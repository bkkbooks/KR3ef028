body:
  text: 傷寒論淺注補正卷六辨厥陰病脈證篇補曰內經云厥陰之上風氣治之風者陰陽摩蕩之氣故西人云樹枝不動亦有微風每一時許行六七里所以噓萬物而遂其生者也人身秉此風氣是生厥陰肝木之臟肝膈下連於腎系為水生木肝膈上連包絡合為一經為木生火三者合化氤氳暢達而血氣得以周流為此厥陰風氣之和也風之為病又由於水冷火熱不得其平之故西洋天文學家言空中之氣有冷熱二種空氣熱則漲而上升他處冷空氣即來補之試於室中熱火門之上下各有孔則上孔之熱氣必外出下孔之冷氣必內入成風之理與此相同因此成兩種風其一為自冷處吹向熱帶之風如熱帶內氣候常熱則氣漲而升南北兩極氣候常冷則南北兩極生風吹向熱帶中去一為自熱處吹向冷處之風蓋風既會於熱帶復散而回轉吹向冷處中國冬日則熱帶在南故風從北吹向南去是為寒風夏日則熱帶在北故風從南吹向北去則為熱風余按吹往南者以陰從陽如周易之巽卦熱帶在南而風生於北故其卦二陽在上而一陰在下也吹往北者陰極陽回如周易之震卦雖易經訓震不名為風然震訓東方也內經云東方生風應春氣陽回陰退之象故上二陰爻而下一陽爻陽生陰退為得其和在人屬厥陰肝經厥者盡也逆也陰盡而陽生極而復返故曰厥陰謂厥陰肝臟內含膽火厥陰包絡下通三焦陰為體而陽為用內經所謂厥陰不從標本從中見之氣化者正謂其通陽和陰以成其氤氳摩蕩之和風則氣血無病也若肝木挾腎水發而為寒風如風從冷帶吹來者也遂發厥利若包絡挾心火發而為熱風如風從熱帶吹來者也遂發膿血或寒熱互相進退為厥熱往來或外寒內熱為厥深者熱亦深或下寒上熱為飢渴又不能食或陰搏陽回為左旋右轉之抽風或陽回陰復為厥熱停勻而自愈至於風之生蟲必先積濕故蟲從風化又云蟲從濕化蓋先有陰濕浸漬後被陽風熏動則蠕蠕而生矣人多不知此經證治皆以風氣二字先不明也厥陰之為病消渴氣上撞心心中疼熱飢而不欲食食則吐蛔下之利不止內經云厥陰之上風氣主之中見少陽是厥陰以風為本以陰寒為標而火熱在中也至厥陰而陰已極故不從標本從於中見厥陰氣之為病中見少陽之熱化則消渴厥陰肝木在下厥陰心包在上風木氣從下而上合心包風火相擊則氣上撞心心中疼熱火能消物故飢胃受木克故雖飢而不欲食蛔感風木之氣而生蛔聞食臭則上於膈故食則吐蛔厥陰之標陰在下陰在下而反下之有陰無陽故利不止此言厥陰自得之病乃厥陰病之提綱也補曰渴欲飲水氣上衝心心中疼熱喜飢此是厥陰包絡挾心火之熱發動於上如赤道熱氣漲而上升之義其不欲食食則吐蛔下之利不止又是厥陰肝氣挾腎水之寒相應而起也如北極冷氣吹往熱帶之義西洋論風最確然中國自古造字風從凡從日吾鄉呂竹如解風字言風者隨陽進退故古文從日今文從蟲者則又蟲因風化之義詳觀造字之義而西洋之説與仲景所論厥陰風氣之為病皆可曉矣注家於厥陰寒熱錯雜處每多訛解因不知風字之義耳厥陰中風脈微浮為欲愈不浮為未愈厥陰風木主氣厥陰中風同氣相感也風為陽病浮為陽脈今脈微浮以陽病而得陽脈故為欲愈若不浮不得陽脈也故為未愈述此言厥陰中風有欲愈之脈有未愈之脈也三陽經中風有中風形證傷寒有傷寒形證三陰中惟太陰篇有太陰中風四肢煩疼太陰傷寒手足自溫二證而少陰厥陰但有中風之脈而無中風之證蓋二經受病邪入已深風寒形證更無分別但陰經之脈當沉細今反浮者以風為陽邪元氣復而邪將散故脈見微浮也浮則欲愈矣若脈不浮是邪深入不能外散故為未愈正曰風為陽邪是但知熱風而不知寒風也吾於總論言風甚詳若執定風為陽邪於厥陰風氣治之之理固不能通且與中風雜病亦多不合厥陰病欲解時從丑至卯上厥陰病欲解時從丑至卯上何也少陽旺於寅卯從丑至卯陰盡而陽生也解於此時者中見少陽之化也此言厥陰病愈之時也補曰淺注此篇凡言得中見之熱化者似將厥陰熱證誤作中見之氣解矣不知內經所謂得中見少陽之化者不指火熱是指衝和之陽而言蓋少陽者陽之初生於一歲為初春於一日為平旦人身厥陰一經風氣治之陽動陰應往往厥熱互勝惟得其和平合於少陽之衝和斯為無病厥陰從中見之氣化者如此以見陰太過則為厥陽太過則為熱必恰合中見少陽之氣則為平和無病此節從丑至卯恰是平旦為少陽司氣之時厥陰至此時則借其和平之氣而愈正是從中見之氣化也若他處熱證亦扯中見為解則混淆矣厥陰病渴欲飲水者少少與之愈厥陰病陰之極也若渴欲飲水者得中見之化也得中之病即從中治宜少少與之愈若多與則入於太陰而變證矣此言木火亢盛得水濟之則陰陽氣和而病自愈男元犀按水為天一之真以水濟火貴乎得當此欲飲水者與消渴引飲有重輕也正曰此言包絡挾心火而發動即熱風也故少與水蓋熱風則當單治其熱意已見於言外讀者勿扯肝木及中見之化為解免生葛藤述厥陰篇自提綱後止三節提出厥陰病其餘則曰傷寒曰病曰厥曰下利而不明言厥陰病者以厥陰從中治而不從標本也正曰厥陰陰盡陽生恐其陰有餘亦恐其陽太過惟得其和平合於中見少陽之氣則無病故從中見之氣化者謂得中見少陽之衝氣則化其偏而為和也乃注不言從中之氣化而言從中治一個治字似欲舍肝與包絡另尋中見以求治法則支離矣且曰其餘皆不明言厥陰病便知厥陰不從標本然仲景六篇中何曾節節皆提出某經某證來以不提厥陰病三字為不從標本不但於義未悉即於文法亦不善讀諸四逆厥者不可下之虛家亦然手冷至肘足冷至膝為四逆手冷至腕足冷至踝為厥凡諸四逆厥者多屬陽氣大虛寒邪直入之證而熱深者亦間之虛寒厥逆其不可下固不待言即熱深致厥熱盛於內內守之真陰被爍幾亡不堪再下以竭之吾為之大申其戒曰此皆不可下之推而言之凡陰虛陽虛之家即不厥逆其不可下也亦然述此起下文諸節厥逆之意正曰此節非起下文乃承上節而言也上節是言熱風此節是言寒風上節是包絡挾心火之熱而發於胸中此節是肝木挾腎水之寒而發於四肢寒宜溫不宜下且四肢厥冷是少陰之本證而亦厥陰之兼證不但厥陰之厥逆不可下即少陰之厥逆亦不可下故以諸字賅之然則厥陰之厥為挾腎寒義可知矣此一節單言寒風合上節言熱風者皆是分疏提綱之意不應扯入熱深陰亡等語反令文義不明傷寒先厥後發熱而利者必自止見厥復利陰陽寒熱原有互換之理厥陰傷寒先得厥陰之標陰則厥後得少陽中見之熱化則發熱既得熱化則向之厥時而利者必於熱時自止醫者治之得法從此厥不再作而利亦不再下矣否則復得標陰之氣仍如前之見厥復利循環不已而病勢日加矣此言陰陽寒熱互換之理也補曰厥熱互相勝負理已詳總論中注家若執標陰之寒中見之熱為解則反不能通蓋火熱水寒乃人身本有之氣肝木挾腎水之寒氣肆發則為厥逆而利包絡挾心火之熱氣肆發則為發熱利止一熱一厥互相進退則為厥熱往來為水寒火熱兩者交會化為衝和之陽氣是為少陽則風氣和矣此仲景所謂陰陽相順接也亦即內經所謂從中見之化也且經言從中見之化並未言從中見之熱蓋厥陰之熱出於心包厥陰之厥發於肝腎也惟不熱不厥化而為少陽之衝和則愈是從其化非從其熱也淺注凡解中見均涉含糊特詳於此而以下皆不再辨矣傷寒始發熱六日厥反九日而利凡厥利者當不能食今反能食者恐為除中食以索餅不發熱者知胃氣尚在必愈恐暴熱來出而復去也後日脈之其熱續在者期之旦日夜半愈所以然者本發熱六日厥反九日復發熱三日併前六日亦為九日與厥相應故期之旦日夜半愈後三日脈之而脈數其熱不罷者此為熱氣有餘必發癰膿也然而寒熱勝負視乎胃氣厥陰傷寒始得時即得少陽中見之熱化故發熱即至於六日一經已過復作再經不得少陽中見之化其厥反至於九日之久厥而即利前詳其義茲不復贅大凡厥利者當不能食今反能食者恐為除中何以謂之除中以其除去中氣求救於食如燈將滅而復明之象也當以索餅試以索餅試之為穀能勝胃土今食以索餅而不暴然發熱者知胃氣尚在故能任所勝之穀氣而相安此可以必其熱來而厥回利愈夫厥陰之厥最喜熱來誠恐暴然之熱一來不久即出而復去也後三日脈之其熱續在者乃中見之熱化猶存即一陽之生氣有主期之旦日寅卯夜半子丑而愈所以然者本發熱六日厥反九日今復續補發熱三日併前六日亦為九日以熱與厥期無太過不及而相應故期之旦日夜半愈若再後三日脈之而脈數其熱不罷者此為中見太過少陽氣有餘逆於肉裏必發癰膿也此論寒熱勝復之理而歸重於胃氣也弟賓有按索餅素餅也不入葷腥故名素夜半陽生旦日陽長陽進而陰退也述此節大意謂發熱則厥利止熱去則復厥利故厥陰發熱非即愈候厥利轉為發熱乃屬愈期耳是以厥轉為熱夜半可愈熱久不能必發癰膿可知仲景不是要其有熱要其發熱而厥利止厥利止而熱亦隨罷方為順候何注家不達此旨強為注釋以致厥陰篇中無數聖訓反成無數疑竇耶補曰與厥相應則厥熱平而合為衝和之少陽故愈厥有餘則純陰無陽為不得愈熱有餘亦為亢陽而非少陽也故必復癰膿而不得愈夜半者陽之初生旦日者陽之衝和乃天少陽司氣之時也借天少陽之氣化人身厥陰寒熱變為衝和之氣所謂得中見少陽之化者如此注家不可妄扯傷寒脈遲六七日而反與黃芩湯徹其熱脈遲為寒今與黃芩湯復除其熱腹中應冷當不能食今反能食此名除中必死前言脈數為熱便知脈遲為寒傷寒脈遲六七日正藉此陰盡出陽之期得陽氣而可望其陽復也醫者不知而反與黃芩湯徹其熱則惟陰無陽矣蓋厥陰為陰之盡當以得陽為主忌見遲脈而反見之脈遲為裏寒今與黃芩湯復除其外熱則內外皆寒腹中應冷當不能食今反能食此名除中謂中氣已除而外去必死由此觀之傷寒以胃氣為本之旨愈明矣述此承上文脈數而推及脈遲反覆以明其義傷寒先厥後發熱下利必自止而反汗出咽中痛者其喉為痹發熱無汗而利必自止若不止必便膿血便膿血者其喉為痹厥陰傷寒先病標陰之氣而厥後得中見之化而發熱既得熱化其下利必自止而反汗出咽中痛陰液泄於外而火熱炎於上也內經云一陰一陽結謂之喉痹一陰者厥陰也一陽少陽也病厥陰而熱化太過者其喉為痹所以然者以下利不當有汗有汗則陽熱反從汗而上升也最妙是發熱之時陽守中而無汗則熱與厥應而利必自止若厥止而熱與利不止是陽熱陷下必便膿血夫既下陷而為便膿血者則陽熱不復上升而其喉不痹上下經氣之相通如此述此言熱化太過隨其經氣之上下而為病也補曰別經寒熱皆不剽疾惟厥陰司風氣風性善動挾寒氣則木克土而迅發疾走是為厥利除中挾熱氣則火流金而迅發疾走是為喉痹便膿血此合上節觀之而厥陰寒熱之義可了然矣傷寒一二日至四五日厥者必發熱前熱者後必厥厥深者熱亦深厥微者熱亦微厥應下之而反發汗者必口傷爛赤厥陰傷寒若一二日未愈過於三日之少陽則從陽而交於陰矣至四五日未愈過於六日之厥陰則又從陰而復於陽矣陰陽不可見見之於厥熱二證在陰而厥者在陽必發熱以此知其前與後之由四五日之前遇陽而熱者一二日之後遇陽必厥以此知其深與微之病厥深者熱亦深厥微者熱亦微此陰陽往復之理也厥應下之以和陰陽之氣而反發汗者必火熱上炎口傷爛赤以厥陰之脈循頰裏環唇內故也此一節遙承上節諸四逆厥者不可下之恐人泥其説而執一不通也注家謂單指厥而言非是按前云不可下者指承氣等方而言也此云應下之者熱證輕有四逆散重有白虎湯寒證有烏梅丸是也沈堯封云此正邪分爭一大往來寒熱病也厥深熱亦深厥微熱亦微猶言寒重則發熱亦重寒輕則發熱亦輕論其常理也其有不然者可以決病之進退矣故下文即論厥少熱多厥多熱少不知注傷寒者皆以熱字作伏熱解遂令厥陰病有熱無寒矣不思烏梅丸是厥陰主方如果有熱無寒何以方中任用薑附桂辛椒大辛熱耶蓋厥陰為三陰之盡病及此者必陰陽錯雜況厥陰肝木於卦為震一陽居二陰之下是其本象病則陽泛於上陰伏於下而下寒上熱之證作矣其病臟寒蛔上入膈是下寒之證據也消渴心中疼熱是上熱之證據也況厥者逆也下氣逆上即是孤陽上泛其病多升少降凡吐蛔氣上撞心皆是過升之病治宜下降其逆上之陽取內經高者抑之之義其下之之法非必硝黃攻克實熱方為下劑即烏梅丸一方已具方中無論黃連烏梅黃柏苦酸鹹純陰為下降即附子直達命門亦莫非下降藥也下之而陽伏於下則陰陽之氣順而厥可愈矣倘誤認為外寒所束而反發其汗則心中疼熱之陽盡升於上而口傷爛赤矣正曰沈氏辨伏熱之非然此一節卻正是伏熱證蓋此節當分兩段解前一段而厥者必發熱是言先厥後熱以厥為主熱發則厥退也後一段前熱者後必厥是言先熱後厥以熱為主厥發則熱伏也故承之曰厥深者熱亦深厥微者熱亦微為伏熱之厥故應下之將此節作兩段解則厥熱往來之理與厥深熱深之義皆明矣傷寒病厥五日熱亦五日設六日當復厥不厥者自愈厥終不過五日以熱五日故知自愈陰陽偏則病而平則愈厥陰傷寒病其標陰在下故厥五日熱化在中故熱亦五日蓋以五日足一候之數也設六日過五日一候之數當復厥不厥者中見之化勝不復見標陰之象也故自愈然或至於六日而仍厥而其厥之罷終不過於五日以發熱五日較之亦見其平故知其不藥而自愈述此言厥熱相應陰陽平當自愈也正曰手足皆有厥陰經且厥陰之脈上至頭頂何以單言標陰在下哉熱化在中之説上文已辨之矣此節總注證陰陽平當自愈義頗了當不應扯標陰中熱等語反生葛藤凡厥者陰陽氣不相順接便為厥厥者手足逆冷者是也手之三陰三陽相接於手十指足之三陰三陽相接於足十指凡厥者陰陽氣不相順接便為厥厥者手足逆冷是也此申明上文致厥之由並起下文諸厥之病承上接下之詞也按陳平伯云本條推原所以致厥之故不專指寒厥言也看用凡字冠首則知不獨言三陰之厥並該寒熱二厥在內矣蓋陽受氣於四肢陰受氣於五臟陰陽之氣相貫如環無端若寒厥則陽不與陰相順接熱厥則陰不與陽相順接也或曰陰不與陽相順接當四肢煩熱何反逆冷也而不知熱邪深入陽氣壅遏於裏不能外達於四肢亦為厥冷豈非陰與陽不相順接之謂乎仲景立言妙之如此受業周易圖按陰陽者厥陰少陽也厥陰統諸陰之極少陽總諸陽之始一行陰道而接於陽一行陽道而接於陰陰陽相貫如環無端此順接也否則陰陽之氣不交則為厥矣補曰不相順接者是言陰陽之氣不交厥自厥而熱自熱不能合同而化也不是十指之脈不相順接要從陰陽氣化上講於義乃確讀總論則知陰陽所以不相順接之故傷寒脈微而厥至七八日膚冷其人躁無暫安時者此為臟厥非蛔厥也蛔厥者其人當吐蛔今病者靜而復時煩者此為臟寒蛔上入其膈故煩須臾復止得食而嘔又煩者蛔聞食臭出其人常自吐蛔蛔厥者烏梅丸主之又主久利厥有相似者必須細辨吐蛔尤其顯然者也而躁而不煩與煩而不躁為少陰厥陰之真面目亦生證死證之大關頭傷寒病脈微為少陰之本脈而厥為少陰之陰證至再復於太陽之七日陽明之八日不得陽熱之化不特足手厥冷而周身之膚亦冷其人躁動而無暫安時者孤陽外脫而陰亦不能為之守也此為少陰之藏真將厥而厥非為厥陰之蛔厥也蛔厥者其人當吐蛔以吐蛔為厥陰主證之大眼目也今病者不躁而靜靜中而復有時發煩與無暫安時者不同此為藏寒蛔不安而上入於膈故因蛔之上膈而煩又因蛔之下膈須臾而煩復止得食而嘔即所謂飢不能食是也又煩者即所謂氣上撞心心中熱是也蛔聞食臭出其人當自吐蛔即所謂食則吐蛔是也厥陰為風木之臟蟲從風生故凡厥陰之變證不一無論見蟲不見蟲辨其氣化不拘其形迹皆可約其旨為蛔厥者統以烏梅丸主之又主久利方何也以厥陰證非厥即利此方不特可以治厥而並可以治利凡陰陽不相順接厥而下利之證亦不能舍此而求方此借少陰之臟厥托出厥陰之蛔厥是明托法節末補出又主久利四字言外見本經厥利相因取烏梅丸為主分之為蛔厥一證之專方合之為厥陰各證之總方以主久利而托出厥陰之全體是暗托法作文有借賓定主之訣余請與儒醫説此腐話補曰此節注尚不差惟所以生蛔之理尚未發明蓋必大小腸中所積糟粕先得肝木挾寒水之氣為之浸漬又得心包絡導火熱之氣薰而煽之則陽引其陰陰動於陽而蠕蠕生蟲矣陽動陰應則風生陰從陽變而蟲出此風氣所以生蟲也蟲生皆在大小腸中以肝與包絡之膜皆下連大小腸也蟲雖生於寒濕而實借感於風熱故臟寒則下焦純寒蛔亦不安欲上膈以就熱須知厥陰寒熱往復乃有此忽然生蛔忽然臟寒忽然蛔上忽然蛔下之證烏梅丸方烏梅三百個細辛六兩乾薑十兩黃連一斤當歸四兩附子六兩炮蜀椒四兩炒去汗桂枝六兩人參六兩黃柏六兩上十味異搗篩合治之以苦酒漬烏梅一宿去核蒸之五升米下飯熟搗成泥和藥令相得內臼中與蜜杵二千下丸如梧桐子大先食飲服十丸日三服稍加至二十丸禁生冷滑物食臭等論云厥陰之為病消渴氣上撞心心中疼熱飢而不欲食食則吐蛔下之利不止此厥陰病之提綱也經云厥陰之上風氣主之中見少陽是厥陰以風為本以陰寒為標而火熱在中也至厥陰而陰已極故不從標本而從於中治正曰解中氣作火熱又曰從中治余於上文已詳辨之茲不復贅沈堯封云此厥陰證之提綱也消渴等證外更有厥熱往來或嘔或利等證猶之陽明病胃家實之外更有身熱汗出不惡寒反惡熱等證故陽明病必須內外證合見乃是真陽明厥陰病亦必內外證合見乃是真厥陰其餘或厥或利或嘔而內無氣上撞心心中疼熱等證皆似厥陰而非厥陰也正曰或厥或利或嘔此篇所論皆是厥陰證也乃云此不是真厥陰是不知厥陰之氣化者矣讀總論及各節補正處自見男元犀按論云傷寒脈微而厥至七八日膚冷其人躁無暫安時者是以少陰證之臟厥喚起厥陰之蛔厥也然少陰證水火不交則為煩躁若真陽欲脫危證則但躁不煩與厥陰之但煩不躁者不同故曰膚冷而躁名曰臟厥非蛔厥也蛔厥為厥陰病的證厥陰陰極陽生中為少陽相火名曰蛔厥此蛔字所包者廣厥陰主風木若名為風厥則遺去木字若名為木厥又遺去風字且用字亦不雅馴若名為風木厥更見執著第以蛔厥二字該之蓋以蛔者風木之蟲也而吐蛔為厥陰之真面目拈此一字而病源病證俱在其中其人當吐蛔者以風木之病當有是證亦不必泥於蛔之有無如本節靜而復煩與上肺氣上衝心心中疼熱皆是也曰蛔聞食臭出其人當自吐蛔又用一當字者言吐蛔者其常即不吐蛔而嘔而又煩風木之動亦可以吐蛔例之也曰靜而復煩曰須臾復止曰又煩者風有作止也然通篇之眼目在此為臟寒四字言見證雖曰風木為病相火上攻而其臟則為寒何也厥為三陰陰之盡也周易震卦一陽居二陰之下為厥陰本象病則陽逆於上陰陷於下飢不欲食下之利不止是下寒之確證也消渴氣上撞心心中疼熱吐蛔是上熱之確證也方用烏梅漬以苦酒順曲直作酸之本性逆者順之還其所固有去其所本無治之所以臻於上理也桂椒辛附辛溫之品導逆上之火以還震卦下一畫之奇黃連黃柏苦寒之品瀉心胸之熱以還震卦上四畫之耦又佐以人參之甘寒當歸之苦溫乾薑之辛溫三物合用能令中焦受氣而取汗而烏梅蒸於米下服丸送以米飲無非補養中焦之法所謂厥陰不治取之陽明者此也此為厥陰證之總方注家第謂蛔得酸則靜得辛則伏得苦則下猶淺之乎測烏梅丸也補曰厥陰之寒熱總因風氣而煽動也故用烏梅斂戢風氣而餘藥兼調其寒熱傷寒熱少微厥指頭寒默默不欲食煩躁數日小便利色白者此熱除也欲得食其病為愈若厥而嘔胸脅煩滿者其後必便血厥陰不特藉少陽之熱化而尤藉少陽少陰之樞轉厥陰傷寒微從少陽之熱化則熱少微現厥陰之標陰則厥微惟其熱少厥微故手足不厥冷而止見指頭帶寒少陽主陽之樞少陰主陰之樞陰陽樞轉不出故默默不欲食少陽主煩厥陰主躁陰陽不能以驟交故俟數日若小便利色白者樞轉利而三焦之決瀆得氣此熱從水道之下行而除也然病以胃氣為本故必以食驗之其人欲得食胃氣和其病為愈若厥而嘔少陰樞轉不出也胸脅煩滿者少陽樞轉不出也陰陽並逆不得外出內傷陰絡其後必便血內經云陰絡傷則便血是也以上俱言厥陰藉少陽之熱化而此言熱化之外又藉其樞轉且又藉陽樞挾陰樞而俱轉也正曰藉熱化既誤而又云藉陽樞亦誤且云借陽樞挾陰樞而俱轉於仲景文義添出葛藤不知此節當分兩段皆言外厥內熱之證上段內熱輕則又厥亦輕但指頭寒而不大厥也故其內之熱亦只默默微煩躁不至於嘔而煩滿也待數日後或得小便利色白者則此微熱已從小便除去遂欲得食而病愈矣此是上段假言厥輕熱微者可得小便利而自愈矣下段乃言內熱之重者曰若厥之甚而又嘔吐比上段之不欲食為更重矣此為厥深熱亦深胸脅必煩滿其後陰尤必便血也義甚爽直何必扯陽樞陰樞為借而又借轉而又轉之説哉病者手足厥冷言我不結胸小腹滿按之痛者此冷結在膀胱關元也熱邪內陷既為便血證矣而寒邪內陷其證若何病者手足厥冷厥陰乏中見之化而標陰之為病重矣胸在上而主陽腹在下而主陰今陰邪各從其類不結於上故言我不結胸結於下故小腹滿以手按之而痛者以厥陰之脈過陰器抵少腹此冷結在少腹內之膀胱關元也述上節熱邪樞轉不出逆於陰絡而便膿血此節寒邪樞轉不出逆於膀胱關元而為冷結也臍下四寸為中極三寸為關元少陽之氣出於中極循關元而上補曰關元即胞宮也又名血室又名氣海又名丹田義詳少陰總論此因肝系之膜下連網油而至臍下肝脈又抵少腹包絡之血下膈循衝任而下會於胞宮故二經之冷亦能下結於胞宮也原文先言我不結胸以見胸前之膜膈固與肝系心包相通而下至胞宮亦是二經膜膈相通之處乃肝之氣與包絡之血會聚之所故能結於此也知此則凡寒疝癥瘕之故皆可會通傷寒發熱四日厥反三日復熱四日厥少熱多者其病當愈四日至七日熱不除者必便膿血厥陰傷寒發熱四日厥反三日復熱四日即厥與熱之日數比較厥少熱多者為陽氣進而陰氣退其病勢當易愈若四日至七日寒去而熱不除者陽氣太過陰血受傷其後必便膿血此節言陰陽勝負可以日數之多寡驗之也厥陰病多有便血者以厥陰主包絡而主血也述張注內經云人之傷於寒也則為熱病熱雖盛不死是傷寒以熱為貴也然熱不及者病太過者亦病故此節論寒熱之多少以明不可太過與不及也補曰厥陰之厥冷是肝挾腎水則侮脾土而利不止厥陰之熱是包絡挾心火則傷血脈而便膿血以包絡主血故也讀者先將寒熱分得開乃知寒熱相錯之故且知包熱肝寒合化則寒熱平而成為少陽之衝和所謂得中見之化則愈也淺注多以熱為中見之化則義反支離傷寒厥四日熱反三日復厥五日其病為進寒多熱少陽氣退故為進也厥陰傷寒厥四日熱反三日復厥五日其病勢為進即其厥與熱之日數比較寒之數多而熱之數少陰氣盛而陽氣退故其病勢為進也上節言熱勝於厥而傷陰此節言厥勝於熱而傷陽也陳平伯云上條以熱多而病愈本條以厥多而病進注家皆以熱多正勝厥多邪勝立論大失仲景本旨如果熱多為正勝當幸其熱之常在以見正之常勝何至有過熱便膿血之變且兩條所言皆因熱深非由寒勝發熱與厥總是邪熱為禍有何正勝邪勝之可言乃仲景以熱多為病愈厥多為病進者是論病機之進退以厥為熱邪向內熱為熱邪向外凡外來客熱向外為退向內為進也故熱多為病邪向愈之機不是病邪便愈之候所以縱有便膿血之患而熱逼榮陰與熱深厥逆者仍有輕重若是厥多於熱者由熱深壅閉陽氣不得外達四肢而反退處於邪熱之中復申之曰陽氣退故為進蓋厥多熱少因陽氣退伏不因陽虛寂滅於熱深之病機為進也此雖引而不發之旨然仲景之意自是躍如奈何注家不能推測反將原文蒙晦耶按此説未免矯枉過正正曰陳平伯只知厥陰有真熱假厥之證而不知厥陰有真厥真熱互見之證謂此節之厥總是熱邪而不知此節之厥正是言寒邪也此篇文法凡言邪熱發厥者皆是先言熱後發厥為厥深熱亦深凡言寒邪發厥者皆是先發厥後乃發熱以見陽回陰退則望其衝和而愈若寒多熱少則陽氣反退陰氣反進故為病進平伯不知此義而修園亦未辨明皆因厥熱之理一間未達耳傷寒六七日脈微手足厥冷煩躁灸厥陰厥不還者死厥陰有不治之證不可不知傷寒六日厥陰主氣既至七日值太陽主氣之期竟不能得陽熱之化陽欲絶而不行於脈故脈微陽欲絶而不行於四肢故手足厥冷虛陽在上而不能下交於陰故煩真陰在下而不能上交於陽故躁此陰陽水火不交之故宜灸厥陰以啓陰中之生陽而交會其水火若灸之而厥不還者陽不復陰氣乖離故死此言上下水火不交而死也言厥陰之病俱見少陰之死證以少陰為厥陰之母乙癸同源窮則反本之義也正曰厥陰之厥原是肝木挾腎水而生寒厥陰之煩原是包絡挾心火而生熱故厥陰俱見少陰之死證義極爽直至謂乙癸同源窮則反本失於太迂曲矣張令韶云灸厥陰宜灸滎穴關元百會等處滎者行間穴也在足大指中縫間會者章門穴也在季脅之端乃厥陰少陽之會關元在臍下三寸足三陰經脈之會百會在頂上中央厥陰督脈之會沈丹彩云可灸太衝二穴在足大指下後二寸陷中灸三壯蓋此穴是厥陰脈之所注也此章凡六節皆論不治之死證傷寒發熱下利厥逆躁不得臥者死厥不還者死可知厥陰病發熱為不死證矣然發熱亦有三者為死證一者厥陰傷寒既見發熱則利當自止而反下利身雖發熱而手足反見厥逆是孤陽外出獨陰不能為之守而躁不得臥者陰盛格陽主死此言厥陰發熱以躁不得臥定為死證也傷寒發熱下利至甚厥不止者死二者厥陰傷寒以熱多厥少為病退病退則利漸止而厥漸回矣今既見發熱熱甚而下下利至甚熱利不止而厥亦不止者即金匱所云六腑氣絶於外者手足寒五臟氣絶於內者利下不禁臟腑氣絶故主死此言厥陰發熱以厥不止定為死證也傷寒六七日不利便發熱而利其人汗出不止者死有陰無陽故也三者厥陰傷寒六日為厥陰主氣之期交七日又有太陽陽熱之化故不利若熱微而渴汗濈濈微利者是陽復之證不可認為虛脫倘若驟然便見發熱而下利其人汗出不止者熱汗下一時並見乃真陽之氣虛脫於內而為利浮散於外而為熱為汗主死所以然者表裏之陽氣皆去陰氣獨存有陰無陽故也此言厥陰發熱以汗出不止定其為死證也傷寒五六日不結胸腹濡脈虛復厥者不可下此亡血下之死然以上皆亡陽之死證而亡陰死證不可不知傷寒五六日六經已周也不傷於氣而傷於血故不結胸既不結胸則腹亦不硬而軟濡脈乃血脈血虛則脈亦虛陰血虛於內不能與陽氣相接於外故手足復厥者慎不可下此厥不為熱深而為亡血若誤下之則陰亡而陽亦亡矣故死上節言亡陽而死此節言亡陰而死也補曰此上四節淺注極其了當惜全書不盡如是也發熱而厥七日下利者為難治病既見少陽之熱化而發熱而仍得厥陰之陰寒而厥厥至於七日六氣已周而又來復於太陽而厥應止矣今則不惟不止反加下利者此陰盛雖未至於死而亦為難治總之厥陰為陰之盡不得陽熱之化即為不可治矣述此言六氣已周病不解而為難治之證也傷寒脈促手足厥逆可灸之陽盛則促雖手足厥逆亦是熱厥忌用火攻然有陰盛之極反假現數中一止之促脈但陽盛者重按之指下有力陰盛者重按之指下無力傷寒脈促知其陽盛之假手足厥逆者知其陰盛之真可於厥陰之井滎經俞等穴灸之以通其陽蓋以厥陰為陰之極貴得生陽之氣也此言厥證之寒也述此章凡八節皆論厥證之有寒有熱有虛有實也傷寒脈滑而厥者裏有熱白虎湯主之傷寒脈滑而厥者陽氣內鬱而不得外達外雖厥而裏有熱也白虎湯主之此言厥證之熱也脈滑為熱然必煩渴引飲乃為白虎湯之對證受業何鶴齡按白虎湯論中兩見一見於陽明篇曰傷寒脈浮滑表有熱裏有寒也此篇曰傷寒脈滑而厥者裏有熱也蓋以脈滑為熱彼滑脈從浮分而見故主表熱而此為裏熱其滑脈從沉分而見可知也手足厥寒脈細欲絶者當歸四逆湯主之若其人內有久寒者宜當歸四逆加吳茱萸生薑湯經脈流行常周不息若經血虛少則不能流通暢達而手足為之厥寒脈細按之欲絶者以當歸四逆湯主之若其人內有久寒者宜當歸四逆加吳茱萸生薑湯主之此言經脈內虛不能榮貫於手足而為厥寒之證也內者中氣也薑萸以溫中氣一説久寒即寒疝癥瘕之屬沈堯封云叔和釋脈云細極謂之微即此之脈細欲絶即與微脈混矣不知微者薄也屬陽氣虛細者小也屬陰血虛薄者未必小小者未必薄也蓋榮行脈中陰血虛則實其中者少脈故小衛行脈外陽氣虛則約乎外者怯脈故薄況前人用微字多取薄字意試問微雲淡河漢薄乎細乎故少陰論中脈微欲絶用通脈四逆主治回陽之劑也此之脈細欲絶用當歸四逆主治補血之劑也兩脈陰陽各異豈堪混釋受業何鶴齡按此厥陰不能上合於心包也心包主血亦主脈橫通四布今心包之血不四布則手足厥寒又不能橫通於經脈則脈微欲絶故以此湯養血通脈以主之補曰沈氏論脈甚精何氏心包主血亦與此經之旨意相合此等好注腳不可多得當歸四逆湯方當歸三兩桂枝三兩芍藥三兩細辛三兩大棗二十五個甘草二兩炙通草二兩按即今之木通是也今之通草名通脫木不堪用上七味以水八升煮取三升去滓溫服一升日三服當歸四逆加吳茱萸生薑湯方即前方加吳茱萸半升生薑三兩以水六升清酒六升和煮取五升去滓分溫五服陳平伯云仲景治四逆每用薑附今當歸四逆湯中並無溫中助陽之品即遇內有久寒之人但加吳茱萸生薑不用乾薑附子何也蓋厥陰肝臟藏榮血而應肝木膽府內寄風火同源茍非寒邪內犯一陽生氣欲寂者不得用大辛大熱之品以擾動風火不比少陰為寒水臟其在經之邪可麻辛與附子合用也是以雖有久寒不現陰寒內犯之候者加生薑以宣泄不取乾薑之溫中加吳萸以苦降不取附子之助火分經投治法律精嚴學者所當則效也受業林士雍按此證何以辨為真厥陰中風之病蓋風為陽邪一也入於一經則隨一經之氣變其面目論中提六經之病皆加一為字可味中於厥陰陽邪則其厥愈深其脈愈細所謂先厥後必發熱也大要從本篇提綱處細繹其旨而得其真今且於本節後半若其人內有久寒者八字對面尋繹出來彼曰內便知此之為外太陽篇有外不解用桂枝湯之例彼曰久便知此為暴病非十日已去過經不解之邪彼曰寒寒為陰邪便知此為中風之陽邪故君當歸補厥陰之血即取桂枝湯為解外之法加細辛木通烈而且通因病未久而期速去之意去生薑重加大棗以風為陽邪與厥陰合為一家恐助辛桂之熱當馴辛桂之性若內有久寒方加吳萸生薑清酒之溫一為中風主治一為傷寒主治正曰林説許多矯強皆因誤認風為陽邪之故當歸四逆湯明是溫藥與陽邪不合今欲遷就其詞以曲圓其風為陽邪之説則兩失矣羅東逸曰厥陰為三陰之盡陰盡陽生若受寒邪則陰陽之氣不相順接故脈微而厥然厥陰之臟相火遊行其間經雖受寒而臟不即寒故先厥者後必發熱所以傷寒初起見其手足厥冷脈細欲絶者不得遽認為寒而用薑附也此方取桂枝湯君以當歸者厥陰主肝肝為血室也佐細辛其味極辛能達三陰外溫經而內溫臟通草其性極通善開關節內通竅而外通榮去生薑者恐其過表也倍大棗者即建中加飴之義用二十五枚者取五五之數也肝之志苦急肝之神欲散辛甘併舉則志遂而神悅未有厥陰神志遂悅而脈微不出手足不溫者也不須參苓之補不用薑附之峻此厥陰厥逆與太少不同者也若其人內有久寒非辛溫之品不能兼治則加吳萸生薑之辛熱更用酒煎佐細辛直通厥陰之臟迅散內外之寒是又救厥陰內外兩傷於寒之法也正曰此因脈細知其寒在血分不在氣分故不用薑附而但用桂辛以溫血也羅氏扯説相火謂雖厥冷脈細不得遽認為寒然試問當歸四逆湯非治寒而何大汗出熱不去內拘急四肢疼又下利厥逆而惡寒者四逆湯主之經脈內虛而厥既有當歸四逆之治法矣而陽虛而厥治之奈何大汗出為表陽虛熱不去為陽氣外越內拘急為陰氣內盛四肢疼為陽虛不能四達又下利為下焦之生陽下泄厥逆而惡寒者表陽脫於外生陽泄於下也以四逆湯主之回表陽之外脫救生陽之下陷此陽虛而厥反作假熱之象也陳亮師云大汗出謂如水淋漓熱不去謂熱不為汗衰蓋言陽氣外泄寒邪獨盛表虛邪盛如此勢必經脈失和於是有內拘急四肢疼之證也再下利厥逆陰寒內盛惡寒陽氣大虛故用四逆湯急溫經復陽以消陰翳陳平伯云大汗身熱四肢疼皆是熱邪為患而仲景便用四逆湯者以外有厥熱惡寒之證內有拘急下利之候陰寒之象內外畢露則知汗出為陽氣外亡身熱由虛陽外越肢疼為陽氣內脫不用薑附以急溫虛陽有隨絶之患其辨證處又只在惡寒下利也總之仲景辨陽經之病以惡熱不便為裏實辨陰經之病以惡寒下利為裏虛不可不知愚按上節言內有久寒而厥只用生薑吳茱萸此節言熱不去厥而惡寒重用乾薑生附子學者務宜於此處講究補曰上節無下利只肝經血脈之寒故不用薑附此節有下利是肝挾腎水之寒故用薑附最易曉也何必煩言惟此與少陰四逆所以同中有異者在內拘急四肢疼二者皆是腹內之膜四肢之筋為寒凝結也筋膜當統於肝膈故此屬厥陰其他寒疝轉筋皆如此例用生附者取其麻烈之味兼秉風性能追風也烏頭煎亦是此義若一炮熟則風性去而但能溫腎大汗若大下利而厥冷者四逆湯主之陽亡於外而大汗若陽脫於內而大下利外亡內脫而厥冷者四逆湯主之此陽虛而厥無假熱之象也上節有假熱此節無假熱陳亮師云汗而云大則陽氣亡於表下利云大則陽氣亡於裏矣如是而又厥冷何以不列於死證條中玩本文不言五六日六七日而但云大汗大下乃陰寒驟中之證凡驟中者邪氣雖盛而正氣初傷急急用溫正氣猶能自復未可即稱死證不比病久而忽大汗大下陰陽脫而死也故用四逆勝寒毒於方危回陽氣於將絶服之而汗利止厥逆回猶可望生程扶生云不因汗下而厥冷者用當歸四逆因汗下而厥冷者用四逆此緩急之機權也喻氏曰此證無外熱相錯其為陰寒易明然即云大汗大下則陰津亦亡但此際不得不以救陽為急俟陽回乃可徐救其陰也愚按救陰非熟地之類四逆湯加人參足矣病人手足厥冷脈乍緊者邪結在胸中心下滿而煩飢不能食者病在胸中當須吐之宜瓜蒂散亦有因痰水而致厥者厥雖不同究竟統屬於陰證厥內不可不知試先言痰厥病人無他證忽然手足厥冷以四肢受氣於胸中胸中為痰飲結聚斯氣不能通貫於四肢矣脈乍緊者以痰脈怪變無常不緊而忽緊忽緊而又不緊也實指其病原之所在曰邪結在胸中胸者心主之宮城心為邪礙心中滿而煩煩則火能消物故飢滿則痰火壅塞雖飢而仍或不能食者治法高者越之此病在胸中當須吐之宜瓜蒂散此言痰之為厥也受業黃奕潤按此厥陰不病陰臟之虛寒而病胸中之陽位既在胸中不必治其風木惟吐去胸中之邪則木欣欣而向榮矣正曰乍緊者謂初得病時脈即見緊也淺注解為忽緊而又不緊謂是痰脈怪變然考仲景各處論痰均無怪脈且仲景書皆是憑脈憑證以為斷曰厥冷則寒證也曰脈緊則寒脈也所謂邪結在胸中者即寒邪也胸中指膈膜言邪在膈中則包絡之火不得下行故煩故不能食者肝寒動於下也總因邪在胸膈間但吐去膈中之寒邪而包絡與肝兩皆暢矣凡寒結則水聚不得將寒飲分為兩事傷寒厥而心下悸宜先治水當服茯苓甘草湯卻治其厥不爾水漬入胃必作利也再言水厥傷寒手足厥其證不一而惟審其心下悸者為水停於心之下胃之上心為陽臟而惡水水氣乘之是以悸動宜乘其未入胃之時先治其水當服茯苓甘草湯雖曰治水卻治其厥倘若不爾則水從脘上漬入於胃必作利也夫厥證最忌下利利則中氣不守邪愈內陷故與其調治於既利之後不若防患於未利之前所以宜先治水此言水之為厥也茯苓甘草湯方見太陽篇二卷魏念廷云此厥陰病預防下利之法蓋病至厥陰以陽升為欲愈邪陷為危機若夫厥而下利則病邪有陷無升所以先治下利為第一義無論其厥之為寒為熱而俱以下利為不可犯之證如此條厥而心下悸者為水邪乘心心陽失御之故見此則治厥為緩而治水為急何也厥猶可從發熱之多少以審進退之機水則必趨於下而力能牽陽下墜者也法用茯苓甘草湯以治水使水通而下利不作此雖治末實治本也若不治水則水漬入胃隨腸而下必作下利利作則陽氣有降無升厥利何由而止故治厥必先治水也傷寒六七日大下後寸脈沉而遲手足厥逆下部脈不至喉咽不利唾膿血泄利不止者為難治麻黃升麻湯主之厥證以作利為大忌未利為預防其自利若誤下而利不止不可不立救治之法以盡人事傷寒六七日乃由陰出陽之期醫者不知誤施大下之後虛其陽氣故寸口之陽脈沉而遲陽虛不與陰相接故手足厥逆且大下之後虛其陰氣故下部之陰脈不至陰虛亦不與陽接陰陽兩不相接此手足厥逆之所由來也厥陰之脈貫膈上注肺循喉嚨之後大下後亡其津液遂成肺痿故咽喉不利而唾膿血泄利不止者厥陰首節以下之利不止者示戒今誤下為生氣內陷之劇證矣此為難治然亦不忍置之而不治姑以麻黃升麻湯主之此承上節必作利而言大下後之劇證也錢天來云厥陰為含陽之體陽氣藏於至陰之中乃陰之極處所以本篇首條即有下之利不止之禁在陽經尚有表證未解者況陰經本不可下而妄下之使未解之經邪陷入於至陰之中乎寸脈者氣口也經云氣口獨為五臟主胃陽衰而寸脈沉遲也手足四肢也經云四肢為諸陽之本陽虛故手足厥逆也下後陽虛於下故下部脈不至下寒則熱迫於上故咽喉不利而吐膿血也即前所謂厥後熱不除者必便膿血熱氣有餘必發癰膿及口傷爛赤之變證也泄利不止寒邪在下所謂厥者必利亦即下之利不止之義也正虛邪實陰盛陽衰寒多熱勝表裏舛錯治寒則遺其熱治熱必害於寒補虛必助其實瀉實必益其虛誠為難治仲景不得已立麻黃升麻湯主之麻黃升麻湯方麻黃一兩半去節升麻一兩一分當歸一兩一分知母黃芩萎蕤各十八銖石膏碎綿裹白朮乾薑芍藥天門冬去心桂枝茯苓甘草各六銖炙上十四味以水一斗先煮麻黃一兩沸去上沫納諸藥煮取三升去滓分溫三服相去如炊三斗米頃令盡汗出愈張令韶曰傷寒六七日乃由陰出陽之期也粗工以為大熱不解而大下之虛其陽氣故寸脈沉遲手足厥逆也下為陰下部脈不至陰虛不能上通於陽也咽喉不利吐膿血陽熱在上也泄利不止陰寒在下也陰陽不相接故為難治與升麻麻黃桂枝以升陽而復以茯苓白朮乾薑調其下利與當歸白朮天冬萎蕤以止膿血與知母黃芩甘草以利咽喉石膏性重引麻黃升麻桂枝直從裏陰而透達於肌表則陽氣下行陰氣上升陰陽和而汗出矣此方藥雖駁雜意義深長學者宜潛心細玩可也補曰此證此方極其難解張令韶之説可謂精矣但未知實得仲景之心否耶傷寒四五日腹中痛若轉氣下趣少腹者此欲自利也傷寒三日之後陽入於陰至四五日病未愈則氣又值於厥陰其人腹中痛為太陰之部位若轉氣下趨少腹者由太陰而仍歸厥陰之部位是厥陰不得中見之化反內合於太陰寒氣趨下惟下不上此欲自利也述自此以下凡十八節皆論厥陰下利有陰陽寒熱虛實生死之不同也此言厥陰寒利也補曰厥陰之寒利皆是肝木挾寒水以侮脾經義最明顯不可牽扯中見之化也再者下趨少腹此中有路道是言從肝膈行油膜中則下至少腹從少腹之油膜以入於大腸則作利矣故內經云肝與大腸通傷寒本自寒下醫復吐下之寒格更逆吐下若食入口即吐乾薑黃芩黃連人參湯主之傷寒人平日本自虛寒利下醫復吐下之則上熱為下寒所格蓋以寒本在下而更逆之以吐下下因下而愈寒上因上而愈熱若火之上炎食入口即吐不宜於橘半甘草以乾薑黃連黃芩人參湯主之此言厥陰因吐下而為格陽證也若湯水不得入口去乾薑加生薑汁少許徐徐呷之此少變古法屢驗乾薑黃連黃芩人參湯方乾薑黃芩人參黃連各三兩上四味以水六升煮取二升去滓分溫再服蔚按傷寒本自寒下者以厥陰之標陰在下也醫復吐下之在下益寒而反格熱於上以致食入即吐方用乾薑辛溫以救其寒芩連苦寒降之且以堅之然吐下之後陰陽兩傷胃氣索然必藉人參以主之俾胃氣如分金之爐寒熱各不相礙也方名以乾薑冠首者取乾薑之溫能除寒下而辛烈之氣又能開格而納食也家君每與及門論此方及甘草附子湯謂古人不獨審病有法用方有法即方名中藥品之前後亦寓以法善讀書者當讀於無字處也下利有微熱而渴脈弱者今自愈厥陰若得中見之化則自愈下利為標陰在下之病有微熱而渴則為火氣在中矣更得脈弱者可以定其少陽之微陽漸起遂斷之曰今自愈此言得中見之化補曰有微熱則利當止矣熱不甚而微又其脈不大而弱為得少陽之衝氣故愈注以熱為火氣在中則非也余於上文已屢言之以下皆不再贅云下利脈數有微熱汗出今自愈設復緊為未解下利脈數少陽火熱勝也有微熱汗出厥陰少陽兩相和合亦可以斷之曰今自愈然緊與數相似而實不同數為陽為熱緊為陰為寒吾謂數脈自愈者以其得少陽之化也設令不數而復緊是復得厥陰之氣矣故為未解此亦言得中見之化又以數緊二脈分言其解與未解也下利手足厥冷無脈者灸之不溫若脈不還反微喘者死少陰負趺陽者為順也厥陰下利手足厥冷陽陷下不能橫行於手足也無脈者陽陷下不能充達於經脈也灸之起陷下之陽手足應溫而竟不溫然手足雖不溫而不望其脈還為吉兆若脈亦不還反加微喘者是下焦之生氣不能歸元而反上脫也必死所以然者脈之源始於少陰生於趺陽少陰趺陽為脈生始之根少陰脈不至少陽脈不出故少陰則在下趺陽在上故必少陰上合而負於趺陽者戊癸相合脈氣有根其證為順也其名負奈何如負戴之負也此言厥陰下利陽陷之死證而並及於脈之本源也下利寸脈反浮數尺中自澀者必清膿血厥陰下利脈當沉遲若寸脈反見浮數乃熱邪上乘心包也尺為陰部澀則無血尺中自澀者陰血虛也陽盛陰虛迫血下行必清膿血此言熱傷包絡而便膿血也包絡手厥陰而主血也上節言陰盛傷陽此節言陽盛傷陰補曰便膿血者即今之痢證也遍考金匱傷寒所稱便膿血皆是痢證皆屬厥陰經蓋厥陰包絡主血脈包絡熱甚則血脈傷厥陰肝經主風氣風火交煽血化為膿而肝又主疏泄疏泄之利太過則迫注下利若大腸中之金氣不收澀則不後重如金氣收澀則利而不快故後重凡痢多發於秋皆金木不和故乘金令而發痢也下利清穀不可攻表汗出必脹滿厥陰內合臟氣而中見少陽不在於裏即在於中故無表證下利清穀臟氣虛寒也臟氣虛寒當溫其裏不可攻表攻表汗出則表陽外虛裏陰內結故必脹滿經云臟寒生滿病是也此言厥陰臟氣虛寒而下利不可發汗也下利脈沉弦者下重也脈大者為未止脈微弱數者為欲自止雖發熱不死厥陰下利喜得少陽中見之化少陽之脈弦而不沉若脈沉弦者為少陽初陽之氣下陷故利而下重也夫少陽為陰中初陽不可不及亦不可太過若脈大者則為太過其利未止若脈見微弱之陰象又見數之陽象者乃陰中有陽正合少陽之象為欲自止考之內經有身熱則死之説而此得中見之化為陰出之陽雖發熱不死此言厥陰下利而中見之氣下陷也下重是火邪下迫於肛門見下白頭翁湯證然亦有木氣不升恐苦寒無以升達木氣喻嘉言借用小柴胡湯亦是巧思暗合即局方人參敗毒散亦頗有意義下利脈沉而遲其人面少赤身有微熱下利清穀者必鬱冒汗出而解病人必微厥所以然者其面戴陽下虛故也厥陰陰寒在下則為下利脈沉而遲三陽之氣上循頭面陽格於上則其人面少赤雖身有微熱喜其得少陽之熱化但得少陽之熱化少而得厥陰之標陰多其下利清穀者厥陰之標陰全陷於下可見也陽熱在上陰寒在下兩不相接危在頃刻惟大具旋轉乾坤之手者取少陰篇大方救之從陰出陽儼有龍戰於野之象必鬱冒汗出而解然雖解而病人必微厥所以然者其面戴陽陽在上而不行於下下焦陽虛故也此言三陽陽熱在上而在下陰寒之利猶冀其上下相通而得解也師於最危之證審其有一線可回者亦不以不治而棄之其濟人無已之心可謂至矣但此證醫家托別故而遠去病家聽於命而不藥余每遇此獨肩其任十中亦可愈其六七特無如三四證之未愈者受怨招謗實徒自苦至今而不能改者區區此心如是則安不如是則不安也補曰原文中間者字下必字上當有脫簡故治法遺漏下利脈數而渴者今自愈設不瘥必清膿血以有熱故也厥陰下利證前言脈數有微熱汗出今自愈又言有微熱而渴脈弱者今自愈皆言得中見之化也設不差乃中化太過上合厥陰心包必隨下迫而清膿血蓋少陽三焦屬火厥陰心包亦屬火兩火相併以有熱故也此遙承第三第四節而言也下利後脈絶手足厥冷晬時脈還手足溫者生脈不還者死下利生死之證論之詳矣而茲再申言其利後下利後中土虛也中土虛則不能從中焦而注於手太陰故脈絶上貫四旁虛則手足不溫而厥冷脈以平旦為紀一日一夜終而復始共五十度而大周於身晬時為環轉一周而脈得還手足溫者中土之氣將復復能從中焦而注於太陰故生脈不還者中土已敗生氣已絶雖手足不逆冷亦主死述此言生死之機全憑於脈而脈之根又藉於中土也夫脈生於中焦從中焦而注於手太陰終於足厥陰行陽二十五度行陰二十五度水下百刻一周循環至五十度而復大會於手太陰故脈還與不還必視乎晬時也補曰手足雖屬脾而厥冷實屬腎之陽虛脈雖注於肺而其根實生於心之血管言脾肺而不言心腎是知其末不知其本蓋脾肺屬後天心腎屬先天仲景凡言生死多以先天為斷以先天未絶則猶可生後天也若先天即絶則斷乎不救陳亮師云此言下利後死證諸節皆言下利此節獨言下利後則與少陰下利止而頭眩時時自冒者同意也利後似乎邪去殊不知正氣與邪氣俱脫之故晬時脈還手足溫者陽氣尚存一線猶可用四逆白通等法否則死期近矣敢望生哉此證若是久利脈絶斷無復還之理若一時為暴寒所中致厥冷脈伏投以通脈四逆白通之類尚可望其還期然醫家之肩此重任亦難矣傷寒下利日十餘行脈反實者死傷寒下利日十餘行則胃氣與臟氣俱虛矣證虛而脈反實者無胃氣柔和之脈而真臟之脈見矣主死述此言證虛脈實者死也下利清穀裏寒外熱汗出而厥者通脈四逆湯主之穀入於胃藉中土之氣變化而腐以成糟粕猶奉心化赤而為血之義也若寒傷厥陰厥陰之標陰氣盛穀雖入胃不能變化其精微蒸津液而泌糟粕清濁不分以致下利清穀陰盛格陽以致裏寒外熱汗出而厥者與少陰篇之通脈四逆湯證相似亦宜以通脈四逆湯主之啓生陽之氣而通心主之脈此言裏不通於外而陰寒內拒外不通於裏而孤陽外越非急用大溫之劑必不能通陰陽之氣於頃刻熱利下重者白頭翁湯主之厥陰協中見之火熱而利謂之熱利下重者熱鬱於下氣機不得上達也以白頭翁湯主之述上節言裏寒下利而為清穀此節言裏熱下利而為下重也即內經所謂暴注下逼皆屬於熱之旨也條辨云下重者厥陰經邪熱下入於大腸之間肝性急速邪熱甚則氣滯壅塞其惡濁之物急欲出而不得故下重也白頭翁湯方白頭翁二兩黃連黃柏秦皮各三兩上四味以水七升煮取二升去滓溫服一升不愈更服一升蔚按厥陰標陰病則為寒下厥陰中見病則為下利下重者則經所謂暴注是也白頭翁臨風偏靜特立不撓用以為君者欲平走竅之火必先定搖動之風也秦皮浸水青藍色得厥陰風木之化故用以為臣以黃連黃柏為佐使者其性寒能除熱其味苦苦又能堅也總使風木遂其上行之性則熱利下重自除風火不相煽而燎原則熱渴飲水自止補曰市中白頭翁繁茸曲屈形如蒿艾其葉外白內青又名白茵陳實非白頭翁也蓋白頭翁一莖直上四面細葉莖高尺許通體白芒其葉上下皆白莖也花微香而味微苦乃草中秉金性者能無風獨搖以其得木氣之和也有風不動以其秉金性之剛也故用以平木熄風又其一莖直上故治下重使風氣上達而不迫注此藥四川田野多有川人多能識之與川柴胡同形而大小青白之色不同惜川柴胡天下亦不知用皆未考仲景之藥性故也下利腹脹滿身體疼痛者先溫其裏乃攻其表溫裏宜四逆湯攻表宜桂枝湯厥陰病下利腹脹滿為裏寒身體疼痛者為表寒夫臟寒生滿病厥陰之脈挾胃寒甚則水穀之氣下行陰寒之氣上逆故不惟下利而且脹滿也表裏相權以裏為主必也先溫其裏裏和而表不解始乃專攻其表溫裏宜四逆湯攻表宜桂枝湯此節言寒在表裏治有緩急之分也述下利而腹脹滿其中即伏清穀之機先溫其裏不待其急而始救也裏和而表不解可專治其表朱注云攻專治也此不曰救而曰攻義同下利欲飲水者以有熱故也白頭翁湯主之下利欲飲水者以有少陽火熱在中陰液下泄而不得上滋故也以白頭翁湯主之此節言熱淫上下方有一貫之道也述此申明白頭翁湯能清火熱以下降而引陰液以上升也下利譫語者有燥屎也宜小承氣湯厥陰下利譫語者中見火化與陽明燥氣相合胃氣不和有燥屎也厥陰忌下有燥屎不得不下也宜小承氣湯微和胃氣述此言中見火化上合燥氣而為陽明燥實證也下利後更煩按之心下濡者為虛煩也宜梔子豉湯前既詳下利後之死證今試言下利後不死之證下利後水液下竭火熱上盛不得相濟乃更端復起而作煩然按之心下濡者非上焦君火亢盛之煩乃下焦水陰不得上濟之煩此為虛煩也宜梔子豉湯以交水火此言下利後水液竭不得上交於火而為虛煩也嘔家有癰膿者不可治嘔膿盡自愈厥陰包絡屬火而主血嘔家有癰膿者熱傷包絡血化為膿也此因內有癰膿腐穢欲去而嘔若治其嘔反逆其機熱邪內壅無所泄矣必不可治嘔膿盡則熱隨膿去則自愈述此章凡四節俱論厥陰之嘔有氣血寒熱虛實之不同也補曰便膿血屬厥陰嘔膿血亦屬厥陰則知厥陰主血膿並知風熱相煽則血化為膿凡治一切膿血皆得主腦矣嘔而脈弱小便復利身有微熱見厥者難治四逆湯主之厥陰病氣機上逆而嘔裏氣大虛而脈弱氣機下泄而小便復利身有微熱見厥者陰陽之氣不相順接也上者自上下者自下有出無入故為難治若欲治之且以四逆湯主之述此言上下內外氣機不相順接而為難治之證也乾嘔吐涎沫頭痛者吳茱萸湯主之有聲無物而乾嘔其所吐止是涎沫兼見頭痛者厥陰之脈挾胃上顛故也以吳茱萸湯主之此言厥陰陰寒極盛津液為寒氣絆逆而上故所嘔皆涎沫而無飲食痰飲而且逆行顛頂而作頭痛非此大劑不能治此劇暴之證方中無治頭痛之藥以頭痛因氣逆上衝止嘔即所以治頭痛也嘔而發熱者小柴胡湯主之厥陰主闔不特藉中見之化尤藉中見之樞今嘔而發熱者闔而不能樞轉也以小柴胡湯主之此厥陰病從少陽之樞而治之也發熱二字應是寒熱往來述厥陰與少陽為表裏邪在厥陰惟恐其厥逆下利若見嘔而發熱是藏邪還府自陰出陽無陰邪變逆之患矣故當從少陽法治之傷寒大吐大下之極虛復極汗者其人外氣怫鬱復與之水以發其汗因得噦所以然者胃中寒冷故也傷寒以胃氣為本不獨厥陰然也而厥陰不治取之陽明尤為要法傷寒大吐大下之則內既極虛復極汗出者則外亦極虛虛則氣少不得交通於內徒怫鬱於外故以其人外氣怫鬱恰如外來之邪怫鬱於表醫人認為邪熱不得汗復與之水以發其汗既虛且寒因而得噦所以然者胃中寒冷故也述此言傷寒以胃氣為本故特結胃氣一條以終厥陰之義蓋汗吐下皆所以傷胃氣故於此總發明之仲景書噦即厄也噦為重證與方書嘔吐噦作一類者不同傷寒噦而腹滿視其前後知何部不利利之即愈噦既有虛寒之證亦有實熱之證厥陰之經抵少腹挾胃上入頏顙凡噦厄之氣必從少腹而起由胃而上升於咽嗓故也傷寒噦而腹滿必其人前後便不利水火之氣不得通泄反逆於上而作噦矣視其前後知何部不利利之則噦愈述即一噦通結六經之證以見凡病皆有虛實不特一噦為然也然即一噦而凡病之虛實皆可類推矣故於此單提噦證一條不特結厥陰一篇而六篇之義俱從此結煞是傷寒全部之結穴處也夫傷寒至噦非中土敗絶即胃中寒冷然亦有裏實不通氣不得下泄反上逆而為噦者玉機真臟論曰脈盛皮熱腹脹前後不通悶瞀此謂五實身汗得後利則實者活今噦而腹滿前後不利五實中之二實也實者瀉之前後大小便也視其前後二部之中何部不利利之則氣得通下利而不上逆噦即愈矣夫以至虛至寒之噦證而亦有實者存焉則凡系實熱之證而亦有虛者在矣醫者能審其寒熱虛實而為之溫涼補瀉於其間則人無夭扎之患矣
