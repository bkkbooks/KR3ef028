body:
  text: 傷寒論淺注補正卷五辨少陰病脈證篇補曰少陰一經水火陰陽之故不易知也今特分合詳言如下足少陰腎經腎形如豆居背脊十四椎下左右各一枚中有油膜一條是為腎系貫於脊中以通髓道名曰命門為人身生氣之根腎屬坎水之陰其系則坎水中之一陽從此系生出膜網周於上下名曰三焦故內經曰腎合三焦三焦根於腎系生出油網連接大腸之前膀胱之後中間一個夾室是為胞宮道家謂之丹田與膀胱只隔一層膀胱者為腎行水之府也故內經又曰腎合膀胱西醫言人飲水從胃散出走油膜歷腎中兩腎將水滴瀝然後從油膜入下焦以滲入膀胱此膀胱所以為腎之陰府也又賴三焦為腎之陽府陰陽相交合為坎中滿之象而氣生焉故內經云腎生氣西洋有人身氣管圖從鼻入肺過心循背脊入腎而下分細管以入腹又圖前面亦有氣管惟臍旁者最大西洋所圖不知前後管各有不同後面是吸入之氣管前面是呼出之氣管循環一周內經所以有任督之分凡人張口能出氣而不能入氣即知呼吸有前後之異矣內經又云生氣通天蓋人鼻孔所吸者天陽也吸天陽入肺歷心又引心火從背後氣管而至於胞中膀胱與胞相連胞中之陽熱遂熏蒸膀胱之水化而為氣餘瀝則泄為小便膀胱如釜中著水胞中如灶底添薪蒸水為氣透出膀胱亦歸胞中故胞宮又名氣海此氣然後循臍旁之氣街穴上胸膈而出於肺是為呼出之氣衛皮毛溫支體出聲音充臟腑只此一氣而已矣氣出口鼻又化津液蓋氣本水中陽氣所化遇陰則復化為水人身肺為清金氣上則化津如西洋化學所謂天陽上升至冷則復下化為雨露也手少陰心經心體上圓下尖形如牛心其上周圍有夾膜膏油包裹即包絡也包絡上為心系連於肺系皆著於頸下其系之膜網遂循腔子而至胸肋盡處則為膈膈下為中焦之膜油又下則為下焦矣心中脈管通於上下內外者皆是從包絡之膜油而行達也西醫言心空如囊有兩房左房遞血出行周於身則血變紫色名為炭氣復返於肺得出氣吹之紫色退而還為赤血乃從心右房以入其左右開闔起落不休則周身之脈應之而動醫林改錯妄言脈是氣管謂氣方能動然使脈果是氣管則當與呼吸相應何以一呼脈兩跳一吸脈兩跳顯與氣之出入相違則脈為血管無疑難經云脈為血府內經云心之合脈也與西醫之説皆合惟西醫知血生於心出則名血管不名為脈且心之何以能生血則西醫不知也善夫內經之言曰南方生熱熱生火火生苦苦生心心生血在天為熱在地為火在臟為心在色為赤此數句將心之生血發明無遺蓋心在五行秉火氣以為體者也於卦為離離火之色正赤故心火化液則為赤血離中含陰故心亦陽中有陰乃化為血此陰字是指陰液乃人之津入胃中化穀取出汁液從胃絡上行於肺其色尚白婦人之乳汁即此上行於肺之汁液也又上交於心則得心火之化而變赤色是為血故婦人乳子則血少而經不行即知汁液奉心乃化為血也靈樞云中焦泌糟粕蒸津液化其精微上注於肺脈乃化為血此液上入於心即離中之陰也陰得陽化而為血血雖火體而仍屬陰分其理明矣合心腎論之曰心主血脈腎主元氣血為營營行脈中氣為衛衛行脈外西洋醫謂回血管至肺復入心即內難經所謂人一呼脈行三寸一吸脈行三寸晝夜一萬三千五百息脈行五十度周於身復會於手太陰肺是其義也衛氣則晝行於陽二十五度則人醒夜行於陰二十五度則人寐平旦行盡則衛氣與營血大會於手太陰肺營以為守衛以為御營統於肝衛統於肺而其根則皆在心腎也內經云腎藏精然精雖以腎為主而實則合心血之所化也內經云女子二七而天癸至任脈通太衝脈盛月事以時下男子二八而天癸至精氣溢泄天癸者天一坎中之陽氣從命門下至胞宮則化為水名曰天癸是督脈所發乃先天陽氣至於胞宮也陽至則陰應之胸前任脈與太衝脈皆司後天之陰血導心血下入胞中與天癸之水相合女子屬陰以血為主則氣從血化天癸之水皆變為赤色陰之道主下行是為月信男子屬陽以氣為主則血從氣化血皆變為水之色是之謂精精非清水極稠濃者以其中含血質也陽之道主上行是生髭鬚其精之內斂者則返至腎系入於脊中是生骨髓上至於腦而為髓海腦開七竅與天氣通故腦髓者又人身元氣所宰矣內經又曰心藏神然神雖以心為主而實合髓以為用者也西洋醫言人知覺運動皆腦髓筋用事心是頑物不主知覺其説非也西醫知腦髓筋通於心而不知心能用髓髓不能用心髓是坎水之精所化髓通於心合為離火中含一陰之象惟其陰精內含陽精外越所以心火光明燭照事物而神出焉即如讀文字久猶記憶其能記者腦髓之力也此髓譬如照像將影留在鏡上即久猶記得之理也然此影不自留於鏡必先用日光照之乃入於鏡則知此文字不自入於髓中必用心讀之然後留記於腦髓之中不思則不記後再思之則能記得其思之也心火上照其髓而所留記之文字乃出古人思字從心從囪殆即以心用髓之義而心之藏神意可知矣夫心腎本分水火而皆稱少陰經者以心主血腎主水皆具陰質而二經皆陰中有陽不純於陰故曰少陰皆稱熱氣治者蓋天地水中之陽氣上騰積聚陽精則為日水中之陽與天上之日亦止是一熱氣而已若乎火者麗木則明有形質與熱之但屬氣分者不同所謂麗木則明之火也故就先天根源論之則少陰統稱熱而火屬少陽乃為麗木則明之火熱屬氣火屬血熱與火不同故六經分熱與火為二氣焉心主血血脈下行而交於大腹膜中腎主氣氣道上行亦交於大腹膜中大腹者中焦也為脾所司血液與氣澤交會於此遂生膏油以化水穀此少陰心腎交於中土之實迹也餘再詳原文注中少陰之為病脈微細但欲寐也內經云少陰之上君火主之又云陰中之陰腎也是少陰本熱而標寒上火而下水其病不可摸捉故欲知少陰之為病必先知少陰之脈象其脈薄而不厚為微窄而不寬為細又須知少陰之病情其病似睡非睡似醒非醒神志昏憒但見其欲寐所以然者少陰主樞轉出入於內外今則入而不出內而不外故也正曰樞轉出入四字用解少陰之病不確實也少陰之為樞內經只用此一字取譬少陰陰陽相生循環如樞而已非言其出入旋轉也且就注所謂入而不出內而不外者問是何物不將此物指明但言其不出不外真恍慌語也須知此分血氣言血屬心所生而流行於脈中心病則陰血少而脈細氣屬腎所生而發出則為衛陽衛陽出則醒入則寐所以有晝夜也今腎氣病則困於內而衛陽不出故但欲寐只此四字已將心腎水火血氣之理全盤托出仲景提綱語真包括無餘義矣述此先論少陰標本水火陰陽之氣其見於脈證有如是也手足之少陰俱在內按柯注云仲景以微細之病脈欲寐之病情提綱立法於象外使人求法於象中凡證之寒熱與寒熱之真假仿此義以推之真陰之虛實見矣蔚謹按心病於神則脈微腎病於精則脈細欲寐病於陰不得寐病於陽今欲寐而不得寐故曰但欲寐正曰心病於神則脈微腎病於精則脈細其説非也微是腎之精氣虛細是心之血虛脈管是指血之路道血少故脈細微屬氣分氣旺則鼓動而不微今將微屬心血細屬腎氣真大誤也再詳於後少陰病欲吐不吐心煩但欲寐五六日自利而渴者屬少陰也虛故引水自救若小便色白者少陰病形悉具小便白者以下焦虛有寒不能制水故令色白也少陰上火而下水水火濟則陰陽交百樞機矣少陰病其脈從肺出絡心注胸中胸中不爽欲吐而不能吐心中熱煩不能寐而但欲寐此水火不濟陰陽不交機樞不轉之象也五日正少陰主氣之期至六日其數已足火不下交而自利水不上交而作渴者此屬少陰之水火虛也水虛無以沃焚火虛無以致水虛故引水自救此少陰病寒熱俱有之證也若少陰熱則小便必赤若小便色白者白為陰寒少陰陰寒之病形悉具此確切不移之診法也然吾又原其小便之所以白者以下焦虛而有寒全失上焦君火之熱化不能制水故令色白也此言少陰上火下水之病也補曰此總論少陰上屬心火下屬腎水上焦心之陰虛則引水自救下焦腎中陽虛則有寒下不能治水少陰水火之臟故每見此上火下水之證凡水火分病則寒熱之藥分治之凡水火合病則寒熱之藥合用之知此則不疑於仲景之方治矣病人脈陰陽俱緊反汗出者亡陽也此屬少陰法當咽痛而復吐利少陰陰陽不交之病病人脈沉分之陰浮分之陽俱緊少陰原有寒而復受外寒也陰不得有汗今反汗出者陰盛於內而亡陽於外也此屬少陰陰陽不交之故不交則陽自陽而格絶於外反有假熱之象法當咽痛不交則陰自陰而獨行於內必有真寒之證而復上吐下利少陰病咳而下利譫語者被火氣劫故也小便必難以強責少陰汗也少陰病不可發汗不可不知何也少陰病金水不能相滋而為咳少陰失閉藏之職而為下利二者為少陰常有證若咳利而復譫語者知足少陰之精氣妄泄手少陰之神氣浮越必被火氣劫故也然不特譫語且小便必難以汗與小便皆身中之津液以強責少陰汗以竭其津液之源也此言少陰病不可發汗以火劫汗之禍更烈也少陰原有灸法而少陰之熱證又以火為仇次男元犀謹按少陰咳而下利治有兩法寒劑豬苓湯熱劑真武湯之類皆可按脈證而神明之正曰注此言少陰之熱證非也咳而兼下利惟寒水乃有此證寒水之證自無譫語而今忽有譫語者被火氣劫發其汗心神飛越無所依歸故發譫妄之言也何以知其被火劫察其小便必見艱難以強責少陰之汗汗出則膀胱之水外泄故小便難是小便之難本非熱證而譫語亦非熱證皆劫汗神飛越之所致勿誤認為陽明熱證之譫語也少陰病脈細沉數病為在裏不可發汗內經云心部於表腎治於裏是少陰有裏亦有表也少陰病腎水之氣少則脈細君火之氣不升則脈沉數此病為在少陰之裏不可發汗以傷其裏氣此言少陰之裏病不可發汗也程扶生汪苓友鄭重光注解俱以邪熱傳裏而言誤矣正曰腎水氣少則脈細非也細是脈管中之血少屬心經也君火之氣不升則脈沉亦非也沉是氣不上升則脈管落下氣不上升者屬腎經氣生於腎也數則兼沉細二者言之數脈不忌發汗見於沉細之中則為少陰在裏之病故不可發汗少陰病脈微不可發汗亡陽故也陽已虛尺脈弱澀者復不可下之少陰為氣血之主脈為血氣之先少陰病因反發熱權用麻黃附子以微汗之若脈微則不可發汗以傷其陽以脈微汗出而亡陽故也因裏熱甚可權用下法但誤汗後心陽已虛而尺脈弱澀者陰亦虛也復不可下之以傷其陰蓋微為無陽澀為少血汗之亡陽下之亡陰此少陰陰陽兩虛即不可汗復不可下如此此言少陰證之虛者不可汗又不可下不可誤施而傷其根本也補曰此論心與腎一層氣分一層血分理極分明蓋脈管內是血分乃心血流行之路也脈管外是肌腠層氣分乃腎陽化生衛氣而充達於肌腠也弱澀是脈管中之血少當屬心經心火亢者本當下之若見尺脈弱澀則為心血已虛於下雖遇當下之證亦不可下之矣脈管外層氣分氣分充足則能將脈托出極其顯露決不微也若脈微者是腎中陽氣不能外充雖氣分之邪當從汗解而亦不可發汗恐虛陽無根隨汗而亡也仲景將陰陽二脈合論於此至於見證則多分見不必合見也總之聖論詳明可分可合要在將心腎血氣分別清楚則無迷誤少陰病脈緊至七八日自下利脈暴微手足反溫脈緊反去者為欲解也雖煩下利必自愈少陰欲愈而可治之證不可不知少陰病陰寒盛則脈緊七日外而八日乃陽明主氣之期忽然自下利脈變緊象而暴微手足亦不厥而反溫蓋脈緊反去者為少陰得陽明之氣少陰病為欲解也凡陽氣暴回則煩堅水得暖則下今雖發煩與下利乃戊癸合化生陽漸伏必自愈此言少陰得陽熱之氣而解也余自行醫以來每遇將死證必以大藥救之忽而發煩下利病家怨而更醫醫家亦詆前醫之誤以搔不著癢之藥居功余反因熱腸受謗甚矣名醫之不可為也附筆於此以為知者道補曰上二節沉細微弱澀皆言少陰虛證此脈緊是言少陰實證寒氣凝結陽回氣復則脈變緊而為微結因煩而自解化矣前節微脈是虛而不欲愈者此節微脈是和而欲愈者剝換處正欲人參考而得也又脈緊句又有手足冷厥意在內觀下文反溫二字則知先有手足冷其後下利欲解乃反溫也少陰病下利若利自止惡寒而踡臥手足溫者可治少陰病水勝土虛則下利若利自止土氣復也雖見惡寒之甚其身屈曲向前而踡臥然身雖惡寒而手足為諸陽之本稟於胃氣若手足溫者中土之氣和也有胃氣則生故可治此言少陰得中土之氣為可治也補曰少陰腎中之陽下根於足上達於手而充塞於膏膜之中膏即脾所司也脾膏陽足則熏吸水穀不致水穀從腸中直瀉而出若腎陽不充於脾而脾土所司之膏油失職水穀不分氣陷而崩注是為下利其腸中水穀泄盡利止後惡寒踡臥若生陽已竭者則手足厥冷而死設手足溫者是腎中生陽尚在故為可治白通湯等方是矣少陰病惡寒而踡時自煩欲去衣被者可治少陰病惡寒而踡寒氣甚矣然時或自煩而絶無躁象煩時自覺其熱欲去衣被者君火在上也陰寒之氣見火而消故為可治此言少陰得君火之氣為可治也補曰水寒於下而火浮於外是水病而火尚在則陽未絶也引火下交於水中則愈少陰中風脈陽微陰浮者為欲愈少陰中風風為陽邪則寸口陽脈當浮今脈陽寸已微則知外邪不復入矣病在少陰則尺部陰脈當沉今陰尺反浮者則內邪盡從外出矣此為欲愈此言少陰中風欲愈之脈也少陰傷寒之愈脈自可類推少陰病欲解時從子至寅上少陰病欲解時從子至寅上蓋各經解於所王之時而少陰獨解於陽生之時陽進則陰退陽長則陰消即所謂陰得陽則解也此言少陰得夜半之陽而解也少陰病吐利手足不逆冷反發熱者不死脈不至者灸少陰七壯少陰而得太陽標陽之熱化則生少陰陰寒之病上吐下利而手足不逆冷反發熱者此少陰而得太陽之標陽也陰病得陽故為不死若不得太陽之標熱則少陰之氣反陷於下而脈不至者當灸少陰之太溪二穴七壯以啓在下之陽此論少陰病而得太陽標陽之熱化也太溪二穴在足內踝後五分跟骨上動脈陷中正曰太陽之標是經脈與皮毛也經脈皮毛那能生出陽氣反助腎中之真陽哉蓋此節言上吐下利水土同崩若真陽絶則死今手足不逆冷反發熱則知真陽尚存雖陰寒吐瀉而不至於死也理最了當而修園反扯雜不可解矣標本之義見及各經總論何修園知之而尤有未知耶少陰病八九日一身手足盡熱者以熱在膀胱必便血也少陰熱化太過而亦成病少陰病八日為陽明主氣之期九日為少陽主氣之期病氣由陰而漸出於陽身以外為陽手足為諸陽之本一身手足盡熱者陽氣盛也所以然者以少陰之本熱移在膀胱膀胱為胞之室膀胱熱不得外發於肢體而為熱必內動其胞中之血而為便血也此言少陰熱化太過臟病干腑而為便血也按柯注下利便膿血指大便言熱在膀胱而便血是指小便言汪注腎主二便從前後便而出皆是正曰原文明言熱在膀胱則知便血是言小便也汪注謂從前後便出何故添出大便一層反生支節哉蓋太陽膀胱主周身此少陰病是脈細但欲寐而又見一身手足盡熱則為少陰心火之熱隨小腸油膜下合膀胱心火在內本不身熱因合於膀胱乃通於表即周身皆熱心主血脈熱淫而血溢必合膀胱之水下行而為小便下血也此節是心火血分下干腎府之病下一節是腎水中之陽虛誤治傷其心火之血分血病及水水病及火合觀心腎所司可以知其故矣少陰病但厥無汗而強發之必動其血未知從何道出或從口鼻或從目出者是名下厥上竭為難治少陰熱化太過內行於裏熱深者厥亦深故少陰病但厥無汗本無發汗之理醫者不知而強發之不但不能作汗反增內熱必動其少陰之血逆行上竅然未知從何道之竅而出少陰之脈循喉嚨挾舌本繫目系或從口鼻或從目出是名下厥上竭然其名亦何所取考內經厥論云陽氣衰於下則為寒厥陰氣衰於下則為熱厥其起必於足下者以陽氣起於足五指之表陰氣起於足五指之裏也今以但厥無汗之少陰病因發汗而鼓激少陰熱化之邪自下而逆上下因失血而竭少陰原少血之臟血竭故為難治正曰解但厥無汗為裏熱非也使果是裏熱而又動血是上皆熱施治不難措手此云難治者以下厥本是陽虛於下陽下陷而不升則衛氣不能達於肌腠故無汗明言衛陽不外達則無津氣不得有汗也而醫者乃強發之則肌腠間既無氣津只有營血獨被其劫必動而上出是為陰血竭於上也下厥當用熱藥上竭又當涼藥相反相妨故為難治蓋少陰為水火兩臟有合病者有分病者若扯雜無分曉則不知其義矣須知少陰之厥與厥陰不同厥陰則厥深者熱亦深若少陰則厥是陽虛此先題少陰證三字則為脈細但欲寐之厥是陽虛也觀二經總論自知少陰病惡寒身踡而利手足逆冷者不治少陰病標寒外呈必定惡寒惡寒之甚其身必踡以少陰之脈從然谷至俞府皆行身之前脈起足心足寒則引起而踡也若少陰標寒內陷不止惡寒而且自利此內外皆寒不得君火之本熱病之至危者也然猶幸其手足之溫驗陽氣之未絶若手足逆冷者為真陽已敗不治述此章凡六節皆言少陰陽氣衰微而為不治之死證也少陰陰寒為病得太陽之標陽可治得君火之本熱可治下焦之生氣上升可治中焦之土氣自和可治四者全無故為難治正曰君火之本熱實則少陰腎中之陽上交於心而為熱蓋腎中之陽乃地下黃泉中之生陽上發則為天陽積陽為日人身之心陽即如天之日也故心陽實根於腎陽而腎陽最重但有腎陽即可以生心陽也故仲景所論逆冷不治皆是腎無生陽但心陽與腎陽雖一家而實有不同心屬血分其陽名為火血行於膏油中為火生土腎屬氣分其陽名為元氣氣行於膏膜則膏油充足是為脾中元陽此水火二者交於中土之義也中焦之生陽亦止是腎陽而已至於腎陽達於太陽經則為衛外之標陽其根總在腎中無腎陽則標陽不生豈有腎之本陽既無而反求標陽來救者哉故注少陰而曰得標陽得中焦之生氣皆支離語中焦與標陽全賴少陰而少陰之陽不倚賴彼也注者勿忘卻主人翁少陰病吐利躁煩四逆者死少陰病上吐下利恐陰陽水火之氣頃刻離決然陰陽水火之氣全藉中土交合若中土氣敗則陰不交於陽而躁陽不交於陰而煩且土氣既敗不能旁達而為四肢逆冷者死此言少陰藉中土之氣交上下而達四旁若胃氣絶則陰陽離故主死也補曰中土是後天心腎是先天後天實賴心腎水火一血一氣相交於膜網之間是生膏油即人身之中土也膏油不熏吸水穀上逆下崩為吐利雖屬中土失職實則心腎不相交而水火離決也是中土必賴少陰之氣交非少陰反藉中土之氣交此理不可顛倒又陽煩陰躁義亦難明蓋煩是陽氣無賴譬如燈內無油不能濟火則燼落煙生煩之象也躁是陽氣欲離譬如燈小油多火將淹滅則閃爆作聲而後火離其炷矣用洋燈試之自見其閃爆者躁之象也然則煩躁之理可恍悟矣少陰病下利止而頭眩時時自冒者死少陰病下利不止則陰竭於下矣若下利既止其人似可得生乃利雖止而頭竟眩眩甚則昏冒且時時自冒者主死何也人身陰陽相為倚附者也下利則陰竭於下陰竭則孤陽無依遂上脫而為眩冒之死證可見陽回利止則生陰盡利止則死矣可見利止而眩冒為死證利不止而眩冒更為死證矣此言少陰孤陽上脫者死也時時自冒句下一自字見病非外來氣脫時自呈之危象少陰病四逆惡寒而身踡脈不至不煩而躁者死少陰病陽氣不行於四肢故四逆陽氣不布於周身故惡寒而身踡陽氣不通於經脈故脈不至且不見心煩而惟見躁擾者純陰無陽之中忽呈陰證似陽為火將絶而暴張之狀主死此言少陰有陰無陽者死也少陰病六七日息高者死少陰病六日已過至七日乃由陰而陽之候一呼一吸為一息呼出心與肺吸入腎與肝今息高者少陰氣絶於下止呼出而不能吸入生氣上脫有出無入故死此言少陰生氣脫於上者死也少陰病脈微細沉但欲臥汗出不煩自欲吐至五六日自利復煩躁不得臥寐者死少陰病脈微細沉但欲臥為陽虛不能外達惟行於內也汗出為陽氣不能外達外失所衛而不固也不煩自欲吐為不得上焦君火之化也此少陰陰寒之本病尚非必死之候亦非必不死之候也惟於五日為少陰主氣之期至六日而足其數視其陰陽勝復何如其如五六日間真陽自復或因藥力而復陽復則寒解否則陰勝而危故少陰病以五六日為生死之關如至五六日其病不解上言汗出為陽亡於表今則自利為陽絶於裏裏寒甚於表寒也上言不煩欲吐為裏本無熱今則復煩躁為寒邪逼臟真寒反為假熱也上言但欲臥是陽氣受困今則不得臥寐者是真陽被逼無所歸而飛越也此皆陽氣外脫主死此言少陰陽氣外脫者死也少陰病始得之反發熱脈沉者麻黃細辛附子湯主之少陰標寒而本熱太陽標熱而本寒少陰病始得之當不發熱今反發熱是少陰而得太陽標熱之化也既得太陽之標熱其脈應浮今診其脈沉者為雖得太陽之標熱仍陷少陰之裏也以麻黃附子細辛湯主之使少陰太陽交和於內外則愈此言少陰得太陽之標陽而太陽之標陽又陷於少陰之裏陰也麻黃附子細辛湯方麻黃二兩去節細辛二兩附子一枚炮去皮破八片上三味以水一斗先煮麻黃減二升去上沫納諸藥煮取三升去滓溫服一升日三服述此章凡九節論少陰自得之病或得太陽之標或得君火之化或得水陰之氣或在於表或在於裏或在於經或歸於中土不可執一而治也蔚按少陰病始得之是當無熱而反發熱為太陽標陽外呈脈沉為少陰之生氣不升恐陰陽內外不相接故以熟附子助太陽之標陽而內合於少陰麻黃細辛啓少陰之水陰而外合於太陽須知此湯非發汗法乃交陰陽法補曰此兩節總言少陰之表即是太陽若始得病邪從表入合於太陽經而惡寒發熱且並無煩躁下利諸裏證者仍當從表以汗解之使隨太陽之衛氣而從衛以解故用麻黃以解外也再用附子以振腎中之陽內陽既振乃能外達也若但取發汗則用甘草益中氣以宣達之如桂枝湯之用甘棗矣惟脈沉為陽陷不升則用細辛一莖直上者以升之也蓋發汗欲其橫行故用補舉陽欲其直上故用升附子本溫腎中之陽而陳注曰溫表陽麻黃本散在表之寒而陳注曰啓少陰顛倒其詞於生陽之根與衛陽之出入蓋未明也少陰病得之二三日麻黃附子甘草湯微發汗以二三日無裏證故微發汗也少陰病反發熱自始得之以及二三日值少陽主氣之期陰樞藉陽樞以轉出宜麻黃附子甘草湯微發其汗夫太陽主表而內合於少陰少陰主裏而外合於太陽今以二三日無少陰之裏證止是發熱得太陽之表證故微發汗也此言少陰得太陽之表證二三日可微發汗麻黃附子甘草湯方麻黃二兩去節甘草二兩炙附子一枚炮去皮上三味以水七升先煮麻黃一二沸去上沫納諸藥煮取三升去滓溫服一升日三服蔚按少陰病自始得以至二三日無下利厥逆大寒之裏證又無心中煩不得臥熱化之裏證又無口燥咽乾自利清水腹脹不大便當急下之裏證可知病少陰而得太陽之表熱非汗不解而又恐過汗以傷心腎之真液故於前方去細辛加甘草之補中取中焦水穀之津而為汗則內不傷陰邪從汗解矣須知此湯變交陰陽法為微發汗法少陰病得之二三日以上心中煩不得臥黃連阿膠湯主之少陰病得之二三日以上自二日以及三日各隨三陽主氣之期以助上焦君火之熱化也下焦水陰之氣不能上交於君火故心中煩上焦君火之氣不能下入於水陰故不得臥法宜壯水之主以制陽光以黃連阿膠湯主之此言少陰上焦君火之熱化也黃連阿膠湯方黃連四兩黃芩一兩芍藥四兩雞子黃二枚阿膠三兩上五味以水五升先煮三物取二升去滓納膠煬盡小冷納雞子黃攪令相得溫取七合日三服受業周易圖按雞屬酉金而黃象地用二枚者取地二之陰以補心也補曰此節言少陰心之陰血病火擾其血不得安故煩而不臥注家勿扯下焦解之則義自了當方亦皎然矣元犀按少陰病但欲寐為提綱此節云心中煩不得臥是但欲寐之病情變而心中煩可知水陰之氣不能上交於君火也心煩之極而為不得臥可知君火之氣不能下入於水陰也此為少陰熱化之證方中用黃連黃芩之苦寒以折之芍藥之苦平以降之又以雞子黃補離中之氣阿膠補坎中之精俾氣血有情之物交媾其水火斯心煩止而得臥矣此回天手段少陰病得之一二日口中和其背惡寒者當灸之附子湯主之少陰病君火不宣而太陽寒水之氣用事得之一日正當太陽主氣之期足其數至於二日火用不宣全無燥渴故口中和背為陽陽中之陽心也又太陽其行在背其人背惡寒者是心主陽衰太陽寒盛之證當灸之灸膈關二穴以救太陽之寒灸關元一穴以助元陽之氣法宜益火之源以消陰翳以附子湯主之此節言少陰病上焦君火衰微反得太陽之寒化下節言下焦生陽不起從陰而內注於骨也正曰此節言少陰腎之元陽病非言心火不宣乃是腎水中命門之真陽不能充達也腎水坎中一陽生於兩腎中間是為命門此陽氣隨吸入之天陽下入臍下丹田氣海之中蒸動膀胱之水則化為氣充達於外是為衛氣腎之元陽化氣為衛隨太陽經而布於外太陽者腎之府也太陽之陽實則腎中之元陽也腎陽不振以致太陽經惡寒宜附子湯兼溫經脈以助其陽故用附子入腎水也解為助心火則與方不合修園不知心火屬血分腎陽屬氣分也附子湯方附子二枚炮破八片茯苓二兩人參二兩白朮四兩芍藥三兩上五味以水八升煮取三升去滓溫服一升日三服蔚按論云少陰病得之一二日口中和其背惡寒者當灸之宜此湯此治太陽之陽虛不能與少陰之君火相合也又云少陰病身體疼手足寒骨節痛脈沉者宜此湯此治少陰君火內虛神機不轉也方中君以生附子二枚益下焦水中之生陽以達於上焦之君火也臣以白朮者以心腎藉中土之氣而交合也佐以人參者取其甘潤以濟生附之大辛又佐以芍藥者取其苦降以泄生附之大毒也然參芍皆陰分之藥雖能化生附之暴又恐其掣生附之肘當此陽氣欲脫之頃雜一點陰柔之品便足害事故又使以茯苓之淡滲使參芍成功之後從小便而退於無用之地不遣餘陰之氣以妨陽藥也師用此方一以治陽虛一以治陰虛時醫開口輒言此四字其亦知陽指太陽陰指少陰一方統治之理乎少陰病身體痛手足寒骨節痛脈沉者附子湯主之少陰病下焦生陽之氣不周於一身故身體痛生陽之氣不充於四肢故手足寒生陽之氣不行於骨節故骨節痛脈沉者生陽之氣陷而不舉也亦以附子湯主之述君火者上焦君主之心火生陽者下焦水中之生陽即先天之真火也少陰病不得君火之熱化者死熱化太過者病不得生陽之氣者死生陽漸復者生補曰君火之説皆後世添設之名目內經只曰少陰之上熱氣治之不名君火也吾於篇首已詳言之然同是一熱氣也而根於腎中為坎陽藏於心中為離火位分既殊而名之曰君火生陽亦屬義有可通陳注於此言君火言生陽頗有分曉亦讀書者之一助至於仲景此節則專屬生陽不能充達故以脈沉者三字明之以見是陽氣下陷也注此節者又不可妄扯君火為解按柯注此與麻黃附子甘草湯皆是治少陰證而有出入之不同經曰少陰之陰其入於經也從陽部注於經其出者從陰內注於骨發熱脈沉無裏證者從陽部注於經也身體痛骨節痛脈沉者從陰內注於骨也從陽注經是表熱裏寒病從外來故溫而兼散從陰注骨是表寒裏虛病從內出故溫而兼補少陰病下利便膿血者桃花湯主之感君火之化而病有形之經脈奈何少陰病熱化太過則閉藏失職而下利熱化太過則陰絡受傷而便膿血須知便膿血者大腸鬱化之腐膿與陰絡之血相併而出於下利清穀不同也以桃花湯主之此合下二節言少陰感君火之熱化不病無形之氣化而病有形之經脈也桃花湯方赤石脂一斤一半全用一半篩末乾薑一兩粳米一升上三味以水七升煮米令熟去滓溫服七合納赤石脂末方寸匕日三服若一服愈餘勿服張令韶曰少陰病下利膿血桃花湯主之此感少陰君火之熱不病無形之氣化而病有形之經脈也經謂心之合脈也又謂陰絡傷則便血赤石脂色赤而性澀故能止下利膿血乾薑粳米溫補中焦以資養血脈之源所以治之論又云少陰二三日至四五日腹痛小便不利下利不止便膿血者桃花湯主之此言二三日至四五日值太陰主氣之期而脾絡不通則為腹痛脾絡不通不能轉輸則為小便不利小便不利則水穀不分而為利不止陰絡傷則為膿血石脂為山之血脈凝結而成故治經脈之病下節言便膿血可刺者所以申明病在經脈之義也少陰病二三日至四五日腹痛小便不利下利不止便膿血者桃花湯主之少陰病君火之熱化大過自二日陽明主氣之期得燥氣之助而更甚過少陽之三日陽經已遍至四日太陰以及五日正為少陰主氣之期熱氣欲奔注而下利其未利之前必先腹痛下利則水液全歸於大腸其未利之前必先小便不利旋而下利不止其便非清穀而為膿血者亦以桃花湯主之此即上節之義而復詳其病情也少陰病下利便膿血者可刺凡病在經脈者宜刺之少陰病下利便膿血者經脈之病也可刺受業黃奕潤云此亦申明上文之義少陰內主水火外主經脈水火於內不能循經出入故標陰之水氣干於脾而下利本熱之火氣干於胃而便膿血刺之則經脈通水火運行內外矣正曰熱化太過奔注下利此説非也厥陰篇泄利後重方是熱太過奔迫下注也此篇一則曰下利再則曰下利不止無後重之文知是虛利非實證也故用米以養中薑以溫中石脂以填塞中宮觀赤石禹餘糧之填塞止利便知此方亦是填塞止利矣利止則膿血隨之以止蓋膿血原是熱所化今因脾虛寒用從治法引少陰之熱使就歸於中土則火來生土而不往干血脈斯膿血亦因以止也然從治誘敵之法止可暫用不可久用恐久仍化熱而又動膿血矣故戒曰一服愈餘勿服以免過劑反增變也下節又言下利便膿血者可刺隱見下利當溫而溫藥又恐不能去血膿中之熱宜分頭施治內用溫藥以止其利而其外則可用針刺以瀉血脈中之熱則瀉經脈而不動臟寒溫臟寒而不犯經脈為至妙也證中標陰本熱及水火運行之説皆仿佛語未能指實蓋此證是脾土有寒心經有熱熱化膿血寒為利不止桃花湯正治利不止反治便膿血再加刺法則是桃花湯專止利刺法專治膿血此等虛中實證急難下手故仲景亦慎之又慎用脂米極多而用薑極少恐其多則動血也脂米補而質柔則不犯血脈以免動血此等難措手處非閲歷不知按常器之云可刺幽門二穴在腹第二行俠巨闕兩旁各五分交信二穴在內踝上二寸郭白雲云刺當作灸而不知經脈之病宜刺不宜灸也柯韻伯云便膿血亦是熱入血室所致刺期門以瀉之病在少陰而刺厥陰實則瀉其子也少陰病吐利手足逆冷煩躁欲死者吳茱萸湯主之雖然少陰先天水火之氣皆賴後天中土以資生而資始也醫者必明乎此方可與言少陰之證治少陰病上吐下利則中土虛矣中土虛不能灌溉四旁故手足厥冷不能交媾水火故煩躁其煩躁欲死者水自水火自火陰陽欲合而不得也以吳茱萸湯主之此一節言少陰水火之氣皆本陽明之水穀以資生而復交會於中土以總結上文數節之義蔚按少陰之臟皆本陽明之水穀資生而復交會於中土若上吐下利則中土大虛中土虛則氣不行於四末故手足逆冷中土虛不能導手少陰之氣而下交則為煩不能引足少陰之氣而上交則為躁甚則煩躁欲死方用吳茱萸之大辛大溫以救欲絶之陽佐人參之衝和以安中氣薑棗和胃以行四末師於不治之證不忍坐視專求陽明是得絶處逢生之妙所以與通脈四逆湯白通加豬膽汁湯三方鼎峙也論云食穀欲嘔者屬陽明也吳茱萸湯主之又云乾嘔吐涎沫頭痛者吳茱萸湯主之此陽明之正方也或謂吳茱萸降濁陰之氣為厥陰專藥然溫中散寒又為三陰並用之藥而佐以人參薑棗又為胃陽衰敗之神方昔賢所以有論方不論藥之訓也少陰病下利咽痛胸滿心煩豬膚湯主之少陰上火下水而主樞機今少陰病水在下而火不能下濟故下利火在上而水不能上交故咽痛上下水火不交則神機樞轉不出故胸滿且神機樞轉不出鬱於內則心未有不煩者以豬膚湯主之述此章凡四節俱論少陰主樞旋轉內外無有止息逆則病也正曰少陰所以咽痛者少陰經脈夾咽邪迫結於咽則痛義本易知而陳注必執定少陰之樞旋轉內外為解則何故不旋轉何故不內不外何故為咽痛義反多隔少陰主樞之辨詳下急下之節此凡四節言咽痛止是少陰經脈夾咽之痛也又此下利是鬱熱下注之利如四逆散之下利是陳注解為水在下而火不能下濟亦非也蓋火不下濟是虛寒下利仲景必曰四支逆冷或曰下利清穀或曰自利不止若此節止有下利二字則非虛寒下利之類且合胸滿心煩論之則知胸滿非虛心煩非寒乃鬱熱下注如四逆散之下利同是熱證矣水陰隨熱下注不能上升故心煩咽痛如近今所傳白喉證是白喉書言其咽白爛不可發汗亦不可下當一意清潤其書甚效而不知仲景豬膚湯實開其先也白粉熬香和中止利其白蜜豬膚則清潤之極品觀今湖南白喉證書而此節之義明矣本仲景此意推廣之則白喉揭表一書誠為豬膚湯之功臣豬膚湯方豬膚一斤上一味以水一斗煮取五升去滓加白蜜一升白粉五合熬香和令相得溫分六服張令韶曰此方合下四方皆以少陰主樞旋轉內外無有止息逆則病也夫少陰上火下水而主樞機下利者水在下而火不得下濟也咽痛者火在上而水不得上交也上下水火不交則神機樞轉不出故胸滿神機內鬱故心煩豬為水畜膚取其遍達周身從內而外亦從外而內之義也蜜乃稼穡之味粉為五穀之精熬香者取香氣助中土以交合水火轉運樞機者也正曰執定樞轉出入立説於少陰水火相生之義實有未明又解豬膚為從內而外亦從外而內真仿佛語安知仲景實義哉少陰病二三日咽痛者可與甘草湯不瘥與桔梗湯少陰之脈從心系上挾咽今少陰病二三日乃三陽主氣之期少陰君火外合三陽上循經脈而及咽今咽痛者可與甘草湯服湯後不差者與桔梗湯述此言少陰之氣循經而上逆於咽也補曰此咽痛當作紅腫論與上節豬膚湯不同豬膚是白爛故宜清潤以生肌此是紅腫故宜瀉火以開利火生土而火氣退卸故用甘草引火生土而為瀉火之正法後人用芩連大黃則力更重然只是仲景甘草湯之意主於瀉火而已也仲景不用三黃者以此是主方言外原可加減且芩連大黃等速降而下恐剽而不流反不能瀉上焦之火使之漸退故以甘草緩緩引之使瀉火而生土則火氣退矣近有硼砂能化痰清火為治喉要藥其味頗甘今皆知其治咽痛而不知即仲景甘草湯意也服之不差恐咽壅塞未易去故加桔梗開利之後人用刀針放血即是開利之意仲景示人以法雖方藥似有未備而治法則已明矣陳注未確甘草湯方甘草二兩上一味以水三升煮取一升半去滓溫服七合日二服桔梗湯方桔梗一兩甘草二兩上二味以水三升煮取一升去滓分溫再服述少陰之脈從心系上挾咽二三日乃三陽主氣之期少陰君火外合三陽上循經脈故咽痛甘草生用能清上焦之火而調經脈若不差與桔梗湯以開提肺氣不使火氣壅遏於會厭狹隘之地也少陰病咽中傷生瘡不能語言聲不出者苦酒湯主之少陰病咽中傷而潰爛生瘡不能語言聲不出者奈何蓋少陰之脈入肺循咽嚨肺屬金主聲金空則鳴肺受火氣所爍而咽嚨為之窒塞故也以苦酒湯主之述此言少陰水陰之氣不能上濟君火也或問仲景言咽痛咽以咽物於喉何與而云語聲不出耶答曰喉與咽相附仲景言少陰病熱咽痛而喉嚨即在其中正曰此生瘡即今之喉癰喉蛾腫塞不得出聲今有用刀針破之者用巴豆燒焦烙之者皆是攻破之使不壅塞也仲景用生半夏正是破之也豫親見治重舌敷生半夏立即消破即知咽喉腫閉亦能消而破之矣且半夏為降痰要藥凡喉腫則痰塞此仲景用半夏之妙正是破之又能去痰與後世刀針巴豆等法較見精密況兼雞清之潤苦酒之泄真妙法也今人喉科大半是此湯餘意陳注不能指實而張隱庵力求精深於方與證之真面究未知也苦酒湯方半夏洗破如棗核大十四枚雞子一枚去黃內上苦酒著雞子殼中上二味納半夏著苦酒中以雞子殼置刀環中安火上令三沸去滓少少含咽之不差更和三劑蔚按一雞子殼之小安能納半夏十四枚之多近刻以訛傳訛即張令韶張隱庵柯韻伯之明亦仍之甚矣耳食之為害也余考原本半夏洗破十四枚謂取半夏一枚洗去其涎而破為十四枚也舊本破字模糊翻刻落此一字以致貽誤至今特正之張令韶曰此治少陰水陰之氣不能上濟君火也君火在上熱傷經絡故咽中傷生瘡經曰諸痛瘡瘍皆屬心火是也在心主言在肺主聲皆由腎間之上生氣所出少陰樞機不能環轉而上達故不能語言聲不出也張隱庵有云人之聲音藉陰中之生氣而出半夏生當夏半感一陰之氣而生故能開發聲音破十四枚者七為奇數偶七而成十四是偶中之奇取陰中之生陽也雞卵屬金而白象天肺主金主天助肺以滋水之上源也刀為金器環者還也取金聲環轉之義也苦酒醋也書曰曲直作酸經曰少陽屬腎一以達少陽初生之氣一金遇木擊而鳴矣火上三沸者金遇火而三伏三伏已過金氣復矣樞轉利水氣升金氣清則咽痛愈而聲音出矣正曰此咽生瘡是腫塞不得出聲半夏苦酒以攻破之一言可以明之也而張注不能將咽中瘡或指為腫或指為爛皆無定評故説雖精而不能實事求是也少陰病咽中痛半夏散及湯主之少陰主樞少陰病熱氣不能從樞而出者既有甘草湯桔梗湯之治法矣而寒氣不能從樞而出逆於經脈之中而為咽中痛非甘草桔梗二湯所能治也以半夏散及湯主之述此言少陰樞機逆於經脈不能環轉而四散也正曰此言外感風寒客於會厭干少陰經而咽痛此證豫見多矣喉間兼發紅色並有痰涎聲音嘶破咽喉頗痛四川此病多有皆知用人參敗毒散即愈蓋即仲景半夏散及湯之意也陳注以為樞機不能轉環四散不但方證未明且令少陰之氣化亦模糊而不能辨半夏散及湯方半夏洗桂枝去皮甘草炙以上各等分以上三味各別搗篩已合治之白飲和服方寸匕日三服若不能散服者以水一升煎七沸內散兩方寸匕更煎三沸下火令小冷少少咽之蔚按少陰主樞熱氣不能從樞而出逆於經脈而咽痛為甘草湯證寒氣不能從樞而出逆於經脈而咽中痛為半夏散及湯證半夏運樞桂枝解肌甘草緩痛和以白飲者即桂枝湯啜粥之義從中以達外俾內外之經脈通而少陰之樞機出入矣如咽痛不能服散以湯少少咽之取其輕捷即湯亦同於散也正曰陳注亦知此方散寒而已必拈樞字重復言曰從樞不從樞樞在何處何物是樞不知少陰經氣之實而從徒定古人譬語認作實事反添多少渣滓少陰病下利白通湯主之少陰下利四逆有寒熱虛實之不同也試先論虛寒少陰脈微細但欲寐之病不見他證只見下利為陰寒在下君火不得下交大失閉藏之職以白通湯主之述此節單論下利以起下文五節之意此章凡六節言少陰四逆有寒熱虛實之不同不必盡屬於陽虛也凡言少陰病皆指脈微細但欲寐而言白通湯方蔥白四莖乾薑一兩附子一枚生用去皮破八片上三味以水三升煮取一升去滓分溫再服少陰病下利脈微者與白通湯利不止厥逆無脈乾嘔煩者白通加豬膽汁湯主之服湯脈暴出者死微續者生脈之生原始於腎從下而上由陰而陽自內而外少陰病下利脈微者腎臟之生陽不升也與白通湯以啓陷下之陽而利竟不止反見厥逆無脈陰邪上逆而乾嘔虛陽越而發煩者此非藥之誤也以陰寒極盛驟投熱藥而拒格耳必取熱因寒用之法與白通加豬膽汁湯主之使藥力與病氣相安服此湯脈暴出者燈光之焰主死脈微續者為陽氣漸復主生此言少陰之生陽陷下視前證而較重也白通加豬膽汁湯方蔥白四莖乾薑一兩附子一枚生用去皮破八片人尿五合豬膽汁一合以上三味以水三升煮取一升去滓納膽汁人尿和令相得分溫再服若無膽亦可用男元犀按白通湯主少陰水火不交中虛不運者也生附啓水臟之陽上承於心蔥白引君主之火下交於腎乾薑溫中土以通上下上下交水火濟中土和利自止矣蔚按白通加豬膽汁湯張令韶之注甚妙令韶謂脈始於足少陰腎主於手少陰心生於足陽明胃誠見道之言少陰下利脈微者腎臟之生陽不升也與白通湯以啓下陷之陽若利不止厥逆無脈乾嘔煩者心無所主胃無所生腎無所始也白通湯三面俱到加膽汁人尿調和後人生氣俱在為效倍速苦鹹合為一家入咽之頃苦先入心即隨鹹味而直交於腎腎得心君之助則生陽之氣升又有附子在下以啓之乾薑從中以接之蔥白自上以通之利止厥回不煩不嘔脈可微續危證必仗此大力也若服此湯後脈不微續而暴出燈光之回焰吾亦無如之何矣少陰病二三日不已至四五日腹痛小便不利四肢沉重疼痛自下利者此為有水氣其人或咳或小便利或下利或嘔者真武湯主之少陰病二三日三陽主氣得陽熱之化病當自已矣若不已至四日又值太陰主氣之期交於五日已滿太陰之數太陰主腹故腹痛脾主轉輸故小便不利脾主四肢故四肢沉重而疼痛自下利者少陰之水病而中土之閘折也蓋腎者水也而主乎水者生陽之火也火衰不能生土土虛不能制水水寒用事此為有水氣乃真武之正證然水性無定其人或咳或小便利或下利或嘔者為真武之兼證正證宜真武湯主之兼證宜真武湯加減主之此言少陰之生陽虛而中土因以受病也補曰修園長於治寒水故其注寒證總不錯誤惟於水氣二字每混為一不知非也蓋但是寒水滯留只是小便不利四肢沉重自下利而已不能腹痛與四肢疼痛也蓋其有氣欲行遇水阻拒乃為痛也凡氣者皆生於腎布於肺而其又賴肝木舒散之性以達之也必肝木不舒散乃鬱遏為痛血阻水阻皆為痛矣故凡理氣之藥枳朴木香皆秉木氣芍藥平肝木止痛亦是泄木氣之遏鬱也此有水復有氣故薑附苓朮以治水而必加芍藥以泄其氣也若下利者氣既下泄不當復泄故去芍藥可知水與氣之分矣真武湯加減法若咳者加五味子半升細辛乾薑各一兩若小便利者去茯苓若下利者去芍藥加乾薑二兩若嘔者去附子加生薑足前成半斤少陰病下利清穀裏寒外熱手足厥逆脈微欲絶身反不惡寒其人面色赤或腹痛或乾嘔或咽痛或利止脈不出者通脈四逆湯主之少陰病下利清水完穀寒在裏也裏寒而外反熱陰盛格陽也惟其陰盛故手足厥逆脈微欲絶惟其格陽故身反不惡寒其人面赤色或涉於太陰而腹痛或涉於中胃而乾嘔或循經挾咽而咽痛或中焦穀神內虛利止而脈不出者俱以通脈四逆湯主之此言少陰內真寒而外假熱也通脈四逆湯方甘草二兩炙附子一枚生用大者去皮破八片乾薑三兩上三味以水三升煮取一升二合去滓分溫再服其脈即漸而出者愈非若暴出者之自無而忽有既有而仍無如燈火之回焰也面赤色者加蔥九莖腹中痛者去蔥加芍藥二兩嘔者加生薑二兩咽痛者去芍藥加桔梗一兩利止脈不出者去桔梗加人參二兩參各家説陽氣不能運行宜四逆湯元陽虛甚宜附子湯陰盛於下格陽於上宜白通湯陰盛於內格陽於外宜通脈四逆湯蓋以生氣既離亡在頃刻若以柔緩之甘草為君豈能疾呼散陽而使返耶故借用乾薑而仍不減甘草者恐散渙之餘不能當薑附之猛還藉甘草以收全功也若面赤者虛陽上泛也加蔥白引陽氣以下行腹中痛者脾絡不和也去蔥加芍藥以通脾絡嘔者胃氣逆也加生薑以宣逆氣咽痛者少陰循經上逆也去芍藥之苦泄加桔梗之升提利止脈不出者穀氣內虛脈無所稟而生去桔梗加人參以生脈少陰病四逆其人或咳或悸或小便不利或腹中痛或泄利下重者四逆散主之四肢為諸陽之本四逆俱屬陽氣虛寒然亦有陽氣內鬱者少陰病樞機不利不能轉陽氣以達於手足以致四肢厥逆醫者宜認定四逆為主證而樞機無主隨見或然之證亦以互參其人於四逆見證中或病涉於肺而咳或涉於心而悸或於府而小便不利或標寒病於內而腹中痛或本氣鬱於下而泄利下重者統以四逆散主之此言少陰四逆亦有裏熱而致也或咳或利或小便不利同小青龍證厥而心悸同茯苓甘草證或咳或利或小便不利又同真武證種種是水氣為患腎為水臟水性無定變證處實不離其本相愚按少陽為陽樞小柴胡湯為轉陽樞之專方少陰為陰樞此散為轉陰樞之專方學者於二方細細體會並於兩方加減處細細尋繹知其異並知其同知其同中之異並知其異中之同則於本經治法思過半矣正曰此散為少陰陰樞之專方其説非也少陰為樞不重在出入也且此數節皆主四逆立論蓋四逆是少陰之主證或內寒四逆為通脈真武等方或外鬱而四逆則此方也與小柴胡意正相近特因辨四逆而列此一條何得指為少陰陰樞之專方哉四逆散方甘草炙枳實破水漬炙柴胡芍藥上四味各十分搗篩白飲和服方寸匕日三服後加減法咳者加五味子乾薑五分並主下利悸者加桂枝五分小便不利者加茯苓五分腹中痛者加附子一枚炮令坼泄利下重者先以水五升煮薤白三升去滓以散三方寸匕納湯中煮取一升半分溫再服張令韶曰凡少陰四逆俱屬陽氣虛寒然亦有陽氣內鬱不得外達而四逆者又宜四逆散主之枳實形圓臭香胃家之宣品也所以宣通胃絡芍藥疏泄經絡之血脈甘草調中柴胡啓達陽氣而外行陽氣通而四肢溫矣若咳者肺寒氣逆也用五味乾薑溫斂肺氣並主下利者溫以散之酸以收之也悸者心氣虛也加桂枝以保心氣小便不利者水道不行也加茯苓以行水腹中痛者裏寒也加附子以溫寒泄利下重者陽氣鬱於下也用薤白以通陽氣少陰病下利六七日咳而嘔渴心煩不得眠者豬苓湯主之凡少陰下利俱屬下焦虛寒然亦有脾不轉輸水津不布而利者少陰病下利六日為六經已遍交太陽所主之七日乃陰盡出陽之期也而利竟未止且見肺氣不調而咳胃氣不和而嘔水津不上交而渴君火不得下交而心煩至此變但欲寐之本證而為不得眠者其為熱甚而躁動明矣茲亦不用寒涼之劑惟助脾氣之轉輸水津四布而諸證俱愈如雲行雨施乾坤自有一番新景象矣以豬苓湯主之此言少陰下利不屬於裏寒而出一輸脾利水之法也利水之中兼育真陰是又法外之法正曰此方主下利全是引水復行故道入三焦膜中使從小便出則不流走腸間而利自止矣凡不利者仲景言皆當利其小便此必小便不利水不入於膜中則膜中少陽之火上逆為咳為嘔膜中無水則不能化氣升津是為口渴陰津不上交於心則煩不得眠皆因水不入膜不能化津小便不利故也用豬苓茯苓從脾以利水然不引水入於膜中則脾亦無功故先用滑石色白入肺以導水之上源使入膜中也繼用阿膠秉阿井伏流之性使其復歸故道再用澤瀉生於水中者以引水氣歸根水既引歸膜中而二苓乃滲利之化其質為氣以上升是為津液津液上升則渴咳嘔煩自止此等精義豈易知哉少陰病得之二三日口燥咽乾者急下之宜大承氣湯少陰上火下水其病有水與火之分其治若焚與溺之救請先論君火之亢少陰病得之二日合陽明之燥化又交於少陽主氣之三日不能合陰陽二樞以外轉反合君相二火以內焚其證口燥咽乾者君火熾盛水陰枯極也急下之上承熱氣而下濟水陰緩則焦骨焚身不可救矣宜大承氣湯述此章凡四節論少陰上火下水而主樞機出入者也病在上之火者宜下之病在下之水者宜溫之或下或溫如救焚溺宜急而不宜緩也首節論君火亢於上次節論木火煽於中三節論少陰樞轉不出逆於地中末節論少陰陰寒在下不能上達急下急溫各有攸宜正曰心開竅於舌舌下廉泉玉英二穴有津灌出於口胃開竅於口胃之燥氣不灼傷津液則口不乾今少陰心火合於陽明胃為火就燥舌下津不出而口中燥氣復灼故口燥少陰心脈挾咽少陽三焦脈亦挾咽內經云二陰一陽結為喉痹此咽乾者即二陰一陽火熱相合與喉痹同一例也口燥咽乾四字指陽明燥火熱三者合併真如焚矣故急下之陳注原不差獨其不能合陰陽二樞以外轉句則差矣內經少陰為樞不過比水火陰陽循環相生之象與少陽之半表半裏不同故少陽外出是出於肌表實有外出之地界也陳注不知少陰為樞與少陽不同乃亦解為外出試問少陰外出將出之於何地乎少陰病自利清水色純青心下必痛口乾燥者可下之宜大承氣湯難經云從前來者為實邪腎之前肝也少陰病自利清水乃水陰不能上濟而惟下泄且所泄者只是清水與清穀不同其色純青乃肝木之色火得木助一水不能勝二火也心下為土之位土受木克必痛少陰證以口中和口乾燥為辨寒熱之金針而此口乾燥者為火盛水竭無疑矣亦當急下之救垂竭之水而遏燎原之火宜大承氣湯此少陰之水陰為水火交煽而爍竭雖既利之後亦宜再利通因通用也然自利只是清水可知水愈去而穀愈結仍是通因塞用正曰水不上濟而唯下泄試問何故下泄修園不能知也火得木助現木之青色然未知何故要泄出木之色又心下必痛解為土受木克尤非也既土受木克豈可再用大承氣以攻其土哉蓋純青為木之色者是現出膽汁之本色也西洋醫言肝氣有餘則生膽汁太多嘔苦不食大便青色此其色純青之義也西醫用大黃水銀粉治之與此論正合其心下必痛者是指胸前之膈膜言也膈連於肝而通於膽系膽火盛汁多從肝系而注入膈中至心下將膈中所行之水阻遏使返還入胃中從下而泄是為清水其色純青也蓋膈膜是行水之道水要從胃而入膈膽之火汁要從膈而入胃逆拒於心中下之膈故心下必痛膽汁瀉入胃而水不得入於膈反隨膽汁下泄為下利清水其色純青也水既從胃中下泄而膈膜中反無水不能化氣升津故口乾燥水津者腎所主故此證歸入少陰腎經修園之證近理然於仲景此等精義則未知之也少陰病六七日腹脹不大便者急下之宜大承氣湯少陰病六日交於七日又值太陽主氣之期其病當由陰出陽而愈矣乃君火之氣不能從樞而出竟陷於太陰土之中以致腹脹不大便者內經云暴腹脹大皆屬於熱又云一息不運則針機窮者此也不可不急下之以運少陰之樞使之外出宜大承氣湯述此論少陰君火樞轉不出逆於地中也補曰樞轉不出上節已辨其非矣而暴腹脹之義尤當發明蓋腹字是指油膜言之油膜中乃消水行氣之路道也若是膜中水脹則漸積而脹至於氣脹則能暴發蓋熱盛則氣立漲西洋化學云天之空氣冷則收斂熱則充漲人身油膜中空為行氣之路道而腎陽又化水以為氣也腎中陽熱暴發則氣驟漲充塞而不流通故腹脹不大便宜急下之也少陰病脈沉者急溫之宜四逆湯少陰先天之氣發原於下而達於上少陰陰寒之病脈沉者生氣衰微不能上達也急溫之以啓下焦之生陽宜四逆湯述此言少陰之氣不能由下而上也脈沉而四逆吐利煩躁等證已伏其機沉脈即宜急溫所謂見微知著者消患於未形也少陰病飲食入口則吐心中溫溫欲吐復不能吐始得之手足寒脈弦遲者此胸中實不可下也當吐之若膈上有寒飲乾嘔者不可吐也當溫之宜四逆湯究之少陰水火寒熱之氣變幻無常醫者能於所以然處得其悟機則頭頭是道矣少陰病飲食入口則吐陰寒之氣甚拒格而不納也然何以遽定其為少陰乎惟於不飲食之時審其心中溫溫欲吐復不能吐以此定其為少陰樞機之病也然胸中痰實之病當其始得之亦有欲吐不吐及微厥而手足發寒與少陰寒邪相似但少陰之脈必微細痰滯之脈必弦遲若脈弦遲者此為胸中痰實不可溫其下焦也當吐以越之夫惟以弦遲之脈知其胸上有痰而可吐若膈上有寒飲系少陰之寒氣上彌氣本無形故為有聲無物之乾嘔者不可吐也急溫之溫之則寒散而飲亦去矣宜四逆湯按此言少陰陰寒之氣上彌得食則吐未得食則欲吐不吐時而乾嘔也中段言痰實脈證為借賓定主筆述此二節言少陰水火寒熱之氣以終少陰之義正曰提出中段為賓扯搭前後作主反生葛藤不知此只分兩段上言當吐之下段言不可吐極明爽也上段言少陰病或飲食入口則吐或心中溫溫欲吐不能吐二者始得之不應即見虛厥乃始得而手足即寒是邪伏於內陽不外達故脈弦遲而不微細此胸中痰實非虛寒也且邪高在胸不當下之當吐之為宜至若膈上有寒飲發乾嘔者心中無溫溫之意又非飲食入口則吐亦非欲吐不得吐乃胸中虛寒生飲非胸中實不可吐也當急溫之此一反一正之文法惜修園未細玩耳少陰病下利脈微澀嘔而汗出必數更衣反少者當溫其上灸之少陰陰寒之證宜溫然腎為坎而主水不宜偏溫固不待言而心屬離卦離得坤之中爻亦不得過於偏溫也然而溫之自有其道少陰病裏寒下利診其脈得陽虛之微陰虛之澀陽虛不能勝陰則陰寒上逆而作嘔陰虛不能內守則津液外越而汗出脈證如此亦不過揣摩其大略猶未敢定其必然也然則將何以必之乎必之於數更衣而反少者蓋以陽虛則氣下墜陰弱則勤努責也此時既欲救陽又欲護陰用藥不可偏勝再四思維只當溫藥扶陽養陰外其上取百會穴而灸之既已用薑附輩之補陽而溫中更當助薑附輩之升陽而行上則下利可止此即下病上取法也述少陰上火下水而主神機出入故少陰篇中俱論陰陽水火神機樞轉上下出入之至理知正氣之出入如是即邪氣之出入亦如是因邪以識正由正以識邪邪去則正自復正復則邪自去攻也補也一而二二而一也悟此可以入道矣若徒泥章句不能通其意於言外雖日讀仲景書日用仲景方終屬門外漢耳補曰必數更衣反少者義尚未明闕以待考論云少陰之為病脈微細但欲寐也此以少陰標本水火陰陽之氣見於脈證者為提綱也經云少陰之上君火主之又云陰中之陰腎也少陰本熱而標寒上火而下水神之變精之處也論中言少陰自得之病或得太陽之標或得君火之化或得水陰之氣或在於表或在於裏或歸於中土俱明神機樞轉上下出入之至理故其方亦寒熱攻補表裏之不同正曰少陰水火相銜為生陰生陽之本義誠難明而陳氏只執定少陰為樞一語扭捏解之於陰陽生交之理反不明也注中一則曰從樞再則曰從樞樞在那裏如何從法修園亦當啞然
