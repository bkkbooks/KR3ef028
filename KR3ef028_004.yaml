body:
  text: 傷寒論淺注補正卷三辨少陽病脈證篇補曰手少陽三焦經足少陽膽經膽附於肝人皆知之惟三焦則晉唐以後無人知之遂以為有名無象乃人身內之空腔子色赤屬火而分上中下三停故名三焦至本朝王清任醫林改錯痛詆其非直謂內經所言三焦托空之說無其府也蓋王清任從軍剖死人層層剝視故力詆腔字赤色之誤而其所著醫林改錯又言另有氣府聯接小腸即雞冠油也氣府雞冠油下連大腸前連膀胱此油中有竅凡人飲水至胃即另有竅道將水分出走入油網而不入膀胱水絶不入小腸也今人以為水從小腸臍下乃飛渡入膀胱真是癡人說夢西洋醫書亦言中國人妄言三焦實無其物又言人身有連網中國不知也西醫之言曰人身內外皮裏皆有連網相連凡骨肉之間臟腑之內莫不有連網以聯綴之凡人飲入之水皆從胃散出走連網中而下入膀胱中國不知水由連網中行謂水至小腸之下乃分清濁而飛渡入膀胱此說非也又中國言膀胱有下口無上口亦非也膀胱上接連網其上口即在連網中水從此入也按西醫及王清任皆斥三焦之謬而自稱氣府連網為中國古今所不知此誠足罵盡今醫矣然不可以薄內經仲景之書也西醫不知中國有內經仲景之書而王清任又不考古自鳴得意不知其所謂氣府連網已具於內經仲景之書即三焦是也內經仲景之書不名氣府不名連網故西醫與王清任皆不知之也內經云三焦者決瀆之官水道出焉此即西醫與王清任所指之水道也晉唐以後並此水道而亦不知者則以醫士淺陋不考焦字之義故致貽誤蓋內經焦古作𩏷字從採有層折可辨也從書以其膜象書皮也從焦有皺紋如火灼皮也西醫以連網二字形之古聖只一個𩏷字已如繪其形也後又改作膲字集韻云膲者人之三焦通作焦引醫經上膲在胃上口中焦在胃中脘下膲當膀胱上口已將三焦之形指出省文作焦而後人遂不可識亦何不考之甚也西醫又言連網從內出外則為皮裏肉外之膜包裹瘦肉其兩頭即生筋而著於骨節之間此即內經三焦主腠理之說也腠者皮肉相湊接也理者有紋理乃人周身膜網有縫隙竅道也按之西醫諸說而雞冠油與連網皆即三焦也但西醫王清任不知三焦發源何處管領何事惟內經仲景則精之至矣蓋三焦之根起於腎中腎系貫脊通髓名為命門故曰三焦根於命門從命門而發出膜網是生脅下之兩大板油又生臍下之網油後連大腸前連膀胱腎之通於膀胱是從此中有細竅相通故曰腎合三焦膀胱也膀胱之後大腸之前其膜中一大夾室女子名血室男子名精室又名氣海道家名丹田乃血氣交會化生精氣孕育之所此為下焦至要之地轉從焦膜中能入血室而膀胱之水又賴氣海之陽氣以蒸之又有衝任兩脈導血而下以入於此導氣而上出於胸膈凡熱入血室衝氣上逆水不化氣皆責於此此下焦至重之所也從臍上至胸前之鳩尾環肋骨至腰脊是為中焦其膜根於腎系而發此下焦至重之所也從臍上至胸前之鳩尾環肋骨至腰脊是為中焦其膜根於腎系而發出如網與小腸胃脘相連接有細竅通於腸胃故曰泌別糟粕蒸津液也此為中焦此膜上又有脾臟居之脾氣發生膏油凡有膜網處無論上中下及內外膜網其上皆生膏油左傳所謂膏肓也肓言其膜屬三焦之物膏即言其油乃屬於脾凡化水化穀皆是膏油發力以熏吸之所謂脾主利水化食者如此而其路道則總在中焦之膜中也此膜著背脊處上行至肝是為肝膈肝體半在膈上半在膈下膈發於肝循肋骨而至胸前之鳩尾下遮濁氣上護心肺為陰陽之界限肝氣之通於膈以入腸胃走血室路道皆在膈膜與中下之油網中也膽氣從肝系入膈走膜中入胃化穀所謂木能疏土得此也而西醫則云膽有汁水入胃化穀言氣言汁理皆不悖此膽與三焦相合之路也膈又名膻從膈而循腔子上肺系連心系生包絡皆此膈之膜上入而生之物也故膈名膻而包絡居中即名曰膻中又曰包絡與三焦相表裏以其皆是膜之體而相連也包絡理心血而下行隨衝任以入於血室灌溉上下四旁其路道皆從膈膜而下火即隨血而下交焉臍下之氣上於肺為呼吸並外達皮毛為衛氣皆要從膈中而出氣不得出於膈則為水結火不得下於膈則為火結此痞結陷胸之所由來皆指膈中而言者也從膈膜上肺系又上咽直貫髓海走空竅凡是目中耳中腦中所有薄膜包裏者西醫名為內皮又名為腦氣筋下通於胃通於心肝而不知內經只名為經名為絡言其在三焦膈膜中有絲條管竅上入於腦也此皆在內之膜上中下無所不周者也至於焦膜從內透出於外包裹瘦肉者兩頭生筋凡筋抽惕皆是膜中之證瘦肉外肥肉內夾縫中有紋理名曰腠理其外為肌肌外為皮毛營血從內出外有血絲導之而至於肌以為衛之應此血絲管大而直者名經小而縱者名絡皆行於膜中出腠理而居於肌肉者也衛氣從內出外從微縫中出肌肉而達於皮毛衛氣隨呼吸而更換營血則一日一周回而營衛之行又皆在腠理中往來故能往來寒熱內經謂少陽為樞正言其從陰出陽責在腠理如戶樞當內外之界也從下而上責在胸膈亦如戶樞當出入之界也凡此皆是少陽三焦膜中路道為臟腑周身內外之關鍵故傷寒六經皆有少陽證而仲景不列入少陽使各從其類也但讀者如不知少陽三焦則六經之證皆不能通矣然此上皆論三焦之形而非少陽之氣化也因再補言氣化曰少陽者天地生陽之氣從陰出陽發生萬物故曰少陽於一歲為春屬正二三月於一日為寅卯辰時皆陽氣初出發生之際也蓋天之陽氣當冬令亥子丑月潛於地下黃泉之水中至建寅月陽氣從水中透出於地草木秉此陽氣而萌芽發生至卯月則陽氣正暢草木條達至三月則陽氣已旺草木敷榮於是由木令而交火令矣觀其出於冬而交於夏為水生木木生火之象故少陽之初水木之陽也少陽之終木火之陽也人秉此氣於是而生三焦與膽三焦根於腎系秉水中之陽達於氣海上合肝膽為水生木內經所謂少陽屬腎即指秉於陽之義也合於膽木全是生陽而膽乃布氣於胃中為木能疏上以化水穀上達胸膈以至心包為木生火相為表裏內經所謂少陽之上火氣治之即指膽木生火而言也蓋水生木為少陽之根抵木生火為少陽之極功水火調和風木不鬱則少陽舒暢百病不生仲景此篇所論首言少陽氣化之病繼言三焦膜中交通之故欲人推此以求之各經而證無不明非略也言簡而意已賅也少陽之為病口苦咽乾目眩也少陽者一陽也少陽之為病奈何內經云少陽之上相火主之若從火化火勝則乾故口苦咽乾又云少陽為甲木風虛動眩皆屬於木故目眩也少陽氣化之為病如此此節為少陽證之提綱主少陽之氣化而言也柯韻伯云太陽主表頭痛項強為提綱陽明主裏胃家實為提綱少陽主半表半裏之位仲景特揭口苦咽乾目眩為提綱至當不易之理也蓋口咽目三者不可謂之表亦不可謂之裏是表之入裏裏之出表處所謂半表半裏也三者能開能闔恰合樞機之象苦乾眩者皆相火上走空竅而為病也此病自內之外人所不知惟病人自知診家所以不可與問法三證為少陽病機無風寒雜病而言補曰少陽是三焦腎系命門之中水中之陽故曰少陽從腎系達肝系而與膽通水中之陽上生膽木是為春生之陽故曰少陽膽寄於肝秉風化而生火故又為風火之主若少陽三焦與膽皆不病則風火清暢生陽條達人自不知不覺也設病少陽膽木之火則火從膜中上入胃口而為口苦咽乾設病少陽膽木之風則風從膜中上走空竅入目系合肝脈肝脈貫腦入目膽經與之合則風火相煽而發目眩眩者旋轉不定如春夏之旋風乃風中有鬱火之氣也此少陽膽經自致之病仲景以此提綱既見膽中風火之氣化又見三焦膜膈之路道凡少陽與各經相通之理欲人從此會通之矣少陽中風兩耳無所聞目赤胸中滿而煩者不可吐下吐下則悸而驚少陽之脈從耳後入耳中出走耳前少陽中風風擾其竅道故兩耳無所聞少陽之脈起目鋭眥風火交攻故目赤少陽之樞機不運故胸中滿少陽相火之氣內合於君火火盛而生煩者為少陽自受之風邪不可吐下以傷上下二焦之氣若吐下以傷之則因吐而傷少陽三焦之氣上合厥陰之心包而悸因下而傷少陽膽木之氣內合厥陰之汗而驚此言少陽自受之風邪戒其不可吐下也上節提其總綱專就氣化而言此節補出經脈病治就經脈而言也補曰胸中滿句最是少陽關鍵處胸前有膈膈膜上循腔子為胸中此膈膜連於心包而附近胃中邪在膈膜中故胸中滿上僭入心包故心煩此在膜中不在胃中故不可吐下若吐下傷胃之陽則膀胱水氣上凌而悸傷胃之陰則心包之火飛越而驚修園於胸中不知是膈膜又不知膈膜中是水火游行之路故未能解明也傷寒脈弦細頭痛發熱者屬少陽少陽不可發汗發汗則譫語此屬胃胃和則愈胃不和煩而悸少陽傷寒脈現出本象之弦並現出寒傷經氣之細少陽之脈上頭角故頭痛少陽之上相火主之其發熱者露出相火之本象此屬少陽自受之寒邪也少陽主樞非主表不可發汗惟小柴胡湯加減為對證若發汗竭其津液以致胃乾則發譫語夫樞者少陽也而所以運此樞者不屬於少陽而屬胃胃之關系甚重也胃和則能轉樞而病愈胃不和則少陽三焦之氣內合厥陰心包而煩少陽膽氣失其決斷之職而悸推而言之胃為五臟六腑之本皆可以少陽屬胃之一說悟之也此言少陽自受之寒邪戒其不可發汗也合上節所謂少陽有汗吐下三禁是也漢文辭短意長讀者當於互文見意正曰此屬於胃非言轉樞少陽者其權屬於胃乃言發汗譫語其邪轉屬胃也蓋少陽三焦膜腠之中為水火往來之路發汗則水外泄而火內盛故合於陽明之燥而發譫語若汗後陽明胃不燥則清和而愈此胃無燥熱不與三焦合邪也若胃不清和而有燥熱合於三焦從胸膈上入心包則煩矣而亦有陽隨汗泄內動水氣而悸者總皆發汗傷其水火之所致也譫語煩悸各詳太陽篇此不列方正令人會通各經而仲景少陽篇略而不略也本太陽病不解轉入少陽者脅下硬滿乾嘔不能食往來寒熱尚未吐下脈沉緊者與小柴胡湯少陽為病何以謂之轉屬本太陽標陽之病不解與少陽相火為一屬今因不解而轉入少陽者少陽不得樞轉則脅下硬滿樞機逆而胃氣不和則乾嘔不能食不能由樞而開闔故往來寒熱然尚未吐下中氣猶未傷也脈沉緊者樞逆於內不得外達也與小柴胡達太陽之氣使之從樞以外出此言太陽之轉屬少陽非少陽之自為病也正曰修園於少陽執定樞字扭捏解之而於少陽為樞之理實不知也蓋內經樞字是比譬語言少陽三焦主膈膜中出則為表入則為裏如戶樞之居間而內外相接非真別有樞機之輸也修園樞逆樞轉等字將樞字死解非也此節是言三焦有膜膜上有膏邪從太陽肌肉入於膏油而內著脅下居板油之內則脅下痛滿膏油主消食故不能食邪從皮毛而入於膜是為腠理居陰陽之界故往來寒熱膜縫內氣逆而上則為乾嘔脈沉者邪已內陷之象脈緊者正與邪爭尚欲外出之象故以柴胡湯清利疏達而膜中油中之邪仍透出而解矣此少陽為樞之義也幸勿將樞字死解小柴胡湯方本論無方此方列於太陽篇中今補其方名論以口苦咽乾目眩為提綱言少陽之上相火主之少陽為甲木諸風掉眩皆屬於木主風主火言少陽之氣化也論云少陽中風兩耳無所聞目赤胸中滿而煩不可吐下吐下則悸而恐此言少陽自受之風邪也論云脈弦細頭痛發熱者屬少陽少陽不可發汗發汗則譫語此屬胃胃和則愈胃不和則煩而悸此言少陽自受之寒邪也論云本太陽病不解轉屬少陽脅下痞硬乾嘔不能食寒熱往來尚未吐下脈沉緊者與小柴胡湯此邪從太陽轉屬仍達太陽之氣從樞以外出也論云若已吐下發汗溫針譫語柴胡證罷此為壞病知犯何逆以法治之此言當審汗出溫針四者之逆而救之也少陽未列專方當於太陽篇求之補曰少陽未立專方之故能詳吾篇首總論其義自明陳注脈弦即為自收之寒又曰從樞外出樞字已辨讀者皆當會通也若已吐下發汗溫針譫語柴胡湯證罷此為壞病知犯何逆以法治之若已經吐下發汗三禁之外又加溫針助火無傷經脈四者犯一則發譫語以譫語為此證關鍵可知柴胡湯證不見而罷此為少陽樞壞之病審其或犯吐下而逆或犯發汗而逆或犯溫針而逆知犯何逆隨其所犯而以法救治之此言已犯吐下發汗之禁當審其救治之法也補出溫針見溫針雖不常用而其為禍更烈也時醫輒用火灸更以人命為戲矣補曰此節柴胡湯證乃少陽三焦膜網中之正方正治也若柴胡證罷則邪逆於腑為三陽壞病邪逆於臟為三陰壞病譫語者邪逆於臟腑之一端也即不譫語而知其另犯何逆皆當以法救之法在何處蓋仲景已詳於二陽三陰各篇中按各經法治之可也仲景於此只提數語而凡見二陽三陰各證治義已賅舉欲人會而通之也三陽合病脈浮大上關上但欲眠睡目合則汗太陽主開陽明主闔少陽主樞三陽合病則開闔樞俱病矣關上為少陽之部位今脈見太陽之浮陽明之大二陽浮大之脈俱上於少陽之關上是二陽開闔之機逆於少陽樞內不能出也入而不出內而不外則三陽之氣俱行於陰故但欲眠睡開目為陽合目為陰今衛外之陽氣乘目合之頃內行於陰則外失所衛而出汗此雖三陽合病而以少陽為主也龐安常云脈不言者弦者隱於浮大也補曰少陽半表半裏若從半表而外合於陽明太陽則為三陽合病其脈亦應三陽主外之象而浮大上關上則寸更浮大皆主在表也三陽經皆起於目而三焦膜腠上通耳目空竅聲音從耳入耳壅塞則聾神魂從目出目沉迷則但欲眠蓋邪熱在裏則神魂不得入而虛煩不眠邪熱在表則神魂不得出而但欲眠神魂者陽也與衛氣為一體神魂內返則衛氣不出而衛外故目合則汗其汗之路又從膜而蒸其肌肉從肌肉而滲出皮毛總見少陽三焦膜網外通二陽凡一切由外入內由內出外之理皆可知矣即太陽陽明關於少陽膜間之證亦從可知矣少陽證所以不詳者凡二陽無證已具太陽陽明篇中故不具論讀者當會其通也傷寒六七日無大熱其人躁煩者此為陽去入陰故也邪在少陽入陰最近此以循次而言也然太陽原不必拘於次也即如傷寒六七日陰陽六氣相傳一周已過又當來復於太陽之期若得少陽之樞轉止可以從太陽之開而出矣今身無大熱其人煩躁者此為太陽已去故身無大熱邪入少陰故見煩躁也是可見樞有權則轉外樞失職則內入當於少陽一經三致意也推而言之太陽與少陰一表一裏雌雄相應之道也若當太陽主氣之期不從表而出於陽即從裏而入於陰矣而少陽直入於厥陰者亦然今醫者止守日傳一經之說必以太陽傳入陽明陽明傳入少陽少陽傳入太陰等經矣豈知經氣之傳有定至於病氣或隨經氣而傳或不隨經氣而傳變動不居有如是哉此從少陽而推廣傳經之義也補曰此節言少陽從半裏而入陰經也少陽三焦之膜網全與三陰各臟相連若外無大熱而其邪熱從膜網入心包則煩入腎中則躁蓋三焦之膜發於腎系上生胸膈又從胸膈循腔子而上生心包絡故邪能從膈膜而內入心腎也舉此入陰之一端而凡入太陽入厥陰無一非從膜而入皆可一隅三反矣合上一節總見少陽三焦是人通身之膜網或從半表而出陽或從半裏而入陰將少陽真面目全盤托出矣仲景此篇何曾獨略哉傷寒三日三陽為盡三陰當受邪其人反能食而不嘔此為三陰不受邪也然亦有以次相傳者傷寒三日為少陽主氣之期亦陰陽交換之時也若病氣隨經而行則三陽為盡三陰當以次受邪邪入太陰則不能食而嘔矣乃其人反能食而不嘔其病邪不隨經而入於太陰太陰為三陰之首既不受邪若此即此知其為三陰俱不受邪也此言少陽亦有以次而傳與上文互相發明述此當與太陽篇至七日以上自愈者以行其經盡節合看則傳經了然補曰三陽為盡三陰當受邪此二句又將少陽真面目全行托出見少陽三焦之膜網外通陽明太陽之表內通太陰少陰厥陰之裏三陽為盡謂從太陽之皮毛入陽明之肌肉至少陽之膈膜是三陽之界限已盡矣若邪從膜而上入包絡入肝膈則為入厥陰經若邪從膜而上循包絡以入心循膜之根源以入腎系則為入少陰經若邪從膈膜而入板油網油則為入太陰脾經故曰三陰當受邪也譬如入太陰脾則嘔不能食今反能食而不嘔是邪仍在膜不入太陰經邪在膜中不入於內此為三陰不受邪也上節言煩躁是入厥陰少陰此節言不嘔能食是不入太陰再合上三節三陽合病觀之則凡出陽入陰全從膜中往來而少陽三焦之義明矣故各經皆有少陽證而少陽篇寥寥數節正是一以貫之也傷寒三日少陽脈小者欲已也傷寒三日乃少陽主氣之期若脈弦大為病進今少陽本弦之脈轉而為小者不惟不入於陰即少陽之病亦欲已也經曰大為病進小為病退者也此承上文而言少陽之病欲自已也少陽病欲解時從寅至辰上少陽病欲解時從寅至辰上蓋以少陽之氣旺於寅卯至辰上而其氣已化陽氣大旺正可勝邪故也此言少陽病之得旺時而愈也愚按少陽病脈證並治法仲師原論只十條注家因寥寥數條疑其散失不全或疑為叔和散編入諸經辨論不一余向亦信從之自甲寅至庚申每診病後即謝絶應酬與傷寒論金匱二書為寢食方知前此之所信從者誤也今姑節録其說而辨正於後起今古而同堂諒韻伯平伯諸先生當亦許余為直友也柯韻伯云六經各有提綱則應用各有方法如太陽之提綱主表法當汗解而表有虛實之不同故立桂枝麻黃二法陽明提綱主胃實法當下解而實亦有微甚故分大小承氣少陽提綱有口苦咽乾目眩等證法當清火而火有虛實若邪在半表則制小柴胡以解虛火之游行大柴胡以解相火之熱結此治少陽寒熱往來之二法也若邪入心腹之半裏則有半夏瀉心黃連黃芩等劑叔和搜採仲景舊論於少陽太陰二經不録一方因不知少陽證故不知少陽方耳著論翼將小柴胡湯大柴胡湯及桂枝乾薑湯柴胡桂枝湯柴胡加龍骨牡蠣湯黃連湯黃芩湯皆移入內陳平伯云少陽一經居半表半裏之界凡傷寒在經之邪由陽入陰者每從茲傳入名曰陽樞不離半表而仍不主乎表故不可發汗不離半裏而又不主乎裏故不可吐下惟小柴胡和解一法為本經的對之方然病機有偏表偏裏之殊即治法有從陰從陽之異所以麻桂承氣無加減而小柴胡湯不可無加減也總之往來寒熱為本經所必有之證故柴胡一味為本方所不減之藥其餘則出入加減隨證而施愚按柯韻伯以大小柴胡二方為少陽半表之方半夏瀉心湯等為少陽半裏之方又云少陽主寒熱屬於半表則寒熱往來於外屬於半裏其寒熱雖不往來於外而亦相搏於中故黃連湯半夏瀉心湯黃芩湯黃芩加半夏生薑湯所治痞痛利嘔等證皆是其說卻亦近道然而淺矣至陳平伯所言傷寒在經之邪由陽入陰從茲傳入皆系門外話至云惟小柴胡和解一法為本經的對之方病機有偏表偏裏之殊治法有從陰從陽之異其說亦為近道然而泥矣二家不知小柴胡是太陽病之轉樞方陽明及陰經當藉樞轉而出者亦用之少陽主樞謂少陽之方無有不可若謂少陽之專方則斷斷乎其不可也近時注家凡論中有柴胡之方俱匯入少陽甚者四逆散亦附其內反以仲師活潑潑之妙成為印板論中露出柴胡證三字儼如雲端指示究竟柴胡證何嘗是少陽證耶移易聖經亦自貽荒經之誚耳正曰柯韻伯陳平伯之說原無大差但必將各方攔入少陽則不可也蓋少陽之界出則為陽明太陽入則為少陰太陰厥陰皆從膜中相通故各經皆有少陽證不和少陽三焦之膜不能通各經之理既知少陽三焦之膜則又當隨膜之所在而分屬各經亦不得將各經之方攔入少陽也柯陳自有未合而陳修園必要將柴胡證翻剝為非少陽證亦又過矣
