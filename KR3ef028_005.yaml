body:
  text: 傷寒論淺註補正卷四辨太陰病脈證篇補曰太陰者陰之極大者也太陽如天太陰即如地天無所不包故太陽起於至陰而極於皮毛地無在不有故太陰內連各臟而外連皮毛太陰者脾臟也俗名連貼西醫云脾形曲如帶居胃後在連網之上內經云脾之與胃以膜相連耳膜是三焦之物膜上之膏油即脾之物也蓋言脾臟則形名連貼而言脾所司之物則內為膏油外為肌肉脾旺納穀化生膏油從內達外生出肥肉是內外皆脾之物所充周也故曰太陰言其大無不至是象夫大地也顧方其體則曰地而言其用則曰土內經云中央生濕濕生土土生甘甘生脾又曰太陰之上濕氣治之濕者脾之本氣也土之有濕則為膏壤脾秉濕氣是生膏油膏油滑利則水道暢故脾土主利水膏油生於膜上膜內有熱水不通則蒸發膏油之色而為發黃膏油外達是生肌肉凡肌肉之邪皆屬脾分故桂枝湯多補托脾氣之藥脾之膏油內連腸胃腸胃中食物賴膏油之濕腐之若膏油不能灌溉腸胃則枯燥結硬膏油乾縮名曰脾約言脾所司之膏油收縮則大便硬也膏油中有血絲管營繞於內名曰絡脈在軀殼外者名陽絡在軀殼內者名陰絡此血絲管又為生發膏油之本血屬心膏屬脾血絲管生膏油者心火生脾土之義也西醫言食入則脾擁動發赤以放出熱氣遂生甜肉汁入胃中化穀即內經火生土之義也如火不生土則胃中食不化不思飲食或嘔或瀉蓋脾之膏油不能熏吸飲食而寒濕之氣返注入腸故腹泄膏油中有滯著則腹脹滿以部位言則司大腹外主四肢居中央者運四方也脾與胃相為表裏是為燥濕互相為用究濕之氣化非寒非水乃水與火交而後成濕焉長夏之時所以濕氣用事者正陰陽交媾之時水火相蒸之候故土居中央央者陰陽交會之義鴛鴦鳥不獨宿亦取陰陽交會之義蓋陰陽二字雙聲合為一音即央字也土居中央者即陰陽相交水火合化之義也譬有鹹魚一條天晴久而欲雨則鹹魚必先發濕鹹魚中之鹽即水也其發濕者熱氣逼之而水出與火交故濕也又如有乾茶葉一經火烘即行回潤是茶葉中原具水氣烘之即潤又是火交於水即化為濕之義此天地之濕土其氣象如此而人身之濕土亦象此也人身之水氣從油膜中行人身之火與血亦有脈絡繞行油膜之中是血與氣會於膜而遂生膏油即是水與火交而生濕也火不足則濕不發水不足則濕不流經太陰之上濕氣治之其義如是必先明焉而後可治太陰病惟足太陰屬脾土而手太陰則屬肺金傷寒無肺金證治者非手太陰不主氣化也無金之清亦不能成土之濕特肺與膀胱合於皮毛又與大腸相合肺病多見於二經而本篇卻不再贅讀傷寒者當會通也太陰之為病腹滿而吐食不下自利益甚時腹自痛若下之必胸下結硬太陰氣之為病太陰主地而主腹故腹滿為本證之提綱然腹之所以滿者地氣不升也地氣不升則天氣不降不降故上者不能下而吐食不下不升則下者不能上而自利益甚太陰濕土主氣為陰中之至陰陰寒在下而濕氣不化故時腹自痛若誤以痛為實而下之則脾土愈虛不能轉運必於脾部之胸下結硬此以氣而言也更以經言之足太陰脈入腹屬脾絡胃手太陰脈起於中焦下絡大腸還循胃口上膈屬肺其義亦同至以藏而言雖脾也而肺亦屬焉該於經氣之中不復再贅此太陰證之提綱也補曰腹字是言腸胃之外皮膚之內凡是膏油重疊覆厚故名曰腹脾所司也飲食入胃此膏油熏吸之而水乃化氣走入下焦食乃化液以奉心血若太陰病脾之膏油不能熏吸則食不下行久而吐出水穀停於腸中而寒熱又下注入腸則自利益甚寒氣攻阻則時腹自痛若用涼藥下之則腹中膏油得寒而結有若水凝故結硬言胸下者即指全腹而言如金匱之大建中證是也是皆指膏油膜網中言也淺註解腹字不確故於太陰脾土所司何物亦不能明所以多含糊語也太陰中風四肢煩疼陽微陰澀而長者為欲愈太陰中風風淫末疾故四肢煩疼其脈為浮可知矣今輕手診其陽分則微知風邪之當去矣重手按其陰分則澀知氣血之衰少矣又統診其部位上過寸下過尺而長者是脈絡相通故為欲愈此言太陰腹滿之內證轉而為四支煩疼之外證微澀之陰脈轉而為長之陽脈由內而外從陰而陽故為欲愈之候也按是後言太陰中風未言太陰傷寒至第六節方言太陰傷寒學者當知仲景書互文見意正曰註陽脈微為風邪當去此想像語非定論也註陰脈澀為血氣衰少夫血氣既衰少則不得復見長脈長既為脈絡相通則不衰少也此淺註自相矛盾實於脈法不明不知仲景論脈皆是與證合勘反正互參乃得真諦此節言太陰中風脈若陽大而陰滑則邪盛內陷矣今陽不大而微陰不滑而澀則邪不甚不內陷矣然微澀雖邪不內陷又恐正虛亦不能自愈必微澀而又見長者乃知微澀是邪不盛不是正氣虛長是正氣足不嫌其微澀故為欲愈此等脈法層層剝辨非如後世之死訣也太陰病欲解時從亥至丑上太陰病欲解時從亥至丑上何也太陰為陰中之至陰陰極於亥陽生於子至丑而陽氣已增陰得生陽之氣而解也此言太陰病解之時也陳亮師云此言太陰病解之時太陰坤土其象為純陰亥為陰之盡與純陰相類陰極則復至子則一陽生而為來復之時四季皆屬土而運氣以丑未為太陰濕土子丑乃陽生之時陰得陽則解故主乎丑而不主乎未以未為午後一陰主之時也從亥言之者陰極則陽生故運類而及之也正曰陰得生陽之氣而解說似近理而實非也下篇少陰病欲解從子至寅乃為陰得陽則解以坎中原藏一陽故得一陽之氣而成為腎經坎水生陽之氣化故乘旺而病解至於太陰經則系陰中之至陰旺於陰而不旺於陽者也故從亥至丑皆夜氣所存是為至陰脾經得夜至陰之氣則旺相而病解也凡六經皆乘旺而解豈獨太陰不然哉若是乘生陽之氣則當從子起不當亥起矣故人有白晝不能食至夜能食者得脾陰之旺氣故也修園於六氣司天之義未明故於六經旺時亦不能解須知少陽是生陽之氣出當寅位蓋乘日之初出乘春之初至而少陽遂司其氣逮寅卯以至於申而少陽生物之氣盡矣故曰寅申少陽司天也陽明者陽氣正盛如日之正明起於卯而極於酉故卯酉陽明司天太陽者陽之至極故當辰而盛陽之盛者不能驟衰必至戌位陰已盛而太陽之氣乃入於地水之中矣故辰戌太陽司天若夫陰氣則生於午於易為離卦離中一陰漸至於亥子而少陰之氣盛矣故從午至子為少陰所司也由少而壯是為太陰太陰之氣起於未土至亥子而陰已盛至丑土而陰已故亥子丑為太陰旺時若夫厥陰則為盡陰陰盡陽生起於亥者當陰之極也終於巳者陰氣至巳而盡也故曰巳亥厥陰風木司天也此節因論太陰解時並言六氣之理學者當詳考也太陰病脈浮者可發汗宜桂枝湯太陰內主藏氣而外主肌腠太陰病脈浮者病在肌腠也可輕發肌中之微汗宜桂枝湯此言太陰病之在外也受業侄道著按脈浮者太陰之土氣運行也可發汗者太陰之地氣上而為雲也桂枝湯在陽名為解肌在太陰名為發汗何以言之蓋太陽以皮毛為表太陰以肌腠為表也王宇泰云病在太陽脈浮無汗宜麻黃湯此脈浮當亦無汗而不言者謂陰不得有汗不必言也不用麻黃湯而用桂枝湯蓋以三陰兼表病者俱不當大發汗也須識無汗亦有用桂枝湯也按時說以桂枝湯為太陽專方而不知亦陰經之通方也又以為治自汗之定法而不知亦治無汗之變法也正曰太陰病是指腹滿濕氣為病也濕在內脈當沉今脈浮者是濕從外至仍欲外出之象故用桂枝湯從中外托使自油網中而托出肌外以為汗也王說不當大發汗陳說無汗之變法均不精確須思脾太陰與肺太陰合肺主皮毛故應肺脈之浮而可發汗也自利不渴者屬太陰以其臟有寒故也當溫之宜服四逆輩太陰病在外者既有桂枝之治法矣若病在內自利不渴者無中見之燥化此屬太陰以其脾臟有寒故也當溫之宜服四逆輩此言太陰病之在內也自利者不因下而利也凡利則津液下注多見口渴惟太陰濕土之為病不渴受業黃奕潤按以不渴一證認太陰是辨寒熱利之金針此二節言太陰病在外者宜桂枝以解肌在內者不渴無中見之燥化屬本臟有寒宜四逆輩四逆輩者理中湯丸等溫劑俱在其中也補曰一個輩字已括盡太陰寒證之治法仲景欲人推例以得非故略也程郊倩三陰同屬臟寒少陰厥陰有渴證太陰獨無渴證者以其寒布中焦總與龍雷之火無涉少陰中有龍火水底寒甚則龍升故自利而渴厥陰中有雷火故有消渴太陽一照雷雨收聲故發熱則利止見厥復利也愚按脾不輸津於上亦有渴證然卻不在太陰提綱之內郊倩立言欠圓然亦不可少此一論為中人以下開互證之法正曰龍雷之火是宋元後邪說至於烈日當空龍雷潛伏以此誤治殺人者何止千百皆因失陰陽之真理故也內經仲景無此說法後人萬萬不可妄添我輩註書只可將聖經發明不可於聖經外另生支節也傷寒脈浮而緩手足自溫者繫在太陰太陰當發身黃若小便自利者不能發黃至七八日雖暴煩下利日十餘行必自止以脾家實腐穢當去故也內經云太陰之上濕氣主之中見陽明是以不得中見之化則為臟寒之病若中見太過又為濕熱相併之病此太陰之所以有寒復有熱也傷寒脈浮而緩手足自溫者系在太陰而中見陽明之化也陽明之熱合於太陰之濕即時當發身黃若小便自利者濕熱得以下泄不能發黃至七八日又值陽明主氣之期一得陽熱之化正氣與邪氣相爭而暴煩故雖暴煩下利日十餘行必當自止所以然者太陰中見熱化以脾家實倉稟之腐穢當去故也此言太陰傷寒自利欲解之證也按成註云下利煩躁者死謂先利而後煩是正氣脫而邪氣擾也茲則先煩後利是脾家之正氣實故不受邪而與之爭因暴發煩熱也補曰繫字是聯綴之義太陰者指人身之膏油而言膏油生周身膜網之上而邪入膏油有如聯綴之形故曰系在太陰膜網中是三焦水道水道若遏則合膏油之熱蒸而為濕遂發黃癉黃者土之色人身膏油原帶微黃被濕熱蒸則更發黃若小便自利則濕不遏而熱不蒸故不發黃然小便利者易於結硬雖不發黃又恐合陽明之燥而為煩且不大便矣乃至七八日雖暴煩頗似陽明之燥但大便不結且下利日十餘行則煩非內燥而利非脾虛乃脾家氣實能自去其腐穢也病必自止舉此以見黃證之原方證見太陽陽明而此乃發明之也又舉煩硬與下利見於四逆承氣等法中而此又詳辨之使無誤認也論云傷寒脈浮而緩手足溫者繫在太陰太陰當發身黃若小便自利者不能發黃至七八日雖暴煩下利日十餘行必自止以脾家實腐穢當去故也此言太陰寒證外亦有熱證也經云太陰之上濕氣主之中見陽明若不得中見之化則為臟寒之病若中見太過濕熱相併又為發黃之證小便自利者以太陰中見熱化脾家實倉稟之腐穢當自去也本太陽病醫反下之因爾腹滿時痛者屬太陰也桂枝加芍藥湯主之大實痛者桂枝加大黃湯主之又有太陽轉屬之證本太陽病醫反下之太陽之氣陷於太陰之地中因而腹滿時痛時止者乃太陽轉屬太陰也宜啟下陷之陽以和不通之絡以桂枝加芍藥湯主之若滿甚而為大實常痛不定以時者此脾胃相連不為太陰之開便為陽明之闔以桂枝加大黃湯主之權開陽明之捷徑以去脾家之腐穢此言太陽轉屬太陰之病也受業汪桂小山云太陽標熱誤下之不特轉屬於太陰亦轉屬於陽明也腹滿時痛脾氣不濡也宜桂枝湯加芍藥入太陰出太陽也大實痛者轉屬陽明也桂枝湯加大黃者入陽明出太陽也桂枝加芍藥湯方桂枝三兩芍藥六兩甘草二兩生薑三兩大棗十二枚上五味以水七升煮取三升去滓分溫三服桂枝加大黃湯方即前方加大黃二兩述桂枝加芍藥湯倍用芍藥之苦降能令桂枝深入於至陰之分舉誤陷之邪而腹痛自止桂枝加大黃者以桂薑升邪倍芍藥引入太陰鼓其陷邪加大黃運其中樞通地道去實滿棗草助轉輸使其邪悉從外解下行各不相背太陰為病脈弱其人續自便利設當行大黃芍藥者宜減之以其人胃氣弱易動故也大實痛權借大黃芍藥之力以行腐穢固已然脾胃相連而脾氣又盜藉於胃氣也胃之氣貫於脈胃之強弱徵於便之利不利太陰為病脈弱其人陸續自便利其胃弱可知矣設或不得已而通因通用當行大黃芍藥者亦宜減少其分兩而用之以其人胃氣弱大便易動故也胃氣為生人之本太陰然即六經亦莫不然也此一節承上節而言減用大黃芍藥者以胃氣之不可妄傷也論云本太陽病醫反下之因以腹滿時痛者屬太陰也桂枝加芍藥湯主之大實痛桂枝加大黃主之此言誤下轉屬之證也又云太陰為病脈弱其人續自便設當行大黃芍藥者宜減之以其人胃弱易動故也此承上節脾家實宜芍藥大黃以行腐穢而脈弱者大便陸續而利出宜減芍藥大黃以存胃氣甚矣傷寒之治首重在胃氣也沈堯封云太陰陽明俱屬土同主中州病則先形諸腹陽明為陽土陽道實故病則胃家實而非滿也太陰為陰土陰道虛故病則腹滿而不能實也凡風燥熱三陽邪犯陽明寒與濕二陰邪犯太陰陽邪犯陽則能食而不嘔陰邪犯陰則不能食而吐陽邪犯陽則不大便陰邪犯陰則自利證俱相反可認若誤下則胃中空虛客氣動膈在陽邪則懊憹而煩在陰邪則胸下結硬倘再誤攻必致利不止而死此太陰病之提綱也凡稱太陰俱指腹滿言正曰胃家既實安有不滿之理陽道實而非滿其說有差又陰道虛故滿而不實亦非也既云陰道虛則當空空如也何以又能滿哉此蓋不知胃是胃管脾是油網油網在胃管之外胃管內常有糟粕故能結實油網中無糟粕邪在油網中只能壅水與血而為滿脹一實不滿各有界限不同沈氏說殊誤柯韻伯云太陰脈布胃中絡於嗌故腹滿嗌乾此熱傷太陰自陽部注經之證非論中所云太陰自病也仲景以太陰自病為提綱因太陰主內故不及中風四肢煩疼之表又為陰中至陰故不及熱病嗌乾之證太陰為開又陰道虛太陰主脾所生病脾主濕又主輸故提綱主腹滿時痛而吐利皆是裏虛不固濕勝外溢之證也脾虛則胃亦虛食不下者胃不主納也要知胃家不實便是太陰病補曰在地為土在人為脾究竟脾是人身何物管理何件事故不將膏油指出而徒籠統言之則義不明也愚按仲師太陰病脈證只有八證後人謂為散失不全及王叔和之變亂而不知八條中有體有用有法有方真能讀之則取之無禁用之不竭矣所可疑者中風證四肢煩疼言其欲愈之脈而不言未愈時何如施治太陰病脈浮宜桂枝湯而不言脈若不浮如何施治惟於自利不渴臟寒證出其方曰四逆輩凡理中湯通脈四逆湯吳茱萸湯之類皆在其中又於太陽誤下轉屬腹時痛證出桂枝加芍藥湯方大實痛證出桂枝加大黃湯方又以胃氣弱減大黃芍藥為訓此外並無方治以為少則誠少矣而不知兩節兩出其方大具經權之道宜分兩截看仲景所謂太陰證與內經人傷於寒為熱病腹滿嗌乾證不同提綱皆言寒澀為病以四逆輩為治內正法桂枝湯為治外正法自第一節至第五節一意淺深相承不離此旨所謂經也此為上半截第六節言太陰濕土不與寒合而與熱合若小便利則不發黃若暴煩下利則腐穢當去是常證之外略有變局另作一小段為承上起下處第七節言太陽病誤下轉屬太陰腹滿時痛大實痛者以桂枝加芍藥加大黃為主治一以和太陰之經略變四逆輩之溫而為和法變桂枝湯之解外而為通調內外法是於有方處通其權也一以脾胃相連不為太陰之開便為陽明之闔既闔而為大實痛不得不借陽明之捷徑以去脾家之腐穢要知提綱戒下原因腹時痛而言此從正面審到對面以立法又於暴煩下利十餘行自止節言愈尚未言方此從腐穢既下後想到不自下時之治法是於無方處互明方意以通權也此為下半截總而言之四逆輩桂枝湯及桂枝加芍藥桂枝加大黃湯皆太陰病之要劑若不渴則四逆輩必須若脈弱則芍黃等慎用脈浮有向外之勢桂枝湯之利導最宜煩疼當未愈之時桂枝加芍藥湯亦可通用陳平伯謂桂枝加芍藥湯為太陰經之和劑又謂三陰皆有經病仲景各立主方太陰經病主以桂枝加芍藥湯少陰經病主以麻黃附子細辛湯厥陰經病主以當歸四逆湯原文雖止八條而諸法無有不具柯韻伯等增入厚朴生薑半夏甘草人參湯白散麻仁丸等方欲廣其用反廢其活法大抵未讀聖經之前先聞砭剝叔和之語謂非經文無不可以任意增減移易致有是舉耳
