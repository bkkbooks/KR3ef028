body:
  text: 傷寒論淺注補正卷七辨霍亂病脈證並治法補曰此霍亂證同傷寒下篇陰陽易瘥後勞復皆傷寒大病後常見之證故皆附於傷寒論後其痓濕暍篇本不應附於此然仲師已自言曰三種宜應分別以與傷寒相似故此見之據此數語則此三篇附於傷寒論後於義始備舊本皆與厥陰合為一卷而吾必另分為一卷者盡以證治文法皆不可竄入厥陰篇且仲景原序明言傷寒雜病論合十六卷金匱九卷即雜病論也此當另為一卷與傷寒六篇共作七卷合之金匱適符一十六卷之數且痓濕暍附傷寒論之終而又居金匱要略之首一證見於兩首足見仲景已成傷寒論並成此卷後復念雜病尚不止此因又作金匱一書其痓濕暍又承接而論列之欲人知二書連貫當合讀以盡其義也問曰病有霍亂者何答曰嘔吐而利此名霍亂問曰病有霍亂者何答曰中土為萬物之所歸邪傷土邪氣與水穀之氣一時交亂故上嘔吐而下利邪正紛爭倉忙錯亂名曰霍亂此節言霍亂之邪在內也問曰病發熱頭痛身疼惡寒吐利者此屬何病答曰此名霍亂霍亂自吐下又利止復更發熱也問曰病發熱頭痛身疼惡寒盡同太陽傷寒只是上吐下利一時併作雜以太陰證在內者屬何病答曰此名霍亂霍亂之名自來定於吐下又或吐利止而霍亂之內邪已解而表邪未解復更發熱也此言霍亂之邪內外俱病內解而外未解則霍亂轉傷寒矣夫曰利止不曰吐止者省文也傷寒其脈微澀者本是霍亂今是傷寒卻四五日至陰經上轉入陰必利本嘔下利者不可治也欲似大便而反失氣仍不利者此屬陽明也便必硬十三日愈所以然者經盡故也傷寒其脈因吐利後氣虛而微因吐利後血虛而澀者其吐利本是霍亂今更發熱又是傷寒卻至四日太陰五日少陰至陰經主氣之上或轉入於藏陰則藏陰受邪必復下利何則此證本由霍亂嘔吐下利而得者今若下利是為重虛不可治也若利止發熱至四五日而病人欲似大便而反矢氣仍不利者為不入於陰而仍屬陽明也屬陽明則燥氣在上便必硬十三日經氣兩周自愈所以然者以行其經盡故也此承上文而言霍亂之邪若從內而外即是傷寒內而益內轉入於陰即為不治之證下利後當便硬硬則能食者愈今反不能食到後經中頗能食復過一經能食過之一日當愈不愈者不屬陽明也霍亂下利止後復更發熱而為傷寒當便硬硬則胃陽已復寒邪已去能食者愈今反不能食到後經中復值陽明主氣之期胃和故頗能食即復過一經三傳而至十三日亦能食又過十三日之一日乃十四日又當陽明主氣之期陽明氣旺當愈若不愈者又當於別經中求之不專屬於陽明也傷寒傳經當活潑潑看去不可膠柱而鼓瑟也此再申上文之義惡寒脈微而復利利止亡血也四逆加人參湯主之霍亂利止後惡寒脈微陽氣虛不能支而復利夫中焦取汁化而為血下利則傷其中焦之氣血之根元虧矣利雖止而亡血也用四逆加人參湯主之四逆湯補陽氣加人參以滋中焦之汁此言虛寒利後溫藥中須得補氣以致水之妙也四逆加人參湯方即於四逆湯方內加人參一兩蔚按論云惡寒脈微而復利利止無血也言霍亂既利而復利其證惡寒脈又微可知陽氣之虛也然脈證如是利雖止而非真止知其血已亡也此亡血非脫血之謂即人則亡陰之義也金匱曰水竭則無血即為津液內竭故以四逆湯救其陽氣又加人參生其津液柯韻伯疑四逆湯原有人參不知仲景於回陽方中屏絶此味即偶用之亦是制熱藥之太過惟救陰方中乃加之韻伯此言可知未嘗夢見本草經也霍亂頭痛發熱身疼痛熱多欲飲水者五苓散主之寒多不用水者理中丸主之嘔吐而利一時併作病名霍亂頭痛發熱身疼痛內霍亂而外傷寒得陽明之燥氣而熱多欲飲水者以五苓散主之助脾土以滋水精之四布不得燥氣而寒多不用水者理中焦而溫補其虛寒以理中丸主之然丸不及湯丸緩而湯速也述此言霍亂內傷脾土無論寒熱而皆以助脾為主也正曰得陽明之燥氣而熱多此語差矣陽明之熱是白虎湯證此五苓散之熱是太陽之水氣溢泄而衛陽與之相爭也若解為燥氣則與吐利服五苓散之法皆不合矣水飲停蓄亦發渴觀太陽篇五苓散證自見不可誤解為燥氣其理中湯證解說則不差也理中丸方人參甘草白朮乾薑各三兩上四味搗篩為末蜜丸如雞子黃大以沸湯數合和一丸研碎溫服之日三服夜二服腹中未熱益至三四丸然不及湯湯法以四物依兩數切用水八升煮取三升去滓溫服一升日三服附加減法若臍上築者腎氣動也去朮加桂四兩吐多者去朮加生薑三兩下多者還用朮悸者加茯苓二兩渴欲得水者加朮足前成四兩半腹中痛者加人參足前成四兩半寒者加乾薑足前成四兩半腹滿者去朮加附子一枚服湯後如食頃飲熱粥一升許微自溫勿發揭衣被總結服湯後法蔚按論云霍亂頭痛發熱疼痛熱多飲水者五苓散主之寒多不用水者理中丸主之夫曰霍亂者嘔吐而利也頭痛發熱身疼痛者內霍亂而外傷寒也熱渴者以五苓散助脾土以滋水津之四布寒而不渴者用理中丸理中焦而交上下之陰陽蓋以上吐下利不論寒熱治宜專顧其中也王晉三云人參甘草甘以和陰白朮乾薑辛以和陽辛甘相輔以處中則陰陽自然和順矣正曰五苓散功併利水水利則津生義詳太陽篇此云滋水津之四布於義不合此為溫補第一方論中言四逆輩則此湯俱在其中又治大病瘥後喜唾善讀書者於喜唾二字推廣之凡脾胃虛皆是便可悟調理之善方矣程郊倩曰參朮炙草所以固中州乾薑守中必假之焰釜薪而騰陽氣是以穀入於陰長氣於陽上輸華蓋下攝州都五臟六腑皆以受氣矣此理中之旨也吐利止而身痛不休者當消息和解其外宜桂枝湯小和之吐利止為內邪已解而身痛不休者則外之餘邪尚未盡也是當消息和解其外宜桂枝湯小微和之此言裏和而表未和也消息二字最妙不然四逆桂枝新加湯證與此證只差一黍吐利汗出發熱惡寒四肢拘急手足厥冷者四逆湯主之霍亂之為陰虛者中焦之津液內灌溉於臟腑外濡養於筋脈吐則津液亡於上矣利則津液亡於下矣汗出則津液亡於外矣亡於外則表虛而發熱惡寒亡於上下無以榮筋而四肢拘急無以順接而手足厥冷者以四逆湯主之助陽氣以生陰液方中倍用炙甘草以味補陰述此言四逆湯能滋陰液也此證尚可治者在發熱一證為陽未盡亡滋陰二字不可令張景嶽薛立齊李士材馮楚瞻葉天士一流人聞之費了多少熟地黃地黃炭何首烏之類以誤人也正曰此病明是寒證四肢拘急亦是內經所謂諸寒收引也故用四逆以治其寒強解作滋陰實為支離既吐且利小便復利而大汗出下利清穀內寒外熱脈微欲絶者四逆湯主之霍亂之為陽虛者既吐且利陽氣亡於上下矣小便復利而大汗出陽氣亡於表裏矣下利清穀裏寒甚也寒甚於內而格陽於外故內寒外熱診其脈微而欲絶者惟陰無陽生陽不升故也宜急回陽以四逆湯主之述此言四逆湯能助陽氣也陽虛二字不可令熟於張景嶽薛立齊雜說之下聞之以人參黃耆湯藥誤人不少吐已下斷汗出而厥四肢拘急不解脈微欲絶者通脈四逆加豬膽汁湯主之陰陽氣血俱虛水穀津液俱竭無有可吐而吐自已無有可下而下自斷亡陰亡陽之證仍在故汗出而厥四肢拘急不解脈微欲絶者更宜通脈四逆加豬膽汁湯主之啓下焦之生陽助中焦之津液述此合上兩節之證而言也上節以四逆湯滋陰液次節以四逆湯助陽氣此節氣血兩虛又宜通脈四逆豬膽汁湯生氣而補血也蔚按論云吐已下斷者言陰陽氣血俱虛水穀俱竭無有可吐而自已無有可下而自斷也曰汗出而厥脈微欲絶者無陽氣以主之也曰四肢拘急者無津液以養之也此際若用四逆湯薑附之溫未嘗不可以回陽倍用甘草之甘未嘗不可以滋陰然猶恐其緩而無濟也若用通脈四逆湯倍乾薑之勇似可追返元陽然猶恐大吐大利之餘驟投大辛之味內而津液愈涸外而筋脈愈攣頃刻死矣師於萬死中覓一生路取通脈四逆湯以回其厥以止其汗更佐以豬膽生調取氣生俱在苦先入心而脈復以汁補中焦之汁灌溉於筋則拘急解辛甘與苦甘相濟斯陰陽二氣頃刻調和即四逆加人參湯之意但人參亦無情之草根不如豬膽汁之異類有情生調得其生氣為效倍神也諸家囿於白通加法謂格陽不入借苦寒以從治之堪發一笑按古本只加膽汁無人尿張隱庵注有人尿必有所本讀其注文極有見解張隱庵云此節重言以結上文兩節之意上兩節皆主四逆湯此言氣血皆虛更宜通脈四逆加豬膽人尿以治之不曰吐利止而曰吐已下斷者謂津液內竭吐無所吐下無所下也若吐已下斷如所謂汗出而厥四肢拘急之證仍然不解所謂微脈欲絶之脈依然如故此為陰陽血氣皆虛更宜通脈四逆加豬膽汁湯主之通脈四逆湯解見少陰篇加水蓄之甲膽乃起腎臟之精汁上資心主之血更加人尿乃引膀胱之津液還入胃中取精汁內滋而血氣調和之意蓋風雨寒暑之邪直入中焦皆為霍亂若吐利太過而生氣內傷手足厥冷脈微欲絶皆宜四逆湯主之無分寒與暑也何也正氣受傷止論正而不論邪後人補立藿香正氣散以治吐利此治微邪在胃正氣不傷如此之證弗藥亦愈即陰陽湯黃土湯皆能療之若霍亂裏虛古聖止立四逆理中二方為急救正氣之法有謂藿香正氣散治暑霍亂者亦非也余每見暑月病霍亂四肢逆冷無脈而死藿香正氣不過寬胸解表之劑惡能治之況夏月元氣發泄在外中氣大虛外邪卒至救正猶遲況疏散之劑乎夫邪正相搏有風雨寒暑之分正受邪傷止論正氣之虛實入臟即為不治之死證非風暑為陽而寒雨為陰也此為霍亂之大綱學者宜服膺而弗失高子曰霍亂之證至汗出而厥四肢拘急脈微欲絶乃純陰無陽用四逆湯不必言矣又加豬膽汁人尿者津液而竭陰血併虛不當但助其陽更當滋益其陰之意每見夏月霍亂之證四肢厥逆脈微欲絶投以理中四逆不能取效反以明礬少許和涼水服之而即愈亦即膽汁人尿之意先賢立法可謂周遍詳明矣吐利發汗脈平小煩者以新虛不勝穀氣故也然治此當以胃氣為主也吐利之病在內若發汗先從外以解之恐傷胃氣也今按其脈平外解而內亦和也但尚有小煩者食入於胃濁氣歸心一時不能淫精於脈也蓋吐利初愈以其臟腑新虛不能勝受胃中之穀氣故也穀氣足經脈充胃氣復煩自止矣今之治傷寒者輒禁其食貽害不少然與之有時不令太早與之有節不令太過則愈此人言以胃氣為本經曰得穀者昌失穀者亡霍亂吐利胃氣先傷尤當顧之故結此一條以終霍亂之義師每篇俱以顧胃氣為總結以人有胃氣則生也治病者當知所重矣然今醫亦耳食此二字反以四君子湯補中益氣湯歸脾湯等為補中之劑以梔子豉湯竹葉石膏湯調胃承氣湯瀉心湯等為敗胃之劑江浙閩粵四省尤甚堪發一喟辨陰陽易差後勞復脈證傷寒陰陽易之為病其人身體重少氣少腹裏急或引陰中拘攣熱上衝胸頭重不欲舉眼中生花膝脛拘急者燒裩散主之傷寒男子新病差而婦人與之交得病名曰陽易婦人新病差而男子與之交得病名曰陰易言男女互相換易也陰陽易之為病其形相交其氣相感形交則形傷其人身體重氣交則氣傷其人少氣夫奇經衝任督三脈皆行少腹前陰之間前陰受傷故少腹裏急或引陰中拘攣或熱邪受三經而上衝於胸髓海不足而為頭重不欲舉精不灌目而為眼中生花精不榮筋而為膝脛拘急者以燒裩散主之述此言傷寒餘熱未盡男女交媾毒從前陰而入傷奇經衝任督三脈而為陰陽易之病也燒裩散方上取婦人中裩近隱處剪燒灰以水和服方寸匕日三服小便即利陰頭微腫則愈婦人病取男子裩襠燒灰張隱庵曰裩襠乃陰吹注精之的蓋取彼之餘氣卻彼之餘邪邪毒原從陰入復使之從陰以出故曰小便利陰頭微腫即愈大病瘥後勞復者枳實梔子豉湯主之傷寒大病差後榮衛氣血陰陽水火始相調和而交會若勞傷之而復作者以枳實梔子豉湯主之胃氣新復運化不及若有宿食者加大黃如博棋子大五六枚此言新差病後有勞復食復之證也勞復者病後無大勞如因言語思慮梳澡迎送之類復生餘熱也食復者內經所謂多食則復食肉則遺是也若犯房則復者名女勞復華元化謂為必死愚隨證以大劑調入燒裩散救之枳實梔子豉湯方枳實三枚炙梔子十四枚擘豉一升綿裹上三味以清漿水七升空煮取四升納枳實梔子煮取二升下豉更煮五六沸去滓溫分再服覆令微似汗按清漿水是淘米水二三日外味微酸者取其安胃兼清肝火一說取新淨黃土以水攪勻澄之取其水之清者蓋欲藉土氣以入胃耳余每用俱遵前說張隱庵曰大病瘥後則陰陽水火始相交會勞其形體則氣血內虛其病復作其證不一故不著其病形只以此方統治之方中梔子清上焦之煩熱香豉散下焦之水津枳實炙香宣中焦之土氣三焦和而津液生津液生而氣血復矣若有宿食則三焦未和加大黃以行之令燥屎行而三焦氣血自相和合矣今之醫輩凡遇此證無不以補中益氣湯誤之也傷寒瘥以後更發熱小柴胡湯主之脈浮者以汗解之脈沉實者以下解之傷寒差已後不因勞食而更發熱者乃餘邪未盡而留於半表半裏之間宜轉其樞以小柴胡湯主之若脈浮熱發在表也以汗解之若脈沉實者熱發在裏也以下解之述此五節言傷寒瘥後餘邪未盡有虛實有寒熱有水氣有在表者有在裏者有在表裏之間者皆宜隨證而施治之也按尚論篇云汗下之法即互上條汗用枳實梔子之微汗下用枳實梔子加大黃之微下存參大病瘥後從腰以下有水氣者牡蠣澤瀉散主之太陽寒水之氣從下而上運行於膚皮今大病差後太陽之氣不能通行周遍於一身止逆於下焦從腰以下有水氣者以牡蠣澤瀉散主之蓋腰以上屬陽陽水當從外泄腰以下屬陰陰水當從下泄也述大病後用諸藥峻攻何反不顧其虛耶正因水勢未犯半身以上急排其水所全甚大設用緩藥則陰水必侵入陽界治之無及矣倘因大病後遽行溫補豈知其後且有大患哉牡蠣澤瀉散方牡蠣澤瀉栝蔞根蜀漆洗去腥葶藶熬商陸根熬海藻洗去鹹以上各等分上七味異搗下篩為散更入臼中治之白飲和服方寸匕小便利止後服日三蔚按太陽之氣因大病不能周行於一身氣不行而水聚之今在腰以下宜從小便利之牡蠣海藻生於水故能行水亦鹹以軟堅之義也葶藶利肺氣而導水之源商陸攻水積而疏水之流澤瀉一莖直上栝蔞生而蔓延二物皆引水液而上升可升而後可降也蜀漆乃常山之苗自內而出外自陰而出陽所以引諸藥而達於病所又散以散之欲其散布而行速也但其性甚烈不可多服故曰小便利止後服此方用散不可作湯以商陸水煮服殺人大病瘥後喜唾久不了了胸上有寒當以丸藥溫之宜理中丸大病差後喜唾是脾虛不能收攝津液乃至久不了了者胃上有寒不能其行津液以致涎沫涌出當以丸藥緩緩溫之宜理中丸述上節差後而得實證此節差後而得虛寒之證無虛虛實實立論之章法也傷寒解後虛羸少氣氣逆欲吐竹葉石膏湯主之傷寒解後氣血虛少血少不能充肌肉滲皮毛故形體消瘦而虛羸中氣虛故少氣上言胃土有寒則喜唾此證胃中有熱則氣逆欲吐者以竹葉石膏湯主之述上節言虛寒證此節言虛熱證也竹葉石膏湯方竹葉二把石膏一斤半夏半升洗麥門冬一升人參三兩甘草二兩炙粳米半升上七味以水一斗煮取六升去滓納粳米煮米熟湯成去米溫一升日三服張隱庵曰竹葉凌冬青翠得冬令寒水之氣半夏生當夏半得一陰之氣參草粳米資養胃氣以生津液麥冬通胃氣之絡石膏紋肌色白能通胃中之逆氣達於肌腠總令津液生而中氣足虛熱解而吐自平矣男元犀按徐靈胎云此仲景先生治傷寒愈後調養之方也其法專於滋養肺胃之陰氣以復津液蓋傷寒雖六經傳遍而汗吐下三者皆肺胃當之又內經云人之傷於寒也則為病熱故滋養肺胃岐黃以至仲景不易之法也後之庸醫則用溫熱之藥峻補脾腎而千聖相傳之精義消亡盡矣病人脈已解而日暮微煩以病新瘥人強與穀脾胃氣尚弱不能消穀故令微煩損穀則愈病人脈不浮不沉實為脈已解脈解而病之解為真解矣而日暮乃陽明之旺時微煩蓋以大病新差之人強與以穀脾胃氣尚弱一時不能消穀故令微煩不必用藥消之止須減損其穀則能消化而愈何以謂之損少少與之非不與也述此又結穀氣一條以明病後尤當以胃氣為本而胃氣又以穀氣為本也損穀即是納穀之妙用所謂以少許勝人之多許也凡病人起居坐臥俱聽其自然不可勉強強則非所欲反逆其性而不安矣不特一食也補曰自柴胡湯節下皆言餘邪未淨之證柴胡湯主之一節是言三焦膜中有餘邪牡蠣澤瀉散一節是言太陽膀胱不化氣理中丸一節是脾虛有餘寒竹葉石膏湯一節是肺虛有餘熱損穀則愈一節是胃虛不任穀分別解之則節節著實無遁情矣辨痓濕暍脈證傷寒所致太陽痓濕暍三種宜應別論以為與傷寒相似故此見之痓充至切暍音謁言三種所因雖不同而俱傷太陽之氣與傷寒相似故於傷寒之後見之補曰此數語是仲景了結傷寒引起金匱一個小序而此三證者證雖附於是篇方則詳於金匱此篇之末即是金匱之首以見雜病應別論不得不再作金匱又見金匱通於傷寒皆可從此附見處起例矣仲景此篇不列方余於此篇亦少補正以皆見於金匱茲不重出惟此篇承傷寒之終即以啓金匱之始乃仲師教人要會通二書之意故其序既合金匱為十六卷而其文則由傷寒入金匱從此病過渡矣讀者當觀其通太陽病發熱無汗反惡寒者名曰剛痓太陽中風之病入於經俞則強急反張動搖口噤而為痓風傷標陽故發熱陽邪傷陽陰液不通故無汗標陰既已外應即不當惡寒今反惡寒者標本俱病也純陽無陰故名曰剛痓此言剛痓金匱有方太陽病發熱汗出而不惡寒名曰柔痓太陽病同前證惟發熱汗出風入經俞而表裏虛也不惡寒者病標陽而無本寒之氣也陽之汗以天地之雨名之汗出則剛強之氣稍折而柔和故名曰柔痓此言柔痓金匱有方太陽病發熱脈沉而細者名曰痓為難治太陽病底面即是少陰今痓病發熱是太陰表證脈沉而細者是少陰裏脈與尋常脈按之緊如弦直上下行者不同名曰痓為難治按此三字宜從金匱補入余著金匱讀論之甚詳而補其方屢用屢效太陽病發汗太多因致痓太陽病作痓者血虛無以榮養其經脈也發汗太多汗即血也即一汗證可以例産後金瘡一切血虛之證皆因之而致痓此言所以致痓之由也病者身熱足寒頸項強急惡寒時頭熱面赤目赤獨頭動搖卒口噤背反張者痓病也經云因於風者上先受之故痓病上而身熱未及於下故下而足寒風傷太陽之經故頸項強急風傷太陽之氣故惡寒陽氣上行於頭面故時頭熱面赤太陽之脈起於目內眥風熱傷於經脈故目脈赤頸項因強急而不能動獨頭動呈風象而搖強急則筋不舒而牙緊閉故卒然口噤況風邪客於會厭乎背反張者風邪入於經俞也此剛柔二痓之見病也述此形容痓病之象以明痓病不與傷寒中風同也按前言剛柔二痓金匱言剛者用葛根湯柔者用桂枝加栝蔞根湯皆太陽之治法非既成痓病之治法也金匱用大承氣湯具旋轉乾坤之手段余著金匱讀於仲師欲言未言處補出兩方皆是起死回生之劑補曰剛痓柔痓皆非痓之正病惟此兩節是正言痓病論詳金匱太陽病關節疼痛而煩脈沉而細者此名濕痹濕痹之候小便不利大便反快但當利其小便關者機關之室真氣之所過也節者周身三百六十五節骨節之交神氣之所游行出入者也濕傷太陽流於關節而為病則心所主神真之氣為濕邪所傷故關節疼痛而心煩濕為陰邪故脈沉而細者此名濕痹然風寒濕三氣皆為能痹不獨濕也欲辨其為真正濕痹之候必其人水道不行而小便不利濕淫於內而大便反快但當利其小便則濕從小便而出矣此言濕流關節之病也然濕者六氣之一也但一氣中猶有分別霧露之氣為濕中之清傷人皆中於上雨水之濕為濕中之濁傷人皆中於下變稱太陽者病由榮衛而入榮衛皆屬太陽也此條論地氣之濕乃濕之濁者也故曰但當利其小便若霧露之清邪即當以微似汗解之條內藥鼻中以取嚏亦外治之解法也此證師未立方而五苓散及甘草附子湯之類可悟濕家之為病一身盡疼發熱身色如熏黃也濕家之為病濕行於周身肌肉之間故一身盡疼濕與陽氣合併而為熱故發熱濕熱鬱於肌肉之間故身色如似熏黃述上節言濕邪凝著於內不能化熱而為濕此節言濕邪發熱於外化為熱而為熏黃也按熏黃如煙熏之狀黃而帶黑也黃家有陰陽之別陽黃明亮陰黃暗黑師於金匱有五苓散加茵陳與論中茵陳蒿湯等方寒熱不同不可不辨濕家其人但頭汗出背強欲得被覆向火若下之早則噦或胸滿小便不利舌上如苔者以丹田有熱胸上有寒渴欲得飲而不能飲則口燥煩也濕病禁下者不可不知濕家病在太陽太陽之脈上額交顛夾背脊而行於兩旁霧露之濕清邪中上邪著太陽陽氣聚而不行故其人他處無汗而但頭汗出濕邪滯礙而其經輸不利故背強濕為陰邪陰氣盛於表故欲得被覆而喜向火此其病尚在於表也若下之太早則寒熱之邪陷入於胃而為噦且胃居中焦胃病則上下二焦亦病上焦之氣不降則濁氣鬱塞而胸滿下焦之氣不升則氣化不行而小便不利舌上如胎者乃濕滑而白似胎非胎也總由寒濕之邪陷於胸膈命門之陽鬱於下焦以丹田有熱胸中有寒八個字為不易之勘語丹田有熱故渴欲得飲胸中有寒故雖欲得水而不能飲則口燥似喜水又似惡水其難過之狀而為煩也受業何鶴齡案張氏擬補黃連湯閩醫相沿用五苓散述此濕邪誤下之逆於胸而為下熱中寒之證也此合下節俱言濕家不可下也補曰胸中與丹田皆是膜油相連寒濕之氣既入胸中之膜間則閉塞在膈中也其與丹田氣海應出之氣因胸膈閉而不得出則鬱而為熱注家於丹田胸中尚不知其道路而妄補黃連湯五苓散真是強作解事濕家下之額上汗出微喘小便利者死若下利不止者亦死濕家誤下之則額上汗出以陽明之脈交額中此陽明之氣絶而真液上泄也且見微喘以太陽之氣與肺相合而主皮毛此太陽之氣絶而真氣上脫也且見小便利者以少陽三焦司決瀆而出水道此少陽之氣絶而津液下注也三陽氣絶上下離脫故死若下利不止者中土敗而地氣陷不必三陽氣絶而亦主死述此言濕家下之而上脫下泄而為不治之死證也風濕相搏一身盡疼痛法當汗出而解值天陰雨不止醫云此可發汗汗之病不愈者何也蓋發其汗汗大出者但風氣去濕氣在是故不愈也若治風濕者發其汗但微微似欲出汗者風濕俱去也問曰風勝為行痹濕勝為著痹一屬陽一屬陰風濕不和而兩相搏以致一身盡疼痛若陰陽和則雨露降法當汗出而解然陽之汗以天之雨名之值天陰雨不止醫云此陰雨之時天人之氣相應正可發其汗今汗之而其病猶有不愈者何也答曰汗者所以和陰陽也蓋發其汗汗大出者風為陽邪但風氣去即陽氣衰陽衰陰盛而陰邪之濕氣仍在是故不愈也若治風濕者發其汗但微微似欲汗出者則陰陽兩不相負而風濕俱去也述此節論風濕次節論寒濕末節論所以致風濕而寒濕亦在其中矣濕家病身疼發熱面黃而喘頭痛鼻塞而煩其脈大自能飲食腹中和無病病在頭中寒濕故鼻塞納藥鼻中則愈霧露之濕為清邪自上受之濕家病關節不疼痛止是半身以上疼痛不發熱似熏黃而發熱止是面黃肺司氣而主皮毛濕襲於皮毛故氣不順而喘陰證無頭痛濕未入陰故頭痛濕襲皮毛內壅肺氣故鼻塞濕氣彌而不散亦擾心主而生煩此濕邪但在上焦毫不犯裏故其脈視出陽之大不犯胃氣自能飲食脾氣亦舒而腹中和因而斷曰臟腑無病病在頭中寒濕故鼻塞病淺不必深求毋庸致劑止內辛香開發之藥於鼻中宜泄頭中之寒濕則愈述此言寒濕傷於高表裏氣自和宣通其空竅而自愈也按朱奉議用瓜蒂散納之補曰頭中寒濕之中當讀仄聲病者一身盡疼發熱日晡所劇者名風濕此病傷于汗出當風或久傷取冷所致也病者風濕相搏一身盡疼發熱每於日晡所劇者以日晡所為陽明王時太陽濕土鬱而不伸也此名風濕然所以致此風濕之病乃傷於汗出當風汗隨風復入皮腠而為風濕也或久傷取冷所以致風濕也致風濕者以此而其所以致寒濕者亦可以類推矣述上節言治風濕之法而未及致風濕之因故特申明其故以終濕痹之義錢天來云病因汗出當風夫汗出則腠理開當風則風乘腠理矣風邪既入汗不得出以離經之汁液既不得外出皮毛又不能內返經絡留於肌腠而為濕此即人身汗液之濕也其或暑汗當出之時傷於納涼太過使欲出之汗不得外泄留著肌腠而致病與汗出當風無異也金匱用麻黃杏仁薏苡甘草湯太陽中熱者暍是也汗出惡寒身熱而渴太陽中熱者暍是也暍者暑也暑干肌腠而表氣虛微所以其人汗出太陽以寒為本故惡寒暑濕之邪內合太陽之標熱故身熱而渴也述此三節論暍傷太陽暍者暑也金匱用白虎加人參湯太陽中暍身熱疼重而脈微弱此以夏月傷冷水水行皮中所致也太陽中暍者其證身熱疼重而脈微弱此以夏月因受暑熱而復傷冷水水行皮膚中所致也推之夏月陽浮陰伏凡畏熱貪涼皆可以傷冷水例之病在陰經即為陰證豈可一以清涼治暑哉此言暑熱常合濕邪為患金匱治以一物瓜蒂湯方用瓜蒂二十七個水一升者取五合去滓頓服後人推廣其義用五苓散大順散小半夏茯苓湯十味香薷飲白虎加蒼朮湯皆兼治濕也無形之熱傷其肺金用白虎湯救之有形之濕壅其肺氣用瓜蒂湯通之正曰上節熱者暍是也是暍之正文此節傷冷水非暍證也仲景因於此正恐人誤認為暍故特辨之今人創為陰暑之說則反生葛藤太陽中暍發熱惡寒身重而疼痛其脈弦細芤遲小便已灑灑然毛聳手足逆冷小有勞身即熱口開前板齒燥若發其汗則其惡寒甚加溫針則發熱甚數下之則淋甚太陽中暍者病標本之氣故發熱惡寒病所循之經故身重而疼痛熱傷氣故其脈弦細芤遲膀胱者毫毛其應故小便已灑灑然毛聳陽氣虛不能榮於四肢故手足逆冷小有勞身即熱氣虛不能自支也口開前板齒燥以榮而動陽熱陰液不能上滋也此表裏經脈俱虛不可汗下溫針倘若誤認為傷寒而發汗則表虛而惡寒甚若因其寒甚而加溫針則經脈虛而發熱甚若因其發熱甚而數下之則裏虛而津液傷故淋甚此言中暍之陰證發熱惡寒至手足逆冷皆陰寒之脈證小有勞三句是虛而有熱之見證火汗下皆為所戒而治法從可推矣正曰此非中暍之陰證也既曰陰寒而又曰虛而有熱義實難通蓋此節以弦細芤遲之脈為主言其人素虛而驟得此熱暍之病也故以汗下溫針為戒謂其人素虛寒則可謂其人中陰暑則不可陰暑二字皆後世之謬談萬不可引入仲景書中跋注傷寒論有五難變易原文各逞己見以恣辨論遂至顛倒錯亂後學莫得尋其層次雖賢如柯韻伯亦所不免余何足論焉則不講文法一難也論中逐節相生首尾連貫如發汗後不可更行桂枝湯節與下後不可更行桂枝湯節文雖同而有汗後下後之別乃有以為重出而去之者其他應分不分應合不合者難以枚舉則不求章法二難也漢文古奧每於虛字處見精神如第一句太陽之為病之為二字人以為虛語其實是說太陽經氣之中所為出諸病似此類者甚多其尤易見者傷寒脈浮滑此表有熱裏有寒節竟有改為表有寒裏有熱則不考治法三難也經方本湯液經效如桴鼓乃有畏其難而莫之用如麻黃升麻湯之類有因其缺而補之如皮日休補禹餘糧丸猶有見解至每節下必補出某方甚為笨癡可厭則不審方法四難也全書有提綱有結束論某證某治法合數節而成一章然六經外何以終於霍亂陰陽易篇厥陰篇何以與末二篇同以胃氣結束則不標讀法五難也傷寒論淺注曾有一於是乎仲師自序云傷夭橫之莫救是編亦以傷夭橫而著之也王叔和序傷寒論云擬防世急是編亦正以防世急也然則吾夫子之注是篇其壽世壽民之意亦深矣嘉慶歲次庚辰孟春受業弟賓有侄道著同謹跋補曰修園書跋語甚多只贊其書之妙與仲景原文無涉余為此書為發明仲景原文起見非代刻修園之書也故其跋皆刪去而獨存此篇以其見解尚有益於讀者附識蔚按醫道之不明也皆由於講方而不窮經之故神農本草經明藥性也未嘗有配合之方靈樞素問明造化陰陽之理原其得病之由除雞矢醴半夏秫米湯等方外無方難經八十一章闡明內經之旨以補內經所未言亦無方至漢張仲景得商伊聖湯液經著傷寒論金匱要略二書專取伊聖之方而立三百九十七法法以方而行方以法而定開千百年之法眼不可專謂為方仲景後此道漸晦至唐賴有孫思邈起而明之著千金方其方俱從傷寒論套出又將傷寒論一一備載不遺惜其字句不無增減章節不無移易又不能闡發其奧蘊徒汲汲於論中各方臨摹脫換以求新異且續刻千金翼以養性補益各立一門遂致後醫以補脾補腎脾腎雙補補氣補血氣血兩補溫補涼補不溫不涼之平補等方迎合於富貴之門鄙陋之習由此漸開究非千金方之過不善讀千金方之過也後學若取其所長棄其所短則千金書何嘗非仲景書之翼也耶千金私淑仲景時有羹墻之見其方托言龍宮祕方蓋以仲景居臥龍岡其傷寒金匱方即為龍宮方老生恆談神明瘁鬼神來告豈其真為神授哉家嚴少孤家徒四壁半治舉子業半事刀圭家日見各醫競尚唐宋各匯方金元劉張朱李四大家以及王宇泰薛立齊張景嶽李士材輩濫收各方而為書是有方之書得而無方之書遂廢心甚憫之每欲以家藏各方書付之祖龍而於無方之本經內經難經之祖述伊聖之經方仲景書寢食數十年弗倦自千金以下無譏焉壬子登賢書後寓都門適伊雲林先生患中風證不省人事手足偏廢湯米不入者十餘日都門名醫咸云不治家嚴以二大劑起之名噪一時就診者門外無虛輒後因某當事強令館於其家辭弗就拂其意癸丑秋托病而歸後出宰畿輔恐以醫名蹈癸丑歲之前轍遂絶口不談猶私自著書嘗語蔚曰三不朽事立言居其一詩文詞賦不與焉有人於此若能明仲景之道不為異端末學所亂民不夭扎其功德且及於天下後世也前刻公餘醫録等書皆在保陽官舍而成而傷寒論金匱要略淺注二書稿凡三易自喜其深入顯出自王叔和編次成無己注釋後若存若沒千有餘年至今日方得其真諦與時俗流傳之醫書大有分別所苦者方中分兩輕重煮漬先後分服頓服溫服少冷服等法毫釐間大有千里之判不得從俗本編為歌括以便記誦命蔚於歌括後各有擬注親筆改易其於蔚之千慮一得處則圈之又圈點之又點意欲大聲急呼喚醒千百醫生靡靡欲悟中忽然警覺而後快至於金匱方又命弟元犀韻之蔚則仿建安許氏內臺方議體為之逐條立議焉蓋以高年之心不堪多用蔚與弟元犀不過效有事服勞之道非敢輕動筆墨也云爾時嘉慶二十四年歲次己卯冬至後五日也男蔚謹識蔚再按以上擬注及附識一條皆家嚴親筆圈點蔚謹遵而不敢違付刻後每欲於注中說未了者續出數條庶無剩義因閲時賢徐靈胎醫書六種其首卷有論六條頗見曉暢蔚可以不必再續也今附録於後以公同好方藥離合論論共六首俱徐靈胎著靈胎名大椿江蘇吳江人也方之與藥似合而實離也得天地之氣成一物之性各有功能可以變易血氣以除疾病此藥之力也然草木之性與人殊體入人腸胃何以能如人之所欲以致其效聖人為之制方以調劑之或用以專攻或用以兼治或相輔者或相反者或相用者或相制者故方之既成能使藥各全其性亦能使藥各失其性操縱之法有大權焉此方之妙也若夫按病用藥藥雖切中而立方無法謂之有藥無方或守一方以治病方雖良善而其藥有一二味與病不相關者謂之有方無藥譬之作書之法用筆已工而配合顛倒與夫字形俱備而點畫不成者皆不得謂之能書故善醫者分觀之而無藥弗切於病情合觀之而無方不本於古法然後用而弗效則病之故也非醫之罪也而不然者即偶或取效隱害必多則亦同於殺人而已矣至於方之大小奇偶之法則內經詳言之茲不復贅云古方加減論古人制方之義微妙精詳不可思議蓋其審察病情辨別經絡參考藥性斟酌輕重其於所治之病不爽毫發故不必有奇品異術而沉錮難險之疾投之輒有神效此漢以前之方也但生民之疾病不可勝窮若必每病制一方是曷有盡期乎故古人即有加減之法其病大端相同而所現之證或不同則不必更立一方即於有方之內因其現證之異而為之加減如傷寒論中治太陽病有桂枝湯若見項背強者則用桂枝加葛根湯喘者則用桂枝加厚朴杏子湯下後脈促胸滿者桂枝去白芍湯更惡寒者去白芍加附子湯此猶以藥為加減者也若桂枝麻黃各半湯則以兩方為加減矣若發奔豚者用桂枝加桂湯則以又藥之輕重為加減矣然一二味加減雖不異本方之名而必明著其加減之藥若桂枝湯倍用芍藥而加飴糖則又不名桂枝加減飴糖湯而為建中湯其藥雖同而義已別則立名亦異古法之嚴如此後之醫者不識此義而又欲托名用古取古之方中一二味而即以某方目之如用柴胡則即曰小柴胡湯不知小柴胡之力全在人參也用豬苓澤瀉即曰五苓散不知五苓之妙專在桂枝也去其要藥雜以他藥而仍以某方目之用而不效不知自咎或則歸咎於病或則歸咎於藥以為古方不可治今病嗟呼即使果識其病而用古方支離零亂豈有效乎遂相戒以為古方難用不知全失古方精義故與病毫無益而反有害也然則當何如曰能識病情與古方合者則全用之有別證則據古法加減之如不盡合則依古方之法將古方所用之藥而去取損益之必使無一藥之不對證自然不悖於古人之法而所授必有神效補曰仲景凡以某方為主者皆有加減出入世謂經方不可加減皆讀書未化之故須知仲景亦常有加減之方明明示人加減之法要在會通其理然後可議加減方劑古今論後世之方已不知幾億萬矣此皆不足以名方者也昔者聖人之治方也推藥理之本原識藥性之專能察氣味之從逆審臟腑之好惡合君臣之配偶而又探索病源推求經絡其思遠其義精味不過三四而其用變化不窮聖人之智真與天地同體非人之心思所能及也上古至今千聖相傳無敢失墜至張仲景先生復申明用法設為問難注明主治之證其傷寒論金匱要略集千聖之大成以承先而啓後萬世不能出其範圍此所謂古方與內經並垂不朽者其前後名家如倉公扁鵲華他孫思邈諸人各有師承而淵源又與仲景微別然猶自成一家但不能與靈素本草一線相傳為宗枝正脈耳既而積習相仍每著一書必自撰方千百唐時諸公用藥雖博已乏化機至於宋人並不知藥其方亦板實浮淺元時號稱極盛各立門庭徒逞私見逮乎前明蹈襲元緒餘而已今之醫者動云古方不知古方之稱其指不一若謂上古之方則自仲景先生流傳以外無幾也如謂宋元所制之方則其可法可傳者絶少不合法而荒謬者甚多豈可奉為典章若謂自明人以前皆稱古方則其方不下數百萬夫常用之藥不過數百品而為方數百萬隨拈幾味皆已成方何必定云某方也嗟嗟古方何其嚴今之方何其易其間亦有奇巧之法用藥之妙未必不能補古人之所未及可備參考者然其大經大法則萬不能及其中更有違經背法之方反足貽害安得有學之士為之擇而存之集其大成刪其無當實千古之盛舉余蓋有志而未遑矣古今方劑大小論今之論古方者皆以古方分兩太重為疑以為古人氣體厚故用藥宜重不知此乃不考古而為此無稽之談也古時升斗權衡歷代各有異同而三代至漢較之今日得十之二余親見漢時有六升銅量容今之一升二合如桂枝湯乃傷寒大劑也桂枝三兩芍藥三兩甘草二兩共八兩二八不過一兩六錢為一劑分作三服則一服藥不過今之五錢三分零他方間有藥品多而加重者亦不過倍之而已今人用藥必數品各一二錢或三四錢則反用三兩外矣更有無知妄人用四五兩作一劑近人更有用熟地八兩為一劑者尤屬不倫用丸散亦然如古方烏梅丸每服如桐子大二十丸今不過四五分若今人之服丸藥則用三四錢至七八錢不等矣末藥只用方寸匕不過今之六七分今亦服三四錢矣古人之用藥分量未嘗重於今日周禮遺人凡萬民之食食者人四釜注六斗四升曰釜四釜共二石五斗六升為人一月之食則每日食八升有餘矣而謬說相傳方劑日重即此一端而荒唐若此況其深微者乎蓋既不能深思考古又無名師傳授無怪乎每舉必成笑談也煎藥法論煎藥之法最宜深講藥之效不效全在乎此夫烹飪禽魚羊豕失其調度尚能損人況藥專以之治病而可不講乎其法載於古方之末者種種各殊如麻黃湯先煮麻黃去沫然後加餘藥同煎此主藥當先煎之法也而桂枝湯又不必先煮桂枝服藥後須啜熱粥以助藥力又一法也如茯苓桂枝甘草大棗湯則以甘瀾水先煎茯苓如五苓散則以白飲和服服後又當飲暖水小建中湯則先煎五味去渣而後納飴糖大柴胡湯則煎減半去渣再煎柴胡加龍骨牡蠣湯則煎藥成而後納大黃其煎之多寡或煎水減半或十分煎去二三分或止煎一二十沸煎藥之法不可勝數皆各有意義大都發散之藥及芳香之藥不宜多煎取其生而疏蕩補益滋膩之藥宜多煎取其熟而停蓄此其總訣也故方藥雖中病而煎法失度其藥必無效益病家之常服藥者或尚能依法為之其粗魯貧苦之家安能如法制度所以病難愈也若今之醫者亦不能知之矣況病家乎服藥法論病之愈不愈不但方必中病方雖中病而服之不得其法則非特無功而反有害此不可不知也如發散之劑欲驅風寒出之於外必熱服而暖覆其體令藥氣行於營衛熱氣周遍挾風寒而從汗解若半溫而飲之仍當風坐立或僅寂然安臥則藥留腸胃不能得汗風寒無暗消之理而營衛反為風藥所傷矣通利之藥欲其化積滯而達之於下也必空腹頓服使藥氣鼓動推其垢濁從大便解若與飲食雜投則新舊混雜而藥氣與食物相亂則氣性不專而食積愈頑矣故傷寒論等書服藥之法宜熱宜溫宜涼宜冷宜緩宜急宜多宜少宜早宜晚宜飽宜饑更有宜湯不宜散宜散不宜丸宜膏不宜丸其輕重大小上下表裏治法各有所當此皆一定之至理深思其義必有得於心也補曰以上各條於仲景書頗有發明故特採入以為讀是書者之一助考古錢天來云漢之一兩即今之二錢七分也一升即今之二合半也汪苓友云古云銖者六銖為一分即二錢半二十四銖為一兩也云一升者即今之大白盞也古方全料謂之一劑三分之一謂之一服凡用古方先照原劑按今之馬子折實若干重古方載三服者只取三分之一遵法煎服載兩服者宜分兩次服之頓服者取一劑而盡服之只要按今之馬子折之至大棗烏梅之類仍照古方枚數以馬子有古今之不同而果枚古今無異也程扶生云古以二十四銖為一兩一兩分為四分去聲六銖為一分計二錢五分則所謂十八銖者蓋三分之重古之七錢半也然以古今量度及巨黍考之以一千二百黍之重實於黃鐘之籥得古之半兩今之三錢也合兩籥為合得古之一兩今之六錢也十銖為一千黍之重今之二錢半也一銖為百黍之重今之二分半也或又謂古今量度惟漢最小漢之一兩惟有今之三錢半強故千金本草以古三兩為今一兩古三升為今一升然世有古今時有冬春地有南北人有強弱大約古用一兩今用一錢足矣宜活法通變不必膠柱而鼓瑟則為善法仲景者矣愚按諸說頗有異同大抵古之一兩今折為三錢不泥於古而亦不離於古也勸讀十則凡積重難反之勢驟奪其所好世所驚疑今且淺而商之明藥性始於神農本經論病情始於靈樞素問以藥治病始於伊尹湯液逮漢仲景出集尹聖及上古相傳之經方著傷寒論及金匱玉函經二書外臺謂又有小品一書今失傳方諸舉業家與四子書無異而猶有疑之者豈四子之書亦不可讀乎則以讀仲師書為第一勸仲師書文義古奧難讀即劉張朱李四家明時以張長沙與劉河間李東垣朱丹溪為四家此李士材之誤也張石頑云張是張子和當知相沿之誤雖尊仲聖之名鮮有發揮更有庸妄者顛倒是非謂仲師專工於傷寒其桂枝麻黃只行於西北宜於冬月以芎蘇羌獨荊防等劑為感冒切用之品以補中歸脾八珍六味等方為雜病平穩之方百病不究根由只以多熱為陰虛多寒為陽虛自誇為挈領提綱之道究竟僞術相師能愈一大病乎夜氣猶存舉生平所治之證悉心自問當亦知所變計也則以知過必改為第二勸經方效如桴鼓非若後世以地黃補陰以人參補陽以香砂調氣以歸芎調血籠統浮泛待病氣衰而自愈也內經云一劑知二劑已又云覆杯而臥傷寒論云一服愈不必盡劑可知古人用藥除宿病痼病外其效只在半劑一二劑之間後世如薛立齊醫按云服三十餘劑及百劑效李士材云備參五斤期於三月奏效此豈果服藥之效哉乃病氣衰而自愈若輩貪天之功而為己力也余閲其案深憫病人之困於藥甚於桎梏也則以經方之療效神速為第三勸傷寒論一百一十三方以存津液三字為主試看桂枝湯和平解肌無一非養液之品即麻黃湯輕清走表不加薑之辛熱棗之甘壅從外治外不傷榮氣亦是養液之意故統制一劑分為三服不必盡劑可愈愈後亦無他病近醫芎蘇羌獨荊防蒼芷苦燥辛烈大傷陰氣最陋是吾閩習氣謂二陳湯為發汗平穩之劑方中如陳皮之耗氣半夏之耗液性澀如血出不止以此藥生搗敷之則止止血即止汗之驗茯苓滲利太早致邪陷入少陰皆所以涸其汗原此二字余切究十年方悟留邪生熱以致變成煩躁大渴譫語神昏等證所謂庸醫誤人者此也至於金匱一百四十三方大旨是調以甘藥四字後世之四君子湯補中益氣湯及四物八珍十全歸脾逍遙等劑頗得甘調之意而偏駁不馴板實不靈又不可不知則明經方之有利無害為第四勸仲師為醫中之聖人非至愚孰敢侮聖所疑者其方也方中無見證治證之品且銖量升斗畏其大劑不敢輕試不知本草亂於宋元諸家而極於明之李時珍能讀本經洞達藥性者自知其三四味中備極神妙況古人升斗權衡三代至漢較之今日僅十之三每劑分三服一服亦不過七八錢與兩零而已較之時方之重者乃更輕今以古今之馬子折算又為之淺淺解釋俾知經方道本中庸人與知能為第五勸先入為主人之通患也桂枝湯小柴胡湯無論傷寒雜病陽經陰經凡榮衛不和者得桂枝而如神邪氣不能從樞而外轉者得柴胡而如神今人惑於活人春夏忌桂枝之說又惑於前醫邪在太陽誤用柴胡反致引入少陽之說及李時珍虛人不可多用張嶽景制五柴飲列於散陳遂致應用不用誤人無算而不知二藥神農列之上品久服可以卻病延年今之信各家而不信神農誠可怪也閩醫習見余用桂枝湯萬一無失此數年來自三錢亦至用八九錢而效者咸知頌豫創始之德至於柴胡不過四錢而止而浙省江蘇每用必以龜血拌蒸最多不過二錢皆先入之說誤之也不知長沙方柴胡用至八兩取其性醇不妨多服功緩必須重用也本經崇原云柴胡出於銀州者佳今市中另有一種柴胡不知何草之根害人不淺推之細辛五味用不過一錢大棗不過二枚生薑不過二片種種陋習皆違經旨吾願同事者先迸去市中徇人惡習而以愈達愈上為第六勸起死回生醫之道也如醫家束手病家待斃察其為雜法所誤先與病家說明璧其方資愈不受謝照仲師法四逆白通以回陽承氣白虎以存陰助其樞轉運其針機臟腑調和統歸胃氣危急拯救不靠人參此一句為病家之腦後下一針也經方無用參為救急法惟霍亂有理中丸湯方然汗厥脈微欲絶以通脈四逆加豬膽湯為主又無取乎人參第不可與讀薛氏景嶽等書人說也其有任亦可救十中二三余自臨證三十餘年知經方之權奪造化為第七勸經方愈讀愈有味愈用愈神奇凡日間臨證立方至晚間一一於經方查對必別有神悟則以溫故知新為第八勸醫門之仲師即儒宗之宣聖凡有闡揚聖訓者則尊之其悖者則砭之障川東流功在吾輩如四家中劉河間書雖偏苦寒尚有見道之處朱丹溪雖未究源頭卻無支離之處張子和瑕瑜參半最下是李東垣樹論以脾胃為主立中以補中為先徇其名而亡其實燥烈劫陰毫無法度嘗考醫論中載其人富而好名巧行其術邪說流傳至今不熄正與仲師養津液及調以甘藥之法相反不可不知至於李時珍王宇泰之雜李士材之淺薛立齊之庸趙養葵之妄張景嶽陳遠公馮楚瞻之浮誇影響不使一字寓目方可入於精微之奧坊刻訒庵等本雖云耳食卻有一二道得著處但於仲師方末雜引陶節庵諸輩臆說不無朱紫之亂入門時姑參其說終為鄉願矣則以專一不雜為第九勸亞聖有云豫豈好辨哉不得已也今醫學各門成戶所藉乎明先聖之功溯委窮源不絶於口則陷溺未及久穎慧過人者自必悔而就學道不孤矣若言之過激則怨而生謗位置太高則畏而思避踽踽獨行濟人有幾凡我同人務宜推誠相與誠能動物俾此道日益昌明則以有言無隱和氣可親為第十勸補曰十條多痛快語間亦有過拘過激處然其大意皆有益於醫學故概録之醫病順其自然說病人之吉凶禍福寄之於醫醫者之任重然權不操諸醫而操諸用醫之人何也人有大病庸醫束手無策始求救於名醫名醫入門診畢告以病從何來當從何去得那一類藥而增劇者何故得那一類藥除去那一病而此外未能盡除者何故病勢雖覺稍愈逾一二日仍作或逾一二日而更甚於前者又何故一一為病家說明定其如此救誤如此溫清攻補如此按法立方服藥後必見出何證又見出何證則向愈預斷其愈於何日何時病能一一信其言而不疑且架中不藏本草備要醫方集解萬病回春本草綱目東醫寶鑒馮氏錦囊赤水元珠薛氏醫案景嶽全書石室祕録辨證奇聞臨證指南之類又無強不知以為知之親友與依阿兩可素稱果子藥之先生朱紫不亂則名醫得以盡其所長傷寒卒病二三日可愈最遲亦不出十八日之外風勞臌膈一月可愈最遲亦不出三月之外否則病家疑信參半時醫猶可勉強從事俟其病氣衰而自愈若以名醫自命者斷不可肩此重任反致取怨敗名余因熱腸而備嘗其苦凡我同志不可以鑒此前車今之方技家恃在口給見有同我者引之互相標榜遜我者亦不卻之臨深為高至於窮本草經讀靈素法仲景其自立為耳所未聞其治效又目所僅見遂謙讓曰我不能如此之神亦不如此之偏以取勝也若輩造此偏之一字任令法高一丈其奈魔高十丈且謂古書不可以今用即於多讀書處謂其偏起死證而生之即以出奇冒險目其偏以致病家先入為主廣集不偏之醫歷試罔效不得已始延為破釜沉舟之計究竟終疑其偏麻桂硝黃則曰汗下之太過也薑附芩連則曰寒熱之太峻也建中理中陷胸十棗則曰補瀉之不留餘地也滋水之地黃補元之人參用應多而反少日食之棗子至賤之甘草用應少而非反多此似是而非之言更甚於恣肆不倫於理之言知幾者正可以拂衣而去乃猶曰病尚可為不忍恝然而舍之此雖活人無已之心而疑事無功未能活人且以誤人蓋藥之所以流行於經絡臟腑內外無有不到者氣為之也氣不自到心氣主之膽氣壯之也彼既疑我為偏一見我之用藥又出於意想之外則心氣亂內經云心者君主之官也神明出焉又云主不明則十二官危是也不獨心氣亂而且膽氣亦因之而怯內經云膽者中正之官決斷出焉又云十二經皆取決於膽是也藥乃草根樹皮及一切金石之鈍物原藉人之真氣以流行今心氣亂而妄行膽氣怯而不行如芩連入口其寒性隨其所想而行旋而皮毛鼓栗而寒狀作矣薑附入口其熱性隨其所想而行旋而心煩面赤而熱狀作矣凡此之類不過言其大略不必淋漓痛切而再言之其中之所以然者命也我亦順其自然而已矣又何必多事為凡我同志者能以余為前車之鑒則道愈彰而活人愈衆征引一傷寒論平脈法第十三節問曰脈有災怪何謂也師曰假令人病脈得太陽與形證相應因為作湯比還送湯如食頃病人乃大吐下利腹中痛師曰我前來不見此證今乃變異是名災怪問曰何緣得此吐利答曰或有舊時服藥今乃發作故為災怪耳程郊倩注曰望問故醫家之事亦須病家毫無隱諱方能盡醫家之長因復出此條為病家服藥瞞醫之戒災因自作而反怪及醫故曰災怪然更有怪災病不可不知得仲景法處仲景方病家大怪以示諸醫益搖頭吐舌而大怪乃從其不怪者治之輕者劇重者死而災及其身終不解其病為何病此病近日竟成疫沿門漸染仲景卻未言及想仲景時只有災怪病尚無怪災病耳一噱按程郊倩謂怪災病孽不在庸醫之好造謠言而在病家之貴耳賤目執俗本之本草查對名醫之處方執俗本之套語貶駁名醫之治法以致名醫嘆息而不與辨決然而去豈非災由自取耶憶戌辰春李太守名符清患氣短病余主以桂苓甘朮湯與腎氣丸間服許以半月必效旋有所聞驚怪而阻另延津門陶老醫服葶藶杏仁枇杷葉木通之類二十餘劑腫脹癃閉而逝候補知縣葉名鈞偶患咳嗽微發熱小便不利余曰小青龍湯一服可效渠怪而不服另延姑蘇葉天士之族侄診之說水不制火火氣刑金日以地黃兩許麥冬阿膠枇杷葉貝母之類為佐二十餘日後與余相遇於北關官廨自言咳嗽已愈惟早起氣覺短促餘無他病余察其面部皮裏膜外伏青黯之色環口尤甚按其脈數而弦芤重按之散而無神遂直告之曰此群陰用事陽光欲熄之候宜拋去前藥以白朮附子濃煎調生薑自然汁半杯六七服尚可急救葉公以余言太激而不答是晚自覺倦怠異常前醫仍用熟地一兩黨參五錢枸杞麥冬阿膠各三錢杜仲酒芍當歸各二錢炙甘草一錢服之次早神昏不語痰涎如涌渠胞弟驚告余曰前言一線殘陽扶之尚恐不及況以熟地等助其陰霾之氣乎今陰霾之氣上彌天際痰涎涌盛狀如中風蓋以肝為風木之藏人當東方生氣將脫之頃往往外呈此象其實與中氣無與也證與脈弦數散亂三五不調余直辭不治次日未刻果歿庚午秋七月前任天津尹丁名攀龍過余旅寓見其面上皮裏黧黑環唇更甚臥蠶微腫鼻上帶些青色余直告之曰君有水飲之病根挾肝氣而橫行無忌此時急療可愈若遲至二十日病亦發作恐醫日多方日雜總不外氣血痰鬱四字定出搔不著癢之套方即有談及水飲緩至以六君二陳加減峻治以滾痰黑錫專行此敷衍題面而題理題神則盡錯矣以藥試病試坐窮而變計雖盧扁莫何丁君心怪言之過激弗聽至七月下旬病作中秋後漸重九月下旬邀診余告之曰向者所陳之弊今一一蹈之前說明病發後毋庸用藥非自今推諉然無中生有之治法惟金匱咳嗽篇用十棗湯云咳家其脈弦者有水此主之又云支飲家咳滿胸中痛者不卒死至一百日及一歲亦宜用此湯推病根成於舊歲冬初未及一歲且病發止六十餘日尚在百日之內喻嘉言醫門法律咳嗽續論篇言之甚詳俟有識有膽者用之而余則不能坐中有一老醫立爭不可余姑擬龍牡甘苓行水化氣等藥而去遂不復延嗣余奉委到高陽辦理賑務聞渠延醫滿座日以熟地枇杷葉炮薑附子肉桂人參服之不斷漸至大喘腫脹吐血大衄耳目俱出血小水全無而歿此皆怪災病之新案補曰修園之論往往過激又於陰品必加斥罵亦略有偏然其痛快淋漓處實切中時弊征引二張隱庵曰順治辛卯歲豫年四十有二八月中生一胃脘癰在鳩尾斜下右寸許微腫不紅按之不痛隱隱然如一雞卵在內姚繼元先生視之曰此胃脘癰也一名捧心癰速宜解散否則有性命之憂與一大膏藥上加末藥二三錢午間烘貼至暮手足蘇軟漸至身不能轉側仰臥於書齊心煩意亂屏去家人至初更時癰上起一毒氣從左乳下至肋下脅入於左腎入時如燒錐刺入眼中一陳火光大如車輪神氣昏暈痛楚難言火光漸搖漾而散神昏始蘇過半時許其氣復起其行如舊痛楚如前如此者三四次豫思之此戊與癸合也然腑邪入臟自分必死妄想此毒氣不從脅下入腎得從中而入於腸胃則生矣如此靜而行之初次不從二次即隨想而仍從於左乳下入於腸中腹中大鳴無從前之痛楚矣隨起隨想因悟修養之道氣隨想而運用者也運氣法大能起鼓膈之證勞怯咳嗽亦妙至天明大泄數次胸膈寬疏繼元先生復視之曰毒已散解無妨事矣至次年中秋復發仍用膏藥末藥毫無前番之狀而腫亦不消豫因想運氣之妙行住坐臥以手按摹意想此毒氣仍歸腸胃而出如此十餘日而散按讀此案知病家不能深信斷斷不可勉強相從且不必言及治當何法應用何方恐後到之醫矯吾言而走入錯路又恐其從吾言而還致生疑不如三緘其口之為得征引三喻嘉言寓意草云王岵翁深知醫理投劑咸中肯綮所以長年久世然苦耳鳴不樂對客其左右侍從誰能究心醫藥之事前病獲安兢以為人參之力而卸禍者反以居功謂其意中原欲用參但不敢專主姑進余商確以示詳慎耳於是善後之宜一以諉之曾不顧夫一誤再誤也前所患虛風證余用甘寒藥二劑稍效俄焉更醫而致危不得已又召余視之雖用旋覆代赭二劑回天然前此虛風本證尚無暇於驅除而主家及醫其時方兢誇人參之力謂調理更宜倍用無俟參酌獨不思虛風蘊釀日深他求日再良治不能及矣余向為岵翁視病言無不聽獨患此大病竟不樂於交談且日來喜食羊肉河豚以召風然亦不自由也蓋風煽胃中如轉丸之捷食入易消不得不借資於厚味而不知胃中元氣久從暗耗設虛風止熄即清薄之味尚不易化況於肥甘乎今之醫家全不究病前病後消息明語以虛風之證竟不知虛風為何物奈何言醫耶奈何言調攝耶彼時余適有浙游旋日復得重恙召診時語余云一病幾危今幸稍可但徹夜撰改本草不輟神亂奈何余對曰胃風久熾津液乾槁真火內燔宜用知母一兩人參甘草各一錢日進二劑自安衆議方中用參太少且無補藥佐之全無取義竟置不用連進參朮大劑不效越三日劑中人參竟加一兩服後頃刻氣高不返而逝按讀此按以自知醫理與平時心服之人忽為時醫蠱惑侍從尼阻竟至不能用而死可知命之所定非人力所能主也嘉言既盡其道可告無罪於王岵翁而人言不足恤也余因之有感焉天下事事後易為智大病一愈邀功者議補議溫紛紛不一以致既愈之後仍留遺患者有之垂成忽敗者有之夫大病自我愈之而善後之計不復一商者其故有二一以勝任有人也一以酬謝可免也偷薄之風適以殞命堪發一嘆
