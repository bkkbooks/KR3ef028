body:
  text: 傷寒論淺註補正卷一上辨太陽病脈證篇補曰太陽者天之巨陽也彌綸萬物只此陽氣而已矣然其氣雖充塞於太虛而實發於地下之水中大地惟水最多因其水多是以化氣極多而能充塞萬物也西洋化學知氣生於水於是以火煎水而取氣以運輪機是即氣生於水之一驗也但西法必用火煎水出於人功而天氣之發於水中者則不用火煎只以日氣下交日晝行天則光交於水日夜行地下則光透入水是以水被熏蒸而化為氣騰出地上則為天陽之氣與西法之以火煎水取氣無異知此則知天陽之氣發於地下水中也人身應之而有太陽膀胱寒水之府以司人周身之水稱為寒水以水之本性原寒而又名為太陽經者以水中化氣上行外達則又為衛外之巨陽故稱太陽經焉此氣不自化實借心火下交於水乃蒸而為氣人之有心如天之有日天日下交而大地之水皆化氣上騰心火下交而膀胱之水亦化氣上達心火之所以能下交者則以小腸為心之府導心火下交於膀胱也近說膀胱有上口無下口非也內經明言下焦當膀胱上口近人不知三焦實有其物焦古作膲即人身之油膜西醫名為連網乃行水之路道內經所謂三焦者決瀆之官水道出焉蓋水之路道全在三焦油膜之中凡人飲水入胃胃之通體有微絲管將水散出走入油膜其能散者肺氣布之也故肺為水之上源水散入油膜走入膀胱其水未散盡者至小腸中又有微絲管將水盡散出走下焦以入膀胱膀胱上口即在下焦連網之中此皆下行之水未化為氣者也必待心火下交乃化為氣心有管通肺凡人鼻中吸入天陽之氣從肺歷心引心火循脊入腎系由腎系入連網以布達小腸凡水之在連網中及由小腸而入連網者皆被火蒸之而化為氣其化之不盡者則滲入膀胱膀胱之底是為氣海又名血室乃油膜中一大夾室凡人吸入之氣從肺歷心引心火下入腎系直走連網抵氣海血室之中熏蒸膀胱之水皆化為氣透出於氣海循油膜上胸膈以達於喉是為呼出之氣其從油膜四達者則走肌肉出皮毛是為衛外之氣此小腸與膀胱所以化氣衛外而統稱為太陽經也其經行身之背有如天之赤道陽氣循行之路也其氣由內之油膜透出肌肉由肌肉透出皮毛其上行者由油網透胸膈達喉鼻喉鼻皮毛皆肺所司故太陽之氣上合於肺皮毛內之肥肉名為肌肉肥肉裏瘦肉外夾縫中之油網名腠理以其有紋理也腠理即三焦之所司以其從內油網透出而生此膜腠外與內油網同是一物故皆屬三焦由腠理入瘦肉即與筋連筋亦連內之油網而內油膜膈即三焦之府也油網不利則水道不通膜膈滯塞則胸前痞結循油網入胃小腸為入府循油網入血室入膀胱均為入府循油網入心肝包絡則為入臟人必知小腸膀胱交通之故又必知心腎水火相蒸之理尤必知兩腑兩臟其連絡全在三焦三焦即是油膜其根發於腎系其上歸結為心包悉知乎此乃可以讀太陽篇此說參之西法證以內經與仲景書字字符合幸勿疑有杜撰也太陽之為病脈浮頭項強痛而惡寒太陽主人身最外一層有經之為病有氣之為病主乎外則脈應之而浮何以謂經內經云太陽之脈連風府上頭項挾脊抵腰至足循身之背故其為病頭項強痛何以謂氣內經云太陽之上寒氣主之其病有因風而始惡寒者有不因風而自惡寒者雖有微甚而總不離乎惡寒蓋人周身八萬四千毛竅太陽外衛之氣也若病太陽之經則彼惡寒此言太陽之為病總提大綱補曰太陽主外則脈應之而浮然脈何故要應之此理須透乃知仲景一切脈法蓋脈為血脈西洋醫名為血管內經名為營血脈管之外皆是網膜內經名腠理為衛氣往來之所故診脈有單論脈管者細大澀皆脈管所主是也有單論氣分者浮沉緊皆氣分所主也脈管只在腠理膜油之中若衛氣伏內則脈管往內而沉衛氣鼓出則脈管往外而升緊者脈管外之衛氣有所裹束不得舒散故絞束而緊此節脈浮正見外感在皮膚則內之衛氣往外迫湊遂將脈管鼓動而浮出於外也辨脈能知氣在脈外血在脈中脈之動根於心而氣之原生於下於仲景一切脈法自然貫通太陽病發熱汗出惡風脈緩者名為中風太陽脈浮頭項強痛之病若得病而即見發熱風為陽邪其性迅速也且見汗出風干肌腠而外不固也惡寒之微見風始惡而為惡風風性散漫於浮脈之中而覺其怠緩者此病名為中風其名為中奈何蓋以風者善行而數變由毫毛直入於肌腠如矢石之中人也此論風中太陽之肌腠受業薛步云按風陽邪也太陽之標為陽兩陽相從之為病重在發熱二字正曰風為陽邪非也序例云桂枝下咽陽盛則斃使果風為陽邪何得復用桂枝湯以助其陽哉蓋風在六氣屬厥陰經吾於厥陰已詳之風之與寒不得以陰陽二字截分之也惟寒則傷衛衛氣閉束故脈緊風則傷營營血受傷則血脈弱而其動緩故脈緩論詳桂枝湯證下讀者勿守成無己風傷衛之說又勿以風專為陽邪而致與桂枝湯自相矛盾也太陽病或已發熱或未發熱必惡寒體痛嘔逆脈陰陽俱緊者名為傷寒太陽脈浮頭項強痛之病中風外又有陰邪之證其邪淺其人陽氣盛者即時或已發熱其邪深其人陽氣弱者其時或未發熱然已發未發雖曰不同而於其先見之時可以斷其必然者一在惡寒以傷寒必惡寒無風時亦覺其寒非若惡風者有風時始覺其寒也一在體痛以寒邪外束傷太陽通體之氣也一在嘔逆以寒邪內侵裏氣不納也其為脈陰尺陽寸俱緊者以太陽本寒而加以外寒兩寒之氣凝聚於中故也此非太陽中風而名之曰傷寒其名為傷奈何以膚表第一層而受損傷也此論寒傷太陽之膚表受業薛步云按寒陰邪也太陽之本為陰兩陰相合之為病重在惡寒二字傷寒一日太陽受之脈若靜者為不傳頗欲吐若躁煩脈數急者為傳也人之言傷寒者動曰傳經其所以然之理難言也有正傳有邪傳有陰陽表裏之氣相傳有六經連貫之氣相傳請以陰陽表裏之氣相傳者言之傷寒一日太陽之氣受之然太陽與少陰相表裏脈若安靜而不數急者為止在太陽而不傳於少陰也頗欲吐者即少陰欲吐不吐之見證若兼見足少陰之躁手少陰之煩診其脈數急而不安靜者乃病太陽之氣中見少陰之化為傳也傷寒如此中風亦然傷寒二三日陽明少陽證不見者為不傳也又以六經之氣相傳言之傷寒二日當陽明主氣之期三日當少陽主氣之期陽明之身熱自汗不惡寒反惡熱之外證不見少陽之口苦咽乾目眩之外證不見者為氣之相傳而病不與氣俱傳也傷寒如此中風可知矣二經如此他經可知矣此二節一論陰陽表裏相傳一論六經之氣相傳太陽病發熱而渴不惡寒者為溫病若發汗已身灼熱者名風溫風溫為病脈陰陽俱浮自汗出身重多眠睡鼻息必鼾語言難出若被下者小便不利直視失溲若被火者微發黃色劇則如驚癇時瘈瘲若火熏之一逆尚引日再逆促命期且夫太陽病之即發者有中風傷寒之異至於不即發者內經謂冬傷於寒春必病溫為伏邪蘊釀成熱邪自內出其證脈浮頭項強痛故亦謂之太陽病但初起即發熱而渴不惡寒者須於中風傷寒之外區別為溫病治宜寒涼以解散順其性以導之如麻杏甘石湯之類若無頭項強痛之太陽病但見發熱而渴不惡寒之證是太陽底面少陰為病內經謂冬不藏精春必病溫是也如心中煩不得臥者黃連阿膠湯主之稍輕者陽盛陰虛之人周身之經絡渾是熱氣布護治法只宜求之太陽署之裏陽明署之表如所云心中懊憹舌上胎者梔子豉湯主之渴欲飲水口乾舌燥者白虎加人參湯主之脈浮發熱渴欲飲水小便不利者豬苓湯主之之類切不可用辛溫以發汗若醫者誤用辛溫之劑汗之其內蘊之熱得辛溫而益盛不特汗後身不涼靜而且發汗已身反灼熱者是溫病為風藥所壞遂變重證名曰風溫風溫之為病若何其脈陰尺陽寸俱浮其證自汗出猶為太陽中風亡本象而大可患者全顯出少陰之危象腎主骨熱在骨故身重熱入陰分故神昏而多眠睡鼻息必鼾為腎熱而壅於肺語言難出為腎熱而壅於心以腎脈上連心肺也若被誤下者津液竭於下而小便不利津液竭於上則目系緊急而直視且既竭之餘腎氣將絕不能約太陽之氣而失溲危乎危乎若更被火灸或燒針者以熱攻熱腎敗而現出克攻之象微為皮膚發黃色為土克水劇則熱亢攻心如驚癇熱極生風時瘈瘲其皮膚不止發黃竟若火熏之現出黃中帶黑之色是被為一逆被火為再逆一逆尚可引日再逆則促其命期推而言之凡服一切消導之藥皆犯被下之禁凡服一切辛熱之藥皆犯被火之禁醫者其可不慎哉此言太陽病中有溫病誤治即變為風溫也補曰後世溫熱各書皆謂仲景只論傷寒不論溫熱不知仲景開章先以風寒溫三者為提綱而以下分經用藥只言某經某證當用某藥而並不辨其為風為寒為溫蓋仲景已將三者為提綱而三者變見諸證但歸某經見某證即用某藥雖三者來歷不同而歸經則一誰為仲景六篇無溫熱證哉至於疫瘴從口鼻入治法自有小異然其見各經之證仍當按經治之觀近代瘟疫論何常出仲景范圍哉甚矣六經立法誠萬病之隱括也今人讀仲景此段多視為借賓定主之文謂仲景此段撇去溫病以後乃單論傷寒不知仲景此段與上文傷寒中風為三大綱讀者當會其意也吾鄉孝廉林華亭曰瘟疫自吳又可後疊出專書謂與傷寒不同以傷寒從皮毛入瘟疫從口鼻入今必將溫疫一門納入傷寒論中與近日各書不合不如刪去此條以免滋議余以其說近理便擬刪削嗣經鄧雲航閱至此條大聲疾呼曰吾素疑仲景傷寒論已將溫疫賅括此處提出溫病與風寒鼎峙而三細玩文法並非閑文實則三大綱也其後乃立麻黃湯為治寒專方桂枝湯為治風專方麻杏石甘湯為治風溫之專方其餘變見諸證不分來路只論見證憑證用藥直切了當而風寒溫無不賅舉矣或疑溫疫要方如安宮牛黃丸羚羊犀角等皆非傷寒論所有故謂傷寒溫疫各有不同也不知牛黃難得之物犀角羚羊遠物難得聖方平易不取珍異安得以仲景方中無犀羚牛黃遂疑其不賅溫證哉且安宮牛黃丸即黃連阿膠湯意也羚羊犀角清溫湯即白虎湯意也雙解散通聖散即大柴胡湯意也涼膈散大清涼散亦只是三承氣湯之意或多加數味或別出巧思如紫雪丹等亦只是竹葉石膏湯柴胡加芒硝湯增減變化仍不外乎聖法也又或以為溫疫從口鼻入傷寒從皮毛入不可強同然觀仲景傷寒論無從皮毛入之文其曰從皮毛入者後人讀仲景書見其發熱惡寒知為從皮毛入也獨於此節不知仲景已寓從口鼻入之義蓋仲景曰發熱則指明邪在肌肉曰渴即指明在口中曰不惡寒即指明不在皮毛也然則發熱而渴不惡寒此數字已顯見邪不在皮毛矣仲景因自解之曰此為溫病是明指冬不藏精冬傷於寒伏氣所致以及從口鼻入凡是熱由內發者皆以為溫病三字括之矣此溫熱之真面目不由外至者也其有本非溫病因傷外感醫者不得治法致於發汗已後變成熱證者此非溫之本證乃風溫也一個風字以見不是正溫病乃因外感風寒誤汗之變證名曰風溫則知上文所謂溫病者是不由外感皮毛而得矣仲景文法迥環已將溫之來歷露出而由伏氣發由口鼻入之理皆在言外今補註將溫證看通幸勿刪削余以雲航之此言為是因並存之病有發熱惡寒者發於陽也無熱惡寒者發於陰也發於陽七日愈發於陰六日愈以陽數七陰數六故也太陽底面即是少陰治太陽之病即宜預顧少陰二經標本寒熱不同醫者必先了然於心然後絲絲入扣內經云太陽之上寒氣主之以寒為本以熱為標也又云少陰之上君火主之以寒為標也病有發熱惡寒者發於太陽之標陽也無熱惡寒者發於少陰之標陰也發於陽者七日愈發於陰者六日愈以陽數七陰數六故也此一節提陰陽寒熱標本之大綱並按陰陽之數以定病愈之期言手足標本之異手之太陽其標熱也與手少陰為表裏發熱惡寒發於手太陽之標陽也足之太陽其本寒也與足少陰為表裏無熱惡寒發於足少陰之標陽也太陽病頭痛至七日以上自愈者以行其經盡故也若欲作再經者針足陽明使經不傳則愈何以謂發於陽者七日愈請言其所以愈之故如太陽病頭痛等證至七日以上應奇數而自愈者以太陽病自行其本經已盡七日之數故也若未愈欲作再經者陽明受之宜針足陽明足三里穴以泄其邪使經不傳則愈推之發於陰者六日愈亦可比例得其旨矣此節言上文而言病愈之期又提出行其經三字謂自行其本經與傳經不同曲盡傷寒之變幻六經皆有行有傳舉太陽以為例太陽病欲解時從巳至未上察陰陽之數既可推其病愈之日而六經之病欲解亦可於其所旺時推測而知之太陽病欲解之時大抵從巳至未上者以巳午二時日中而陽氣之所主邪欲退正欲復得天氣之助值旺時而解矣此一節承上文而言病愈之時以見天之六淫能傷人之正氣而天之十二時又能助人之正氣也風家表解而不了了者十二日愈邪解後未全暢快曰病衰曰少愈皆可以不了了三字該之風陽邪也如太陽中風家七日陽得奇數邪氣從表而解然雖解而餘邪不了了凈盡者俟過五日五日為一候五臟元氣始充合共十二日精神慧爽而愈推之寒為陰邪如發於陰之病六日陰得偶數而解既解而不了了者亦須復過一候大抵十一日而愈矣若誤治又不在此例此一節承上文言既愈之後而定以痊愈之期也病人身大熱反欲得衣者熱在皮膚寒在骨髓也身大寒反不欲近衣者寒在皮膚熱在骨髓也醫家辨證開口一言太陽矚目即在少陰須知太陽標熱而本寒少陰標寒而本熱太陽之標即少陰之本少陰之本即太陽之標上章以發熱無熱言猶未暢明其義茲請再申之為辨太陽之證者辨到太陽之根病人身大熱為太陽之標熱在外而反欲得近衣者為少陰之標寒在內是熱在太陽所主之皮膚寒在少陰所主之骨髓也身之寒熱不足憑必以骨髓之寒熱為主陽根於陰司命者不可不深明此理也此一章承前章陰陽寒熱標本之旨深一層立論上章言其所惡此章言其所欲皆探其病情程郊倩云陰陽順逆之理在天地徵之於氣者在人身即協之於情情則無假合之前三章彼為從外以審內法此則從內以審外法太陽中風陽浮而陰弱陽浮者熱自發陰弱者汗自出嗇嗇惡寒淅淅惡風翕翕發熱鼻鳴乾嘔者桂枝湯主之救治之法須辨脈證以立方先以太陽言太陽中風風為陽邪而中於肌腠其脈陽寸浮而陰尺弱陽浮者風勢迅發待閉鬱而熱自發陰弱者津液漏泄不待覆蓋而汗自出而且嗇嗇欲閉之狀而惡寒淅淅欲開之狀而惡風翕翕難開難合之狀而發熱陽邪上壅而鼻鳴陽邪上逆而乾嘔者中風脈證的確無疑桂枝湯主之此一節言風中太陽之肌腠立方以救治也補曰寸陽浮則主衛陽外越故熱自發陰尺弱則主營血受傷為衛之守營不守衛故衛氣外泄而自汗出成無己註以為風傷衛寒傷營非也蓋寒當傷衛風當傷營何以言寒當傷衛哉寒者太陽之本氣也太陽之陽發於至陰而充於皮毛是皮毛一層衛所居也衛陽虛招外寒則寒傷衛而皮毛閉塞故無汗何以言風傷營哉風在六氣屬厥陰肝木厥陰主營血血虛則招外風故風傷血營血雖與衛氣偕行而究之皮毛一層為衛所司肌肉一層為營所宅故風傷營則歸於肌肉中而營不守衛是以衛氣漏出為汗況無汗用麻黃明是治衛氣之藥有汗用桂枝明是和營血之藥註家何得混亂哉又原文嗇嗇惡寒淅淅惡風翕翕發熱此三句是三層淺註尚欠分明蓋嗇嗇惡寒是言皮毛一層自汗皮毛開故遇寒則欲閉而作嗇嗇之狀因皮毛間衛氣無守故惡寒也淅淅惡風是言肌肉一層汗既漏出如淅米之狀故曰淅淅風來乘之直入肌肉則營血受傷故惡風也翕翕發熱故名腠理一層腠理在肥肉之內瘦肉之外夾縫中有紋理故名腠理邪在肌肉營分之中而衛氣從腠理透出與營分合則相並作熱故曰翕翕發熱鼻鳴者腠理之氣不外達則內壅於鼻而息有聲乾嘔者腠理屬三焦三焦之氣不能透出腠理則逆入胃中而嘔是以乾嘔本少陽證而桂枝證中亦有此者因亦連及三焦故也究竟其邪只在肌肉中故不必治腠理亦不必治皮毛但用桂枝湯解肌而皮毛腠理之邪自解淺註未能分晰則於麻桂二證之分別與少陽乾嘔之相同不能通體透徹於仲景書一間未達矣桂枝湯方桂枝三兩去皮芍藥三兩甘草二兩炙生薑三兩切大棗十二枚擘上五味㕮咀以水七升微火煮取三升去滓適寒溫服已須臾啜熱稀粥一升餘以助藥力溫覆令一時許遍身漐漐微似有汗者益佳不可如水流漓病必不除若一服汗出病差停後服不必盡劑若不汗更服依前法又不汗後服小促其間半日許令三服盡若病重者一日一夜服周時觀之服一劑盡病證猶在者更作服若汗不出者乃服至二三劑禁生冷黏滑肉麵五辛酒酪臭惡等物蔚按桂枝辛溫陽也芍藥苦平陰也桂枝又得生薑之辛同氣相求可恃之以調周身之陽氣芍藥而得大棗甘草之甘甘苦合化可恃之以滋周身之陰液師取大補陰陽之品養其汗源為勝邪之本又粥以助之取水穀之津以為汗汗後毫不受傷所謂立身於不敗之地以圖萬全也補曰陳修園以手太陽小腸經從足膀胱之化統稱寒水幾謂太陽氣化無關於小腸矣不知但有膀胱之水而無小腸之火則水不化氣何以成其太陽之功用哉吾於總論已言小腸導心火下交膀胱蒸動水氣之理茲復言曰膀胱主水主氣屬衛分小腸主火主血屬營分營生於心藏於肝而導之者小腸也心火生營血循包絡下入肝膈散走連網而及小腸小腸通體全生於連網之上小腸者心之府而連網者肝膈相連者也小腸宣心之陽從連網肝膈之中而外達腠理又外達肌肉是為營氣與衛風合以成其為太陽之功用故邪在營分用甘棗補脾從脾之膏油外達以托肌肉之邪用白芍行肝血從肝膈遁連網而外達肌肉以行營血之滯用生薑宣三焦少陽之氣從連網達腠理以散外邪而尤重在桂枝一味能宣心陽從小腸連網以達於外使營血充於肌肉間而邪不得留也然則此方正是和肌肉治營血之方正是小腸血分之方若不知水火合化之理則此方之根源不明也太陽病頭痛發熱汗出惡風桂枝湯主之桂枝湯調陰陽和榮衛為太陽中風之主方而其功用不止此也凡中風傷寒雜證審系太陽之為病醫者必於頭痛發熱等共同證中認出汗出一證為大主腦汗出則毛竅空虛亦因而惡風者桂枝湯主之不必問其為中風傷寒雜病也第審其汗出斯用之無有不當矣此一節承上節而推廣桂枝湯之用補曰淺註言凡中風傷寒雜病又曰不問其為中風傷寒雜證但見此病即用此方將仲景立方之通例於此揭出真善讀仲景書者仲景全書皆作如是觀太陽病項背強𠘧𠘧反汗出惡風者桂枝加葛根湯主之雖然病在太陽之肌腠桂枝湯成為切當若太陽經輸之病專用桂枝湯原方恐未能絲絲入扣內經云邪入於輸腰脊乃強蓋太陽之經輸在背太陽病項背不舒而強如短羽之鳥欲飛而不能飛其狀𠘧𠘧是邪入太陽之經輸也夫邪之中人始於皮毛次及肌絡次及經輸今者邪入經輸則經輸實而皮毛虛故反汗出而惡風視桂枝證同而不同者非得葛根入土最深其藤延蔓似絡領桂枝直入肌絡之內而還出於肌膚之外者不能捷效必以桂枝加葛根湯主之此一節言太陽經輸之證亦承上節推廣桂枝湯之用而不泥其方桂枝加葛根湯方桂枝三兩去皮芍藥三兩甘草二兩炙生薑三兩切大棗十二枚擘葛根四兩上六味以水七升納諸藥煮取三升去滓溫服一升不須啜粥餘如桂枝將息及禁忌法張令韶曰桂枝湯解肌加葛根以宣通經絡之氣蓋葛根入土最深其藤延蔓似絡故能同桂枝直入肌絡之內而外達於膚表也正曰淺註云項背強反汗出是經輸實而皮毛虛然下文葛根湯之項背強亦是經輸實何以反無汗而皮毛並不虛哉觀葛根湯證之經輸實為皮毛不虛則知桂枝加葛根證之皮毛虛並非因經輸實所致矣蓋皮毛肌肉是指周身言經輸是太陽經脈則專指項背言故有邪在皮毛而不入經輸者為麻黃證若兼入經輸則是葛根湯證也有邪在肌肉而不入經輸者為桂枝證若兼經輸則是桂枝加葛根湯證也然則皮毛虛皮毛實皆有邪入經輸者淺註解入經輸則皮毛虛與葛根湯證相矛盾矣又解葛根為入肌絡不知絡者經脈之支也經脈直上下行太陽經直行在背故有項背強之證若夫絡脈則橫行周身凡各經之經脈皆直行各經之絡脈皆橫行絡脈既橫行安有項背直強之證哉今解葛根藤蔓似絡而入肌絡與項背強不合蓋葛根其藤最長其根入土最深吸引上下黃泉之水氣以上達於藤有如太陽經引膀胱水之中陽氣以上達於經脈也人必知水中之陽化氣上行而為太陽經乃知葛根能引土下之水上貫其藤即與太陽化氣上行其理更無以異故仲景用葛根入走經脈而註云入肌絡不免稍差太陽病下之後其氣上衝者可與桂枝湯方用前法若不上衝者不得與之桂枝湯為肌腠之主方邪在肌腠既可於汗出等正面看出亦可於誤治後反面勘出太陽病誤下之後則太陽之氣當從肌腠而下陷矣若不下陷而其氣竟上衝者是不因下而內陷仍在於肌腠之間可與桂枝湯方用前啜稀粥溫覆微取汗法從肌腠外出而愈矣若不上衝者邪已內陷不在肌腠之中桂枝不可與之此一節承上節以起下文五節之意張令韶曰經云太陽根於至陰是太陽之氣由至陰而上於胸膈由胸膈而出肌腠由肌腠而達於皮毛外行於三陽內行於三陰氣從此而出入邪亦從此而出入師所謂其氣者指此而言也讀者知正氣之出入如此則邪氣之出入亦如此則於此道知過半矣所以傷寒言邪即言正而言正即可以識邪按讀熟此註方知論中經氣傳行及一日二日三日五六日等皆是眼目太陽病三日已發汗若吐若下若溫針仍不解者此為壞病桂枝不中與之也觀其脈證知犯何逆隨證治之然而不可與者又不止此太陽病三日已三陽為盡發汗則肌表之寒自解若吐則中膈之邪當解若下則陽胃之邪當解若溫針則經脈之邪當解當解而仍不解者此為醫者誤治壞病壞病不關肌腠故桂枝湯不中與也觀其脈證知犯何逆或隨其發汗之逆或隨其吐下溫針之逆分各證而救治之可也此一節承上節言病不關於肌腠者桂枝湯用之而不當桂枝本為解肌若其人脈浮緊發熱汗不出者不可與之也常須識此勿令誤也且更有必不可與者不得為不重叮嚀桂枝湯本為解肌與麻黃湯為膚表之劑迥別蓋邪之傷人先傷膚表次及肌腠惟風性迅速從膚表而直入肌腠則肌腠實而膚表虛所以脈浮緩汗自出不曰傷而曰中也若其人脈浮緊發熱汗不出者明明邪在膚表不在肌腠不可與也甚矣哉桂枝湯為不汗出之大禁當須識此勿令誤也此一節承上節分別桂枝本為解肌大殊發表之劑重為叮嚀若酒客病不可與桂枝湯得之則嘔以酒客不喜甘故也桂枝本為解肌以汗自出為據然亦有不可固執者若酒客病濕熱蘊於內其無病時熱氣熏蒸固多汗出及其病也脈緩汗出可知矣然其病卻不在肌腠之內故不可與桂枝湯若誤與之得此湯以助濕熱且甘能壅滿則為嘔蓋以酒客喜苦而不喜甘故也推之不必酒客凡素患濕熱之病者皆可作酒客觀也此一節承上節桂枝本為解肌句言濕熱之自汗不為肌腠之病又當分別喘家作桂枝湯加厚朴杏子佳桂枝本為解肌若喘則為邪拒於表表氣不通而作宜麻黃而不宜桂枝矣然亦有桂枝證悉具惟喘之一證不同當知是平日素有喘之人名曰喘家喘雖愈而得病又作審而桂枝證亦不可專用桂枝湯宜加厚朴從脾而輸其氣杏子從肺以利其氣佳此一節承上節桂枝本為解肌句言喘不盡由於肌腠之病不可專用桂枝湯凡服桂枝湯吐者其後必吐膿血也得湯則嘔請申其義凡不當服桂枝湯而服之不但嘔而且吐者以其人內有濕熱又以桂枝湯之辛熱以助其熱兩熱相衝反能涌越熱勢所逼致傷陽絡其後必吐膿血也此一節申明前二節得湯則嘔之義序例謂桂枝下咽陽盛則斃者此也太陽病發汗遂漏不止其人惡風小便難四肢微急難以屈伸者桂枝加附子湯主之太陽病固當汗之若不取微似有汗為發汗太過遂漏不止前云如水流漓病必不除故其人惡風猶然不去汗渙於表津竭於裏故小便難四肢為諸陽之本不得陽氣以養之故微急且至難以屈伸者此因大汗以亡陽因亡陽以脫液必以桂枝加附子湯主之方中取附子以固少陰之陽固陽即所以止汗止汗即所以救液其理微矣正曰此小便難是膀胱之水寒結也與五苓散之水結相似故五苓用桂以溫之而此方更加附子正所以溫水散結淺註解小便難為津液竭不知下文所謂證象陽旦按法治之而增劇者乃為津液竭此節正是陽旦證此桂枝加附子即是陽旦湯正是招補亡陽非救其陰也四肢微急難以屈伸亦是諸寒收引故當用桂枝附子與下文兩脛拘急者不同下文兩脛拘急是陰液不養其筋故用白芍甘草湯觀下文證象陽旦者為陰液竭即知此節是陽氣亡非陰液竭也互勘自明註家幸勿牽混此章凡九節承上數章言太陽證之變動不居桂枝湯之泛應不窮也張令韶云自此以下八節論太陽之氣可出可入可內可外外行於陽內行於陰出而皮膚入而肌腠經絡無非太陽之所操縱也桂枝加附子湯方即桂枝湯原方加附子一枚炮男元犀按太陽之臟即是少陰太陽病本宜發汗發之太過而為漏不止必用附子以固之重至肢厥必用四逆輩以救之若惡風小便難四肢微急難以屈伸者汗出過多脫液尚喜腎中之真陽未亡只用附子大補少陰之氣得桂枝湯為太陽之專藥令陰交於陽則漏止漏止則液不外脫而諸證可俱除矣正曰令陰交於陽是空話不著實小便難是水結與五苓散之寒水內結一例惡風是汗出淋漓邪反不去四肢微急難以屈伸是諸寒收引拘急也故方用桂附以振陽氣解肢體為散寒溫水止漏汗之法淺註解為脫液求深而反有未合太陽病下之後脈促胸滿者桂枝去芍藥湯主之若微惡寒者桂枝去芍藥加附子湯主之不但誤汗而陽亡於外設若誤下亦致陽衰於內太陽之氣由胸而出入若太陽病誤下之後陽衰不能出入於外內以致外內之氣不相交接其脈數中一止其名為促氣滯於胸而滿者桂枝去芍藥湯主之蓋桂枝湯為太陽神方調和其氣使出入外內又恐芍藥之苦寒以緩其出入之勢若脈不見促而見微身復惡寒者為陽虛已極桂枝去芍藥方中加附子湯主之恐薑桂之力微必助之附子而後可上節言誤汗而陽亡於外此節誤下而陽衰於內其方只一二味出入主治判然按陽亡於外宜引其陽以內入芍藥在所必用陽衰於內宜振其陽以自立芍藥則大非所宜也桂枝去芍藥湯方即桂枝湯原方去芍藥以水七升煮取三升溫服一升桂枝去芍藥加附子湯方即前方加附子一枚炮去皮破八片五味㕮咀以水七升煮取三升去滓溫服一升惡寒止停後服蔚按傷寒論大旨以得陽則生上節言汗之遂漏慮其亡陽此節下後言脈促胸滿亦恐亡陽蓋太陽之氣由至陰而上於胸膈今因下後而傷胸膈之陽斯下焦濁陰之氣僭居陽位而為滿脈亦數中一止而為促治宜急散陰霾於桂枝湯去芍藥者恐其留戀陰邪也若見惡寒為陽虛已極徒仰其陰無益必加熟附以壯其陽方能有濟喻嘉言程扶生之解俱誤太陽病得之八九日如瘧狀發熱惡寒熱多寒少其人不嘔清便欲自可一日二三度發脈微緩者為欲愈也脈微而惡寒者此陰陽俱虛不可更發汗更下更吐也面色反有熱色者未欲解也以其不能得小汗出身必癢宜桂枝麻黃各半湯太陽頭痛項強發熱惡寒之病得之八日已過至九日正當少陽主氣之期藉其氣以為樞轉故如瘧狀亦見寒熱往來究竟發熱惡寒現出太陽本證與真瘧不同所幸者寒熱並見之中熱較多而寒卻少太陽以陽為主熱多是主勝客負露出吉兆其人不嘔邪不轉屬少陽圊便欲自可邪不轉屬陽明其寒熱一日二三度發不如瘧之有定候太陽得少陽之樞轉邪氣有不能自容之象脈微者為邪衰緩者為正復皆為欲愈之證脈也設脈但見其微而不見其緩是邪衰而正亦衰也不見其發熱而但見其惡寒者是客勝主負也蓋太陽底面即是少陰今脈微即露少陰脈沉細之機惡寒即伏少陰厥逆及背寒之兆此不獨太陽虛而少陰與太陽俱虛不可更發汗更下更吐也雖然證脈如此宜其面色熱色矣而面色反有熱色者以諸陽之會在於面猶幸陽氣未敗尚能鼓鬱熱之氣而見於面獨憾陽氣已虛未能遂其所欲自作小汗而解也茲以其不能得小汗出辨其面色有熱色而知鬱熱之氣欲達於肌表又察其肌表之氣未和而知周身必癢邪欲出而不能出宜桂枝麻黃各半湯以助之此一節言病在太陽值少陽主氣之期而藉其樞轉也正曰此一節當分作三段解第一段言得少陽之氣化而脈緩病衰熱多寒少者為欲愈也第二段反接言脈若不緩而見微熱若不多而但惡寒者此非少陽欲愈之證乃少陰太陽俱虛不可更汗下吐也第三段又激轉第二段之意承言但惡寒者固是虛寒若但惡寒而面色反有熱色者又不得作虛寒論乃是太陽外寒固閉鬱熱壅遏身癢無汗以不得外解而然又宜桂麻各半以發其汗幸勿作虛寒例也如此分作三段則尺幅之中一波三折其辨證也真如剝蕉抽繭層層透脫淺註牽連一片故不了當桂枝麻黃各半湯方桂枝一兩十六銖去皮芍藥生薑切甘草炙麻黃各一兩去節大棗四枚擘杏仁二十四個湯浸去皮尖及雙仁者上七味以水五升先煮麻黃一二沸去上沫納諸藥煮取一升八合去滓溫服六合治太陽病得之八九日過經如瘧狀與往來寒熱不同故曰如發熱惡寒現出太陽經真面目熱多寒少太陽以陽為主熱多是主勝客負為將解之兆其人不嘔邪不轉屬少陽圊便自可邪不轉屬陽明一日二三度發瘧之寒熱有定候此則或二或三無定候也太陽之陽氣有權則邪氣有不能自容之象脈微緩者微則邪衰緩則正復為欲愈也自起句至此為一節言邪輕欲自解不藥可愈也脈微上節以微與緩對舉此節但云微而不云緩者以邪衰以而正亦衰也而惡寒者上節以發熱惡寒對舉此節但云惡寒不云發熱便是大眼目處且熱多寒少為主勝客負之兆若寒多熱少即為客勝主負之兆況但寒無熱之證乎此陰陽俱虛陰陽認作氣血則誤甚要知太陽以陽為主今脈微即露出少陰之沉細象惡寒即露出少陰之厥冷及背惡寒象不獨太陽虛即少陰亦虛也陰陽指太少言最切不可更發汗更吐更下也自脈微至此句為一節提出虛字便可悟芍藥甘草附子湯之法又可悟四逆湯及附子湯之法矣師不出方即引而不發之道面色反有熱色者反字是大眼目言脈微惡寒面色不宜有熱色今反見有熱色以其人陰陽雖曰俱虛而陽氣尚能鼓鬱熱之氣而見於面色未欲解也欲字可味太陽以陽為主猶幸陽氣未敗尚能鼓過經之邪見於面色獨恨陽氣已虛不能遂其所欲令作小汗而解以其不得小汗出身必癢申上未欲解意辨面色之熱兼徵之周身作癢宜桂枝麻黃各半湯邪欲出而不能自出故藉此方以助之自面有熱色至此又是一節通章以太陽病得之八九日一句為主言過經之病也下分三節節節相承一層剝起一層自有註傷寒論以來千百餘年無有一人道及今特詳註之補曰此註是修園附入方歌之首者想以淺註已刻成後自覺原先淺註有不合宜故特再註於此以自行補其缺誤也今仍採入以見修園亦有自知其註未能周到自己且欲補正之矣故余此書非攻修園正欲襄其不逮蔚按內臺載此方即桂枝湯原方分兩加麻黃二兩杏仁七十個白水煎服取微汗許宏方議云桂枝湯治表虛麻黃湯治表實二者均曰解表霄壤之異也今此二方合而用之乃解其表不虛不實者也太陽病初服桂枝湯反煩不解者先刺風池風府卻與桂枝湯則愈太陽病審其為桂枝證用桂枝湯照法煮取三升分三服若初服桂枝湯一升反煩不解者緣此湯只能治肌腠之病不能治經脈之病治其半而遺其半故也宜先刺風池風府以瀉經中之熱卻與留而皆服之桂枝湯二升照法服之則愈此一節言太陽之病涉於肌腠而復干於經脈也風池二穴在頭上三行顳顬後髮際陷中足少陽之經穴針入三分留三呼風府一穴上髮際一寸大筋內宛宛中督脈之經穴針入四分留三呼二者皆太陽經所過之處故刺之以瀉太陽之邪服桂枝湯大汗出脈洪大者與桂枝湯如前法若形似瘧一日再發者汗出必解宜桂枝二麻黃一湯邪之在表與在肌其治不可以或混而病之在表與在肌其氣未始不相通如審系太陽肌腠之病服桂枝湯取微似有汗者佳若逼取大汗流漓而出病反不除其脈勢必變浮緩而為洪大者察其桂枝證未罷當仍與桂枝湯如前啜粥令微似汗之法是法也可以發汗汗生於穀也即可以止汗精勝而邪卻也凡系肌腠之病宜無不愈矣若猶未能即愈寒熱往來其形如瘧但瘧有定時而此則作止無常日再發而與瘧分別者不獨肌病兼見表病表病汗出必解宜桂枝二麻黃一湯此服桂枝後少加麻黃之一法此一節言太陽之氣在肌而復通於表也桂枝二麻黃一湯方桂枝一兩十七銖去皮芍藥一兩六銖麻黃十六節去節生薑一兩六銖切杏仁十六個去皮尖甘草一兩二銖炙大棗五枚擘上七味以水五升先煮麻黃一二沸去上沫納諸藥煮取二升去滓溫服一升日再服蔚按桂枝湯宜令微似汗若大汗出脈洪大為汗之太驟表解而肌未解也仍宜與桂枝湯以啜粥法助之若形如瘧日再發者是肌邪表邪俱未盡宜桂枝二以解肌邪麻黃一以解表邪服桂枝湯大汗出後大煩渴不解脈洪大者白虎加人參湯主之太陽之氣由肌腠而通於陽明服桂枝湯當取微似有汗者佳今逼取太過則大汗出後陽明之津液俱亡胃絡上通於心故大煩陽明之上燥氣主之故大渴不解陽氣盛亢診其脈洪大無倫者白虎加人參湯主之此一節言太陽之氣由肌腠而通於陽明也白虎為西方金神秋金得令而炎氣自除加人參者以大汗之後必救其液以滋其燥也補曰肌肉為脾所司胃為脾之府故陽明胃亦主肌肉由肌肉即通陽明矣若腠理即三焦所司肌腠二字不得混稱白虎加人參湯方知母六兩石膏一斤碎綿裹甘草二兩炙粳米六合人參二兩上五味以水一斗煮米熟湯成去滓溫服一升日三服蔚按上節言服桂枝大汗出而邪反不能凈宜仍服桂枝以法汗之或桂枝二麻黃一湯合肌表而並汗皆所以竭其餘邪也此節言大汗出外邪已解而汗多亡陽明之津液胃絡上通於心故大煩陽明為燥土故大渴陽明盛故脈洪大主以石膏之寒以清肺知母之苦以滋水甘草粳米之甘人參之補取氣寒補水以制火味甘補土而生金金者水之源也太陽病發熱惡寒熱多寒少脈微弱者此無陽也不可發汗宜桂枝二越婢一湯太陽之氣外行於陽內行於陰太陽與少陰為表裏其內行無論矣而且有陷入於脾不能外達者將何以辨之辨之於證與脈之相反太陽為病其證皆發熱惡寒太陽以陽為主若熱多寒少為主勝客負是將愈之吉兆脈宜緩而不弱今脈微弱者脈與證相反是證為太陽其氣內陷於至陰之中全隱其太陽真面目不得不為之區別曰此證為陽而脈則無陽也陽主表無陽則不可發其表汗從脈不從證斷斷然者宜桂枝二越婢一湯方從至陰中以發越之此一節言太陽之氣陷於脾而脾氣不能外達者不發其表汗宜越其脾氣也桂枝二越婢一湯方桂枝去皮芍藥麻黃甘草炙各十八銖大棗擘四枚生薑切一兩二銖石膏碎綿裹二十四銖上七味㕮咀以五升水煮麻黃一二沸去上沫納諸藥煮取二升去滓溫服一升本方當裁為越婢湯桂枝湯合飲一升今合為一方桂枝二越婢一按讀方下所註知仲景所用皆古方真述而不作之聖也論中無陽二字言陽氣陷於陰中既無表陽之證不可發其表汗故用越婢湯方中石膏質重而沉帶同麻黃之勇直入於裏陰之中還同桂枝湯復出於肌表而愈蔚按本方分兩甚輕大抵為邪氣輕淺者設也太陽以陽為主所云熱多寒少是陽氣欲勝陰邪之兆所云脈微弱是指脈不緊盛所云無陽不可發汗是指此證此脈無陽邪之太盛不可用麻黃湯發其汗只用此湯清疏榮衛令得似汗而解也書中陰陽二字有指氣血而言有指元陰元陽而言有指腑臟而言有指表裏而言有指寒熱而言有指邪正而言非細心如發者每致誤解即高明如程扶生輩亦以無陽二字認為陽氣虛少甚矣讀書之難也服桂枝湯或下之仍頭項強痛翕翕發熱無汗心下滿微痛小便不利者桂枝去桂加茯苓白朮湯主之不獨陷於脾而不能外達且有陷於脾而不能轉輸者太陽病服桂枝湯服後未愈醫者不審其所以未愈之故或疑桂枝湯之不當而又下之仍然表證不解而為頭項強痛翕翕發熱無汗且又兼見裏證而為心下滿微痛小便不利者然無汗則表邪無外出之路小便不利則裏邪無下出之路總由邪陷入脾失其轉樞之用以致膀胱不得氣化而外出三焦不行決瀆而下出內經云三焦膀胱者腠理毫毛其應是言通體之太陽也此時須知利水法中大有轉旋之妙用而發汗亦在其中以桂枝去桂加茯苓白朮湯主之所以去桂者不犯無汗之禁也所以加茯苓白朮者助脾之轉輸令小便一利而諸病霍然矣此一節言陷脾不轉輸之治法也補曰此與五苓散互看自明五苓散是太陽之氣不外達故用桂枝以宣太陽之氣氣外達則水自下行而小便利矣此方是太陽之水不下行故去桂枝重加苓朮以行太陽之水水下行則氣自外達而頭痛發熱等證自然解散無汗者必微汗而愈矣然則五苓散重在桂枝以發汗發汗即所以利水也此方重在苓朮以利水利水即所以發汗也實知水能化氣氣能行水之故所以左宜右有桂枝去桂加茯苓白朮湯方芍藥三兩甘草二兩炙生薑茯苓白朮各三兩大棗十二枚上六味㕮咀以水八升煮取三升去滓溫服一升小便利則愈蔚按上節言太陽之氣內陷於脾而不能外達此節言太陽之氣內陷於脾而不能轉輸也用桂枝湯後而頭痛項強翕翕發熱無汗之證仍在其病機在於無汗二字知桂枝湯之不能絲絲入扣也或者悔桂枝湯之誤而下之無如表證悉具轉因誤下而陷於脾以致心下滿微痛小便不利其病機在於小便不利四字桂枝之長於解肌不長於利水服五苓散多飲暖水以出汗師有明訓知桂枝之不可不去也太陽之氣陷於中土心下為脾之部位故滿而微痛脾不能轉輸其液津故小便不利今用桂枝去桂而加白朮茯苓則轉輸靈而小便自利小便利而太陽之氣達於內外而內外之邪俱凈矣又按經方分兩輕重變化難言有方中以分量最重為君者如小柴胡湯柴胡八兩餘藥各三兩之類是也有方中數味平用者如桂枝湯芍桂生薑各三兩而以桂枝為君是也有一方各味等分者如豬苓湯各味俱一兩而以豬苓為君是也有方中分兩甚少而得力者如甘草附子湯中為使之桂枝四兩而所君之甘草只二兩是也又如炙甘草湯中為使之地黃一斤而所君之炙甘草只四兩是也然此雖輕重莫測而方中有是藥而後主是名未有去其藥而仍主其名主其名即所以主其功如此證頭項強痛翕翕發熱為太陽桂枝證仍在因其誤治遂變其解肌之法而為利水水利則滿減熱除而頭項強痛亦愈主方在無藥之處而神乎其神矣傷寒脈浮自汗出小便數心煩微惡寒腳攣急反與桂枝欲攻其表此誤也得之便厥咽中乾煩躁吐逆者作甘草乾薑湯與之以復其陽若厥愈足溫者更作芍藥甘草湯與之其腳即伸若胃氣不和譫語者少與調胃承氣湯若重發汗復加燒針者四逆湯主之傷寒脈浮自汗出小便數心煩微惡寒腳攣急此與桂枝證相似但腳攣急不似考少陰之脈斜走足心上股內後廉凡辨證當於所同處得其所獨今據此攣急之一證便知太陽之標熱合少陰之本熱為陰陽熱化之病熱盛灼筋故腳攣急並可悟脈浮自汗小便數皆系熱證即有微惡寒一證亦可知表之惡寒漸微則裏之鬱熱漸盛其與桂枝證貌雖相似而實懸殊醫者反與桂枝湯欲攻其表此誤也病人陽盛於內得此辛熱之藥周易謂亢龍有悔陽亦外脫而亡便見厥證水涸而咽中乾水火離而煩躁水逆而吐逆者此時投以苦寒之劑不受惟以乾薑炮黑變辛為苦同氣以招之倍用甘草以緩之二味合用作甘草乾薑湯與之以從治之法復其陽若厥愈足溫者更作芍藥甘草湯與之滋陰以退熱熱退其腳即伸若胃氣不和譫語者是前此辛熱之毒留於陽明而不去少與調胃承氣湯蕩滌其遺熱取硝黃以對待乎薑桂也他若太陽之本寒合少陰之標寒為病陰陽俱虛重發其汗則汗不止而亡陽復加燒針者更逼其汗而亡陽必用四逆湯主之均系亡陽而彼此懸隔此一節言太陽標熱合少陰本熱之為病誤治而變證不一也正曰此一節是陽亢而反亡陽乃亡陽中之變證與虛寒亡陽者不同故先辨陽亢亡陽之證言其初宜從治以招來之用甘草乾薑湯繼宜正治以調和之用芍藥甘草湯終宜逆治以攻克之用調胃承氣湯曲折輕重慎而又慎則陽亢亡陽之變證可治愈矣又恐人誤認此證以為虛寒亡陽也因又借證之曰若轉發其汗復加燒針以致四逆者乃為虛寒亡陽宜四逆湯與上文所論陽亢亡陽之證大不同也柯韻伯將若字以下裁去言非此節原文不知仲景借賓定主欲人互勘而明也故用一若字推開讀仲景書要在虛字上著眼則文法不差矣甘草乾薑湯方甘草四兩炙乾薑二兩炮上㕮咀以水三升煮取一升五合去滓分溫再服蔚按誤服桂枝湯而厥其為熱厥無疑何以又用甘草乾薑乎而不知此方以甘草為主取大甘以化薑桂之辛熱乾薑為佐妙在炮黑變辛為苦合甘草又能守中以復陽也論中乾薑俱生用而惟此一方用炮須當切記或問亡陽由於辛熱今乾薑雖經炮帶些苦味畢竟熱性尚存其義何居答曰此所謂感以同氣則易入也子能知以大辛回陽主薑附而佐以膽尿之妙便知以大甘復陽主甘草而佐以乾薑之神也推之僵蠶因風而死取之以治中風驢為火畜大動風火以伏流之阿水造膠遂能降火而熄風皆古聖人探造化之微也仲景又以此湯治肺痿更為神妙後賢取治吐血蓋學古而大有所得也芍藥甘草湯方白芍藥四兩甘草四兩炙上二味㕮咀以水三升煮取一升半去滓分溫再服之蔚按芍藥味苦甘草味甘甘苦合用有人參之氣味所以大補陰血血得補則筋有所養而舒安有拘攣之患哉時醫不知此理謂為戊己湯以治腹痛有時生熟並用且云中和之劑可治百病凡病人素溏與中虛者服之無不增劇誠可痛恨調胃承氣湯方大黃四兩去皮清酒浸甘草二兩炙芒硝半斤上三味㕮咀以水三升煮取一升去滓納芒硝更上火微煮令沸少少溫服之蔚按此治病在太陽而得陽明之陽盛證也經曰熱淫於內治以鹹寒火淫於內治以苦寒君大黃之苦寒臣芒硝之鹹寒而更佐以甘草之甘緩硝黃留中以泄熱也少少溫服亦取緩調之意次男元犀按調胃承氣湯可救誤服桂枝遺熱之證太陽之陽盛證用之能泄肌熱以作汗陽明證用之能調胃氣以解微結內臺方自註云脈浮者三字大有意義四逆湯方甘草二兩炙乾薑一兩半附子一枚生用去皮破八片上三味㕮咀以水三升煮取一升二合去滓分溫再服強人可大附子一枚乾薑三兩蔚按四逆湯為少陰正藥此證用之以招納欲散之陽太陽用之以溫經與桂枝湯同用以救裏大陰用之以治寒濕少陰用之以救元陽厥陰用之以回薄厥次男元犀按生附子乾薑徹上徹下開闢群陰迎陽歸舍交接十二經為斬旌奪關之良將而以甘草主之者從容籌畫自有將將之能也正曰陳氏知四逆是少陰亡陽之正藥而云此證亦用之以招納欲散之陽不知四逆方是借賓定主之文仲景意謂亡陽譫語者斷不可用四逆湯也故原文特加一若字以別於上文言上文所謂亡陽譫語是陽亢而亡陽當用以上三方不當用四逆湯若少陰之虛寒亡陽者乃可用四逆湯也註家不可牽混又觀下節原文是申明此節之意而下節不申言四逆湯者以四逆是借賓定主之撇筆故不申言焉細玩文法自知問曰證象陽旦按法治之而增劇厥逆咽中乾兩脛拘急而譫語師曰言夜半手足當溫兩腳當伸後如師言何以知此答曰寸口脈浮而大浮為風大為虛風則生微熱虛則兩脛攣病形象桂枝因加附子參其間增桂令汗出附子溫經亡陽故也厥逆咽中乾煩躁陽明內結譫語煩亂更飲甘草干薑湯夜半陽氣還兩足當熱脛尚微拘急重與芍藥甘草湯爾乃脛伸以承氣湯微溏則止其譫語故知病可愈問曰證象陽旦按桂枝湯加附子增桂名陽旦湯之法治之而增劇厥逆咽中乾兩脛拘急而譫語師曰曰字衍文言夜半陰陽交接手足當溫兩腳當伸後如師言何以知此答曰兩手六部皆名寸口其脈下指即見為浮而脈形寬闊為大浮則為風陽為風邪也大則為虛陰虛於內不能為陽之守也風則以陽加陽故生微熱虛則陰液不足故兩脛攣病證象桂枝因取桂枝湯原方加附子一枚參其間增桂枝三兩名陽旦湯與服以令汗出以附子溫經亡陽故也蓋附子為溫經之藥陰寒用事得之則溫經以回陽如桂子加附子湯之治遂漏是也陽熱內盛得之則溫經以亡陽如此湯之令汗出是也審其厥逆咽中乾陽明內結譫語煩亂知其因服辛熱之藥所致遂更易其治法飲甘草乾薑湯引外越之陽以返內夜半天之陽生而人之陽氣亦還兩足當溫陰陽順接而厥回但陰津尚未全故脛尚微拘急重與芍藥甘草湯苦甘生其陰液爾乃脛伸其譫語未止者因誤服陽旦湯之熱視桂枝湯為倍烈以致陽明內結煩亂是胃中有燥屎徒用調胃承氣湯少與之恐不足以濟事必以大承氣湯令大便微溏燥屎亦下則止其譫語故病可愈此一節設為問答承上節而明誤藥之變證更進一層立論正曰此節是申明上節之意設為問答以明之也問曰上節所謂脈浮自汗小便數惡寒腳攣急之證本象陽旦證也按陽旦法用桂枝加附子治之而反增劇反見厥逆咽乾脛反加拘急而又譫語此何故也師曰似此陽旦證而實非陽旦也誤作陽旦治之則陽反飛越故厥逆陰液受傷故拘急必夜半陽氣回手足當溫陰氣復則兩腳當伸後如師言因再問曰此何以知其似陽旦而非陽旦耶答曰以其寸口脈浮而大浮則為風邪大則為陰虛風邪則生微熱陰虛則血不養筋而腳攣急證雖象桂枝證之發熱惡寒而踡曲然實則非桂枝證也醫者誤以為象桂枝證中之陽旦證因加附子增桂令汗出是誤也此證象桂枝陽旦而實則陰虛陽浮之風熱證今以附子溫經桂枝出汗反逼其陽氣外越則亡陽也故致厥逆然此非虛寒亡陽外則亡陽而內則陰虛加以熱甚咽乾譫語煩亂救陰救陽極難措手陰虛本不當用乾薑然以其寒亡陽更要用此甘草乾薑以從治之夜半陽回兩足當溫厥逆當愈矣然外陽雖回而內陰太竭重與芍藥甘草湯以正治之使復其陰其腳即伸然後陰陽俱存可以專治其熱用調胃承氣湯微溏則止其譫語陳註言非調胃承氣是用大承氣不知仲景此節原以申明上節則是承上文調胃承氣言也且曰微溏者蓋以救陽救陰初回復時不可大下示人鄭重之意知其不用大承氣也又曰故病可愈者以見此病虛中夾實變證變法極其難治而能曲折進退如此治者乃可愈也此仲景示人兢業之意讀者當細心體玩太陽病項背強𠘧𠘧無汗惡風葛根湯主之肌腠實則膚表虛而自汗入於經輸既有桂枝加葛根湯之法而膚表實而無汗入於經輸者治法何如太陽病項背強𠘧𠘧前已詳其說矣其無汗為邪扼於表表氣實也其惡風者現出太陽之本象也葛根湯主之此一節言邪從膚表而涉於經輸與邪在肌腠而涉於經輸者之不同另立葛根湯取微似汗法張令韶云自此以下四節俱論太陽之氣循經而入不在肌腠之中也葛根湯方葛根四兩麻黃三兩去節桂枝二兩去皮芍藥二兩切甘草二兩炙生薑三兩切大棗十二枚擘上七味㕮咀以水一斗先煮麻黃葛根減二升去沫納諸藥煎取三升去滓溫服一升覆取微似汗不須啜粥餘如桂枝湯法將息及禁忌蔚按第二方桂枝加葛根湯與此湯俱治太陽經輸之病太陽之經輸在背經云邪入於輸腰脊乃強師於二方皆云治項背𠘧𠘧𠘧𠘧者小鳥羽短欲飛不能飛而伸頸之象也但前方治汗出是邪從肌腠而入輸故主桂枝此方治無汗是邪從膚表而入輸故主麻黃然邪既入輸肌腠亦病方中取桂枝湯全方加葛根麻黃亦肌表兩解之治與桂枝二麻黃一湯同意而用卻不同微乎微乎葛根性用解見第二方張令韶曰太陽與陽明合病必自下利者太陽主開陽明主闔今太陽合於陽明不從太陽之開而從陽明之闔病闔反開故必自下利下利者氣下而不上也葛根之性延蔓上騰氣騰於上利自止矣太陽與陽明合病者必自下利葛根湯主之太陽之惡寒發熱頭項強痛等證與陽明之熱渴目疼鼻乾等證同時均發無有先後名曰合病合病者兩經之熱邪並盛不待內陷而胃中之津液為其所逼而不守必自下利雖然下利而邪猶在表未可責之於裏既非誤下邪陷之裏虛斷不可以協熱下利之法治之仍將以兩經之表證為急故以葛根湯主之此一節言太陽合於陽明而為下利證也正曰淺註以為兩經之邪熱內陷非也觀下文葛根黃連黃芩湯證方是邪熱內陷玩其文法下節云桂枝證而此二節所謂太陽即可知其為麻黃證矣麻黃證本系傷寒乃陰邪也陰邪內合陽明陷於大腸則自下利逆於胃中則但嘔理中湯之治嘔利以寒單在裏故以溫裏為急葛根湯之治嘔利則以寒自外來故仍以發表為主使寒仍從外解也淺註解為熱邪內陷與方不合且下節利不止並加脈促者三字以別之以見熱邪內陷脈數而歇至與寒邪內陷之脈不同也即下一節定此二節而知此二節所言是太陽寒邪內合陽明之證讀仲景書正須從文法間搜討太陽與陽明合病不下利但嘔者葛根加半夏湯主之太陽與陽明合病其機關全在乎下利而茲不下利而但作嘔者當求其說蓋太陽主開陽明主合今陽明為太陽所逼本合而反開開於下則下利開於上則為嘔即以葛根加半夏湯主之蓋以半夏除結氣以遂其開之之勢而利導之也此一節承上節而言太陽合於陽明不下利而但嘔也二節言太陽與陽明合病重在太陽之開一邊與下章合病用麻黃法不同小註宜細玩而熟記之葛根加半夏湯方葛根湯原方加半夏半升洗同法煎服張令韶曰不下利但嘔者太陽之氣仍欲上達而從開也因其勢而開之故加半夏以宣通逆氣太陽病桂枝證醫反下之利遂不止脈促者表未解也喘而汗出者葛根黃芩黃連湯主之太陽病頭項強痛自汗惡風為桂枝證病在肌也醫反下之致太陽之邪由肌而內陷利遂不止然邪雖內陷而氣仍欲出其脈急數中時見一止而無定數其名為促脈促者表邪未能徑出而未解也邪欲出而未能徑出則喘喘則皮毛開發而汗出者此桂枝證誤治之變既變則宜從變以救之不可再用桂枝湯而以葛根黃芩黃連湯主之此一節言太陽證雖邪已陷亦可以乘機而施升發使內者外之張令韶云下後發喘汗出乃天氣不降地氣不升之危證宜用人參四逆輩仲師用此方專在表未解句雖然仲師之書豈可以形跡求之耶總以見太陽之氣出入於外內由外而入者亦可由內而出此立證立方之意也補曰此節提出桂枝證以別於上節麻黃證之太陽病也上二節是傷寒以見此一節是傷風風在肌肉陽明所司之界本能翕翕發熱若誤下之則熱邪內陷為協熱下利與上節之必自利者不同何以知其與上節之寒利不同哉蓋寒脈不數今以其脈數而歇止名之為促所以促者因熱內陷而表未解故邪欲出而不得出是以促急也熱氣逆於肺則喘熱氣蒸於肌腠則汗出此太陽陽明協熱下利之證故用葛根黃連黃芩湯治之與上二節用葛根湯以治寒者不同讀者正須互勘葛根黃芩黃連湯方葛根半斤甘草二兩炙黃芩三兩黃連三兩上四味以水八升先煮葛根減二升納諸藥煮取二升去滓分溫再服蔚按太陽桂枝證而反下之邪由肌腠而內陷於中土故下利不止脈促與喘汗者內陷之邪欲從肌腠外出而不能出涌於脈道如疾行而蹶為脈促涌於華蓋肺主氣而上喘肺主皮毛而汗出方主葛根從裏以達於表從下以騰於上輔以芩連之苦苦以堅之堅毛竅而止汗堅腸胃以止瀉又輔以甘草之甘妙得苦甘相合與人參同味而同功所以補中土而調脈道真神方也許宏方議云此方亦能治陽明火熱下利者又能治嗜酒之人熱喘者取用不窮也蔚按金桂峰之女患痢身熱如焚法在不治余斷其身熱為表邪用人參敗毒散繼服此方全愈信長沙方之取用益不窮也太陽病頭痛發熱身疼腰痛骨節疼痛惡風無汗而喘者麻黃湯主之太陽在肌之病言之詳矣茲請專言其在表太陽病頭痛發熱固不待言而身疼病在太陽之氣也經云太陽主周身之氣是也其腰痛者病在太陽之經也經云太陽之經挾脊抵腰是也經氣俱病即骨節亦牽連而疼痛病從風得故惡風邪傷膚表則膚表實而無汗邪不得汗而出則內壅於肺而喘者不可用解肌之桂枝湯必以發表之麻黃湯主之此一節言太陽病在膚表之治法也張令韶云自此以下三節俱論太陽之氣在表為麻黃湯證也柯韻伯曰麻黃八證頭痛發熱惡風同桂枝證無汗身疼同大青龍證本證重在發熱身疼無汗而喘又曰本條不冠傷寒又不言惡寒而言惡風先輩言麻黃湯主治傷寒不治中風似非確論蓋麻黃湯大青龍湯治中風之重劑桂枝湯葛根湯治中風之輕劑傷寒可通用之非主治傷寒之劑也補曰淺註言宜發膚表之汗不可用解肌之桂枝湯而麻黃湯中又用桂枝何也且骨節痛是邪已犯骨節不止在皮毛矣又喘者是邪已入肺上壅喉鼻亦不止在皮毛矣何以但發皮毛之汗而各證即愈哉蓋太陽膀胱中所化之氣由氣海行氣街循油膜上胸膈入於肺出之於鼻為呼出氣膀胱所化之氣又有從內油膜透出肌肉達於皮毛者為衛外之氣今人但知口鼻出氣而不知周身毛竅無不出氣鼻氣一出則周身毛竅皆張鼻氣一入則周身毛竅皆斂若毛竅之氣不得外出則反入於內壅塞於肺上出口鼻而為喘寒傷皮毛衛氣不外出是以返於內而上壅為喘治法但將皮毛發散使氣外泄不壅於內則喘自止皮毛內是肌肉寒傷皮毛不能禁之使不內犯也周身疼痛是邪兼犯肌肉血脈受傷故痛頭項腰痛又是邪兼犯太陽之經脈至於骨節疼痛則邪兼入筋內經云諸筋皆屬於節故骨節疼是邪犯於筋蓋人身皮內為肥肉名曰肌肥肉內夾縫中有紋理名曰腠理又內為瘦肉瘦肉兩頭即生筋筋與瘦肉為一體皆附骨之物也邪犯瘦肉則入筋而骨節疼瘦肉之膜即連於內膜膈而歸屬於肝今因邪在皮毛而兼犯肌肉兼犯筋節並內壅而為喘故用甘草以助胃氣使外達肌肉用杏仁利肺降氣使不內壅則氣散於外而出皮毛矣用桂枝從肝之血分外達筋節宣之使出惟麻黃直走皮毛使各藥內托之性透毛竅而為汗則邪不能留是但發其表而由內及外層層清徹矣若從以發表二字囫圇言之則於方證未能了晰此說參用西醫而與內經恰合麻黃湯方麻黃三兩桂枝三兩去皮甘草一兩炙杏仁七十個去皮尖上四味以水九升先煮麻黃減二升去上沫納諸藥煮取二升半去滓溫服八合覆取微似汗不須啜粥餘如桂枝法將息蔚按以上俱言桂枝證至此方乃麻黃證也方下所列各證皆兼經氣而言何謂經內經云太陽之脈上連風府上頭項挾脊抵腰至足循身之背是也何謂氣內經云太陽之上寒氣主之又云三焦膀胱者腠理毫毛其應是太陽之氣主周身之表而主外也桂枝證病在肌腠肌腠實則膚表虛故以自汗為提綱此證病在膚表邪在膚表則膚表實故以無汗為提綱無汗則表氣不通故喘痛而曰疼痛之甚也此經與氣並傷視桂枝證較重故以麻黃大開皮毛為君以杏仁利氣甘草和中桂枝從肌以達表為輔佐覆取似汗而不啜粥恐其逗留麻黃之性發汗太過也補曰此解尚妥惟引三焦膀胱者腠理皮毛其應而不分出腠理是三焦之應蓋不知三焦是內膜膈西醫名為連網從內膜透出於外在皮肉之夾縫中有紋理為腠理即人皮內之膜也是皮毛主衛氣為膀胱之應而腠理乃三焦之應也宋元後醫不知三焦是以陳註混引而不能分晰也太陽與陽明合病喘而胸滿者不可下宜麻黃湯肌肉即陽明所司太陽之邪在肌肉即與陽明合若久不解則由肌肉而入胃為胃家實可下之矣若但見胸滿則胃家尚未實也胸前膈膜乃太陽之氣從出之路道今邪在胸膈而滿太陽之氣不得外出於皮毛而壅於胸膈求通不得則迫而為喘也但當用麻黃湯透達太陽之氣使之外出則愈斷不可下之恐正氣抑而不出也蓋胃實是下證胸滿而不在胃管中只在膈膜中是小柴胡證本當用柴胡以透其膜而此不用柴胡竟用麻黃者以其見喘證是太陽之氣自欲出而不得責不在膜膈之滯只在太陽氣分也故不用柴胡只用麻黃以達太陽之氣太陽病十日以去脈浮細而嗜臥者外已解也設胸滿脅痛者與小柴胡湯脈但浮者與麻黃湯太陽病頭項強痛等證五日少陰至十日已去為十一日正值少陰主氣之期其脈浮為太陽細為少陰而嗜臥者太陽少陰之氣兩相和合故知其外已解也設令胸滿脅痛者太陽之氣欲從胸脅而出不得少陰之樞轉也蓋少陰為陰樞少陽為陽樞惟小柴胡胡湯能轉其樞茲與以小柴胡湯藥證若對即立效若脈但浮而不細者是太陽之氣自不能外出非關樞也與麻黃湯以達表此言太少陰陽之氣表裏相通而太陽又得少陰之樞以為出入也張令韶云此以上三節皆用麻黃湯而所主各有不同也首節言太陽之氣在表宜麻黃湯以散在表之邪次節言太陽之氣合陽明而在胸宜麻黃湯以通在胸之氣此節言太陽之氣自不能外出不涉少陰之樞亦宜麻黃湯導之出外也張隱庵印宗云此節言陽病遇陰陰病遇陽陰陽和而自愈非表病變陰陽病而得陰脈之謂讀論者當知陰陽之道變通無窮幸勿膠柱庶為得之正曰註外已解是陰陽和而自愈非也仲景只是言太陽在表之病已解卻又見出脈細嗜臥則是病及少陰元陽不得外出之象雖浮脈原主表病然又見細脈與嗜臥之症雖浮亦非外證乃外已解也教人要認識少陰裏證不得用麻黃湯矣當用附子細辛湯治之始與脈細嗜臥陽不得出之治法相合仲景於此未言其方亦以見少陰篇中此處不煩重出但用外已解也四字喚醒醫人教其治少陰不得仍用太陽之麻黃湯矣其下又插一筆曰設脈細嗜臥而又兼見胸脅滿痛者則又是三焦膜膈之過蓋腎陽化氣從氣海循膜膈而上出於外今見胸脅膜膈痛滿則知腎氣所以不得出因三焦之膜膈不暢也故與小柴胡湯疏達膜膈則腎陽得出而嗜臥與脈細皆治矣此下又繳轉曰若但脈浮而不細則雖見嗜臥而卻非少陰證雖見胸脅滿而卻不用柴胡湯蓋脈必兼細乃為外已解故為少陰證借用少陰方皆所以治其裏也今脈不細而但浮者仍是太陽之表外未解也不得治裏仍用麻黃湯以解其表表解而少陽之樞自達少陰之氣自出矣仲景文法剝換讀者當細玩太陽中風脈浮緊發熱惡寒身疼痛不汗出而煩躁者大青龍湯主之若脈微弱汗出惡風者不可服之服之則厥逆筋惕肉瞤此為逆也麻黃證桂枝證外又有大小青龍之證不可不知請先言大青龍之證太陽中風脈浮浮為邪在於肌而表虛表虛本有欲汗之勢此則浮中兼緊緊為邪在於表而表實表實而仍不得汗是肌與表兼病也發熱為太陽標病惡寒為太陽本病是標與本俱病也太陽之氣主周身之毫毛太陽之經連風府上頭項挾脊抵腰至足今一身皆疼痛是經與氣併病也而且不得汗出則邪熱無從外出而內擾不安為煩躁者是煩躁不由不汗出所致與少陰煩躁不同以大青龍湯之發表清裏主之若脈微弱微為水象微而兼弱病在坎中之陽少陰證也少陰證原但厥無汗今汗出而惡風者雖有煩躁證乃少陰亡陽之象全非汗不出而鬱熱內擾者比斷斷其不可服若誤服之則陽亡於外而厥逆陽亡於內而筋惕肉瞤此為逆也按此句下以真武湯救之方喻各本皆然意者仲師當日不能必用法者盡如其法故更立真武一湯救之特為大青龍對峙見一則救不汗出之煩躁興雲致雨為亢者設一則救汗不收之煩躁燠土制水為陰盛者設煩躁一證陰陽互關不可不辨及毫釐此一節言大青龍湯為中風不汗出而煩躁者之主方也張令韶云合下四節論大小青龍功用之不同大青龍湯方麻黃六兩去節桂枝二兩去皮甘草二兩炙杏仁五十個去皮尖生薑三兩切大棗十二枚擘石膏如雞子大碎上七味以水九升先煮麻黃減二升去上沫納諸藥煮取三升去滓溫服一升取微似汗汗出多者溫粉撲之一服汗者停後服汗多亡陽遂虛惡風煩躁不得眠也蔚按太陽底面便是少陰少陰證本無汗而煩躁證少陰與太陽俱有之若太陽中風脈浮為肌病有欲汗之勢緊為表實仍不得有汗是肌與表兼病也發熱為太陽之標病惡寒為太陽之本病是標與本俱病也太陽之氣主周身之毫毛太陽之經挾脊抵腰身疼痛是經與氣併病也風為陽邪病甚而汗不出陽邪內擾不可認為少陰之煩躁以致議溫有四逆湯議寒有黃連阿膠湯之誤只用麻黃湯以發表桂枝湯以解肌而標本經氣之治法俱在其中去芍藥者惡其苦降恐引邪入陷少陰也加石膏者取其質重性寒紋理似肌辛甘發散能使汗為熱隔之證透達而解如龍能行雲而致雨也更妙在倍用麻黃挾石膏之寒盡行於外而發汗不留於內而寒中方之所以入神也下節言脈即不緊而緩身即不疼而但重且有輕時雖不若上節之甚而無汗與煩躁審非少陰證亦可以此湯發之論云無少陰證者此者字承上節不汗出而煩躁言也傷寒脈浮緩身不疼但重乍有輕時無少陰證者大青龍湯發之大青龍湯為少陰證之大禁茍無少陰證者不特中風之重者用之即傷寒之輕者亦可用傷寒脈不浮緊而浮緩身不覺其疼而但覺其重而且重不常重亦乍有輕之時似可以無用大青龍之大劑矣然不汗出而煩躁為大青龍之證茍非大發其汗則內熱無可宣泄其煩躁亦何自而安乎醫者必審其不汗出非少陰之但厥無汗煩躁非少陰水火之氣相離審證既確亦可以自信而直斷之曰此無少陰證者以大青龍湯發之此一節言傷寒之輕證亦有用大青龍法點出無少陰證者五字以補出上節之大主腦也者字承上節不汗出而煩躁言上節云主之以內外之熱交盛此方主其中而分解之此節云發之者外邪雖閉而內之煩躁未甚但發其外而內自解也柯韻伯曰中風輕者微煩重者煩躁傷寒輕者煩躁重者必嘔逆矣又曰脈浮緊者身必疼浮緩者身不疼中風傷寒皆然又可謂之定脈定證矣傷寒表不解心下有水氣乾嘔發熱而咳或渴或利或噎或小便不利少腹滿或喘者小青龍湯主之又有傷寒表之寒邪不解而動裏之水氣遂覺心下有水氣蓋太陽主寒水之氣行於皮膚出入於心胸今不能運行出入以致寒水之氣泛溢而無所底止水停於胃則乾嘔水氣與寒邪留戀而不解故發熱肺主皮毛水氣合之則發熱而咳是發熱而咳為心下有水氣之陰證然水性之變動不居不得不於未然之時先作或然之想或水蓄而正津不行則為渴或水漬入腸間則為利或逆之於上則為噎或留而不行則為小便不利少腹滿或如麻黃證之喘而兼證處顯出水證則為水氣之喘者以上諸證不必悉具但見一二證即是也以小青龍湯主之此節言寒傷太陽之表而動其裏之水氣也本方散心下之水氣藉麻黃之大力領諸藥之氣布於上運於下達於四旁內行於州都外行於元府誠有左宜右有之妙小青龍湯方麻黃三兩去節芍藥三兩五味子半升乾薑三兩甘草三兩炙細辛三兩桂枝三兩半夏半升湯洗上八味以水一斗先煮麻黃減二升去上沫納諸藥煮取三升去滓溫服一升蔚按此寒傷太陽之表而不解動其裏水也麻桂從太陽以祛表邪細辛入少陰而行裏水乾薑散胸前之滿半夏降上逆之氣合五味之酸芍藥之苦取酸苦涌泄而下行既欲下行而仍用甘草以緩之者令藥性不暴則藥力周到能入邪氣水飲互結之處而攻之凡無形之邪氣從肌表出有形之水飲從水道出而邪氣水飲一並廓清矣喻嘉言云方名小青龍者取其翻波逐浪以歸江海不欲其興雲升天而為淫雨之意若泥麻黃過散減去不用則不成其為龍將何恃以翻波逐浪乎傷寒心下有水氣咳有微喘發熱不渴服湯已渴者此寒去欲解也小青龍湯主之且夫寒水之氣太陽所專司運行於膚表出入於胸膈有氣而無形茍人傷於寒則不能運行出入停於心下病無形之寒水化而為有形之水氣水寒傷肺而氣上逆則為咳而微喘病在太陽之表則現出標陽而發熱然水寒已甚標陽不能勝之雖發熱而仍不渴審證既確而以小青龍湯與服服湯已而渴者此寒去欲解而水猶未解也仍以小青龍湯主之再散其水氣而愈此一節承上節以重申水氣之義補曰小青龍是寒動其水之證太陽之上寒氣治之是寒水為太陽之本氣故表寒不解則內動水氣遂為停飲作咳小青龍所以用薑辛以驅寒也大青龍是寒閉其熱太陽膀胱水中化氣上行外達為衛外之陽故稱太陽是其本寒而其標熱也內經謂太陽少陰從本從標謂其標陽亦能主事故陽不外達鬱於內為熱則發煩躁大青龍所以用石膏以清熱也熱與火不同吾於總論已詳之大青龍證所以煩躁是太陽標熱內遏之所致與少陰心原不相涉然膀胱水中之陽化氣上行實借腎命門之陽氣化之上合於心如天之有日故少陰之本氣為熱內經所謂少陰之上熱氣治之也今太陽之標陽內鬱則同氣相求合心而為煩躁以熱就熱也石膏秉水陰之氣故能清熱知太陽傷寒能動水能遏熱則以下變證皆從此兩途而生其理皆可推求矣傷寒論淺註補正卷一中辨太陽病脈證篇太陽病外證未解脈浮弱者當以汗解宜桂枝湯辨太陽病脈證篇在表在外病各不同麻黃桂枝湯亦各判請匯集而參觀之太陽之病皮膚為表肌腠為外外證未解肌中之氣為邪所傷其脈因見浮弱者當以甘溫之藥資助肌腠之氣血從汗而解宜桂枝湯此一節言桂枝湯為解外之劑也張令韶曰自此以下十五節言病有在表在外之不同湯有麻黃桂枝之各異也柯韻伯曰桂枝溫能散寒甘能益氣生血辛能發散外邪故麻葛青龍凡發汗劑咸用之惟桂枝湯不可用麻黃而麻黃湯不可無桂枝也何也桂枝為汗藥中衝和之品若邪在皮毛則皮毛實而無汗故主麻黃以直達之令無汗者有汗而解若邪在肌肉則肌肉實而皮毛反虛而自汗故不主麻黃之徑走於表止佐以薑棗甘芍調和氣血從肌肉而出皮毛令有汗者復汗而解二方之不同如此今人不知二方之旨以桂枝湯治中風以麻黃湯治傷寒失之遠矣太陽病下之微喘者表未解故也桂枝加厚朴杏子湯主之在表之邪未解尚見太陽頭項強痛等病醫者誤下之猶幸裏氣未奪反上逆與表邪交錯於胸中而為微喘者表未解故也蓋肌也表也氣原相通邪從表而入肌亦從肌而出表故仍用桂枝加厚朴杏仁湯主之蓋杏仁降氣厚朴寬胸方中加此二味令表邪交錯者從肌腠出於皮毛而解矣按時人往往於肌表二字認不清所以終身憒憒此一節言表邪未解者不可下若誤下之仍宜用桂枝加味令其從肌以出表陽病有在表在外之不同以皮膚為表肌腠為外也太陽表病未解而下之氣不因下而內陷仍在於表不能宣發而微喘用桂枝湯從肌而托之於表加厚朴以寬之杏仁以降之表解而喘平矣與太陽病下之後其氣上衝者可與桂枝參看太陽病外證未解不可下也下之為逆欲解外者宜桂枝湯在外之邪未解尚見太陽頭項強痛等病須知其為外證未解者不可下也下之為治之逆欲解外者宜桂枝湯主之此一節言誤下後還用桂枝湯救外證之逆次男元犀按桂枝湯本為解肌誤下後邪未陷者仍用此方若已陷者當審何逆從其變而治之然則外證未解救誤如此而內證未除者誤之當何如師故舉一隅以示人焉太陽病先發汗不解而復下之脈浮者不愈浮為在外而反下之故令不愈今脈浮故在外當須解外則愈宜桂枝湯未汗而遽下之既以桂枝湯為救誤之法先汗而復下之亦藉桂枝湯為補救之資太陽病先以麻黃湯發汗既汗而猶不解正宜以桂枝湯繼之而竟不用桂枝湯而復下之此粗工泥守先汗後下之法不知脈理故也脈浮者不愈浮為在外而反下之故令不愈今脈浮故知在外當須解外則愈宜桂枝湯主之此一節言先汗後下察其脈浮病不解者仍宜用桂枝湯以解外也言外見麻黃湯後繼以桂枝湯為正法也太陽病脈浮緊無汗發熱身疼痛八九日不解表證仍在此當發其汗服藥已微除其人發煩目瞑劇者必衄衄乃解所以然者陽氣重故也麻黃湯主之再以表病用麻黃湯之法而言太陽病脈浮緊是麻黃證的脈無汗發熱身疼痛是麻黃湯的證醫者不知用麻黃湯至八日當陽明主氣之期九日當少陽主氣之期不解表證仍在此雖為日已久還當發其汗麻黃湯主之若服前藥已只見表邪得汗而出微除而三陽之陽熱內盛陽盛則陰虛故其人陽盛而發煩陰虛而目瞑劇者必逼血上行而為衄衄出而經絡之熱隨衄乃解所以然者以太陽主巨陽之氣陽明主悍熱之氣少陽主相火之氣三陽合並而為熱陽氣重故也麻黃湯主之此一節言病在太陽得陽明少陽之氣化合並為熱之治法也但言發熱不言惡寒者主太陽之標而言也太陽病脈浮緊發熱身無汗自衄者愈三陽氣盛汗之而不解者既可使其從衄血解矣而太陽本經之熱亦自有衄而解之證太陽病脈浮緊發熱身無汗不因發汗而其熱自能從衄而解者其病比上條三陽合併稍輕而易愈蓋血之與汗異名同類不得汗必得血不從汗解而從衄解此與熱結膀胱血自下者同一局也此一節言不因三陽之氣盛不用麻黃之發汗而太陽標陽之熱若得衄則無不解矣男蔚按發熱無汗則熱鬱於內熱極絡傷陰絡傷血並衝任而出則為吐血陽絡傷血並督脈而出則為衄血此督脈與太陽同起目內眥循膂絡腎太陽之標熱借督脈作衄為出路而解也正曰汗與血異名同類此說稍差汗色白血色赤汗質輕清血質重濁汗是衛氣血是營血何得混言同類蓋從汗解者是使營分之邪皆借衛氣外泄而為汗汗者水也氣乃水之所化故口鼻之氣著於漆石之上皆復化而為水膀胱之陽化水為氣直出者上口鼻橫出者透內膜達肌肉而發於皮毛則為汗汗者衛氣復化之水也屬之氣分何得與血同類哉血者營分之陰汁營生於心出包絡屬於肝循內網油得小腸之氣導之下行則入血室與膀胱相連故熱結膀胱有血自下之證此下行之血也其上行外達之血亦隨小腸之氣布達於外透腔子穿瘦肉達腠理至肌肉為衛之守是名營血邪氣久留營分則血為邪擾血有餘而循經外溢則邪隨血泄得衄而解衄之與汗一是從營分解一是從衛分解何得混而同之哉又曰今人論太陽經證但知膀胱而遺卻小腸不知膀胱主氣小腸主血內經言膀胱氣化則能出言小腸化物出焉即指化液為血以外出也是小腸亦有功用豈得指為呆管一條哉二陽併病太陽初得病時發其汗汗先出不徹因轉屬陽明續自微汗出不惡寒若太陽病證不罷者不可下下之為逆如此可小發汗設面色緣緣正赤者陽氣怫鬱在表當解之熏之若發汗不徹不足言陽氣怫鬱不得越當汗不汗其人躁煩不知痛處乍在腹中乍在四肢按之不可得其人短氣但坐以汗出不徹故也更發汗則愈何以知汗出不徹以脈澀故知也二陽併病緣太陽初得病時當發其汗汗先出不通徹因轉屬陽明故謂之併病夫既屬陽明則水穀之汗相續不絕肌表中時自見其微汗出若果不惡寒則太陽之證罷可以議下矣若太陽惡寒之病證不罷者不可下下之為治之逆必須發汗為治之順如此當知有小發汗更發汗二法可小發汗為偏於陽明在經之證設面色緣緣正赤者即面色有熱色之象為陽明之氣怫鬱在表當以小發汗之劑解之解之而不盡者仍以藥氣熏之中病則已若太陽經氣俱病之重證發汗不徹不足言僅為陽氣怫鬱不得越緣前此當發太陽之汗而不汗熱邪無從外出其人內擾不安而煩躁此煩躁由於不汗所致與大青龍證之煩躁同例邪無定位不知痛處腹中四肢皆陽明之所主太陽之病邪併之或乍在腹中或乍在四肢按之不可得其定位呼出為陽吸入為陰陰陽之氣不相交故其人短氣然其人所以短氣者但坐以汗出不徹以致陰陽之氣不交出入不利故也更發其汗則愈何以知汗出不徹以脈滯澀不流利故知其汗液不通也此一節言太陽之病併於陽明也龐安常擬補麻黃湯喻嘉言擬桂枝加葛根湯二方俱隔靴搔癢正曰此一條要分作兩段解上段言皮毛不開則閉鬱其陽明之氣故面色正赤當解之熏之此為上段其下若發汗不徹至末是指周身膜腠內有停汗不出為氣為飲之病陳註仍執定陽明解之所以不確短氣非陽明證通查仲景書無陽明證言短氣者也蓋第二段是言若非陽明併病而止是太陽經發汗不徹則無面色緣緣正赤之形是不足言為陽氣不得越也此數句是文法剝換處將上段撇去以下乃言此是太陽經病本當汗出使衛氣外散而解今因當汗不汗則衛氣與邪停於膜腠之中內膜通於包絡汗當外出而內犯則煩躁外膜即周身之腠理故周身不知痛處乍在腹中是併入內膜也乍在四肢是游走外膜而併於四肢也按之不可得是在膜腠中往來無定也人身膜腠內外上下貫徹無遺故在膜腠中乃有此象此是何物在膜腠中只是汗留於內汗者衛陽發於膀胱中乃水所化之氣此氣不出則停而為飲凡有飲者皆短氣故其人短氣但坐而不得臥臥則氣更逆與咳逆倚息不得臥同例所以然者總由汗出不徹故停為飲更發其汗則愈合觀此條上一段是陽明有熱鬱於肌肉中下一段是少陽膜腠內有水氣游移不定一是不汗而閉其火一是留滯為水讀者正當分辨脈浮數者法當汗出而愈若下之身重心悸者不可發汗當自汗出乃解所以然者尺中脈微此裏虛須表裏實津液自和便自汗出愈病出汗不徹且有小發更發之法況其為應汗不汗乎然亦有法雖當汗而獨取尺脈為憑為法外之法脈浮數者必發熱法當汗出而愈者若下之雖幸其邪尚未陷而無如氣被傷而身重血被傷而心悸者蓋衛氣榮血外循行於經絡之間而肺衛心榮內取資乎水穀之氣今下後陽明水穀之氣不充不可發汗當聽其自汗出乃解所以然者尺中脈微尺為陰而主裏此裏陰之虛慎勿亂藥惟糜粥自養漸復胃陰又依內經之說月廓滿則氣血實肌肉內堅預告病人勿幸速效須俟穀氣充天時旺則表裏之氣實而津液自和便自汗出而愈此法外之法也此一節言汗乃血液血液少者不可汗也正曰苓桂朮甘證建中湯證真武湯證均有心悸均指水飲內犯修園所素知也獨此解為心血被傷與他處不合又解尺中脈微為胃陰不足必俟穀氣充尺脈旺此說亦非尺脈不診穀氣平人穀氣充者尺脈亦不盡旺且微脈是陽氣微非陰液虛也修園常言細為血虛微為氣虛何以此處自相矛盾只緣不解自汗出乃愈之義是以混誤蓋此節言當汗反下之則傷其衛陽而內動水氣故心下悸水上克其火也是下傷腎陽不能化水所致若再用麻黃湯發其汗則陽愈泄恐變為厥逆肉瞤等證所以然者因尺脈微是誤下傷其腎陽故不可復以汗泄之亦如大青龍湯之脈微弱不可服同一例也蓋太陽為表少陰即為其裏此是少陰裏氣被下而虛腎陽不能化氣安可復泄其陽以發汗哉須扶少陰之裏氣助太陽之表氣使陽津外達陰液內充則自然汗解如用桂枝加附子湯等法是也原文云當自汗須表裏實一當字內中明有方治使之自汗明明與不可發汗相對以見不可用麻黃湯耳蓋此數節皆是為麻黃湯發議陳註不知此意而又解為血液少誤矣脈浮緊者法當身疼痛宜以汗解之假令尺中遲者不可發汗何以知然以榮氣不足血少故也由此法而推之脈浮數之外更有脈浮緊之證脈浮緊者法當身疼痛宜以麻黃湯發汗解之假令尺中遲者不可發汗何以知之然以榮者水穀之精氣也和調於五臟灑陳於六腑乃能入之於脈今尺中遲乃知中焦之榮氣不足血液虛少不能入於脈故也前云脈浮數因誤治而虛其陰尚可勿藥俟其自愈今則浮緊之脈不易出汗陰氣本虛不因誤治所致又不能俟其自復而作汗若云先補後散補散兼用更為妄語吾觀虛人於未病時服人參地黃等藥無數尚且未見大效豈邪盛無汗之際得之即能補虛而不助邪乎是必無之理也當於本原處而求其治則得矣此一節承上節而續言脈浮緊之證以見血液少者不可發汗言外見雖發之而亦不能作汗也正曰以勿藥俟愈解上節有誤而此節又將尺中遲連浮緊解謂脈浮緊者不易出汗而尺中遲又為陰氣本虛此不知寸關尺止一條脈遲則均遲安有寸關浮緊不遲而尺中獨遲者哉仲景凡三部分言者必曰寸口關上若何尺中若何今其文法明以假令二字別於上文謂假令脈不浮緊而尺中遲者則不可汗舉尺中遲者則知其三部皆遲也蓋脈之動必由尺而及於關寸舉尺中則關寸可知矣脈者血脈西洋醫言心有左右房左為出血管右為回血管人心跳動不休心一跳動則血管隨之而動西醫所謂管即中國所謂脈也心火有餘則血多而其動速心火不足則血少而其動遲故遲為血虛若上節之脈微是跳動輕微微為氣虛非血虛也氣附脈行氣虛不能鼓蕩是以跳動輕微蓋脈凡遲凡數皆責在脈管故無尺寸之異凡微凡浮沉皆責之於氣非脈管中事也故無尺寸之異修園於上下兩節遲微兩脈皆解為血虛誤也仲景文法移步換形剖悉極精讀者幸勿囫圇吞棗脈浮者病在表可發汗宜麻黃湯脈浮而數者可發汗宜麻黃湯二者於尺中之脈既知其不可即便知其可矣凡脈浮而緊其尺中不遲者病在表而榮不虛也可以發汗宜麻黃湯徑發之不必他慮也脈浮而數其尺中不微者為裏不虛也可以發汗宜麻黃湯徑發之又不必他慮也此一節承上文兩節之意而申言之病常自汗出者此為榮氣和榮氣和者外不諧以衛氣不共榮氣諧和故爾以榮行脈中衛行脈外復發其汗榮衛和則愈宜桂枝湯上言榮言裏而診於尺中者以榮為陰也榮陰而衛陽和合而循行於肌表今請再言衛氣病人常自汗出者此為榮氣本和然榮氣和者而竟有常自汗之證奈何蓋因衛外之衛氣不諧以衛氣之虛不能共榮氣和諧故爾蓋衛為陽榮為陰陰陽貴乎和合今榮自和而衛不能與之和諧以致榮自行脈中衛自行於脈外兩不相合如夫婦之不調治者當乘其汗正出時與桂枝湯啜粥是陽不足者溫之以氣食入於陰氣長於陽既汗復發其汗則陽氣振作榮衛因之以和則汗不復出而愈宜桂枝湯此一節因上文榮氣不足而復及於衛氣也補曰成無已風傷衛寒傷營之說本此不知仲景並未分風寒只論營衛蓋此是營衛自病不因外邪也若傷寒中風之自汗則是邪在營分而衛不與偕與此方治法雖同而其理各別病人臟無他病時發熱自汗出而不愈者此衛氣不和也先其時發汗則愈宜桂枝湯病人藏府無他病惟有定時發熱因有定時自汗出每熱則汗出與無熱而常自汗出者不同而推其所以不愈者即內經所謂陰虛者陽必湊之故少氣時熱而汗出此衛氣因陽熱之湊而不和也治者先於其未發熱之時發其汗欲從汗以泄其陽熱並以啜粥遵內經精勝而邪卻之旨則愈宜桂枝湯主之上節言衛氣不和乃衛氣不與榮氣相和此節言衛氣不和乃衛氣之自不和也張令韶云此二節言桂枝湯能和榮衛而發汗亦能和榮衛而止汗也柯韻伯云一屬陽虛一屬陰虛皆令自汗但以無熱有熱別之以常汗出時汗出辨之總以桂枝湯啜熱粥汗之傷寒脈浮緊不發汗因致衄者麻黃湯主之前言邪從衄解一在八九日三陽熱盛服麻黃湯之後而解也一在太陽本經熱盛亦有不服麻黃湯可以自衄而解也然二者皆於衄後而解亦有衄後而不解者不可不知傷寒脈浮緊不發汗因致衄者其衄點滴不成流雖衄而表邪未解仍以麻黃湯主之俾元府通衄乃止不得以衄家不可發汗為辭謂汗後有額上陷脈緊目直視不能眴不得眠之變也然彼為虛脫此為盛盈彼此判然且衄家是素衄之家為內因致衄此是有因而致為外因此一節又補言衄後邪不解之證也然邪解而脈微邪不解而脈浮以此為辨傷寒不大便六七日頭痛有熱者與承氣湯其小便清一云大便清者知不在裏仍在表也當須發汗若頭痛者必衄宜桂枝湯以上兩言得衄而解又言得衄而仍不解大旨以汗之與血異名同類不從汗解必從血解既衄而不成衄者又當從汗而解之言之詳矣然衄證又當以頭痛為提綱以頭為諸陽之會督脈與太陽同起於目內眥邪熱盛則越於督脈而為衄也然頭痛病在上也而察其病機則在於下一曰大便一曰小便若傷寒不大便六日為經之氣已周七日又值太陽主氣之期頭痛有熱者熱盛於裏而上乘於頭與承氣湯上承熱氣於下以泄其裏熱其頭痛有熱而小便清者知熱不在裏仍在表也當須發汗以麻黃湯泄其表熱此一表一裏之證見俱見頭痛若頭痛不已者勢必逼血上行而為衄此可於未衄之前以頭痛而預定之也然猶有言之未盡者病在表者固宜麻黃湯至於病在肌腠其邪熱從肌腠而入經絡頭痛亦必作衄宜以桂枝湯於未衄之前而解之此一節以頭痛者必衄五字為主而言在裏在表在經之不同欲學者一隅而三反也總而言之桂枝與麻黃功用甚廣而桂枝湯更有泛應曲當之妙傷寒發汗已解半日許復煩脈浮數者可更發汗宜桂枝湯傷寒服麻黃湯以發汗服後汗出身涼為表邪已解至半日許復發熱而煩是表邪解而肌邪未解也又診其脈不見桂枝之浮弱仍見麻黃證之浮數者知非麻黃證未罷乃肌腠之邪不解動君火之氣而為煩所致麻黃湯不可治煩可更易麻黃湯之竣而用啜粥調和之法以發其汗宜桂枝湯主之解肌以止煩此一節總結十五節病有在表在外之不同湯有麻黃桂枝之各異而申言桂枝之用更宏也柯韻伯云桂枝湯本治煩服後外熱不解而內熱更甚故曰反煩麻黃證本不煩服湯汗出熱初解而內熱又發故曰復煩凡曰麻黃湯主之者定法也服桂枝湯不解仍與桂枝湯汗解後復發煩更用桂枝湯活法也服麻黃湯復煩可更用桂枝服桂枝湯復煩者不得更用麻黃且麻黃脈證但桂枝湯可用更汗不可先用桂枝湯發汗此又活法中定法矣凡病若發汗若吐若下若亡血亡津液陰陽自和者必自愈汗吐下三者攻邪之法也凡病若發汗若吐若下用之得當則邪去而病已若汗吐下用之太過為亡津液而且有亡陽之患雖其汗吐下之證仍在不可復行汗吐下之法姑慢服藥俟其陰陽之氣自和者邪氣亦退必自愈此一節言汗吐下三法不可誤用張令韶云以下十三節皆所以發明首節之義以見汗吐下之不可誤施有如此也大下之後復發汗小便不利者亡津液也勿治之得小便利必自愈大下之後復發汗以致小便不利者亡津液故也勿用利小便之藥治之姑俟其津回得小便利則陰陽和而表裏之證必皆自愈此一節言汗下逆施重亡津液也下之後復發汗必振寒脈微細所以然者以內外俱虛故也下之後復發汗則氣虛於外不能熏膚充身故必振寒血虛於內不能榮行經脈故脈微細所以然者以誤施汗下內外氣血俱虛故也此一節言汗下後不特亡津液並亡其內外之陰陽氣血也男元犀按此言倒施下汗之誤病在外當汗解而反下之傷陰液於內故脈微細復發汗又虛陽氣於外故身振寒此為內外俱虛陰陽將竭視上節病較重補曰振寒二字振是振戰凡老人手多戰動皆是血不養筋之故此因下後傷陰血血不養筋則筋強急若不惡寒則無所觸發筋雖強急亦不振動茲因復發其汗傷其陽氣氣虛生寒是以發寒而振惟其氣虛則脈應而微微者氣不能鼓出故脈之動輕惟其血虛則脈應之而細細者血管中血少故縮而窄小所以然者內被下而血虛外被汗而氣虛之故也仲景文法字字承接一絲不亂讀此節可悟仲景全部文法此與苓桂朮甘真武證之振振皆同惟彼單論水寒此兼論血氣義自有別下之後復發汗晝日煩躁不得眠夜而安靜不嘔不渴無表證脈沉微身無大熱者乾薑附子湯主之下之後復發汗亡其陽氣晝日為陽陽虛欲援同氣之救助而不可得故煩躁不得眠夜為陰陰盛則相安於陰分而安靜其於不嘔不渴知其非傳裏之熱邪其於無表證知非表不解之煩躁也脈沉微氣虛於裏也身無大熱者陽虛於表也此際不急復其陽則陽氣先絕而不可救以乾薑附子湯主之此一節言汗下之後亡其陽氣也補曰仲景辨證皆是同中辨似此節煩躁不得眠與陽甚煩躁無異必辨其夜而安靜不嘔不渴無表證身無大熱方可斷為亡陽然使其脈不沉微則恐是外寒內熱之煩躁尚未可斷為亡陽也必視其脈沉微乃為陽虛之極仲景全書辨證之細皆如此類讀者逐句當審其詞氣之輕重也乾薑附子湯方乾薑一兩附子二枚生用去皮擘破八片上二味以水三升煮取一升去滓頓服蔚按太陽底面便是少陰太陽證誤下之則少陰之陽既虛又發其汗則一線之陽難以自主陽主於晝陽虛難以自主欲援同氣之救助而不可得故煩躁不得眠陰主於夜陽虛必俯首不敢爭故夜則安靜又申之曰不嘔不渴脈沉微無表證身無大熱辨其煩躁之絕非外邪而為少陰陽虛之的證也證既的則以回陽之薑附頓服何疑發汗後身疼痛脈沉遲者桂枝加芍藥生薑各一兩人參三兩新加湯主之發汗後邪已凈矣而身猶疼痛為血虛無以榮身且其脈沉遲者沉則不浮不浮則非表邪矣遲則不數緊不數緊則非表邪之疼痛矣桂枝加芍藥生薑各一兩人參三兩新加湯主之俾血運則痛愈此一節言汗後亡其陰血也補曰仲景脈法散見各條須加鉤考乃能會通有如此處論脈曰微細曰沉微曰沉遲粗工遇此不過一虛字了之而仲景則大有分別故於脈微細者自註曰內外俱虛故也以見內之血虛故脈細外之陽氣虛故脈微至下兩節一則曰沉微申之曰身無大熱者蓋熱屬氣分無熱則氣虛氣虛不能鼓動故脈微所以主用附子補腎與膀胱之氣也一則曰沉遲而先敘其身疼痛蓋痛屬血分血生於心由心營出而散為脈故脈經言脈為血府內經言食氣入胃濁氣歸心淫精於脈脈氣流經西洋醫法言心體跳動不休故脈應之而動與內經心生血及脈為血府之說皆合醫林改錯言血不能跳動凡脈之動皆是氣動此說非也使其是氣動則氣一呼當應之而一動氣一吸當應之一動何一呼動二至一息動二至顯然與呼吸相左哉以是知脈是血管應心而動為無疑矣心火甚則動速心火虛則動遲故主用桂枝以補心火而生血也同一沉脈而一遲一微又有氣血之分讀者當於細密處求之桂枝加芍藥生薑人參新加湯方桂枝三兩去皮芍藥四兩甘草二兩炙人參三兩生薑四兩切大棗十二枚擘上六味以水一斗二升微火煮取三升去滓分溫服餘依桂枝湯法蔚按此言太陽證發汗後邪已凈而榮虛也身疼痛證雖似外邪而血虛不能養榮者必痛也師恐人之誤認為邪故復申之曰脈沉遲以脈沉者病不在表遲者血虛無以榮脈也方用桂枝湯取其專行榮分加人參以滋補血液生始之源加生薑以通血脈循行之滯加芍藥之苦平欲領薑桂之辛不走於肌腠而作汗潛行於經脈而定痛也曰新加者言邪盛忌用人參今因邪凈而新加之註家謂有餘邪者誤也發汗後不可更行桂枝湯汗出而喘無大熱者可與麻黃杏仁甘草石膏湯且汗吐下不如法而誤施之既已增病亦恐傷及五臟之氣先以熱邪乘肺言之蓋太陽之氣與肺金相合而主皮毛若麻黃證標陽盛者竟用桂枝湯啜粥以促其汗發汗後切不可更行桂枝湯何也桂枝之熱雖能令其汗出而不能除麻黃本證之喘究竟汗為熱汗而麻黃本證之汗未嘗出也無大熱者熱盛於內上乘於肺而外熱反輕也可與麻黃杏仁甘草石膏湯主之取石膏止桂枝熱逼之汗仍用麻黃出本證未出之汗也此一節言發汗不解邪乘於肺而為肺熱證也張令韶云自此以下五節因誤施汗吐下致傷五臟之氣也柯韻伯云溫病風溫仲景無方疑即此方也按柯氏此說雖非正解亦姑存之以備恭考麻黃杏仁甘草石膏湯方麻黃四兩去節杏仁五十個去皮尖甘草二兩石膏半斤碎綿裹上四味以水七升先煮麻黃減二升去上沫納諸藥煮取二升去滓溫服一升男元犀按此借治風溫之病論曰太陽之病發熱而渴不惡寒者為溫病若發汗已身灼熱者名風溫一節未出其方此處補之其文略異其實互相發明不然汗後病不解正宜桂枝湯曰不可更行者知陽盛於內也汗出而喘者陽盛於內火氣外越而汗出火氣上越而喘也其云無大熱奈何前論溫病曰發熱而渴不惡寒者邪從內出得太陽之標熱無太陽之本寒也今曰無大熱邪已蘊釀成熱熱於內以外熱較之而轉輕也讀書要得間不可死於句下至於方解柯韻伯最妙宜熟讀之柯韻伯曰此方為溫病之主劑凡冬不藏精之人熱邪伏於臟腑至東風解凍伏邪自內而出治當乘其熱而汗之熱隨汗解矣此證頭項強痛與傷寒盡同惟不惡寒而渴以別之證系有熱無寒故於麻黃湯去桂易石膏以解表裏俱熱之證岐伯所云未滿三日可汗而已者此法是也此病得於寒時而發於風令故又名曰風溫其脈陰陽俱浮其證自汗身重蓋陽浮則強於衛外而閉氣故身重當用麻黃開表以逐邪陰浮不能藏精而汗出當用石膏鎮陰以清火表裏俱熱則中氣不運升降不得自如故多眠鼻鼾語言難出當用杏仁甘草以調氣此方備升降輕重之性足以當之若攻下火熏等法此粗工促病之術也蓋內蘊之火邪與外感之餘熱治不同法是方溫病初起可用以解表清裏汗後可復用以平內熱之猖狂下後可復用徹邪之留戀與風寒不解用桂枝湯同法例云桂枝下咽陽盛則斃特開此涼解一法為大青龍湯之變局白虎湯之先著也然此證但熱無寒用青龍則不宜薑桂恐脈流薄疾斑黃狂亂作矣此證但熱不虛用白虎則不宜參米恐食入於陰則長氣於陽譫語腹脹矣此為解表之劑若無喘鼾語言難出等證則又白虎之證治矣凡治溫病表裏之實用此湯治溫病表裏之虛用白虎加參米相須相濟者也若葛根黃芩黃連湯則治痢而不治喘要知溫病下後無利不止證葛根黃連之燥非治溫藥且麻黃專於外達與葛根之和中發表不同石膏甘潤與黃連之苦燥懸殊同是涼解表裏同是汗出而喘而用藥有毫釐之辨矣發汗過多其人叉手自冒心心下悸欲得按者桂枝甘草湯主之以傷其心氣言之發汗過多虛其心液其人叉手自覆冒於心外有所衛而安也心下悸欲得按者內有所依而愈安也桂桂甘草湯主之此一節言發汗而傷其心氣也桂枝甘草湯方桂枝四兩去皮甘草二兩炙上二味以水三升煮取一升去滓頓服張令韶曰此發汗多而傷其心氣也汗為心液汗出過多則心液空而喜按故用桂枝以保心氣甘草助中土以防水逆不令腎氣乘心發汗後其人臍下悸者欲作奔豚茯苓桂枝甘草大棗湯主之以傷其腎氣言之發汗過多之後腎陽虛則水邪挾水氣而上衝故其人臍下悸者欲作奔豚然猶欲作而尚未作也當先其時以茯苓桂枝甘草大棗湯主之此一節言發汗後而傷其腎氣也補曰此兩節發汗後何以能傷心氣傷腎氣陳註知其然而未明其所以然也蓋腎屬水為衛氣之主心屬火為營氣之主心火下交於腎從丹田氣海之中蒸動膀胱之水合化為氣以充達於外是為營衛營出於心屬火屬血衛出於腎屬水屬氣汗多則泄其衛陽而傷腎氣是以臍下氣海虛怯而作悸氣海中之陽不能蒸化膀胱之水則水欲泛上而作奔豚其方不用補腎但用甘棗茯苓克制腎水用桂枝導心火以交於臍下則腎水化氣而愈矣上節發汗傷其心氣者又因汗多傷其營氣心火隨營氣大泄因致心氣虛欲叉手冒心以護之心下指膈間言心火從包絡下抵膈間由肺入連網乃下行入氣海今心火不能布於膈間故心下悸主用桂枝以宣心陽膈與胃相連故主用甘草以實其胃細勘此兩節便知營衛之源流水火之氣化矣茯苓桂枝甘草大棗湯方茯苓半斤甘草二兩炙大棗十五枚擘桂枝四兩去皮上四味以甘瀾水一斗先煮茯苓減二升納諸藥煮取三升去滓溫服一升日三服作甘瀾水法取水二斗置大盆內以杓湯之水上有珠子五六千顆相逐取用之蔚按此治發汗而傷其腎氣也桂枝保心氣於上茯苓安腎氣於下二物皆能化太陽之水氣甘草大棗補中土制水邪之溢甘瀾水速諸藥下行此欲作奔豚圖於未事之方也發汗後腹脹滿者厚朴生薑半夏甘草人參湯主之以傷其脾氣言之發汗後外邪已解而腹脹滿者蓋以汗雖出於榮衛實稟中焦水穀之氣以成今發汗傷其中氣致中虛不能運行升降乃生脹滿以厚朴生薑半夏甘草人參湯主之此一節言發汗而傷其脾氣也同學周鏡羅云太陽發汗所以外通陽氣內和陰氣發汗不如法致太陽之寒內合太陰之濕故腹脹滿之病作矣厚朴生薑甘草半夏人參湯方厚朴半斤去皮炙生薑半斤切半夏半升洗人參一兩甘草二兩炙上五味以水一斗煮取三升去滓溫服一升日三服張令韶曰此治發汗而傷脾氣汗乃中焦水穀之津汗後亡津液而脾氣虛脾虛則不能轉輸而脹滿矣夫天氣不降地氣不升則為脹滿厚朴色赤性溫而味苦泄助天氣之下降也半夏感一陰而生能啟達陰氣助地氣之上升也生薑以通滯氣甘草人參所以補中而滋生津液者也津液足而上下交則脹滿自消矣傷寒若吐若下後心下逆滿氣上衝胸起則頭眩脈沉緊發汗則動經身為振振搖者茯苓桂枝白朮甘草湯主之以傷其肝氣言之傷寒若吐若下後中氣傷矣心下為脾之部位土虛而負木乘之故逆滿氣上衝胸即厥陰之為病氣上撞心是也起則頭眩即內經所謂諸風掉眩皆屬於木是也脈沉緊肝之脈也發汗則動經身為振振搖者經脈空虛而風木動搖之象也金匱知肝之病當先實脾卻是不易之法也茯苓桂枝白朮甘草湯主之此一節言吐下而傷其肝氣也正曰此與下真武證同有頭眩身振搖之病淺註未互勘故其解略誤蓋心下逆滿是停水不化氣上衝心是水氣上泛與真武證之心下悸同意起則頭眩與真武證之寒水上冒頭眩同意若不發其汗則雖內有寒水而經脈不傷可免振寒之證若再發汗泄其表陽則寒氣浸淫動其經脈身遂為振搖與真武證之振振欲擗地亦同但真武證重故用附子以溫水此證輕故用桂枝以化水也淺註不知脈沉緊是寒水在內之診而解為肝之脈非也解氣上衝胸為厥陰病解頭眩為諸風掉眩不但與真武證不合即與本方苓桂治法亦不合矣方下張註亦有誤茯苓桂枝白朮甘草湯方茯苓四兩桂枝三兩去皮白朮二兩甘草二兩上四味以水六升煮取三升去滓分溫三服張令韶曰此治吐下後而作肝氣也心下逆滿者心下為脾之部位脾主中焦水穀之津下吐以傷其津遂致脾虛而為滿脾虛而肝氣乘之故逆滿也氣上衝胸等句皆言肝病之本脈本證方中只用桂枝一味以治肝其餘白朮當先實脾是也發汗病不解反惡寒者虛故也芍藥甘草附子湯主之且虛人不宜發汗汗之則為虛虛發汗後病應解而不解不應惡寒而反惡寒者以其本人虛故也虛則宜補補正即所以卻邪以芍藥甘草附子湯主之此一節言誤發虛人之汗另立一補救法也芍藥甘草附子湯方芍藥三兩甘草三兩炙附子二枚炮去皮破八片上三味以水五升煮取一升五合去滓分溫服男元犀按各家以此證為發汗虛其表陽之氣似是而非於病不解三字說不去且虛故也三字亦無來歷蓋太陽之法從汗解汗而不解餘邪未凈或復煩發熱或如瘧狀亦有大汗亡陽明之陽用白虎加人參法亡少陰之陽用真武四逆法論有明訓也今但云不解可知病未退而亦未加也惡寒而曰反者奈何謂前此無惡寒證因發汗而反增此一證也惡寒若系陽虛四逆輩猶恐不及竟以三兩之芍藥為主並無薑桂以佐之豈不慮戀陰以撲滅殘陽乎師恐人因其病不解而再行發汗又恐因其惡寒而徑用薑附故特切示曰虛故也言其所以不解所以惡寒皆陰陽素虛之故補虛自足以勝邪不必他顧也方中芍藥甘草苦甘以補陰附子甘草辛甘以補陽附子性猛得甘草而緩芍藥性寒得附子而和且芍草多而附子少皆調劑之妙此陰陽雙補之良方也論中言虛者間於節中偶露一二語單言虛而出補虛之方者只一節學者當此隅反之正曰虛則宜補究是何處虛應該補何處淺註只此一虛字了之豈能切當哉須知虛故也是指太陽膀胱之陽虛蓋因發汗大泄其陽衛陽不能托邪外出故病不解陽虛故惡寒用附子為主以補膀胱之陽虛其芍藥甘草只是調營氣以戢其汗而已營調則汗液不至太動陽氣復振則衛外驅邪病自不留解虛字必指膀胱而言乃於汗後惡寒及用附子之法絲絲入扣幸勿籠統言也發汗若下之病仍不解煩躁者茯苓四逆湯主之虛人發汗且為虛虛汗而又下便入陰而為危證矣太陽病發汗病不解若下之而病仍不解忽增出煩躁之證者以太陽底面即是少陰汗傷心液下傷腎液少陰之陰陽水火離隔所致也以茯苓四逆湯主之此言虛人誤汗下恐少水火之氣因之離隔而難治煩者陽不遇陰躁者陰不遇陽也茯苓四逆湯方茯苓六兩人參一兩附子一枚生用去皮破八片甘草二兩炙乾薑一兩半上五味以水五升煮取三升去滓溫服七合日三服張令韶曰少陰汗下而虛水火之氣心腎之精液虛致病不解陰陽水火離隔而煩躁也煩者陽不得陰躁者陰不得遇陽茯苓人參助心主以止陽煩四逆補腎臟以定陰躁發汗後惡寒者虛故也不惡寒但熱者實也當和胃氣與調胃承氣湯要之病變雖多不外虛實兩證凡發汗後惡寒者虛故也發汗後不惟不惡寒而且但見其熱者實也蓋因發汗以致胃燥而為實熱之證當和胃氣與調胃承氣湯甚矣溫補涼瀉之不可泥也此一節總結上文數節之意言虛證固多而實證亦復不少而又提出胃氣二字補出調胃承氣湯一方其旨微矣蓋太陽病從微盛而轉屬陽微而轉屬少陰為虛證以太陽與少陰相表裏也陽盛則轉屬陽明為實證以太陽與陽明遞相傳也太陽病發汗後大汗出胃中乾煩躁不得眠欲得飲水者少少與飲之令胃氣和則愈若脈浮小便不利微熱消渴者五苓散主之存津液為治傷寒之要太陽病發汗後大汗出陽明水穀之津竭矣故胃中乾土燥於中心不交腎則煩腎不能交心則躁不得眠即內經所謂胃不和則臥不安者是也欲得飲水者人身律液為水之類內水耗竭欲得外水以自救只宜少少與飲之令胃得水而不乾斯氣潤而和則愈切不可誤與五苓散若脈浮小便不利乃脾氣不能轉輸而胃之津液不行也微熱乃在表之邪未解也消渴者飲入而消熱甚於裏也以脈浮在表故微熱以脾不轉輸故小便不利而消渴與五苓散能布散水氣可以主之此一節言發汗後胃之津液有乾竭與不行之分別也太陽病至胃氣和則愈言津液乾竭若脈浮至末言津液不行當作兩截看張令韶云合下四節皆論發汗後煩渴證也補曰五苓散是治停水利小便何以即能止渴哉陳註為脾不轉樞津液不行究屬一間未達不知人口中津即膀胱所化之氣也氣出於鼻著於漆石之上則化為水氣上於口則化為津此如釜中煎水出氣熏於蓋上即為氣水是一理也凡人所飲之水從三焦膜油之中下入膀胱有似釜中之水凡人鼻間吸入天陽之氣從肺歷心由氣管下抵丹田胞室之中有似釜底添薪以煎水也是為心火下交以火蒸水而膀胱中水乃化氣上行是為津有似釜蓋上之氣水一般其既化不盡之水質則泄為小便小便利而津液布其理如此若空言脾不轉樞則其理不實此證之小便不利消渴是因汗大出陽氣外泄故身微熱而脈浮陽氣外泄則胞室氣海之中無火以蒸其水是以水不化氣也方用桂枝為主導心火下交於水以化氣白朮升津茯苓利水為利水化氣升津除熱之妙劑此所以化氣之理也五苓散方豬苓十八銖去皮澤瀉一兩六銖半茯苓十八銖桂枝半兩去皮白朮十八銖上五味為末以白飲和服方寸匕日三服多飲暖水汗出愈錢天來云漢之一兩即今之二錢七分也汪苓友云古云銖者六銖為一分即二錢半二十四銖為一兩也次男元犀按苓者令也化氣而通行津液號令之主也豬苓茯苓澤瀉皆化氣之品有白朮從脾以輸轉之則氣化而水行矣然表裏之邪不能因水利而兩解故必加桂枝以解之作散以散之多服暖水以助之使水精四布上滋心肺外達皮毛微汗一出而表裏之煩熱兩蠲矣白飲和服亦即桂枝湯啜粥之義也發汗已脈浮數煩渴者五苓散主之胃乾之煩渴當以五苓散為禁劑矣而審系脾不轉輸之為渴雖無微熱與小便不利證而治以五苓散則一也發汗之後表邪亦已邪已則脈當緩今脈不緩而浮數以汗為中焦水穀之氣所化汗傷中氣則變其衝和之象也煩渴者汗傷中氣脾不轉輸而水津不能布散也以五苓散主之蓋以五苓散降而能升山澤通氣之謂也通即轉輸而布散之不專在下行而滲泄也上節言汗後邪未解而煩渴此節言邪既解而煩渴也正曰山澤通氣通即轉樞皆是籠統語只因不知水化為氣氣化為津之理故不能解五苓散之方義傷寒汗出而渴者五苓散主之不渴者茯苓甘草湯主之何以言之蓋汗有血液之汗有水津之汗如傷寒汗出而渴者水津之汗也汗出而脾虛津液不能上輸而致渴以五苓散主之若汗出而不渴者血液之汗也心主血脈以茯苓甘草湯主之方中茯苓桂枝以保心氣甘草生薑調和經脈此一節上二句申明上文兩節之義言水津之汗也下二句補出血液之汗另出方治正曰強分血液之汗水津之汗是未知汗之源委也吾於麻黃桂枝證及上欲作奔豚節言汗甚詳當細考之蓋汗出而渴者是傷寒皮毛開而汗自出膀胱之衛陽外越因之水不化氣而津不布故用五苓散化氣布津津升則渴止氣布則寒去矣汗出不渴者亦是傷寒皮毛開而汗自出不渴則內水尚能化氣布津只汗自出是膀胱陽氣隨汗發泄而邪反不得去故用茯苓以滲為斂使不外泄用桂薑專散其寒寒去汗止與桂枝證之自汗出相似但桂枝證之自汗嗇嗇惡風汗雖出不透快也故仍發之使出用白芍以行營血之滯使汗得透快而出無滯留也此證之汗自出是太透快恐其遂漏不止故不用白芍之行血而用茯苓之利水使水氣內返則不外泄矣淺註苓桂保心氣不合旨意而言薑草調經脈其說尤泛茯苓甘草湯方茯苓二兩桂枝二兩去皮生薑三兩切甘草一兩炙上四味以水四升煮取二升去滓分溫三服蔚按此承上服五苓散多飲暖水以出汗人知五苓之用在汗而不知五苓之證在渴也五苓證之渴為脾不轉輸非關胃燥推而言之不輸於上為渴不輸於中為水逆不輸於下為小便不利雖有煩熱之病責在水津不能四布故曰白朮桂枝之辛溫不避也論曰汗出而渴可知中焦水穀之津發泄而傷脾脾傷則不能輸津而作渴故取五苓散布散其水津若不渴者中焦之液未傷只用茯苓甘草湯取茯苓之利水俾腎水不沸騰而為汗中風發熱六七日不解而煩有表裏證渴欲飲水水入則吐者名曰水逆五苓散主之且五苓散不特自內輸布其水津也而亦治表裏證之水逆如中風發熱六日是六經已盡七日而又來復於太陽而其發熱不解而煩謂之表證而何以又謂之有表裏證以渴欲飲水為裏證合而言之名為表裏證也蓋風為陽邪陽熱甚則渴不關於發汗亡津液所致也內經云飲入於胃游溢精氣上輸於脾脾氣散精上歸於肺今脾不能散精歸肺以致水入則吐者名曰水逆謂水逆於中土而不散也以五苓散主之助脾氣以轉輸此一節言五苓散之治水逆近註以太陽為表為標膀胱為裏為本此證名為犯本又名為表裏傳反多枝節與本論之旨不合正曰仲景所謂中風有熱風有寒風陳註執定風為陽邪誤解此渴為陽熱甚不知五苓之渴飲水是水停不化氣氣不布則津不升故總以化氣行水為主解為陽熱豈合方義哉未持脈時病人手叉自冒心師因教試令咳而不咳者此必兩耳聾無聞也所以然者以重發汗虛故如此至於血液之汗主於心上言主以茯苓甘草湯尚未盡其量醫師未持病人之脈時只見病人手叉自復冒其心其心下悸而喜按明矣而醫師因行教試之法令病人作咳而病人竟不咳者此必兩耳聾而無聞也所以然者以重發汗陽氣不充於胸中故手叉自冒精氣不充於兩耳故耳聾無聞陽氣精氣非一亦非二也汗後交虛病故如此豈茯苓甘草湯所可勝任哉此一節言血液之汗發之太過致傷心腎之氣非茯苓甘草湯所能治也後學周宗超按正氣虛之耳聾與少陽邪盛之耳聾分別在手自冒心補曰此節難解淺註亦不必確當闕疑發汗後飲水多必喘以水灌之亦喘其與五苓證相似而不同者奈何發汗後肺氣已虛若飲水多則飲冷傷肺必作喘以水灌之則形寒傷肺亦作喘此豈五苓所能治哉此一節言汗後傷肺五苓散不可以混施正曰水化則為氣氣上出順利則不喘水下出不停則無阻礙若飲水多水遂停而氣不化故喘原文並未言其是飲冷水淺註不解水停氣不化之理故添一冷字而以飲冷傷肺為解不免略差一黍又言以水灌之是形寒傷肺似言以冷水淹潑病人身體則形寒也不知從古治病皆無以水淹潑周身之理所謂灌之亦不過其人不飲而強灌之如米飯漿水清粥藥水迭進以冀其愈是也水停亦為喘皆氣不化之故義詳於上勿守淺註想當然而已也發汗後水藥不得入口為逆若更發汗必吐下不止更有與五苓證之水逆相似者尤不可混發大汗之後水藥不得入口以汗本於陽明水穀之氣而成今以大汗傷之則胃氣大虛不能司納如此此為治之之逆若不知而更發其汗則胃虛陽敗中氣不守上下俱脫必令吐下不止此與五苓證之水逆何涉哉此一節言發汗後胃虛水藥不入之證與五苓散不大相涉自未持脈至此共三節以反掉筆為結尾故不必出方然讀仲景書須於無字處求字無方處索方方可謂之能讀發汗吐下後虛煩不得眠若劇者必反復顛倒心中懊憹梔子豉湯主之若少氣者梔子甘草豉湯主之若嘔者梔子生薑豉湯主之少陰君火居上少陰腎水居下而中土為之交通若發汗吐下後上中下三焦俱為之傷是以上焦之君火不能下交於腎下焦之腎水不能上交於心火獨居上陽不遇陰故心虛而煩胃絡不和故不得眠若劇者不得眠之盛必反復顛倒煩之極自見其心中不爽快而懊憹以梔子豉湯主之以梔子入心而下交於腎豆豉入腎而上交於心水火交而諸證自愈若少氣者為中氣虛而不能交運於上下以梔子甘草豉湯主之即內經所謂交陰陽者必和其中也若嘔者為熱氣搏結不散而上逆以梔子生薑豉湯主之取生薑之散以止嘔也此一節言汗吐下傷其三焦之氣以致少陰之水火不交也張令韶云自此以下六節論梔子豉湯之證有熱有寒有虛有實之不同梔子豉湯方梔子十四枚擘香豉四合綿裹上二味以水四升先煮梔子得二升半納豉煮取一升半去滓分為兩服溫進一服得吐者止後服二張以吐下後虛煩無復吐之理此因瓜蒂散用香豉而誤傳之也男元犀按此湯舊本有得吐止後服等字故相傳為涌吐之方高明如柯韻伯亦因其說惟張隱庵張令韶極辨其訛曰瓜蒂散二條本經必曰吐之梔子湯六節並不言一吐字且吐下後虛煩豈有復吐之理乎因此瓜蒂散內用香豉二合而誤傳之也愚每用此方服之不吐者多亦或有時而吐要之吐與不吐皆藥力勝病之效也其不吐者所過者化即雨露之用也一服即吐者戰則必勝即雷霆之用也方非吐劑而病間有因吐而愈者所以為方之神妙梔子色赤象心味苦屬火性寒導火熱之下行豆形象腎色黑入腎制造為豉輕浮引水液之上升陰陽和水火濟而煩熱懊憹結痛等證俱解矣原本列於太陽主解煩非吐劑而有時亦能涌吐也韻伯移入陽明只知為吐劑泄陽明之煩熱即此為仁者見仁知者見知也梔子生薑豉湯即前方加生薑五兩煎法同梔子甘草豉湯即梔子豉湯加甘草二兩煎法同蔚按梔豉解見上汗吐下後中氣虛不能交通上下故加甘草以補中嘔者汗吐下後胃陽已傷中氣不和而上逆故加生薑暖胃解穢而止逆也發汗若下之而煩熱胸中窒者梔子豉湯主之發汗若下之其熱宜從汗下而解矣而竟不解為煩熱且煩不解留於胸中而窒塞不通者以梔子豉湯主之蓋以胸中為太陽之裏陽明之表其窒塞因煩熱所致必令煩熱止而窒塞自通矣此一節言梔子豉湯不特交通上下而且能調和中氣也按此證最多須當切記正曰胸中是上焦心肺所司解胸中是調和中氣誤將上焦作中焦解豈不差耶不知胸前之大膈膜後連背脊前抵胸骨盡處其膈之內皮循腔子上會於肺系下生包絡而通於心所謂胸中即指膈膜以上肺系以下而言乃肺與心包絡三者之部位也內經云肺為相傅之官主制節其心火不令太過今因心火太過肺之清金不能制節之故致煩熱熱甚氣壅故胸中窒主用梔子者梔子花白子赤得金水之氣而歸於心有似肺金制節心火之象其實有膈膜之形故專主膈上包絡心間之治法也仲景方證精密讀者所當細究傷寒五六日大下之後身熱不去心中結痛者未欲解也梔子豉湯主之傷寒五日至六日六經已周大下之後身熱不解心中結痛者知太陽之裏陽明之表搏結俱未欲解也以梔子豉湯主之此一節言梔子豉湯不特升降上下而亦能和解表裏也傷寒下後心煩腹滿臥起不安者梔子厚朴湯主之傷寒下後多屬虛寒然亦有邪熱留於心腹胃而為實熱證者熱乘於心則心惡熱而煩熱陷於腹則腹不通而滿熱留於胃則胃不和而臥起不安者以梔子厚朴湯主之取枳實之平胃厚朴之運脾合梔子止煩以統治之也此一節言梔子豉湯能清傷寒下後之餘熱也按此證最多又當切記梔子厚朴湯方梔子十四枚擘厚朴四兩炙枳實四枚水浸去瓤炒以上三味以水三升半煮取一升半去滓分二服溫進一服得吐者止後服柯韻伯曰心煩則難臥腹滿則難起起臥不安是心移熱於胃與反覆顛倒之虛煩不同梔子治煩枳朴泄滿此兩解心腹之妙劑也傷寒醫以丸藥大下之身熱不去微煩者梔子乾薑湯主之傷寒中有梔子證醫者不知用梔子湯反以丸藥大下之則丸緩留於中而陷於脾矣身熱不去此太陰脾土本藏之熱發於形身也微煩者以脾為至陰內居中土上焦之陽不得內歸於中土也此熱在上而寒在中以梔子乾薑湯主之此一節言下後脾氣虛寒梔子又宜配以乾薑以溫脾也男蔚按梔子性寒乾薑性熱二者相反何以同用之而不知心病而煩非梔子不能清之脾病生寒非乾薑不能溫之有是病則用是藥有何不可且豆豉合梔子坎離交姤之義也乾薑合梔子火土相生之義也正曰身熱不去是傷寒原有之證故但曰不去非因下後傷脾而身始熱也微煩亦非因下所致是因熱不去而煩也淺註以為是太陰脾土之熱發於形身只因強就乾薑之性而誤註也不知乾薑是治大下之後利尚未止故急以薑溫脾與煩熱原兩歧故用藥有寒熱之異解者幸勿扯雜觀下文病人舊微溏者不可與梔子湯則此方用乾薑正是大下微溏瀉故用乾薑救之而仍不廢梔子者以原有身熱微煩之證其瀉特暫時病故用乾薑足矣不似下節之舊微溏也而熱煩仍其原有之證故仍用梔子寒熱並用較量極精梔子乾薑湯方梔子十四枚擘乾薑二兩上二味以水三升半煮取一升半去滓分二服溫進一服得吐者止後服張令韶曰梔子導陽熱以下行乾薑溫中土以上達上下交煩熱止矣凡用梔子湯若病人舊微溏者為脾虛寒之體病則不能化熱必現出虛寒之證不可與服之此一節言梔子雖能止煩清熱然苦寒之性卻與虛寒之體不宜故結此叮嚀男元犀按梔子下稟寒水之精上結君火之實既能起水陰之氣而滋於上復能導火熱之氣而行於下故以上諸證仲師用之為君然惟生用之真性尚存今人相沿炒黑則反為死滅無用之物矣嘉慶戊辰吏部謝芝田先生令親患頭項強痛身疼心下滿小便不利服表藥無汗反煩六脈洪數初診為太陽陽明合病諦思良久曰前病在無形之太陽今病在有形之太陽也但使有形之太陽小便一利則所有病氣俱隨無形之經氣而汗解矣用桂枝去桂加茯苓白朮湯一服遂瘥惟夜間不寐特告曰此名虛煩因辛熱遺害若用棗仁遠志茯神等藥反招集其所遺而為孽病必復作矣用梔子豉湯即愈嘉慶己巳季春曹扶谷明府患頭痛項強惡寒等證自差次回垣後更增出寒熱往來欲嘔胸滿等證家嚴診其脈數中見小按中虛不應指駭謂之曰陽證見陰脈法在不治所幸者大小便如常神識頗清正雖虛而尚未潰察其胸滿欲嘔寒熱往來之證俱是病氣欲從樞轉之象當乘機而利導之遂令一日服小柴胡兩劑柴胡每劑八錢次日再診以上諸證雖退而心胸懊憹不安語言錯亂無次實覺可憂又診其脈略緩遂為之喜曰邪從樞轉而出故寒熱等證俱平正為邪熱所傷故煩昏證並見此時須當救正但救正二字不讀傷寒金匱便以人參誤事立主用梔子豉湯從離坎交媾處撥動神機服後停藥靜候三日值陽明主氣之期申酉為陽明正旺之時戊癸相合自愈果如言應期而效太陽病發汗汗出不解其人仍發熱心下悸頭眩身瞤動振振欲擗一作僻地者真武湯主之虛人不可發汗汗後變證無常茲先言太陽太陽病發汗其熱當解今汗出不解正氣虛也其人仍發熱徒虛正氣而熱仍在也汗為心液心液亡則心下悸夫津液者和合而為膏上補益於腦髓今津液不足則腦為之不滿而頭為之眩身為脾之所主今脾氣因過汗而虛不外行於肌肉則身無所主持而瞤動動搖不能撐持而欲擗地之狀者以真武湯主之此一節言太陽過汗之變而立一救方治也張令韶云此章凡八節皆言虛者不可汗也正曰傷寒發熱是本身之衛陽與寒相爭故熱宜發其汗使衛陽得出於外而寒隨之解矣若衛陽已泄而汗出寒仍不解留於肌肉而發熱內動膀胱之水上陵心為心下悸水氣挾肝脈上冒為頭眩夫汗出之後經脈已失其養今其寒水之氣又復觸發其筋脈則身瞤動振振欲擗地總由陽氣外泄寒水暴發也是以用生薑白芍理營衛以散外寒用附子為主助腎陽以祛內寒而苓朮治水以佐之水不上泛則眩止不陵心則悸止寒退陽伸則瞤動振搖無不止矣淺註心液亡則悸腦不滿則眩脾氣不行於經脈則振動不免求深反淺或不解瞤動振振之證余曰凡人冬月經大冷凍往往戰慄即瞤動振振之微者也必得火烘乃解故此證必用薑附以溫之也此與上苓桂朮甘湯證相似但有輕重之別也真武湯方茯苓三兩芍藥三兩生薑三兩白朮二兩附子一枚炮上五味以水八升煮取三升去滓溫服七合日三服張令韶曰虛者不可汗汗後病不解而變證也真武者鎮水之神也水性動今動極不安故亦以此鎮之茯苓松之餘氣潛伏於根故歸伏心神而止悸附子啟下焦之生陽上循於頭而止眩芍藥滋養榮血生薑宣通經脈而瞤動自止白朮所以資中土而灌溉四旁者也羅東逸曰小青龍湯治表不解有水氣中外皆寒實之病也真武湯治表已解有水氣中外皆虛寒之病也真武者北方司水之神也以之名湯者藉以鎮水之義也夫人一身制水者脾也主水者腎也腎為胃關聚水而從其類倘腎中無陽則脾之樞機雖運而腎之關門不開水即欲行以無主制故泛溢妄行而有是證也用附子之辛熱壯腎之元陽則水有所主矣白朮之溫燥建立中土則水有所制矣生薑之辛散佐附子以補陽於補水中寓散水之意茯苓之淡滲佐白朮以健土於制水中寓利水之道焉而尤重在芍藥之苦降其旨甚微蓋人身陽根於陰若徒以辛熱補陽不少佐以苦降之品恐真陽飛越矣芍藥為春花之殿交夏而枯用之以亟收散漫之陽氣而歸根下利減芍藥者以其苦降涌泄也加乾薑者以其溫中勝寒也水寒傷肺則咳加細辛乾薑者勝水寒也加五味子者收肺氣也小便利者去茯苓恐其過利傷腎也嘔者去附子倍生薑以其病非下焦水停於胃所以不須溫腎以行水只當溫胃以散水且生薑功能止嘔也咽喉乾燥者不可發汗汗之不可輕發必於未發之先審察辨別而預斷其不可咽喉為三陰經脈所循之處考脾足太陰之脈挾咽腎足少陰之脈循喉嚨肝足厥陰之脈循喉嚨之後三陰精血虛少不能上滋而乾燥者不可發汗或誤發之命將難全亦不必再論變證也自此以下皆承上文而言不可發汗而發之之變證也淋家不可發汗發汗必便血素有淋病名曰淋家其津液久虛不可發汗更走其津液若發汗則津液竭於外而血動於內干及於胞中必患便血何以言之內經云膀胱者津液藏焉又曰膀胱者胞之室是胞為血海居於膀胱之外而包膀胱雖藏血藏津液有別而氣自相通參看太陽熱結膀胱血自下證則恍然悟矣淋家病為膀胱氣化不能行於皮毛津液但從下走而為淋膀胱已枯若再發其汗必包動中之血非謂便血自膀胱出也瘡家雖身疼痛不可發汗汗出則痓瘡家久失膿血則充膚熱肉之血虛也矣雖身疼痛患太陽之表病亦不可以麻黃湯峻發其汗發汗必更內傷其筋脈血不榮筋則強急而為痓矣衄家不可發汗汗出必額上陷脈急緊直視不能眴不得眠血從陽經並督脈而出者為衄汗為血液凡素患衄血之人名曰衄家三陽之經血俱虛故不可發汗汗出則重亡其陰必額上陷脈急緊目直視不能眴不得眠所以然者以太陽之脈起於目內眥上額交顛陽明之脈起於鼻交額中旁納太陽之脈少陽之脈起於目銳眥三經互相貫通俱在於額上鼻目之間三陽之血不榮於脈故額上陷脈緊急也三陽之血不貫於目故目直視不能眴也陽血虛少則衛氣不能行於陰故不得眠也此三陽之危證也正曰發汗則重亡其陰非也汗出氣分屬陽汗出必額上陷以衄家陰血已止惟賴有陽氣尚能保其額之不陷若再汗亡其陽則額間陰血陽氣兩者均竭是以虛陷論詳金匱讀者於陰陽氣血當認真亡血家不可發汗發汗則寒慄而振血從陰經並衝任因溫病是內熱津虧的病因故我覺脈應浮大而出為吐為下多則為脫凡一切脫血之人名曰亡血家血屬陰亡血即亡陰故不可發汗若發其汗是陰亡而陽無所附陰從外脫其人則寒慄而振內經云澀則無血厥而且寒是也補曰此寒慄而振與前必振寒內外俱虛故也同義彼是下後亡陰筋脈失養後發汗又亡其陽則寒氣發動筋脈不能自持故振寒此節亡血家即是陰筋失養後發汗以亡其陽則寒氣發動筋脈不能自持故寒慄而振其義正與前同又此節與上節衄家發汗則額上陷義亦相通衄正是督脈額上之血已亡故發汗再亡其陽則止是督脈所司之額上陷亡血家是周身之血或吐或下從內泄去則周身筋脈失養故汗之再亡其陽則不單在額上陷而在周身皆發寒振淺註既知此節發汗是陽從外脫而註上一節乃云汗出則重亡其陰實屬自相矛盾汗家重發汗必恍惚心亂小便已陰疼與禹餘糧丸平素患汗病之人名曰汗家心主血汗為心液患此病之人其心虛血少可知若重發其汗則心主之神氣無所依必恍惚心亂且心主之神氣虛不能下交於腎而腎氣亦孤故小便已而前陰溺管之中亦疼與禹餘糧丸愚按本方失傳王曰休補方用禹餘糧赤石脂生梓皮各三兩赤小豆半升共為末蜜丸彈子大以水二升煮取一升早暮各一服然亦不過利水之品毫無深義正曰心腎不交之病多矣何以獨見陰疼之證淺註以陰疼是心之神氣不交腎而腎氣亦孤於理似精而於證實不相合不知前陰溺管乃是膀胱下竅膀胱有津液以潤此竅則小便利而溺管不疼內經云膀胱者州都之官津液藏焉氣化則能出矣此出字是言化氣為津液下出以潤溺上出以充皮毛汗家之津液既從皮毛發泄又重發其汗則津液盡從皮毛外出而下行之津液反竭是以溺管枯澀而小便疼也其恍惚心亂者亦不是心血虛少蓋心煩是血虛心悸是陽虛心亂是陽氣飛越此與以火迫劫亡陽必驚狂同義淺註於汗原委未達不知心火下交於水乃化氣為津為汗是以汗太多則心陽外泄也義詳總論讀者須細考之病人有寒復發汗胃中冷必吐蛔不特亡血不可發汗即素寒者亦不可發汗病人有素寒復發其汗汗乃中焦之汁發汗更虛其中焦之陽氣其胃中必冷且胃無陽熱之化則陰類之蟲頓生故必吐蛔他若胃熱之吐蛔又不在此例矣張令韶云本論逐節之後必結胃氣一條以見不特吐下傷其胃氣即汗亦傷胃氣也治傷寒者慎勿傷其胃焉斯可矣本發汗而復下之此為逆也若先發汗治不為逆本先下之而反汗之為逆若先下之治不為逆病氣在外本當發汗從外而解而復從內以下之此為治之逆也若先發汗外邪未盡復從內入因而下之治不為逆病氣在內本當先下之從內而解而反從外以汗之為治之逆若先下之內邪未盡勢欲從外而出因其勢而汗之治亦不為逆張令韶云此章凡六節前四節言病氣隨正氣之出入以為出入正氣亦隨病氣之內外而為內外也或從內解或從外解或救其裏或救其表不可逆也五節言陰陽和正氣之出入復其常病氣亦隨之而解矣末節太陽之氣隨榮衛之行於脈外而行於脈中也傷寒醫下之續得下利清穀不止身疼痛者急當救裏後身疼痛清便自調者急當救表救裏宜四逆湯救表宜桂枝湯太陽傷寒醫者誤下之因誤下而正氣內陷續得下利清穀不止雖明知一身疼痛為屬表者而此時不暇兼顧急當救裏救裏之後審其身疼痛知表證之未解兼審其清便自調者知裏證之全瘳於是復籌所急曰急當救表救裏宜四逆湯以復其陽救表宜桂枝湯以解其肌生陽復肌腠解表裏和矣此一節反應上文先下而後汗之意以見下之而表裏俱虛又當救裏救表不必拘於先下而復汗之說也病發熱頭痛脈反沉若不瘥身體疼痛當救其裏四逆湯方太陽病發熱頭痛痛在表則脈宜浮而反沉此正氣內虛也若既汗之不差其身體疼痛仍然不罷須知其表熱為外發之假陽脈沉為內伏之裏陰當憑脈以救其裏宜四逆湯內經云太陽本寒而標熱此證見標證之發熱不見本證之惡寒以本寒之氣沉於內外無惡寒而內有真寒也此一節言病在表而得裏脈又當救其裏不必如上文之身疼痛而止救其表也太陽之氣外行於三陽而從表內行於三陰而從裏今表證而得裏脈恐沉必兼微即易所謂履霜堅冰至之義也太陽病先下而不愈因復發汗以此表裏俱虛其人因致冒冒家汗出自愈所以然者汗出表和故也裏未和然後復下之太陽病當先發汗今先下之虛而不愈因復發汗以此汗下失度致表裏俱虛陰陽不相交接其人因致首如有所覆戴之象而為冒此陰虛於下而戴陽於上也冒家汗出自愈所以然者以陽加於陰得陰氣以和之汗出表和故也蓋表裏之氣本相通表和裏亦和不必復下若審得裏未和然後復下之此一節應上文先發汗而復下之之意也太陽病未解脈陰陽俱停必先振慄汗出而解但陽脈微者先汗出而解但陰脈微者下之而解若欲下之宜調胃承氣湯太陽病未解診其脈陰尺陽寸不偏大偏微而俱見均停陰陽之氣旋轉於中自然變易一番必先振慄汗出而解若邪盛於表其陽寸之脈必大於陰尺而不均停但使陽寸脈轉微者始與陰尺之脈停為陽之過陰先汗出而解若邪實於裏其陰尺之脈必大於陽寸而不均停但使陰尺之脈轉微者始與陽寸之脈停為陰之遇陽下之而解若欲下之不得太過只宜調胃承氣湯主之此一節言汗下亦所以和陰陽也正曰兩微脈與證治頗難解也淺註因添一使字轉字以強通之然必添字方能解即非解經確詁先玩原文陰陽俱停句一停字便見陽脈主表主衛氣陰脈主裏主營血俱停則表裏營衛俱和故營衛相合振慄汗出而解凡是戰汗而解之病皆是營衛和也以下乃言營衛不和脈不停均者但陽脈微為衛不和故先令汗出則衛和而解但陰脈微為營不和故下之令營血和暢則愈仲景文法大指如是惟全書微脈均無當汗下者而此處微脈獨言當汗下理殊難測或由傳寫之訛或則另有深義尚須闕以待考太陽病發熱汗出者此為榮弱衛強故使汗出欲救邪風者宜桂枝湯太陽之為病無不發熱而汗之自出者當求之榮衛蓋人身之汗主之者脈中之榮固之者脈外之衛此為榮氣被衛氣之所以併而弱衛氣受邪風之所客而強弱則汗不能主強則汗不能固邪風為害故使汗出欲救邪風者宜桂枝湯調和榮衛之氣此一節言太陽之氣又從榮衛之氣出入於內外也補曰淺註此段甚精成無己風傷衛之說觀此便知其謬仲景明言邪風傷營故營弱成無己之說謬矣所以淺註亦不從之吾於桂枝湯證言之甚詳傷寒五六日中風往來寒熱胸脅苦滿默默不欲飲食心煩喜嘔或胸中煩而不嘔或渴或腹中痛或脅下痞硬或心下悸小便不利或不渴身有微熱或咳者小柴胡湯主之傷寒五六日經盡一周氣值厥陰藉其中見之少陽而樞轉傷寒如此中風亦如此其證往來寒熱少陰之樞象也胸為太陽之部脅為少陽之部太陽不得出少陽不得樞故為苦滿默字從火從黑伏明之火鬱而不伸故其形默默木火鬱於中致胃絡不和故不欲飲食木火交亢故為心煩木喜條達而上升故喜嘔此病氣則在太陽經氣則值厥陰厥陰之中見則為主樞之少陽也蓋少陽之氣游行三焦在臟腑之外十一藏皆取決之故兼或然七證或涉於心而不涉於胃則胸中煩而不嘔或涉於陽明之燥氣則渴或涉於太陰之脾氣則腹中痛或涉於厥陰之肝氣則脅下痞硬或涉於少陰之腎氣則心下悸而小便不利或太陽藉少陽之樞轉已有向外之勢則不渴身有微熱或咳者又涉太陰之肺氣矣夫五藏之經俞在背主於太陽而五藏之氣由胸而出亦司於太陽今太陽之氣逆於胸而不能外去雖不干動在內有形之藏真而亦干動在外無形之藏氣現出各藏之證非得少陽樞轉之力不能使干犯之邪向外而解必與以小柴胡湯助樞以主之此一節言太陽之氣不能從胸出入逆於胸膈之間內干動於藏氣當藉少陽之樞轉而外出也張錢塘云此章凡十五節皆論柴胡湯之證治又云小柴胡湯乃達太陽之氣從少陽之樞以外出非解少陽也是以有隨證加減之法李士材謂柴胡乃少陽引經之藥若病在太陽用之若早反引賊入門後人不察經旨俱宗是說謬矣補曰內經云少陽為樞蓋實有樞之境地可指又曰十一經皆取決於少陽亦實有取決之路道可指蓋決如決水謂流行也如管子決之則行之義謂言十二經之流行皆取道於少陽也少陽是三焦古作膲即人身中之膈膜油網西醫名為連網內經名為三焦宋元後謂三焦有名無象其說非也三膲之根發於腎系由腎系生脅下之兩大板油中生腹肉之網油連小腸大腸膀胱又上生肝膈連膽系由肝膈生胸前之膜膈循肋腔內為一層白膜上至肺系連於心為心包絡又上而為咽喉此三膲之腑在內者也從內透出筋骨之外是生肥肉肥肉內瘦肉外一層網膜有紋理為營衛外來之路名曰腠理乃三膲之表也邪在腠理出與陽爭則寒入與陰爭則熱故往來寒熱胸脅是膈膜連接之處邪在膈膜故胸脅苦滿少陽膽火游行三焦內通包絡火鬱不達故默默凡人飲水俱從胃散入膈膜下走連網以入膀胱凡人食物化為汁液從腸中出走網油以達各臟邪在膜油之中水不下行則不欲飲汁不消行則不欲食心煩者三焦之相火內合心包也喜嘔者三焦為行水之府水不下行故反嘔也或但合心火為胸中煩而水不上逆則不嘔或三焦之火能消水則渴或肝膈中之氣迫湊於腹內網油之中則腹中痛或邪結於脅下兩大板油之中則脅下痞滿或三焦中火弱水盛水氣逆於心下膈膜之間則心下悸或三焦之府不熱則不消渴而邪在三焦之表居腠理之間則身有微熱或從膜膈中上肺衝咽喉為痰火犯肺則咳總之是少陽三焦膜中之水火鬱而為病也統以小柴胡湯散火降水主之各隨其證之所見而隨證加減無不確切淺註不能一一指實但引內經囫圇解之是知其然而不知其所以然也小柴胡湯方柴胡半斤黃芩三兩人參三兩甘草三兩半夏半升洗生薑三兩切大棗十二枚擘上七味以水一斗二升煮取六升去滓再煎取三升溫服一升日三服後加減法若胸中煩而不嘔去半夏人參加栝蔞實一枚若渴者去半夏加人參合前成四兩半栝蔞根四兩若腹中痛者去黃芩加芍藥三兩若脅下痞硬去大棗加牡蠣四兩若心下悸小便不利者去黃芩加茯苓四兩若不渴外有微熱者去人參加桂三兩溫覆取微汗愈若咳者去人參大棗生薑加五味子半升乾薑二兩張令韶云太陽之氣不能由胸出入逆於胸脅之間內干動於藏氣當識少陽之樞轉而外出也柴胡二月生苗感一陽初生之氣香氣直達雲霄又稟太陽之氣故能從少陽之樞以達太陽之氣半夏生當夏半感一陰之氣而生啟陰氣之上升者也黃芩氣味苦寒外實而內空腐能解形身之外熱甘草人參大棗助中焦之脾土由中而達外生薑所以發散宣通者也此從內達外之方也愚按原本列於太陽以無論傷寒中風至五六日之間經氣一周又當來復於太陽往來寒熱為少陽之樞象此能達太陽之氣從樞以外出非解少陽也各家俱移入少陽篇到底是後人識見淺處又曰太陽之氣不能從胸出入逆於胸脅之間雖不干動在內有形之臟真而亦干動在外無形之臟氣然見一臟之證不復更見他臟故有七或證也胸中煩者邪氣內侵君主故去半夏之燥不嘔者胃中和而不虛故去人參之補加栝蔞實之苦寒導火熱以下降也渴者陽明燥金氣盛故去半夏之辛倍人參以生津加栝蔞根引陰液以上升也腹中痛者邪干中土故去黃芩之苦寒加芍藥以通脾絡也脅下痞硬者厥陰肝氣不舒故加牡蠣之純牡能破肝之牝臟其味鹹能軟堅兼除脅下之痞去大棗之甘緩欲其行之捷也心下悸小便不利者腎氣上乘而積水在下故去黃芩恐寒苦以傷君火加茯苓保心氣以制水邪也不渴外有微熱者其病仍在太陽故不必生液之人參宜加解外之桂枝覆取微汗也咳者傷肺肺氣上逆故加乾薑之熱以溫肺五味之斂以降逆凡咳皆去人參長沙之秘旨既有乾薑之溫不用生薑之散既用五味之斂不用大棗之緩也補曰仲景所用柴胡是今四川產者一莖直上中通有白瓤故能通三焦之膜膈色青氣香春日生成恰得少陽之氣非別省紅軟銀白等柴胡也各省柴胡性烈非少陽之性也用之傷人比羌獨活更烈決不可用讀仲景書者若見四川柴胡則知仲景用藥之妙血弱氣盡腠理開邪氣因入與正氣相搏結于脅下正邪分爭往來寒熱休作有時默默不欲飲食臟腑相連其痛必下邪高痛下故使嘔也小柴胡湯主之服柴胡湯已渴者屬陽明以法治之上言太陽之病而值厥陰之期厥陰中見少陽少陽主樞太陽病值其主氣之期而外出者藉其樞之有力也經云少陽外主腠理內主三焦腠者三焦通會元真之處血氣所注今血弱氣盡則腠理自開太陽所受之邪氣因其氣血之虛而入邪氣與少陽中正之氣兩相擊搏俱結於少陽所部之脅下正邪不兩立則分爭正勝則熱邪勝則寒分爭則往來寒熱離合無定則休作有時經云少陽之上相火主之茲則陽明之火鬱而不伸故其象默默默默之象為少陽專見之證不欲飲食為木氣內鬱而胃絡不和也胃病必及脾藏府之膜本自相連脾病其痛必在於下即前所謂腹中痛是也然腹中原不可以言下今以胃邪在胃脘之高而此痛反居其下邪高故使嘔也用小柴胡湯轉少陽之樞達太陽之氣以主之若服柴胡湯已而反渴者是太陽之氣不能從樞解而轉屬於陽明之燥化也以白虎加人參湯按法治之上節言太陽之氣逆於胸中而動五臟之氣此言太陽之氣結於脅下而傷太陰陽明之氣亦當藉少陽之樞而轉出也補曰腠理者三焦通會元真之處血氣所注淺註不指出何處則不知血氣如何往來也蓋三焦是內油膜透出為瘦肉外皮毛內之膜油其瘦肉肥肉交界處夾縫中有紋理名曰腠理為營血衛氣出入之路徑血弱氣盡則其路徑空虛邪氣因入從腠理內侵及於脅下入兩大板油之中乃三焦之府也三焦根於腎系由腎系生出兩大板油邪入於此正氣欲出不得遂結於脅下其寒熱休作有時者亦因正與邪有或進或退不相值則休也默默解見上三焦為行水化穀之府不欲飲食是上焦膜油與胃腕相交之處竅道不通故食不入內經云胃有大絡即指胃通於膲膜中之管竅也內經名絡西醫名為管從膜膈下入網油網膜屬三焦網膜上之膏油即脾之物脾臟之油生焦膜上與胃府本自相連邪在脾臟油膜之中則結於脅下之板油內或大小腸之油網內則痛而不通夫邪在上焦水穀不得入而痛在下焦逆氣上行故使水穀嘔出也服湯已渴者是嘔雖已水已得下而三焦油膜中火仍不已熏灼其油乾燥遂為轉屬陽明之燥氣矣淺註未能確指故特補之得病六七日脈遲浮弱惡風寒手足溫醫二三下之不能食而脅下滿痛面目及身黃頸項強小便難者與柴胡湯後必下重本渴飲水而嘔者柴胡湯不中與也食穀者噦太陽之邪不解可以柴胡轉其樞太陽之氣內陷不可以柴胡虛其裏得病六日六經之氣已周而又來復於太陽正是七日診其脈遲氣虛也浮弱血虛也氣血俱虛而見太陽證之惡風惡寒當於尋常之太陽證外另參脈息日期而分別且又有獨見之證曰手足溫系在太陰也此氣血俱虛醫者不知反二三下之虛其中氣以致不能食而脅下為少陽之部位其樞逆而不轉故無往來寒熱惟滿而且痛面目及身黃為太陰土氣虛而真色現也雖頸項強為太陰之經氣不利而脾不轉輸為小便難者是中氣虛之大關鍵柴胡湯乃從內達外之品裏氣虛者忌用若與柴胡湯裏氣虛陷後必下重夫嘔渴乃柴胡湯之的證而本渴而飲水嘔者中胃虛也柴胡湯非中胃之藥不中與也與之而中氣愈虛食穀者噦此緣二三下之既誤不可以柴胡湯而再誤也此一節言太陽之氣陷於太陰之地中太陰陽明氣虛不能從樞外出又非柴胡湯所主也正曰浮主陽浮於外遲弱主陽氣虛弱非血虛也陽氣不振故惡風寒手足溫者別於手足潮熱而言謂陽氣虛弱手足當厥冷即不厥冷而手足溫亦與潮熱不同醫者不知為陽虛乃二三下之其脾必寒膜上之膏油即脾之物也膜油寒不能熏化腸中水穀故不能食膏油之大者是脅下兩大板油寒氣歸此則脅下滿痛周身之油寒乃脾土陽虛之極現出土之本色則黃雖頸項強亦是寒非風熱也小便難亦是水入膜網之中其膏油不能熏蒸滑利所謂脾不健運亦非熱也膏油既弱則其質虛軟若再用小柴胡湯清利其膜網則膜網弛縱不收大小腸往下墜後陰必下重即今所謂脫肛也腸連於膜網而膜網又賴有膏油以充攝之也今膏油虛軟復用柴胡疏其膜網是以弛縱而下墜此理近人少知不得不詳悉言也又本渴有似燥熱而飲水嘔者則渴是津不升嘔是虛寒脾之膏不能化水柴胡是疏三焦之網故不中與也若與之傷其膏油之氣則食穀不化而噦逆總見膏油不能化水穀與膜網不通利者有別須辨到此乃知仲景論證之精傷寒四五日身熱惡風頸項強脅下滿手足溫而渴者小柴胡湯主之前言服柴胡湯已而渴者以法治之不再用柴胡也嗣言柴胡不中與者戒用柴胡也然有不可泥者傷寒四五日為陽虛入陰之期身熱惡風頸項強仍在太陽之分而不入於裏陰也脅下滿得少陽之極象也手足溫者是餘在太陰今手足溫而渴者為不涉於太陰而涉於陽明也上言服柴胡湯已而渴者當以陽明之法治之此不因服柴胡湯而渴仍宜從樞圖治以小柴胡湯主之至於項強脅滿手足溫等證前言不中與而茲特與之者一以大下裏虛一以未下裏不虛也此一節承上文兩節而推言之凡病氣不隨經氣入裏而為燥化與未陷裏陰裏氣未虛者無不可以小柴胡湯治之補曰此證全與上節相同只是未經誤下脈亦不浮弱是脾之膏油未受傷而邪在膜網也仍當清疏理其膜網故用小柴胡湯以見上節病在膏油屬太陰脾土此節病在膜網屬少陽三焦一虛一實毫釐千里仲景對舉於此正欲令人互勘傷寒陽脈澀陰脈弦法當腹中急痛先與小建中湯不瘥者小柴胡湯主之太陽傷寒值厥陰主氣之期浮分之陽脈澀是少陽之樞不能外轉也沉分之陰脈弦是厥陰木邪下於太陰則太陰之榮氣受傷法當腹中急痛者先與小建中湯建立中焦之榮氣令腹痛漸愈若不差者與小柴胡湯主之以轉其樞樞轉則邪氣外達而痛愈矣此一節言太陽病值厥陰主氣之期內干太陰而腹痛當先補益於內而後樞轉於外也按原法腹痛小柴胡湯去黃芩加白芍補曰陽脈屬氣分衛氣從膜網而出以達皮毛網膜不通利則衛氣難於外出故脈應之而澀陰脈屬血分血藏膏油之中血滯油寒氣不得與血流通則血行氣阻而作痛所謂痛則不通也故先與小建中湯以溫其膏油建中者指中焦之而言此湯溫中焦之膏油膏油既溫則血不凝滯而膜中之氣自暢斯不痛矣若油既溫和痛仍不瘥者是膏油血分通利而膜網之微絲管竅不通利故陽氣不得出也復與小柴胡湯疏利其網膜則陽氣得通暢而愈建中柴胡二湯互用從無人實知其理淺註引經為註只囫圇解而不透徹今特指出膜網是三焦膜網上所生之油是脾所司也故病在膏油用建中湯病在膜網用小柴胡義可知矣小建中湯方桂枝三兩去皮甘草二兩炙大棗十二枚擘芍藥六兩生薑三兩切膠飴一升上六味以水七升煮取三升去滓內膠飴更上微火消解溫服一開日三服嘔家不可用建中湯以甜故也程扶生曰傷寒二三日邪尚在表未及傳裏之時悸則陽虛煩則陰虛故以芍藥之苦以益陰薑桂之辛以扶陽而復用甘草大棗之甘溫緩其中中既建則邪不致入裏矣而薑桂等又能托邪外出此為陰陽兩虛之人而立一養正驅邪法也張令韶曰經隧之血脈流行不息今寒氣入而稽遲之入陽絡則脈澀入陰絡則陰脈弦法當腹中急痛先與建中湯以經隧之血脈皆中胃之所生更得小柴胡湯以轉樞機樞機利則經隧之血脈通矣通則不痛也蔚考金匱黃耆建中湯有加減法小建中湯無加減法今查內臺方議本有加減未知為年久脫簡抑或許氏新附與否姑錄之以備參考方議載建中湯治虛痛者加黃耆治心痛者加元胡索治血虛者加當歸芎藭治盜汗多者加小麥茯神治虛中生熱加柴胡地骨皮傷寒中風有柴胡證但見一證便是不必悉具凡柴胡湯病證而下之若柴胡證不罷者復與柴胡湯必蒸蒸而振卻復發熱汗出而解傷寒中風有柴胡證但見一證便是不必悉具此一節申明首節之義以推廣小柴胡湯之用也余通家周宗超云以傷寒言之轉少陽之樞外出太陽也以中風言之厥陰不從標本從中見少陽之治也此解極見明亮且夫柴胡湯之用甚廣也即誤下之後而裏氣不虛者亦可用之凡柴胡湯如首節所言之病證病涉於樞原有欲出之機一轉即出而醫者竟下之下之恐邪氣乘下之虛而入於裏陰矣若柴胡證不罷者速宜復與柴胡湯其氣外轉必蒸蒸而振熱退而卻復發熱汗出而解蓋以下後傷其中焦之津液欲作汗時而為此一番之變動也此一節重申柴胡湯之妙而所以妙之在乎樞轉也補曰少陽是三焦內為膜網外為腠理居半表裏之間界內陰外陽之際故內經以樞機比之非果有機輪轉動也淺註加一轉字似是而非蓋少陽之邪氣從腠理透入於裏少陽之正氣亦須從腠理透出於外柴胡生於春日一莖直上莖中松白有似人身網膜故能透達膜油使氣從腠理中直達於外既下之邪已於裏正氣欲出必蒸蒸而振者正與邪爭故戰也迨正既勝邪陽得外出卻只發熱而邪隨汗解矣其先蒸蒸是陰鬱其陽寒熱交作故振而汗不得出其後鬱解則但熱不寒汗遂出而解矣故以轉字解少陽經尤不如透達二字解之更切傷寒二三日心中悸而煩者小建中湯主之蓋以樞者內外之樞紐也可從樞而外出亦可從樞而內入傷寒病過服發表之劑其惡風寒等證已解而內虛之證漸形至二日為陽明主氣之期三日為少陽主氣之期外邪既凈無庸從少陽之樞而外出而發表後虛弱不支之病轉入於所合之心包絡包絡主血血虛則心中悸不獨悸而且煩者以煩涉於心主之血分而不涉於樞脅之氣分故以小建中湯主之此一節淺言之不過虛補二字而言外合一樞字之義見少陽三焦內合厥陰心包而主血故亦可隨樞而內入也心包主血血虛神無附麗而自悸則悸為虛悸而煩亦虛煩也補曰三焦即膜網也包絡俗名護心油膜膈上循腔子上肺系至心為包絡經曰三焦上合心包以其膜網相連也膜與油古又名膏肓膏即是油肓即是膜網小柴胡是疏膜網建中湯是溫補膏油膏油即脾土所屬心包之火從護心油而下以溫周身之膏油是為火生土建中湯即此義也故以桂枝入心為主而其餘藥皆是補脾陳平伯云但云心中煩悸不云無汗惡寒等證可知服過麻黃湯後表實已解裏虛漸著故以此湯補之否則大青龍梔子豉湯之證誤服害事太陽病過經十餘日反二三下之後四五日柴胡證仍在者先與小柴胡嘔不止心下急郁郁微煩者為未解也與大柴胡湯下之則愈少陽為陽樞少陰為陰樞其氣相通太陽病過經十餘日十日為少陰主氣之期醫反二三下之逆其少陰之樞機後四五日乃十五六日之間再作經而又當少陽主氣之期太陽之氣不因下陷仍欲從樞而外出故柴胡證仍在者先與小柴胡湯以解外若嘔不止是太陽之氣不從樞外出而從樞內入干於君主之分外有心下滿急之病象內有鬱鬱微煩之病情者為未解也與大柴胡湯下之下其邪氣而不攻其大便則愈此言病在樞者小柴胡湯達之於外所以轉之大柴胡湯泄之於內亦所以轉之也補曰但執樞字解少陰經故於嘔不止證不能明了於心下急但言君主之分皆屬含糊不知心下是指胸前之膈膜急如裏急少腹急之急乃是膈膜收縮促急褊窄也膜通利則鬆緩膜鬱滯則褊急少陽三焦膜中火甚則鬱遏燒灼膈膜收縮而急火合於心包則煩火太逆則嘔不止證重於小柴胡故但用清疏不能降其火必用大柴胡有大黃以下之使火氣不逆乃愈又必用柴胡一味以透達膜膈也膈膜透達則通利鬆緩不褊急矣但曰下之亦是轉之囫圇語安能令人明晰大柴胡湯方柴胡半斤黃芩三兩芍藥三兩半夏半升洗生薑五兩枳實四兩炙大棗十二枚擘上七味以水一斗二升煮取六升去滓再煎溫服一升日三服一方用大黃二兩若不加大黃恐不為大柴胡湯也此方原有兩法長沙辨而均用之少陽之樞並於陽明之闔故用大黃以調胃蔚按凡太陽之氣逆而內干必藉少陽之樞轉而外出者仲景名為柴胡證但小柴胡證心煩或胸中煩或心下悸重在於脅下苦滿而大柴胡證不在脅下而在心下曰心下急鬱鬱微煩曰心下痞硬以此為別小柴胡證曰喜嘔曰或胸中煩而不嘔而大柴胡證不獨不嘔而且嘔吐不獨喜嘔而且嘔不止又以此為別所以然者太陽之氣不從樞外出反從樞內入干於君主之分視小柴胡證頗深也方用芍藥黃芩枳實大黃者以病勢內入必取苦泄之品以解在內之煩急也又用柴胡半夏以啟一陰一陽之氣生薑大棗以宣發中焦之氣蓋病勢雖已內入而病情仍欲外達故制此湯還藉少陽之樞而外出非若承氣之上承熱氣也汪訒庵謂加減小柴胡小承氣可為一方未免以庸俗見測之也傷寒十三日不解胸脅滿而嘔日晡所發潮熱已而微利此本柴胡證下之以不得利今反利者知醫以丸藥下之此非其治也潮熱者實也先宜服小柴胡湯以解外後以柴胡加芒硝湯主之傷寒十三日經盡一周而又來復於太陽若不解又交於陽明主氣之期病氣亦隨經氣而涉於陽明陽明司闔而主胸少陽司樞而主脅既滿而又嘔是陽明之闔不得少陽之樞而外出也日晡所在申酉戌之間陽明於其所旺時而發潮熱熱才已而即微利此本系大柴胡證不知用大柴胡方法下之而不得利今反微利者知醫以丸藥下之丸緩留中不得外出非其治也潮熱者陽明氣實也先宜小柴胡湯以解太陽之邪於外後以柴胡加芒硝湯解陽明之邪於內而主之蓋胸脅滿而嘔太少兩陽之病日晡所發潮熱陽明燥氣病也此一節言太陽之氣於陽明中土亦當從樞而外出其用柴胡加芒硝亦從樞出之義非若承氣之上承熱氣也正曰胸滿而嘔是少陽三焦膈膜鬱滯日晡潮熱是陽明大腸燥結實熱當先用小柴胡湯以治滿嘔後用加芒硝湯以治燥實則膜膈之氣上達而病已大腸之實下行而亦不利今病已反有微利者何也蓋此證先嘔滿後潮熱後得之證為標先得之證為本此本證嘔滿是小柴胡證宜升達之邪若用大柴胡湯下之而亦不得利以嘔滿之仍欲上達故不得利何以知下之是用大柴胡因此節承上節而言故知之也今字承上文已字謂本柴胡證雖下之而不利乃今所謂嘔滿潮熱之證已止而反有微利者知醫以別樣攻破之丸藥強下之非其治法故有流弊也此是上段言本病是少陽證標病是陽明證醫者不分先後誤以丸下則非其治也下一段承上本柴胡證滿而嘔吐而標病又見潮熱者是陽明大腸之實熱也其治法宜分先後先用小柴胡以解外使少陽嘔滿之本證得上達而解後用加芒硝湯以泄大腸之實熱則潮熱並愈且斷無已而反微利之流弊如此繳轉解則方證自明淺註不將下利作撇筆解幾如下利之明復用芒硝豈不刺謬哉故讀仲景書於文法承接轉折處須細心體認又胸脅系少陽之膜膈淺註以胸屬陽明因此節文潮熱是陽明證故欲摭胸入陽明經以求通下文之意豈知於胸脅二字既差而於下文轉折剝換又不了了安能全節文理皆通哉又大柴胡是治胃胃通於膜油人之膏油則色帶黃應土之色也心下膜膈連胃脾及兩脅之間膏油最多熱在膏油脹而擠塞故上節心下急以大黃色黃味苦即於膏油者下之加芒硝湯是治大腸大腸生於下焦下焦少膏油只是連網與腸相通大腸屬燥金芒硝色白屬金質潤治燥味鹹直走下焦故治大腸之燥如此分別乃知仲景用藥之精柴胡加芒硝湯柴胡二兩六銖半夏二十銖黃芩一兩甘草一兩生薑一兩人參一兩大棗四枚芒硝二兩上七味以水四升煮取二升去滓納芒硝更煮微沸分溫再服此藥劑之最輕者以今秤計之約二兩分二服則一服只一兩耳蔚按小柴胡湯使太陽之氣從樞外出解見原方茲云十三日經盡一周既來復於太陽當解而不能解又交陽明主氣之期病氣亦隨經氣而涉之陽明主胸少陽主脅胸脅滿而嘔者陽明之闔不得少陽之樞以外出也日晡所者申酉戌之際也陽明旺於申酉戌故應其時而發潮熱熱已微利者陽明之氣雖實其奈為丸藥所攻而下陷陷者舉之用小柴胡湯以解外解寓升發之義即所以舉其陷而止其利也又加芒硝者取芒硝之鹹寒以直通地道不用大黃之苦寒以犯中宮蓋陽明之氣既傷不宜再傷師之不用大柴而用小柴其義深矣傷寒十三日過經譫語者以有熱也當以湯下之若小便利者大便當硬而反下利脈調和者知醫以丸藥下之非其治也若自下利者脈當微厥今反和者此為內實也調胃承氣湯主之傷寒十三日再經已周而又來復於太陽不解則病氣已過於陽明胃府名曰過經過經譫語者以胃府有熱也當以湯藥下之若小便利者津液偏滲大便當鞕今不鞕而反下利診其脈不與證相背亦姑謂之調和者知醫不以湯藥下之而以丸藥下之病仍不去非其治也若胃氣虛寒而自下利者脈當微而手足亦厥必不可下今脈與陽明胃府證不相背即可反謂之和者以丸緩留中留而不去此為內實也以調胃承氣湯去其留中之穢以和其胃氣主之此一節言病氣隨經氣而過於陽明也正曰姑謂之反謂之皆淺註強解之詞安知原文實義哉蓋仲景謂譫語便鞕不當下利脈亦當大不當調和今不硬而反下利脈不大而反調和者知醫不以湯藥滌其熱而但以丸藥下其糞旁流滯下使當大之脈被其挫弱遂為調和之形是下利脈和而實邪仍在非其治也何以知下利脈和仍是實邪仲景又申明曰若下利是虛其脈當微手足當厥今脈不微而反和所以知其非虛乃醫者挫弱其脈如此此雖外見和脈而內仍為實邪也以調胃承氣湯主之余曾臨證見素虛人及六陰脈人雖得傷寒熱證脈亦不大僅見為和即與此節脈和同一例也仲景於常診外添一變法精之至矣太陽病不解熱結膀胱其人如狂血自下下者愈其外不解者尚未可攻當先解其外外解已但少腹急結者乃可攻之宜桃核承氣湯太陽病不解若從胸脅而入涉於陽明少陽之分此小柴胡湯之證也今從背經而入於本府名為熱結膀胱膀胱在少腹之間經曰膀胱者胞之室也胞為血海居膀胱之外熱結膀胱熏蒸胞中之血血陰也陰不勝陽故其人如狂若血自下則熱亦隨血而下者自愈若其邪在外猶是桂枝證不解者尚未可攻當先解其外外解已但見少腹急結者無形之熱邪結而為有形之蓄血乃可攻之宜桃核承氣湯方此一節言太陽之邪循經而自入於本府也桃核承氣湯方桃仁五十個去皮尖桂枝二兩大黃四兩芒硝二兩甘草二兩炙上五味以水七升煮取二升半去滓納芒硝更上火微沸下火先食溫服五合日三服當微利先食言服藥在未食之前也蔚按張令韶謂太陽有氣有經其氣從胸而出入其經挾脊入循膂而內絡膀胱如病邪從胸脅而入涉於陽明少陽之分則為小柴胡湯證循背膂而入自入於太陽之府則為桃仁承氣湯證太陽之腑曰膀胱在小腹之間為血海之所膀胱有津液而無血而與胞中之血海相連熱干之陰不勝陽則動胞中之血而自下故其人如狂然病起外邪當先解外必審其小腹急結乃可攻之急結者其血有急欲通之象也桃得陽春之生氣其仁微苦而涌泄為行血之緩藥得大黃以推陳致新得芒硝以清熱消瘀得甘草以主持於中俾諸藥遂其左宜右有之勢桂枝用至二兩者註家以為兼解外邪而不知辛能行氣氣行而血乃行也男蔚按內經曰血在上喜忘血在下如狂傷寒八九日下之胸滿煩驚小便不利譫語一身盡重不可轉側者柴胡加龍骨牡蠣湯主之傷寒八日當陽明主氣之期九日當少陽主氣之期下之傷其陽明之氣為胸滿逆其少陽之氣而為煩驚以少陽三焦內合心主包絡故也小便不利為少陽三焦決瀆之官失其職也譫語為陽明胃氣不和也一身盡重不可轉側者少陽循身之側樞機不利故也以柴胡加龍骨牡蠣湯主之此一節言太陽之氣因庸醫誤下以致三陽同病特立三陽並治之方滋陽明之燥助少陽之樞而太陽不失其主開之職其病仍從少陽之樞而外出矣柴胡加龍骨牡蠣湯方半夏二兩洗大棗六枚柴胡四兩生薑一兩半人參一兩半龍骨一兩半鉛丹一兩半桂枝一兩半去皮茯苓一兩半大黃二兩牡蠣一兩半上十一味以水八升煮取四升納大黃切棋子更煮一二沸去滓溫服一升內臺方議云傷寒八九日邪氣錯雜表裏未分而誤下之則虛其裏而傷其表胸滿而煩者邪熱客於胸中驚者心惡熱而神不守也小便不利者裏虛津液不行也譫語者胃熱也一身盡重不可轉側者陽氣內榮於裏不行於表也故用柴胡為君以通表裏之邪而除胸脅滿以人參半夏為臣輔之加生薑大棗而通其津液加龍骨牡礪鉛丹收斂神氣而鎮驚為佐加茯苓以利小便而行津液加大黃以逐胃熱止譫語加桂枝以行陽氣而解身重錯雜之邪共為使以此十一味之劑共救傷寒壞逆之法也傷寒論共十二味一本無黃芩止十一味也傷寒腹滿譫語寸口脈浮而緊此肝乘脾也名曰縱刺期門傷寒腹滿為太陰證譫語為陽明證其脈不宜浮緊矣乃取之寸口三部脈浮而緊其名曰弦弦為肝脈此肝乘脾之病也內經云諸腹脹大皆屬於熱又云肝氣盛則多言是腹滿譫語乃肝旺所發也旺則侮其所勝直犯脾土名之曰縱謂蹤勢而往無所顧慮也宜刺期門二穴以制其縱此一節合下節論病在有形之藏而不在無形之氣也在無形之氣則曰太陰厥陰在有形之藏則曰脾曰肝曰肺也傷寒發熱嗇嗇惡寒大渴欲飲水其腹必滿自汗出小便利其病欲解此肝乘肺也名曰橫刺期門傷寒發熱病在表也太陽主表而肺亦主表嗇嗇惡寒皮毛虛也太陽主皮毛而肺亦主皮毛金受火克故大渴欲飲水飲水過多肺氣不能通調水道故其腹必滿若得自汗出則發熱惡寒之證便有出路小便利則腹滿之證便有去路此肺氣有權得以行其治節則其病欲解而不然者發熱惡寒如此腹滿又如此此肝木乘肺金之虛而侮其所不勝也名之曰橫謂橫肆妄行無復忌憚也亦刺期門二穴以平其橫按期門二穴在乳下第二肋端去乳頭約四寸肝募也厥陰陰維之會刺入四分此穴刺法能佐小柴胡湯所不及活人云穴在乳直下肋骨近腹處是也則是第二肋當從下數起恰在軟肋之兩端是血刺法肥人一寸瘦人半寸不肥不瘦中取之但下針令病人吸五吸停針良久徐徐出針此平瀉法也太陽病二日反躁凡熨其背而大汗出大熱入胃胃中水竭躁煩必發譫語十餘日振慄自下利者此為欲解也故其汗從腰以下不得汗欲小便不得反嘔欲失溲足下惡風大便硬小便當數而反不數及不多大便已頭卓然而痛其人足心必熱穀氣下流故也太陽病二日正當陽明主氣之期以太陽之病而得陽明之氣陽極似陰故擾動不安而反躁醫者誤認為陰躁而凡以火熨其背背為陽陽得火熱而大汗出汗乃胃中水穀之津大熱入胃則胃中之水津竭遂下傷水陰之氣而躁上動君火之氣而煩中亡胃中之津必發譫語十餘日又值少陰主氣之期得少陰水陰之氣以濟之則陰氣復而陽熱除先見振慄之象旋而大便自下利者此為陽明得少陰之氣陰陽和而欲解也且夫陰陽之氣元妙難言也而以一身之部位論則身半以上為陽身半以下為陰若陽在上而不得下交於陰故其汗從腰以下不得汗欲小便不得反嘔陰在下而不得上交於陽故欲失溲足下惡風然上下所以不交者責在胃實以隔之前此止是胃中竭後此則為大便鞕鞕者必以法通之不得拘於大便鞕小便當數而反不數及多印板套語謂津液當還胃中而不必遽通也通之之後得大便已則燥結去火邪泄於是陰氣旋轉而上升其頭卓然而痛陽氣光明而下濟其人足心必熱此穀氣下流故也此章凡十一節皆言火攻之誤以明太陽為諸陽主氣陽為火不可以火攻之也即不用火而羌獨荊防薑附桂茱之類皆是也補曰此節文繁理奧或有錯簡或章句不應相連又似當分作兩節解義難通貫當闕疑以待考太陽病中風以火劫發汗邪風被火熱血氣流溢失其常度兩陽相熏灼其身發黃陽盛則欲衄陰虛則小便難陰陽俱虛竭身體則枯燥但頭汗出劑頸而還腹滿微喘口乾咽爛或不大便久則譫語甚者至噦手足躁擾捻衣摸床小便利者其人可治太陽病中風以火劫發汗邪風更被火熱逼其血氣從外流溢失其行陰行陽之常度風為陽火亦為陽兩陽交相熏灼其身發黃設陽邪盛於陽位則猶可乘其勢之欲衄使之從衄而解至於陽邪盛乘陰分之虛而深入之津液乾涸則小便難而陰氣陽氣之流溢者至此俱覺虛竭細察其周身全體則無汗而枯燥但頭汗為火熱上攻而出其津液不能周遍則劑頸而還邪熱內鬱則腹滿微喘邪熱上薰而口乾咽爛其初陽明燥結或止見不大便稍久則神亂而譫語甚者氣逆而至噦其病更深矣四肢者諸陽之本邪熱亢盛則手足躁擾捻衣摸床俱為真陰立亡之象恐非藥力所能勝者必察其小便尚利者為一線之真陰亡而未亡其人猶為可治此一節言火攻之危證也汪苓友云諸家註皆言小便自利夫上文既言小便難豈有病劇而反有自利之理必須用藥以探之其人小便利猶為可治之證如其不利治亦罔效矣此說亦通按探法豬苓湯可用或茵陳蒿湯亦妙傷寒脈浮醫以火迫劫之亡陽必驚狂臥起不安者桂枝去芍藥加蜀漆牡蠣龍骨救逆湯主之傷寒脈浮為太陽之病當以麻黃湯化膀胱津液出諸皮毛而為汗則愈太陽與君火相合而主神心為陽中之太陽醫以火迫劫之遂致亡其上焦君火之陽神氣浮越必驚狂起臥不安者以桂枝去芍藥再加蜀漆牡蠣龍骨救逆湯主之前條中風火劫其汗證見亡陰故小便利為可治此條傷寒火劫其汗證見亡陽難俟陽之自復故以此湯從手厥陰以復之凡亡陰中之陽必用附子以救之此亡陰中之陽因火迫劫又非附子之所宜此一節為火逆出其方也當知手厥陰證之專方非火逆通用之方也但汪苓友疑亡陽證恐不能勝蜀漆之暴悍柯韻伯疑當時另有蜀漆非常山苗也愚每以茯苓代之熱盛者以白薇代之桂枝湯去芍藥加蜀漆龍骨牡蠣救逆湯桂枝三兩去皮甘草二兩炙生薑三兩切牡蠣五兩龍骨四兩大棗十二枚擘蜀漆四兩洗去腥上為末以水一斗二升先煮蜀漆減二升納諸藥煮取三升去滓溫服一升原本為末水煮必有其故張令韶曰傷寒脈浮病在陽也太陽與君火相合而主神心為陽中之太陽醫以火迫劫亡陽亡其君主之陽非下焦生陽之陽心為火迫則神氣外浮故如驚狂而不安桂枝色赤入心取之以保心氣佐以龍牡者取水族之物以制火邪取重鎮之品以治浮越也芍藥苦平非亡陽所宜故去之蜀漆取通泄陽熱故先煮之神氣生於中焦水穀之精故用甘草大棗生薑以資助中焦之氣也病在陽復以火劫此為逆也故曰救逆形作傷寒其脈不弦緊而弱弱者必渴被火必譫語弱者發熱脈浮解之當汗出愈病形初作時絕似傷寒見惡寒體痛無汗等證其脈似當弦緊令診其脈不弦緊而弱弱者陰不足陽氣陷於陰分傷其津液其人口必渴若被火攻者津液愈亡致胃中燥熱必發譫語然脈弱者雖不可汗而見證既有發熱再審其脈弱中見浮不妨服桂枝湯啜熱稀粥從養陰法以解之當汗出愈此一節言脈弱亦不可以火攻也按仲景不出方程郊倩擬用大青龍湯未免太過余註擬用桂枝湯然於必渴二字亦扣不著今擬小柴胡湯去半夏加栝蔞根仍與桂枝湯合半用溫服覆取微汗較妥太陽病以火熏之不得汗其人必躁到經不解必清血名為火邪太陽病法在發汗然太陽之汗從下焦血液而生若以火熏之則血液傷而不得汗下焦血液生之於腎腎傷其人必躁如經氣已周七日之數復到於太陽之經而不汗解其火邪下攻則必清血內經云陰絡傷則便血此因火所致名為火邪一本清作圊此一節言火邪之逆於下也補曰此與熱入血室熱結膀胱蓄血等證皆是指血室而言膀胱生於膜油之上膜油內一大夾室即血室也膀胱之氣與血室之血合同而行是為營衛營血外出則居於肌肉之分衛氣外出則充於皮毛之間傷寒邪熱從皮毛氣分入膜網而內侵膀胱則為水結從肌肉之血分入膜油而內侵血室則為蓄血下血等證觀此益知血氣皮毛肌肉腠理膜油血室膀胱內外之層折矣即下節唾血亦是從肌肉內侵膜油干心肺與下血只上下之別而其理則一也脈浮熱甚而反灸之此為實實以虛治因火而動必咽燥吐血脈浮熱甚陽氣實也不宜灸而反灸之此為病證之實反以陷下之法灸之是實以虛治因火而動必上攻於咽而咽燥內動其血而唾血蓋火氣通於心經云手少陰之脈上膈夾咽是也火氣循經上出於陽絡經云陽絡傷則血外溢是也此一節言邪火之逆於上也愚按大黃瀉心湯可用或加黃芩即金匱之正法微數之脈慎不可灸因火為邪則為煩逆追虛逐實血散脈中火氣雖微內攻有力焦骨傷筋血難復也微為虛之脈數為熱之脈虛熱盛則真陰虛慎不可灸若誤灸之因致火盛為邪上攻則為煩逆且陰本虛也更追以火使虛者愈虛熱本實也更逐以火使實者愈實陰主榮血而行於脈中當追逐之餘無有可聚之勢以致血散脈中彼艾火之氣雖微而內攻實為有力焦骨傷筋大為可畏所以然者筋骨藉血以濡養之今血被火而散於脈中血一散則難復也終身為殘廢之人誰職其咎耶此一節言火邪之逆於中也虛熱之人以火攻散其脈中之血則難復也愚按速用芍藥甘草湯可救十中之一二脈浮宜以汗解用火灸之邪無從出因火而盛病從腰以下必重而痹名火逆也欲自解者必當先煩煩乃有汗而解何以知之脈浮故知汗出解脈浮病在表宜以汗解用火灸之傷其陰血不能作汗邪無從出反因火勢而加盛火性上炎陽氣俱從火而上騰不復下行故病從腰以下必重而痹內經云真氣不周命曰痹此因火而累氣故不名氣痹而名火逆也然未灸之先豈無自汗而解者須知欲自解者必待其自汗內經云在心為汗心之血液欲化為汗必當先煩乃有汗而解何以知之診其脈浮為外出之機先見故知汗出而解也此一節言誤灸後之病形並及未灸前自愈之脈證也燒針令其汗針處被寒核起而赤者必發奔豚氣從少腹上衝心者灸其核上各一壯與桂枝加桂湯更加桂二兩也汗為心液燒針令其汗則心液虛矣針處被寒核起而赤者心虛於內寒薄於外而心火之色現也少陰上火而下水火衰而水乘之故必發奔豚其氣從少腹上衝心者灸其核上各一壯助其心火並散其寒再與桂枝加桂湯其方即於原方更加桂二兩溫少陰之水藏而止其虛奔此一節言外寒束其內火用火鬱發之之義也汪苓友云此太陽病未發熱之時誤用燒針開發腠理以引寒氣入藏故用此法若內有鬱熱必見煩躁等證又不在此例矣桂枝加桂湯方桂枝三兩芍藥三兩生薑三兩甘草二兩大棗十二枚牡桂二兩上六味以水七升煮取三升去滓溫服一升按桂即桂枝也本方共五兩已經照數加入二兩矣今坊刻各本有加牡桂二兩相傳已久姑錄存參蔚按少陰上火而下水太陽病以燒針令其汗汗多傷心火衰而水乘之故發奔豚故用桂枝加桂使桂枝得盡其量上能保少陰之火藏下能溫少陰之水藏一物而兩扼其要也核起而赤者針處被寒灸以除其外寒並以助其心火也火逆下之因燒針煩躁者桂枝甘草龍骨牡蠣湯主之火逆之證頗類胃實病象醫者誤認為裏實證而下之下之不愈因復燒針是下既奪其裏陰燒針復逼其虛陽陰陽兩相乖離而煩躁者以桂枝甘草龍骨牡蠣湯主之此一節為火逆煩躁者立交通心腎之方也桂枝甘草龍骨牡蠣湯方桂枝一兩甘草二兩牡蠣二兩龍骨二兩上為末以水五升煮取二升半去滓溫服八合日三服為末水煮即此是法蔚按太陽病因燒針而為火逆者多今人不用針燒而每有火逆之證者炮薑桂附荊防羌獨之類逼其逆也火逆則陽亢於上若遽下之則陰陷於下陽亢於上不能遇陰而煩陰陷於下不得遇陽而燥故取龍牡水族之物抑亢陽以下交於陰取桂枝辛溫之品啟陰氣以上交於陽最妙在甘草之多資助中焦使上下陰陽之氣交通於中土而煩躁自平也太陽傷寒者加溫針必驚也太陽傷寒者若在經脈當用針刺若在表在肌則宜發汗宜解肌不宜針刺矣若加溫針傷其經脈則經脈之神氣外浮故必驚也即內經所謂起居如驚神氣乃浮是也張令韶云自此上十一節歷言火攻之害今人於傷寒病動輒便灸草菅人命可勝悼哉受業薛步雲按火劫發汗今人少用此法而荊防羌獨薑桂芎芷蒼橘之類服後溫覆逼汗皆犯火劫之禁讀仲景書宜活看不可死板傷寒論淺註補正卷一下辨太陽病脈證篇太陽病當惡寒發熱今自汗出反不惡寒發熱關上脈細數者以醫吐之過也一二日吐之者腹中饑口不能食三四日吐之者不喜糜粥欲食冷食朝食暮吐以醫吐之所致也此為小逆太陽病當惡寒發熱今吐傷中氣津液外泄而自汗出汗出而外證亦微不惡寒發熱脾胃之氣不足而關上之脈見微細虛數者此非本病以醫者吐之之過也一二日吐之者以二日為陽明主氣之期吐之則胃傷而脾未傷故脾能運而腹中饑胃不能納而口不能食三四日吐之者以四日為太陰主氣之期吐之則脾傷而胃未傷脾傷則不勝穀故不喜糜粥胃未傷仍喜柔潤故欲食冷食朝為陽胃為陽土胃陽未傷故能朝食暮為陰脾為陰土脾陰已虛故至暮吐所以然者以醫誤吐之所致也前傷胃而不傷脾後傷脾而不傷胃非脾胃兩傷之劇證此為小逆此一節言病由誤吐一時氣逆使然後人擬用大小半夏湯然卻不知仲師無方之妙法述此章凡四節皆言吐之失宜而變證有不同也太陽病吐之但太陽病當惡寒今反不惡寒不欲近衣此為吐之內煩也太陽病不當吐而吐之但太陽病原當惡寒今吐後反不惡寒不欲近衣者此為吐之傷上焦心主之氣陽無所附而內煩也此一節言吐之不特傷中焦脾胃之氣亦能傷上焦心主之氣也病人脈數數為熱當消穀引食而反吐者此以發汗令陽氣微膈氣虛脈乃數也數為客熱不能消穀以胃中虛冷故吐也病人脈一息六七至其名曰數數為熱證與虛冷之證不同故數果為熱熱當消穀而引食而反見作吐者此非熱也以過發其汗令陽氣外微陽受氣於胸中故膈中之氣亦虛脈乃數也數為外來之客熱非胃中之本熱無熱不能消穀以胃中虛冷故吐也上二節之吐言以吐致吐此節之吐言不以吐而致吐也補曰此與金匱胃中空虛客氣動膈同義蓋陽氣微是指陽明胃中之氣微膈是胸前膈膜通於胃脘之處膈膜由胸前上通於心包心火之所以生土者皆由心包傳入膈膜以熏化胃中之飲食而心又主血脈西醫言心體跳動不休脈即應之而動今以膈氣虛心火不能生胃土而客氣乘虛入於膈中擾亂心主之血脈乃見數象是此數脈非陽明胃中本熱乃乘虛外來侵膈中之客熱也客熱在膈不在胃中故胃中仍虛冷所以吐也淺註隨文敷衍未能了晰又西醫之說詳吾醫經精義與內經論脈相合讀者當參考之太陽病過經十餘日心下溫溫欲吐而胸中痛大便反溏腹微滿鬱鬱微煩先此時自極吐下者與調胃承氣湯若不爾者不可與但欲嘔胸中痛微溏者此非柴胡湯證以嘔故知極吐下也調胃承氣湯病證在疑似不可定之際必求諸病人之情太陽病既已過經不解當辨其病留於何經之分而不必泥於所值之氣約計十有餘日或留於陽明之分則心下溫溫欲吐而胸中痛以心下與胸中為陽明之所主也或留於太陽之分則大便反溏而腹微滿以大便與腹為太陽之所主也胃絡上通於心脾脈又上膈注心脾胃不和故鬱鬱微煩然以上諸證或虛或實不無疑議必須審病人之情先此十餘日之時自料其病若得極吐極下而後適其意者此胃實也可與調胃承氣湯微和胃氣若不爾者為虛證則不可與若但欲嘔而無心下溫溫證但胸中痛而無鬱鬱微煩證但微溏而無腹滿證者此且非柴胡證況敢遽認為承氣證乎然則為承氣證從何處而得其病情乎以其嘔即是溫溫欲吐之狀故知先此時自欲極吐下也此一節言病證在疑似之間而得其欲吐之情為主兼參欲下以定治法甚矣問證之不可不講也太陽病六七日表證仍在脈微而沉反不結胸其人發狂者以熱在下焦少腹當硬滿小便自利者下血乃愈所以然者以太陽隨經瘀熱在裏故也抵當湯主之太陽病六日已過而至七日正當太陽主氣之期表證仍在脈則宜浮今脈微而沉是邪不在表而在裏矣太陽之病內傳多是胸膈今反不結胸是病不在上而在下矣其人發狂者邪熱內盛逼亂神明也此證以熱在下焦少腹當鞕滿然小便與血皆居小腹蓄而不行皆鞕滿若小便自利者知不關膀胱之氣分而在於衝任之血分必用藥以下其血乃愈所以然者以太陽之表熱隨經而瘀熱在少腹之裏故也以抵當湯主之此與桃核承氣證不同彼輕而此重彼為熱結膀胱乃太陽肌腠之邪從背膂而下結於膀胱此為瘀熱在裏乃太陽膚表之邪從胸中而下結於少腹也補正曰狂為實證微為虛脈何以脈微反主狂哉蓋狂雖是實乃陰分血實非陽分氣實也金匱言陽氣虛者為狂謂狂為陰分之血實而陽分之氣以形其虛此脈之微亦正是陽分氣虛知病不在氣分也沉脈應病在裏承上文太陽證來則太陽之氣出入於胸中脈應在裏當結胸今反不在上焦胸前之膈膜中不為結胸而其人發狂者內經云血在下如狂以熱在下焦膜網夾室之內是為血室血結為死魄魄亂其魂是以狂也血室後連大腸前連膀胱正當小腹之間故小腹當鞕滿設熱結在膀胱則小便不通今小便自利者知不在膀胱乃在血室中當攻下其結血使從大腸濁道而出乃愈所以然者以血室之油膜上連板油而著於背膂太陽經行身之背隨經瘀熱從背膂入血室之裏不從胸入故不結胸不在膀胱中故小便自利背膂連油膜從血分入故入血室若夫熱結膀胱是從胸前上焦氣分從水道決瀆之路而入故入水府修園不知三焦膀胱原委如此是以從入之路被其倒亂也抵當湯方水蛭三十個熬虻蟲三十個熬去翅桃仁三十個去皮尖大黃三兩酒浸上四味銼如麻豆以水五升煮取三升去滓溫服一升不下再服張令韶曰太陽有經與氣之分亦有外與表之別桃仁承氣證熱結膀胱乃太陽肌腠之邪從背膂而下結於膀胱故曰外不解者尚不可攻肌腠為外也抵當證瘀熱在裏乃太陽膚表之邪從胸中而下結於小腹表氣通於胸故曰表證仍在反不結胸皮毛為表也蓋太陽之氣從胸而出入太陽之脈循背膂之下絡膀胱經病外邪從背而入結於膀胱者詳於桃仁承氣湯方註而氣病表邪從胸而入不涉於膀胱故不曰熱結膀胱而曰反不結胸熱在下焦蓋下焦即胞中衝任二脈之所起也衝脈起於氣衝任脈起於中極之下以上毛際亦居小腹故前章曰小腹急結此章曰小腹鞕滿急結者急欲下通之象不必攻之故曰下者愈只用桃仁承氣足矣此曰鞕滿全無下通之勢故不曰血自下而曰下血乃愈言必攻而始下也非抵當不可二證之分別如此又曰太陽病六七日正當太陽主氣之期表證仍在脈當浮今微而沉者氣隨經絡沉而內薄也內薄於胸當結胸今反不結胸者知表邪從胸而入下於陰分陰不勝陽故發狂熱在下焦故小腹鞕滿鞕滿而小便自利便知其不在無形之氣分而在有形之血分也方用虻蟲水蛭一飛一潛吮血之物也在上之熱隨經而入飛者抵之在下為血為熱之瘀潛者當之配桃核之仁將軍之威一鼓而下抵拒大敵四物當之故曰抵當太陽病身黃脈沉結少腹硬小便不利者為無血也小便自利其人如狂者血證諦也抵當湯主之血之與水以小便之利與不利分之請再申其說太陽病從胸而陷於中土故身黃脈沉結少腹硬小便不利者乃脾氣不能轉輸水聚於少腹為無血也而小便自利其人如狂者非水聚為血聚血證諦也必諦審其果是血證方可以抵當湯主之否則不可姑試也此一節申明上文小便自利之義也喻嘉言云此條乃法中之法也見血證為重病抵當為重藥後人辨證不清不當用而誤用與夫當用而不用成敗在於反掌故重申其義也傷寒有熱少腹滿應小便不利今反利者為有血也當下之不可餘藥宜抵當丸內經云今夫熱病者皆傷寒之類也傷寒有熱至於所有之熱皆歸於少腹故少腹鞕滿小便不利今反利者熱歸血海為有血也但血結陰位卒難蕩滌投藥過多恐傷中氣故當緩緩下之然又恐藥力太微病根深固難拔故應用之藥宜盡數以與之不可更留餘藥宜抵當丸此一節變湯為丸分兩極輕連滓而服又法外之法也抵當丸方水蛭二十個熬虻蟲二十五個熬去翅桃仁二十個去皮尖大黃三兩酒浸上四味杵分為四丸以水一升煮一丸取七合服之晬時當下血若不下者更服晬時周時也陳修園曰抵當之脈浮取微而沉取結按曰微而沉非沉微也故又以沉結申之抵當之證發狂小腹鞕滿小便自利其中又有發黃病審其小便不利為膀胱之氣不化小便自利非膀胱之氣不化為下焦之瘀不行以此方之難用又不可不用不得不重申其義也然此為抵當湯丸二證公共之辨法也師又以抵當丸方法者著眼在有熱二字以熱瘀於裏而仍蒸於外小腹又滿小便又不利而反自利其證較重而治之不可急遽故變湯為丸以和洽其氣味令其緩達病所曰不可餘藥者謂連滓服下不可留餘庶少許勝多許俟晬時下血病去而正亦無傷也太陽病小便利者以飲水多必心下悸小便少者必苦裏急也雖然辨蓄血者既以小便利為斷矣然不詳審其主證而並辨其兼證恐專執小便利之一說概認為血證亦非辨證之法內經云飲入於胃游溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱故太陽病小便利者以其人飲水之多夫飲水多而小便利則水氣不泄應無心下悸之病矣若不下泄而上凌必心下悸心惡水制也是以小便少者氣不施化必苦裏急也豈獨血證然哉正曰淺註以心下悸與小便少者作一串說反形迂曲蓋上節以小便利不利分有血無血此又以小便利不利分水之在上在下謂小便利者水不結在下以飲水過多必停在胸膈間上凌心火而心下悸是水在上故膀胱不裏急也若小便不利者以飲水多不停胸膈間必下結於膀胱無上凌心悸之證必有苦裏急之證矣詞甚爽真讀者當玩張錢塘云上節以小便不利而辨其血之有無此又以小便之多少而驗其水之有無總結前三節之意以見不可概認為血證其章法之精密如此問曰病有結胸有臟結其狀何如答曰按之痛寸脈浮關脈沉名曰結胸也問曰吾聞太陽主開病竟有不能出入內外而固結於胸為結胸少陰主樞竟不能樞轉出入而固結於藏為藏結其病狀何如答曰結有正有邪太陽之正氣與邪氣共結於膈胸有形之間故按之則痛寸以候外太陽主皮毛故寸脈浮關以候中病氣結於胸中故關脈沉此名曰結胸也張錢塘云此章論結胸藏結痞氣之證直至病脅素有痞方止其中有經氣之分陰陽之異生死之殊學者所當細心體會也何謂臟結答曰如結胸狀飲食如故時時下利寸脈浮關脈小細沉緊名曰臟結舌上白苔滑者難治臟結無陽證不往來寒熱其人反靜舌上苔滑者不可攻也何謂藏結答曰胸雖不結陰邪逆於心下其外如結胸之狀而內則發於少陰不如結胸之發於太陽也上不涉於胸胃故飲食如故下干於藏氣故時時下利寸脈浮為少陰之神氣浮於外也關脈小細為少陰之臟氣虛於內也沉緊為少陰之藏氣結於內也若此者名曰藏結舌為心之外候其舌上白胎滑者陰寒甚於下而君火衰於上也病為難治藏結之狀既明而藏結之證不可不講藏結發於少陰少陰上火下水本熱標寒必得君火陽熱之化則無病今不得其熱化則為藏結無陽證少陰主樞今病不見往來寒熱是少陰之陽氣不能從樞以出也陽動而陰靜故其人反靜舌上胎滑者為君火衰微而陰寒氣盛不得不切戒之曰不可攻也此承上文而言藏結之證也正曰藏結是言下焦膜油中之夾室即血室丹田之中也與金匱婦人臟燥之臟皆指此言非泛言五臟也血室胞宮其膜上通胸脅下通大腸故上如結胸而下則時時下利兩面夾寫出藏結之所在凡血室有熱則發於膜腠之間而為往來寒熱藏結皆是陰結無陽證也故不往來寒熱仲景此章歷言胸膈脅膜下焦膜油而並詳丹田之結通身膜網已詳矣修園於此尚欠分曉又詳於下痛引少腹入陰筋節少陰上火而下水其氣交會於陽明中土故脈現於關沉與結胸無異而小細緊為臟陰虛寒結證所獨也按程郊倩云浮為寒傷表脈沉為邪入於裏脈上節單言沉沉而有力也此節兼沉小細緊而言脈之分別如此病發于陽而反下之熱入因作結胸病發于陰而反下之因作痞也所以成結胸者以下之太早故也結胸者項亦強如柔痓狀下之則和宜大陷胸丸今試言結胸之因並詳其狀而及其治病發於太陽太陽主外宜從汗解而反下之則熱邪乘虛而入結於胸膈有形之間因作結胸病發於少陰少陰主裏當救其裏而反下之邪若結於下則為藏結矣今不結於藏而結於心下因而作痞痞證發於陰原無下法不以下之遲早論也其證治另詳於後陽證之所以成結胸者以下之太早故也試再由其因而更詳其狀太陽之脈上循頭項今結胸者氣結於內遂不外行於經脈以致經輸不利其項亦拘緊而強有如柔痓反張之狀下之令內之結氣一通則外之經輸自和宜大陷胸丸方張錢塘云此言結胸藏結之所因而於藏結之中復又推言痞結以見痞之同發於陰而不與藏結同者藏結結於下而痞結結於上也結下者感下焦陰寒之氣結於上者感上焦君火之化也大陷胸丸方大黃半斤葶藶半升熬芒硝半斤杏仁半升去皮尖熬黑上四味搗篩二味納杏仁芒硝合研如脂和散取如彈丸一枚別搗甘遂末一錢匕白蜜二合水二升煮取一升溫頓服之一宿乃下如不下更服取下為效禁如藥法蔚按太陽之脈上循頭項太陽之氣內出於胸膈外達於皮毛其治法宜從汗解今因汗而反下之則邪氣因誤下而結於胸膈之間其正氣亦隨邪氣而內結不能外行於經脈以致經輸不利而頭項強急如柔痙反張之狀取大黃芒硝苦鹹以泄火熱甘遂苦辛以攻水結其用杏仁葶藶奈何以肺主皮毛太陽亦主皮毛肺氣利而太陽之結氣亦解矣其搗丸而又納蜜奈何欲峻藥不急於下行亦欲毒藥不傷其陽也結胸證其脈浮大者不可下下之則死結胸證悉具煩躁者亦死然亦有不可下者當以脈為斷結胸證寸脈浮關脈當沉今診其脈竟浮而大者浮為在外大為正虛邪結於中而正氣反虛浮於外定不可下若誤下之裏氣一泄正氣無所依歸外離而內脫則渙散而死此言結胸證乃太陽之正氣合邪氣而結於內若脈見浮大是邪實固結於內正虛反格於外也張錢塘云正者主也客者邪也正邪並結者客留而主人仍在故可下之邪結於中而反正格於外者主人去而客留故不可下也太陽病脈浮而動數浮則為風數則為熱動則為痛數則為虛頭痛發熱微盜汗出而反惡寒者表未解也醫反下之動數變遲膈內拒痛胃中空虛客氣動膈短氣躁煩心中懊憹陽氣內陷心下因硬則為結胸大陷胸湯主之若不結胸但頭汗出餘處無汗劑頸而還小便不利身必發黃太陽中風之病診其脈浮而動數風性浮越故浮則為風風為陽邪故數則為熱陰陽相搏故動則為痛邪盛則正虛故數則為虛病太陽之膈表則頭痛得標陽之熱化則發熱凡傷風必自汗汗少則惡風汗出多亦必惡寒原無盜汗之證盜汗亦無惡寒之證今微盜汗出而反惡寒者乃中風稽久之證雖不若初中之重而要其表邪未嘗解也醫反下之表邪乘虛內入故動數之脈變遲邪氣與膈氣在內相拒而痛胃中被下而空虛客氣無所顧忌而動膈膈上為心肺主呼氣之出膈下為肝腎主吸氣之入今為客氣動膈則呼吸之氣不相接續故短氣上下水火之氣不交故煩熱煩躁之極則心中懊憹此皆太陽之氣隨邪氣而內陷心下因硬則為結胸以大陷胸湯主之若不結胸而陷於太陰濕土之分則濕熱相並上蒸於頭但頭汗出津液不能旁達餘處無汗劑頸而還若小便不利濕熱因無去路鬱於內而熏於外身必發黃也此一節言中風誤下而成結胸也正曰脈動應頭痛脈浮應發熱數為虛則應盜汗若果內虛則不惡寒今反惡寒者乃表邪未解非內虛也在表宜散醫者不知表散而反下之則動數快利之脈反變出艱遲之象此非虛寒脈遲乃因下後阻抑其脈使不快利脈被其阻則不易出況胸膈間為正氣往來之路為邪所入正氣拒之則為拒痛蓋正氣生於氣海上於胸膈尤賴胃中氣實有以托之則正氣外出邪不得入今下後胃中空虛不能扶托正氣遂令客熱之邪得入膈中行動不止正氣因與相拒也膈中者呼吸之路道也邪正相拒則呼吸之路不通利故短氣邪內犯則煩正難出則躁煩躁之極心中懊憹所以然者人之元氣生於膀胱水中透入氣海而上於胸膈氣生一水為邪所阻陷於胸中則仍化為水與邪熱結是為水火交結心下因硬則為結胸此仲景自行註解之文淺註不知膈間膜油下達氣海內通心包上達口鼻外通皮毛是以註多不晰又下文若不結胸是胸前之膈通利則氣得上出故但頭汗出餘處無汗是邪熱從周身皮毛陷於肥肉膏油之內則周身膜油氣不得出故無汗若小便利則水得下瀉不與熱蒸小便不利者水壅於內必與熱蒸從肥肉肌腠中必發出黃色是黃證乃邪熱阻於通身之油中陷胸是邪熱阻於胸前之膜中陷胸是水火相結發黃是水火相蒸必知邪正水火之理又必知膜油之別然後知仲景連及黃證是與陷胸互相發明也大陷胸湯方大黃六兩去皮芒硝一升甘遂一錢匕上三味以水六升先煮大黃取二升去滓納芒硝煮一兩沸納甘遂末溫服一升得快利止後服蔚按大黃芒硝苦鹹之品借甘遂之毒直達胸間之飲邪不專蕩胃中之邪穢也湯與丸分者丸恐下之太急故連滓和蜜服之使留中之邪從緩而下湯恐下之不急也取三味之過而不留者蕩滌必盡也陳師亮曰結胸者結於胸中而連於心下也身之有膈所以遮上下也膈能拒邪則邪但留於胸中膈不能拒邪則邪留胸而及於胃胸胃俱病乃成結胸如胸有邪而胃未受邪則為胸脅滿之半表半裏證如胃受邪而胸不留則為胃家實之陽明病皆非結胸也故必詳辨分明庶無差誤傷寒六七日結胸熱實脈沉而緊心下痛按之石硬者大陷胸湯主之結胸亦有不因下而成者傷寒六日為一經已周至七日又當來復於太陽不從表解而結於胸則傷寒之邪鬱而為熱實其證重矣又診其脈沉而且緊沉為在裏緊則為痛為實今心下痛按之如石之硬者非他藥所可攻必以大陷湯主之此一節言傷寒不因下而亦成結胸也補曰熱實二字見另有寒實結胸不在此例詳於下文醫者當細辨也又凡緊脈今法只斷為寒不知緊是絞結迫切之形無論寒熱但是絞結迫切等證皆能見此脈形通考仲景脈法自見傷寒十餘日熱結在裏復往來寒熱者與大柴胡湯但結胸無大熱者此為水結在胸脅也但頭微汗出者大陷胸湯主之太陽傷寒十餘日熱結在裏蓋胸中為太陽之裏也蓋得少陽之樞轉復作往來寒熱者乃太陽藉樞轉之機仍欲外出可與大柴胡湯迎其機以導之若不往來寒熱但結胸而無大熱者此為太陽寒水之氣不行於膚表而內結在胸脅也身上俱無汗但頭上微汗出者水逆於胸而不能外泄也以大陷胸湯主之令水氣泄於下而正氣運於上則樞轉亦利矣蓋大柴胡湯為樞轉之捷劑而大陷胸湯為泄邪之峻藥雖不能轉樞然邪去而樞轉亦何難之有補曰熱結在裏則似結胸矣使不往來寒熱而但見煩痛大熱等證便當用大陷胸湯今復有往來寒熱則熱邪雖入結於胸中而正氣尚欲達於身外也宜用大柴胡湯有大黃以奪其結熱有柴胡湯以達其正氣為表裏兩解之法若但結胸無往來寒熱之證且無陷胸等煩躁之大熱證者此為水結在胸脅間非熱結也使純是水則火不上蒸無頭汗矣便不得用大陷胸矣乃雖無大熱而尚有熱雖火不結而尚能上蒸為頭汗出則不但水結尚兼火證矣故宜以陷胸湯奪去其水兼瀉其火大柴胡證是邪結而正欲出此證是水結而火尚炎淺註將水結以下盡解作水證與文法方治均未合張錢塘云此言太陽不能從樞以外出以致水逆於胸而成結胸也太陽寒水之氣內出於胸膈外達於皮膚從樞以外出則有往來寒熱之象不能從樞以出而結於胸膈有形之間則無形寒水之氣遂結而為有形之水矣太陽病重發汗而復下之不大便五六日舌上燥而渴日晡所小有潮熱從心下至少腹硬滿而痛不可近者大陷胸湯主之太陽病重發汗而復下之亡其津液津液亡於下故不大便自大便不起計有五六日又值陽明主氣之期津液亡於上故舌上燥而渴陽明旺於申酉日晡所小有潮熱是兼見陽明之燥證然從心下至少腹鞕滿而痛不可近者則知陽明又不如此危惡承氣湯恐不能四面周到以大陷胸湯主之此一節言汗下亡其津液而成燥結胸之證也張錢塘云內經謂二陽為維謂陽明統維於胸腹之前也夫太陽由胸膈而出入是胸膈為太陽出入之門戶心下至少腹又陽明之所綱維兩經交相貫通故病太陽兼有陽明潮熱之證也補曰從心下至少腹鞕滿而痛是指胸膈連中下焦之膜中皆有結熱又兼日晡潮熱不大便則大腸中亦有結熱也凡言潮熱皆應大腸燥金申酉旺時而熱大腸與下焦膜網相連大腸既有燥熱鞕滿又抵少腹則在下焦膜網之中與大腸熱氣相合矣仍用大陷胸湯使膜中腸中之結並除乃愈上文結胸而心中懊憹者是邪從上焦膈膜而上合心包此節結胸而日晡潮熱者是邪從下焦膜油而下合大腸讀者互勘可得三焦與臟腑相連之理矣小結胸病正在心下按之則痛脈浮滑者小陷湯主之然結胸證又必有大小之分也小結胸病止從胸而結於胃絡正在心下不比大結胸之高在心間且不在少腹也邪在絡脈按之則痛不比大陷胸之痛不可按也脈浮而滑者浮為在外滑則為熱裏雖結熱而經氣仍欲外達之象以小陷胸湯主之此從結胸證中而又分出小結胸證也正曰大結胸證仲景止言心下鞕滿並未言其高在心間誤添此語蓋不知心下是指膈膜言心火下交於血室要從此膈中行膀胱水中元氣上於肺為呼吸亦從此膈中行水火交結於膈中即為結胸無分大小結胸皆是水火結於膈間膈間正當心下凡仲景書所謂心下皆指此膈間而言也膈間結而分大小之名者小結胸止在心下不連腹脅大結胸則下連脅腹皆指膈與脅腹之膜言之修園不知膈與中下之膜相通又不知正在心下之文是承上節從心下至少腹言此不至少腹而正在心下也是水火之結較輕故攻水不用甘遂而止用半夏攻火不用硝黃而止用栝蔞黃連且栝蔞瓤格似膜故入膈膜淺註言結於胃絡亦未盡合小陷胸湯方黃連一兩半夏半升洗栝蔞大者一個上三味以水六升先煮栝蔞取三升去滓納諸藥煮取二升去滓分溫三服張令韶曰氣分無形之邪結於胸膈之間以無形而化有形故痛不可按而為大結胸證結於胸中脈絡之間入於有形之經絡而仍歸於無形故正在心下按之則痛而為小結胸證方用黃連以解心下之熱半夏以疏脈絡之結栝蔞延蔓似絡性寒涼而實下行所以導心下脈絡之結熱從下而降也若大結胸胸證亦用此湯藥不及病多死又曰氣無形者也經有形者也以無形之邪結於胸膈之內故用大黃甘遂輩從有形之腸胃而解結於脈絡之間又用黃連半夏輩從無形之氣分而散其經氣互相貫通之理徐靈胎曰大承氣所下者燥屎大陷胸所下者蓄水此所下者為黃涎涎者輕於蓄水而未成水者也審證之精用藥之切如此太陽病二三日不能臥但欲起心下必結脈微弱者此本有寒分也反下之若利止必作結胸未止者四日復下之此作協熱利也小結胸之病雖曰止至於胸而經氣則上下而相通太陽病過二日而至三日正當少陽主氣之期而不能得少陽樞轉無以自達遂覺臥不安而不能臥起不安而但欲起病氣不能外轉心下必至內結診其脈微弱者此太陽之本有寒分也何以言之太陽本寒而標熱病反其本治亦反其本今病還是本寒醫者誤認為標熱而反下之若利止邪不下而即上必作小結胸利未止者當四日太陽主氣之期復下之氣隨下陷變本寒而為標熱則太陰脾家之腐穢遂從此發作而協太陽之標熱而下利也此一節言小結胸而復推上下之經氣相通也正曰解本有寒分為純寒解協熱利為寒變熱詞理牽強而於必作結胸之故更不明矣不知寒分之分作股分解謂不能臥但欲起心下結已具太陽之標熱有六七分矣熱則脈不當微弱今脈微弱者此是熱證中兼有太陽本寒二三分也兼有寒便不當下醫反下之若熱不下陷而利止寒反上湊而相結則為寒熱結胸若利未止又下之則寒水不上湊而標熱盡下陷是為協熱利也寒熱水火進退之情如此太陽病下之其脈促不結胸者此為欲解也脈浮者必結胸脈緊者必咽痛脈弦者必兩脅拘急脈細數者頭痛未止脈沉緊者必欲嘔脈沉滑者協熱利脈浮滑者必下血經氣不獨上下相通而內外相通可因脈而知其證太陽病外證未罷必不可下若誤下之其邪陷入變證不一若其脈促為陽邪甚於內欲出不能出雖不作結胸者胸中必有邪戀言不結者易於散越此為欲解而未解也若脈浮者病干上焦其脈道近此太陽病下之太早故必結胸也脈緊者傷寒脈緊此因下而不下迫於咽喉故必咽痛脈弦者是邪陷於胸樞機不轉故必兩脅拘急脈細數者細屬陰數主熱是陽邪陷入少陰為兩火相炎頭痛未止脈沉緊者沉屬裏緊主寒太陽寒邪侵入陽明故必欲嘔脈沉滑者沉屬裏滑為水太陽之邪陷於太陰水流濕也故協熱利脈浮滑者浮主風滑主熱風性浮動干動厥陰故必下血上節言上下經氣之相通此節言內外經氣之相通也病在陽應以汗解之反以冷水潠之若灌之其熱被劫不得去彌更益煩肉上粟起意欲飲水反不渴者服文蛤散若不瘥者與五苓散寒實結胸無熱證者與三物小陷胸湯白散亦可服內因之水結而不散則為結胸之證而外因之水入於皮膚亦有小結胸之患病在太陽之表應以汗解之醫者反以冷水潠之若於病人通身澆灌之其在表之陽熱被冷水止卻不得去較未用水之前彌更熱而益煩熱因水阻則汗孔閉而肉上結粒如粟起熱卻於內故意欲飲水外寒制其內熱反不作渴者宜服文蛤散滲散其水氣若不差者與五苓散助脾土以轉輸仍從皮膚而散之如水寒實於外陽熱卻於內而為寒實結胸無肌表之熱證者與三物小陷胸湯苦寒泄熱為反治之法至若白散辛溫散結為從治之法亦可服此一節於小結胸外又補出寒實結胸證也正曰潠之是外澆冷水灌之是內飲冷水其熱被外之冷卻則不得出被內之冷卻又不得入遂止於肌肉之間進退兩難故彌更益煩水氣與熱結於皮肉間而起粟粒是熱與水不結胸中而結在軀殼之皮肉間也熱在軀殼故意欲飲水胃中無熱故反不渴與但欲漱水不欲飲水同意但欲漱是熱在經脈不在胃中此是熱在皮肉不在胃中也故用文蛤殼上起紋有疙瘩者今之蚶子是矣用其殼以治人身軀殼外之粟粒滲水利熱形象皆合淺註解灌潠皆是外澆冷水不知反以字若字顯分兩層肉上又實指出是軀殼外文蛤亦是用殼故能解皮肉間之熱與水也若不差與五苓散亦正是散熱利水行皮肉間之藥此皆熱與寒水結在外者也若因寒水灌潠熱去寒留不結於皮肉間而內結於胸中為寒實結胸無煩欲飲水之熱證者又當專溫其裏與三物小陷胸湯白散亦可服皆溫其寒不得用大小陷胸湯矣按三物小陷胸必另是一方非小陷胸湯也淺註即作小陷胸湯解於寒實二字不合且上文有結胸熱實之文正與此對又本節承接轉換一線到底淺註亦欠分曉文蛤散方文蛤五兩上一味為散以沸湯和一錢匕服湯用五合男元犀按太陽病不以發汗而以水潠之致在表之陽反退卻於內而不得去師取文蛤為散味鹹質燥以滲散其水氣若不瘥者用五苓助脾以轉輸之俾仍從皮膚而散也柯韻伯謂此等輕劑恐難散濕熱之重邪金匱要略云渴欲飲水不止者文蛤散主之又云吐後渴欲得水而貪飲者文蛤湯主之兼主微風脈緊頭痛審證用方則彼用散而此則用湯為宜附文蛤湯文蛤五兩麻黃甘草生薑各三兩石膏五兩杏仁五十枚大棗十二枚水六升煮取二升溫服一升汗出即愈張令韶曰前論內因之水結於胸脅而為大陷胸湯證此論外因之水入於皮膚而肉中粟起或為小結胸證如水寒實於外陽熱卻於內而為虛寒結胸無肌表之熱證者與小陷胸以解其內之熱結白散辛溫可以散水寒之氣總之寒實於外熱卻於內或用苦寒以解內熱或用辛熱以散外寒隨時制宜無不可也白散方桔梗三分巴豆一分去皮心熬黑研如脂貝母三分上三味為散納巴豆更於臼中杵之以白飲和服強人半錢匕羸者減之病在膈上必吐在膈下必利不利進熱粥一杯利過不止進冷粥一杯身冷皮粟不解欲引衣自覆者若水以潠之洗之益令熱卻不得出當汗而不汗則煩假令汗出已腹中痛與芍藥三兩如上法蔚按巴豆辛熱能散寒實而破水飲貝母開胸結桔梗開肺氣不作湯而作散取散以散之之義也進熱粥者助巴豆之熱勢以行之也進冷粥者制巴豆之熱勢以止之也不用水而粥者藉穀氣以保胃氣之無傷也太陽與少陽併病頭項強痛或眩冒時如結胸心下痞硬者當刺大椎第一間肺俞肝俞慎不可發汗發汗則譫語脈弦五日譫語不止當刺期門既有結胸之證亦即有如結胸之證太陽與少陽併病二陽之經脈交會於頭項受邪則頭項強痛二陽之經脈皆起於目而行於頭受邪則目或旋暈而眩頭如復戴而冒夫病在太陽則結胸病在少陽則脅下痞硬今兩陽併病原非結胸之證而時如結胸不為脅下痞硬而為心下痞硬者當刺大椎第一間以泄太少併病之邪不已更刺肺俞以通肺氣斯膀胱之氣化行而邪自不留復刺肝俞以瀉少陽之邪蓋以膽與肝相表裏也慎不可發汗以竭其經脈之血津倘若誤發其汗則經脈燥熱而譫語相火熾盛而脈弦若五六日譫語不止六日值厥陰主氣之期恐少陽之火與厥陰之風相合火得風而愈熾矣當刺肝之期門迎其氣以奪之此一節言太陽少陽併病涉於經脈而如結胸宜刺以瀉其氣也併者猶秦併六國其勢大也按圖經云大椎一穴在第一椎上陷中手足三陽督脈之會可刺入五分留三呼瀉五吸肺俞二穴在第三椎下兩旁相去一寸五分中間脊骨一寸連脊骨算實兩旁相去各二寸下仿此足太陽脈氣所發可刺入三分留七呼得氣即瀉肥人可刺入五分肝俞二穴在第九椎下兩旁相去各一寸五分宜照上實折可刺入三分留六呼期門二穴見上章婦人中風發熱惡寒經水適來得之七八日熱除而脈遲身涼胸脅下滿如結胸狀譫語者此為熱入血室也當刺期門隨其實而取之病在經脈而如結者不獨男子也婦人中風發熱惡寒當表邪方盛之際而經水適來蓋經水乃衝任厥陰之所主而衝任厥陰之血又皆取資於陽明今得病之期過七日而至八日正值陽明主氣之期病邪乘隙而入邪入於裏則外熱除而脈遲身涼已離表證惟衝任厥陰俱循胸脅之間故胸脅下滿如結胸之狀而且熱與血搏神明內亂而發譫語者此為熱入血室也治者握要而圖只取肝募當刺期門隨其實而瀉之何以謂之實邪盛則實也此節合下一節皆言婦人熱入血室病在經脈狀如結胸者正可以互證而明也正曰淺註言衝任厥陰循胸脅之間不知衝任厥陰起於血室而血室即下焦油膜中一大夾室也上連兩脅之板油又上連胸膈間之油膜熱入血室連及板油胸膈則脹滿如結胸狀但論脈而不論膜未知仲景歷言胸脅之旨矣又期門穴在肋骨盡處當胸前膈膜之端膈膜前連胸後連肝故稱期門穴為肝募募即膜也當膜之端而瀉之也知此則知結胸血結所以相似之故矣婦人中風七八日續得寒熱發作有時經水適斷者此為熱入血室其血必結故使如瘧狀發作有時小柴胡湯主之經水未來因病而適來者既明其義矣而經水已來因病而適斷者何如婦人中風七八日業已熱除身涼而復續得寒熱發作有時其經水已來而適斷者果何故哉蓋以經水斷於內則寒熱發於外雖以經水適來者不同而此亦為熱入血室其血為邪所阻則必結結於衝任厥陰之經脈內未入藏外不在表而在表裏之間仍屬少陽故使如瘧之狀發作有時以小柴胡湯主之達經脈之結仍藉少陽之樞以轉之俾氣行而血亦不結矣此一節承上文而言中風熱入血室其經水已來而適斷當知異中之同同中之異各施其針藥之妙也正曰在表裏之間仍屬少陽此不但與血證未明且於瘧證亦不明矣蓋邪在表裏之間只能往來寒熱而不發作有時惟瘧證邪客風府或瘧母結於脅下膜油之中衛氣一日一周行至邪結之處欲出不得相爭為寒熱所以發作有時也夫衛氣者發於膀胱水中透出血分血為營氣為衛此證熱入血室在下焦膜網之中其血必結阻其衛氣至血結之處相爭則發寒熱衛氣已過則寒熱止是以發作有時與瘧無異原文故使二字明言衛氣從膜中出血結在膜中故使衛氣不得達也用柴胡透達膜膈而愈知熱入血室在膜中即知瘧亦在膜中膜透出肌肉為腠理修園但言半表半裏知外之腠理不知內之膜油於仲景精意未明婦人傷寒發熱經水適來晝日明了暮則譫語如見鬼狀者此為熱入血室無犯胃氣及上二焦必自愈熱入血室不獨中風有之而傷寒亦然婦人傷寒寒鬱而發熱當其時經水適來過多不止則血室空虛而熱邪遂乘虛而入之也晝為陽而主氣暮為陰而主血今主氣之陽無病故晝日明了主血之陰受邪故暮則譫語如見鬼狀者醫者當於其經水適來而定其證曰此為熱入血室非陽明胃實所致也既非陽明胃實則無以下藥犯其胃氣及上二焦一曰胃脘之陽不可以吐傷之一曰胃中之汁不可以汗傷之惟俟其經水盡則血室之血復生於胃府水穀之精必自愈慎之不可妄治以生變端也此一節言女人傷寒之入於血室也郭白云云前證設不差服小柴胡湯柯韻伯云仍刺期門正曰註經水適來為過多不止熱乘虛入觀上節經水適斷不是過多不止熱亦入血室便知此解非也且下文必自愈正是經水不止熱隨經血而下瀉故其熱必自愈修園解為血復生於胃非自愈之確解也不知無犯胃氣及上二焦是明血室在下焦膜中不可妄治中上焦也又譫語見鬼淺註言因經水適來始能辨其陽明證不知仲景陽明篇並無見鬼之文如見鬼狀專屬熱入血室陽明證只譫語不見鬼也鬼者魄也人之魂屬氣魄屬血血死即為死魄魄掩其魂故如見鬼男子傷寒亦有此證皆是熱入血室蓋譫訓多言妄語言為心聲陽明熱合心包故多言妄語不干魄氣故亦不見鬼熱入血室乃見鬼也修園此節不免有誤傷寒六七日發熱微惡寒肢節煩痛微嘔心下支結外證未去者柴胡桂枝湯主之再由此而推言乎諸節傷寒六日已過至於七日又值太陽主氣之期發熱病在太陽之標氣微惡寒病在太陽之本氣病氣不能從胸而出入結於經脈之支骨節之交故肢節煩痛經氣鬱欲疏故微嘔不結於經脈之正絡而結於支絡故心下支結外證未去者以其寒熱猶在也以柴胡桂枝湯主之取其解外又達太陽之氣而解支節之結此一節言太陽之氣化而結於經脈之別支也正曰發熱惡寒四支骨節疼痛即桂枝證也嘔而心下支結即心下滿是柴胡證也外證未去句以明柴胡證是病將入內而桂枝證尚在不得單用柴胡湯宜合桂枝湯治之義極顯明而陳註支結是外結於經脈之支絡註心下支結亦是支絡然考仲景書所謂肢節皆言四肢而心下支結之支字又與四肢不同若皆指作支絡解試問肢節疼屬何經之支絡心下支結又屬何經之支絡哉語涉含糊只生葛藤耳蓋支結即支滿支飲同義心下指膈中言膈中行氣行水管竅支分派別西洋醫書圖出管竅則真如樹枝貫串支結者即指此膈間管竅不通也柴胡湯之胸滿亦是此意註家何必扯雜柴胡桂枝湯柴胡四兩桂枝黃芩人參各一兩半甘草一兩炙半夏二合半洗芍藥一兩半大棗六枚擘生薑一兩半切上九味以水七升煮取三升去滓溫服蔚按小柴胡湯解見本方此言傷寒六七日一經已周又當太陽主氣之期其氣不能從胸而出入結於經脈以及支絡故取桂枝湯以除發熱惡寒藉小柴胡湯以達太陽之氣從樞以轉出傷寒五六日已發汗而復下之胸脅滿微結小便不利渴而不嘔但頭汗出往來寒熱心煩者此為未解也柴胡桂枝乾薑湯主之支結之外又有微結傷寒過五日而至六日為厥陰主氣之期經云厥陰之上中見少陽已發汗而復下之則逆其少陽之樞不得外出故胸脅滿不似結胸證之大結而為微結氣不得下行故小便不利經云少陽之上火氣治之故渴無樞轉外出之機故渴而不嘔熱結在上而不在下故別處無汗而但頭汗被蒸而出少陽欲樞轉而不能故為往來寒熱心煩者少陽與厥陰為表裏厥陰內屬心包而主脈絡故也總之太陽之病六日而涉厥陰之氣不能得少陽之樞以外出若此此為未解也以柴胡桂枝乾薑湯主之此湯達表轉樞解結止渴理中各絲絲入扣此一節言太陽病值厥陰主氣之期而為微結也柴胡桂枝乾薑湯方柴胡半斤桂枝三兩乾薑二兩栝蔞根四兩黃芩三兩牡蠣二兩甘草二兩炙上七味以水一斗二升煮取六升去滓再煎取三升溫服一升日三服初服微煩復服汗出便愈張令韶曰傷寒五六日厥陰主氣之期也厥陰之上中見少陽已發汗而復下之則逆其少陽之樞不得外出故而脅滿微結不得下行故小便不利少陽之上火氣治之故渴無樞轉外出之機故不嘔但頭汗出者太陽之津液不能旁達惟上蒸於頭也少陽欲樞轉而不能故有往來寒熱之象也厥陰內屬心包而主脈絡故心煩此病在太陽而涉厥陰之氣不得少陽之樞以外出故曰此為未解也用柴胡桂枝黃芩轉少陽之樞而達太陽之氣牡蠣啟厥陰之氣以解胸脅之結蔞根引水液以上升而止煩渴汗下後中氣虛矣故用乾薑甘草以理中正曰已發汗則陽氣外泄矣又復下之則陽氣下陷水飲內動逆於胸脅故胸脅滿微結小便不利水結則津不升故渴此與五苓散證同一意也陽遏於外不能四散但能上冒為頭汗出而通身陽氣欲出不能則往來寒熱此與小柴胡證同一意也此皆寒水之氣閉其胸膈腠理而火不得外發則返於心包是以心煩故用柴胡以透達膜腠用桂薑以散撤寒水又用栝蔞黃芩以清內鬱之火夫散寒必先助其火本證心煩已是火鬱於內初服桂薑反助其火故仍見微煩服則桂薑之性已得升達而火外發矣是以汗而出愈原註稍涉含糊傷寒五六日頭汗出微惡寒手足冷心下滿口不欲食大便硬脈細者此為陽微結必有表復有裏也脈沉亦在裏也汗出為陽微假令純陰結不得復有外證悉入在裏此為半在裏半在外也脈雖沉緊不得為少陰病所以然者陰不得有汗今頭汗出故知非少陰也可與小柴胡湯設不了了者得屎而解微結中又有陽微結之不同於陰結者不可不知傷寒太陽證五日為少陰主氣之期而六日為厥陰主氣之期氣傳而病不傳仍在太陽之經太陽之氣上蒸故頭汗出太陽之本氣為寒故生惡寒太陽標陽之氣不外行於四肢故手足冷此皆太陽在表之證也心下滿口不欲食大便硬此皆太陽傳裏之證也太陽之脈不宜細今竟見脈細者何也細為少陽之脈今以陽而見陰則陽轉微此為陽微結故見證必有表之頭汗出微惡寒手足冷復有裏之心下滿不欲食大便硬也由此言之隨證以審脈則可若舍證以言脈則同類之可疑者不少不獨脈細而在裏即脈沉亦為在裏也雖然隨證審脈既不可以板拘而病證互見又何以自決惟於切實處決之今於頭汗出一證即可定其結為陽微假令為少陰之純陰結不得復有外證悉入在裏而見痛引少腹入陰筋之證矣此證猶幸為半在裏半在外也脈雖沉緊究不得為少陰藏結之病所以然者三陰之經絡劑頸而還少陰證不得有頭汗今頭汗出故知為太陽之樞滯非少陰之藏結也可與小柴胡湯以助樞轉而裏外之邪散矣設外解而裏不了了者胃氣不和也得屎而解此陽微結之似陰而要不同於陰結者如此此可變小柴胡湯之法為大柴胡湯此一節言陽微結之似陰雖見裏脈而究與少陰之純陰結有辨也傷寒五六日嘔而發熱者柴胡湯證具而以他藥下之柴胡證仍在者復與柴胡湯此雖已下之不為逆必蒸蒸而振卻發熱汗出而解若心下滿而硬痛者此為結胸也大陷胸湯主之但滿而不痛者此為痞柴胡不中與之宜半夏瀉心湯小柴胡證大陷胸證既各不同而痞證更須分別太陽傷寒至五日少陰為主氣之期六日為厥陰主氣之期大抵五六日之間是少厥太三經之交也太陽主開嘔而發熱者欲從樞外出之象其餘皆為柴胡湯證悉具醫者不用柴胡而以他藥下之下之猶幸其不下陷所具之柴胡證仍在者可復與柴胡湯此雖已下之卻不為逆服藥之後正氣與邪氣相爭正氣一勝則邪氣還表必蒸蒸而振蒸蒸者三焦出氣之象振者雷出地奮之象卻發熱汗出而解少陽樞轉氣通於天也若下之心下滿而硬痛者此為結胸也宜大陷胸湯主之但滿而不痛者乃病發於陰誤下之後而成此為痞痞證感少陰之熱化無少陽之樞象柴胡不中與之宜半夏瀉心湯此一節復以小柴胡證大陷胸證夾起痞證言大陷胸不可與即柴胡亦不可與也特出半夏瀉心湯一方以引起下文諸瀉心湯之義正曰淺註以小柴胡證陷胸證夾起痞證不知此三證原是一串故仲景連及之並非借賓定主也蓋小柴胡證是表之腠理間病腠理是赤肉外之膜油若從外膜而入內膜聚於胸膈則為陷胸蓋胸膈乃內膜之大者為上下之界故邪入於內多於正氣結於此間正氣不升飲水亦停於膈是為有形之水飲邪氣內陷並心包之火阻於胸膈則為有形之痰血血生於心火火行則血行火阻則血阻血與水交結則化為痰是為結胸實證當奪其實用大陷胸湯但滿而不痛則無血與水無凝聚成痰之實證只水火無形之氣塞於胸膈和其水火之氣而痞自解不必攻下有形之物也柴胡是透膈膜而外達腠理陷胸是攻膈膜而下通大腸瀉心等湯則只和膈膜以運行之皆主膈膜間病而有內外虛實之分故仲景連及言之其示人也切矣修園註痞是病發於陰證尚欠分曉半夏瀉心湯方半夏半升洗黃芩乾薑甘草炙人參以上各三兩黃連一兩大棗十二枚擘上七味以水一斗煮取六升去滓再煮取三升溫服一升日三服蔚按師於此證間日即云傷寒五六日嘔而發熱柴胡證俱在者五六日乃厥陰主氣之期厥陰之上中見少陽太陽之氣欲從少陽之樞以外出醫者以他藥下之心下滿而硬痛者為結胸但滿而不痛者為痞痞者否也天氣不降地氣不升之義也芩連大苦以降天氣薑棗人參辛甘以升地氣所以轉否而為泰也君以半夏者因此證起於嘔取半夏之降逆止嘔如神亦即小柴胡湯去柴胡加黃連以生薑易乾薑是也古人治病不離其宗如此太陽少陽併病而反下之成結胸心下硬下利不止水漿不下其人心煩結胸痞證由於誤下所致可知下之不可不慎也太陽少陽併病宜從少陽之樞轉醫者不知樞轉之義而反下之逆其樞於內則成小結胸心下硬樞逆於下則下焦不合而下利不止樞逆於上則上焦不納而水漿不下樞逆於中則中焦之胃絡不和故其人心煩此併病誤下之劇證也此一節言太陽少陽併病誤下之劇證也受業薛步雲云誤下後太少標本水火之氣不能交會於中土火氣不歸於中土獨亢於上則水漿不下其人心煩水氣不交於中土獨盛於下則下利不止此不可用陷胸湯即小柴胡亦未甚妥半夏瀉心湯庶幾近之脈浮而緊而復下之緊反入裏則作痞按之自濡但氣痞耳知併病之不可以誤下也亦知陰證更不可以誤下乎傷寒病在表則脈浮而在陰則為緊浮中見緊者可以定其為少陰之表證矣何以言之少陰篇云少陰病得之二三日麻黃附子甘草湯微發其汗以二三日無裏證故微發汗是也醫者不知微發其汗而復下之其緊初見於浮分者旋而反入於裏變為沉緊病發於陰而誤下之則作痞痞之所由來也但痞與結胸異彼以按之自硬此以按之自濡彼為有形之結痛此但無形之氣痞耳此一節申言痞證之因正曰緊是少陰證與仲景少陰證之脈法不合蓋緊脈是寒被其火浮緊主在表則為皮毛肌腠間病沉緊主在裏曰反入裏者謂本浮而反沉主從外而入內故主陷入胸膈而為痞也又曰但氣痞耳則是仲景自行註解言痞止是寒熱無形之氣不似結胸是水火有形之痰也讀者當辨太陽中風下利嘔逆表解者乃可攻之其人汗出發作有時頭痛心下痞硬滿引脅下痛乾嘔短氣汗出不惡寒者此表解裏未和也十棗湯主之痞證間有風激水氣而成者自當分別而觀太陽中風動其寒水之氣水氣淫於下則下利水氣淫於上則嘔逆然風邪在表須待表解者乃可從裏攻之若其人內水滲溢則漐漐汗出水有潮汐則汗出亦發作有時水搏則過顙水激則在山故為頭痛水飲填塞於胸脅則心下痞而硬滿又引脅下而作痛水邪在中阻其升降之氣上不能下則乾嘔下不能上則短氣歷歷驗之知裏證之未和惟此汗出不惡寒之另為一證者即於不惡寒中知表證之已解因而斷之曰此表解裏未和也以十棗湯主之此一節於痞證外論及太陽中風激動其寒水之氣而為痞也漐音蟄汗出如小雨不輟貌正曰發作有時是何緣故何得比為水有潮汐頭痛亦何比得為水激在山蓋水停胸脅在膜油中與瘧邪之客於募原同也募原今人不知蓋即三焦之油膜也邪在膜中正氣過此與之相爭則瘧發作此節水留膈膜之間衛氣與爭則發作衛氣已過則止與瘧之發作有時其理正同衛氣爭而得出則漐漐汗出寒水之氣隨太陽經脈上攻於頭則為頭痛故但用十棗湯攻其水而諸證解又有此硬滿二字與但氣痞者不同仲景欲人互參故繼上章而詳此也十棗湯方芫花熬甘遂大戟大棗十枚擘上上三味等分各別搗為散以水一升半先煮大棗肥者十枚取八合去滓納藥末強人服一錢匕羸人服半錢溫服之平旦服若下少病不除者明日更服加半錢得快下利後糜粥自養蔚按太陽為天天連於水太陽中風風動水氣水氣淫於上則嘔逆水氣淫於下則下利水氣聚於心下則為痞且硬滿引脅而痛也其人漐漐汗出頭痛乾嘔短氣汗出等證宜辨若惡寒為表未解不可攻之若不惡寒為表解而裏未和宜用此湯第三味皆辛苦寒毒之品直決水邪大傷元氣柯韻伯謂參朮所不能君甘草又與之相反故選十棗以君之一以顧其脾胃一以緩其峻毒得快利後糜粥自養一以使穀氣內充一以使邪不復作此仲景用毒攻病之法盡美又盡善也太陽病醫發汗遂發熱惡寒因復下之心下痞表裏俱虛陰陽氣並竭無陽則陰獨復加燒針因胸煩面色青黃膚瞤者難治今色微黃手足溫者易愈痞證間有汗下虛其陰陽而成者亦當分別而觀太陽病在肌腠者宜桂枝湯以解肌醫者誤以麻黃湯發汗徒傷太陽之經而虛其表遂致發熱惡寒比前較甚若再用桂枝湯啜熱稀粥法則愈矣醫者不知因復下之更甚太陰之藏而虛其裏心下作痞責之表裏俱虛陰氣與陽氣並竭並竭則不交而為痞矣且夫陰陽之為義大矣哉自其淺言之則氣陽也血陰也自其深言之陽有陽氣而陰亦有陰氣陰氣為無形之氣隨陽氣循行於內外不同於有形之陰血獨行於經脈之中也陰血止謂之陰陰氣謂之為陰亦可謂之為陽此證無陽則陰獨其理雖奧醫者不可以不明倘復加燒針以強助其陽火氣因攻於胸而為煩土敗而呈木賊之色其面色青黃脾傷而失貞靜之體其肌膚瞤動而不安者難治今面色不青而微黃是土不失其本色也手足溫者猶見土氣灌溉於四旁也病尚易愈此一節言汗下傷陰陽之氣而成痞者不可更用燒針也今閩粵江浙醫輩不敢用麻黃湯而代以九味羌活湯香蘇飲加荊防芎芷炮薑之類視麻黃湯更烈正曰陰氣謂之為陰又云亦可謂之為陽則混淆矣陰陽氣並竭與無陽則陰獨實為難通吾於此頗有意會然仍不敢解恐未合聖師心法也故闕之以待考心下痞按之濡其脈關上浮者大黃黃連瀉心湯主之痞發於陰實感少陰君火之氣而成故其病心下不通而痞以手按之卻不硬而濡此病在無形之氣也診其脈卻不同誤下入裏之緊關脈之上浮者以關上為寸浮為上升此少陰君火亢盛之象以大黃黃連瀉心湯主之瀉少陰亢盛之火而交於下則痞結解矣此一節言痞感少陰君火之氣而成出其正治之方也此外各瀉心法皆因其兼證而為加減也補曰結胸瀉心所謂胸心皆指膈膜而言心包之火隨血下行要從此過膀胱之水從胃而滲入三焦膈膜是上焦乃水之上源三焦決瀆之水要從此過其膀胱所化之氣透入氣海循下焦油膜而上出口鼻充皮毛均要從膈膜中過是以膈間有結胸痞氣之證結胸是有形之實證痞氣是無形之虛氣結胸有寒熱並結者又有寒實熱實之殊痞證有水火交痞者又有單水痞單火痞之異十棗湯單是水痞此湯是單火痞仲景對舉之正欲令人互勘大黃黃連瀉心湯方大黃二兩黃連一兩上二味以麻沸湯二升漬之須臾絞去滓分溫再服蔚按心下痞按之濡而不鞕是內陷之邪與無形之氣搏聚而不散也脈浮在關以上其勢甚高是君火亢於上不能下交於陰也此感上焦君火之化而為熱痞也方用大黃黃連大苦大寒以降之火降而水自升亦所以轉否為泰法也最妙在不用煮而用漬僅得其無形之氣不重其有形之味使氣味俱薄能降而即能升所謂聖而不可知之謂神也心下痞而復惡寒汗出者附子瀉心湯主之痞為少陰本熱火亢而有復呈太陽本寒為病者亦須分別心下痞為少陰君火內結之證而復惡寒乃得太陽本寒之氣而且汗出者為太陽本寒之甚而標陽又虛難以自守之象以附子瀉心湯主之蓋以太陽少陰標本相合水火相濟本氣中自有陰陽水火非深明陰陽互換之理者不可以語此補曰瀉心皆是水火虛氣作痞惟此是火氣實水氣虛水中化氣即衛外之陽氣也故用附子補水分之陽氣附子瀉心湯方大黃二兩黃連黃芩各一兩附子一枚炮去皮破別煮取汁上四味切三味以麻沸湯二升漬之須臾絞去滓納附子汁分溫再服蔚按心下痞是感少陰君火之本熱也復惡寒者復呈太陽寒水之本寒也汗出者太陽本寒甚而標陽大虛而欲外撒也治傷寒以陽氣為主此際豈敢輕用苦寒然其痞不解不得不取大黃黃連黃芩之大苦大寒以解少陰之本熱又恐亡陽在即急取附子之大溫以溫太陽之標陽並行不悖分建奇功如此最妙在附子專煮扶陽欲其熟而性重三黃湯漬開痞欲其生而性輕也本以下之故心下痞與瀉心湯痞不解其人渴而口燥煩小便不利者五苓散主之水火不交其作痞固也而土氣不能轉運者亦因而作痞太陽之本寒也傷寒中風但見惡寒之本病不見發熱之標病汗之宜慎而下更非所宜醫者不知其病止在本汗後復以承氣之類下之故心下痞與瀉心湯欲瀉其陽痞而痞竟不解所以然者汗傷中焦之汁下傷中宮之氣脾虛故也脾虛不能上升而布津液則其人渴而口中躁煩脾虛不能下行而調水道則其人小便或短赤或癃閉而不利者以五苓散主之上節言水火不交而成痞此言土不灌溉而亦成痞也補曰痞是水火虛氣然亦有單水痞之實證十棗湯是也又有單水痞之虛證五苓散是也辨證細密之至又原文本字下當有脫簡傷寒汗出解之後胃中不和心下痞硬乾噫食臭脅下有水氣腹中雷鳴下利者生薑瀉心湯主之脾不和者既因以成痞矣而胃不和者亦然傷寒汗出外邪已解之後惟是胃中不和不和則氣滯而內結故為心下痞硬不和則氣逆而上衝故為乾噫蓋胃之所司者水穀也胃氣和則穀消而水化矣茲則穀不消而作腐故為食臭水不化而橫流故為脅下有水氣腹中雷鳴下利者水穀不消糟粕未成而遽下逆其勢則不平所謂物不得其平則鳴者是也以生薑瀉心湯主之上節言脾不轉輸而成痞此節合下節皆言胃不和而亦成痞也正曰以物不得其平則鳴解腹中雷鳴牽強之至豈知水氣二字仲景明言有水復有氣若有水不有氣則水停而氣不鼓之不雷鳴矣有氣不有水則氣行而水不激之亦不雷鳴矣惟水與氣爭趨是以雷鳴下利又按諸瀉心證皆是痞結膈膜之間西醫言膈膜有管竅通於胃中內經言胃有大絡是指紋絡其實絡中有管竅也胃絡通於膈故各瀉心湯治膈間皆用和胃之藥借胃氣以運行其膈間也但各節是言膈病而兼治胃此節是言胃病而兼及膈也病當在膈則食管中無病故不食臭腸中亦無病故不下利惟因胃中水火不和而兼膈痞者不但火逆之氣出於膈間而為乾噫必且食物在胃脘亦穢逆而為食臭不但水與氣從膈侵及脅下而且復中大小腸與胃連為一體者亦為水氣攻衝而雷鳴下利細觀此節便知腸胃膈膜之別並知火逆水瀉之原矣生薑瀉心湯方生薑四兩切甘草三兩炙人參三兩乾薑一兩黃芩三兩半夏半升洗黃連一兩大棗十二枚擘上八味以水一斗煮取六升去滓再煎取二升溫服一升日三服男元犀按太陽為寒水之經寒水之氣傷於外者可從汗而解之寒水之氣入於裏者不能從汗解之汗出解後而後現之證俱屬水氣用事為本條之的證惟心下痞硬為諸瀉心法統共之證陳平伯云君生薑之辛溫善散者宣泄水氣復以乾薑參草之甘溫守中者培養中州然後以芩連之苦寒者滌熱泄痞名曰生薑瀉心賴以瀉心下之痞而兼擅補中散水之長也倘無水氣必不用生薑半夏之辛散不涉中虛亦無取乾薑參草之補中要知仲景瀉心湯有五然除大黃黃連瀉心湯正治之外皆隨證加減之方也傷寒中風醫反下之其人下利日數十行穀不化腹中雷鳴心下痞硬而滿乾嘔心煩不得安醫見心下痞謂病不盡復下之其痞益甚此非結熱但以胃中虛客氣上逆故使硬也甘草瀉心湯主之然而胃不和中又有誤下之虛證太陽病或傷寒或中風不應下者醫反下之虛其腸胃則水寒在下而不得上交故其人下利日數十行穀不化腹中雷鳴火熱在上而不得下濟故其人心下痞硬而滿乾嘔心煩不得安此上下水火不交之理本來深奧醫者不知只見其心下痞謂邪熱之病不盡復誤下之則下者益下上者益上其痞益甚此非結熱但誤下以致胃中虛客氣乘虛上逆故使心下硬也以甘草瀉心湯主之此交上下者調其中之法也此一節承上節胃不和而言胃中虛之證也甘草瀉心湯方甘草四兩黃芩三兩乾薑三兩半夏半升洗大棗十二枚擘黃連一兩上六味以水一斗煮取六升去滓再煎取三升溫服一升日三服陳平伯曰心下痞本非可下之實熱但以妄下胃虛客熱內陷上逆心下耳是以胃氣愈虛痞結愈甚夫虛者宜補故用甘溫補以虛客者宜除必藉苦寒以泄熱方中倍用甘草者下利不止完穀不化此非稟九土之精者不能和胃而緩中方名甘草瀉心見泄熱之品得補中之力而其用始神也此伊尹湯液所制治狐惑蝕於上部則聲嗄者方中有人參三兩傷寒服湯藥下利不止心下痞硬服瀉心湯已復以他藥下之利不止醫以理中與之利益甚理中者理中焦此利在下焦赤石脂禹餘糧湯主之復不止者當利其小便痞不特上中二焦之為病也即下焦不和亦能致痞傷寒服攻下之湯藥下後則下焦之氣下而不上故下利不止上焦之氣上而不下故心下痞硬伊聖瀉心湯所以導心下之火熱而下交也服瀉心湯已則心下之痞滿既除而上中之氣亦和矣復以他藥下之則下焦之氣益下而不能上故利不止醫又認為中焦虛寒以理中湯與之利益甚蓋理中者溫補脾胃其效專理中焦此利不在中焦而在下焦當以赤石脂禹餘糧湯主之復利不止者法在分其水穀當利其小便此一節言下焦不和以致痞發千古所未發正曰下焦不和以致痞誤矣下焦是大腸胱膀間之膜油主通利水道入膀胱又主收止大腸之氣並以膏液潤大腸也此處病萬不能上胸膜而作痞證且原文言此利在下焦並未言此痞在下焦何得妄扯而反自鳴得意哉蓋此節是治痞而致利服瀉心湯己是已治其痞硬而反下之是又誤下之也遂利不止是痞已去只是利不止也故下文但言治利不言治痞修園於文法未細玩故誤只緣不知三焦是何物耳仲景曰理中者理中焦是理小腸脾胃間之膜油此利在下焦是指大腸膀胱間之膜油故以赤石餘糧止塞大腸若仍利者當利小便是當從油膜而分消之使從小便去則水不侵入大腸矣識得下焦之膜油則知利小便即是治大便之利並知治中焦之誤且知下焦不能為胸痞並知痞證誤下所以能致下利也會通結胸痞滿各證皆在上焦膜膈中或時連及中下焦與腠理者皆因以膜相連之故同而不同之理皆可明矣赤石脂禹餘糧湯方赤石脂一斤碎禹餘糧一斤碎上二味以水六升煮取二升去滓分三服張令韶曰石性墜下故以治下焦之利非僅固澀也下焦濟泌別汁而滲入膀胱故利不止者又當利其小利以分別其水穀焉夫心下痞屬上中二焦此復言不特上中二焦不和而成即下焦不和而亦能成痞也柯韻伯曰甘薑參朮可以補中宮元氣之虛而不足以固下焦脂膏之脫此利在下焦故不得以理中之劑收功矣乃大腸之不固仍責在胃關門之不閉仍責在脾二石皆土之精氣所結實胃而澀腸急以治下焦之標者實以培中宮之本也要知此證土虛而火不虛故不宜於薑附若濕甚而虛不甚復利不止者故又當利小便又曰凡草木之藥皆稟甲乙之氣總不若稟戊己之化者得同氣相求之義又有爐底補塞之功傷寒吐下後發汗虛煩脈甚微八九日心下痞硬脅下痛氣上衝咽喉眩冒經脈動惕者久而成痿下後致痞言之詳矣而發汗在吐下之後而成痞者奈何傷寒吐下後又發其汗則奪其經脈之血液而為汗矣心主血故虛煩心主脈故脈甚微八月值陽明主氣之期而從闔九日值少陽主氣之期而不能樞轉故心下痞硬而脅下亦痛甚至陰虛陽亢虛氣上衝於咽喉血不上榮頭目時形其眩冒經脈動惕者以吐下之後而汗則經脈之血告竭而筋遂無所養也久而不愈恐肢體不為我用而成痿此一節雖吐下與汗並言卻重在誤汗一邊傷寒發汗若吐若下解後心下痞硬噫氣不除者旋復代赭湯主之汗吐下後病已解而尚有痞噫之證未除者不可不備其治法傷寒發汗若吐若下解後心下痞硬噫氣不除者此中氣傷而虛氣上逆也以旋覆代赭湯主之此節言治病後之餘邪宜於補養中寓散滿鎮逆之法旋覆代赭石湯方旋覆花三兩人參二兩生薑五兩切代赭石一兩大棗十二枚掣甘草三兩炙半夏半升洗上七味以水一斗煮取六升去滓再煎取三升溫服一升日三服俞麟州曰此即生薑瀉心湯之變法也夫二條皆有心下痞硬句而生薑瀉心湯重在水氣下趨而作利旋覆代赭湯重在胃虛挾飲水氣上逆而作噫取治水氣下趨而利者必用生薑以散水胃虛挾飲而噫者必用赭石以鎮逆二條對勘益見仲景制方之妙羅東逸云此方治正虛氣不歸元則承領上下之聖方也蓋發汗吐下後邪雖去而胃氣之虧損亦多胃氣既虧三焦亦因之而失職陽無所歸而不升陰無所納而不降是以濁邪留滯伏飲為逆故心下痞硬噫氣不除方中以人參甘草養正補虛薑棗和脾養胃所以定安中州者至矣更以赭石得土氣之甘而沉者使之斂浮鎮逆領人參以歸氣於下旋覆之辛而潤者用之開肺滌飲佐半夏以蠲痰飲於上茍非二物承領上下則何能除噫氣而消心下之痞硬乎觀仲景治下焦水氣上凌振振欲擗地者用真武湯鎮之利在下焦大腸滑脫者用赤石脂禹餘糧湯固之此胃虛於中氣不及下復用此法領之而胸中轉否為泰其為歸元固下之法各極其妙如此下後不可更行桂枝湯若汗出而喘無大熱者可與麻黃杏子甘草石膏湯下之太早為結胸為痞此證之常也而證之變者又當別論太陽溫病風溫證熱自內發宜用涼散而托解之不宜下之太早也下後雖不作結痞等證而下之太早其內熱尚未歸於胃腑徒下其屎不下其熱熱愈久而愈甚矣欲解其熱必不可更行桂枝湯以熱增熱須知溫病風溫證為火勢燎原而莫戢若火逼於外則蒸蒸而汗出火逆於上則鼾齁而作喘內熱已甚而外反見其無大熱者可與麻黃杏子甘草石膏湯順其勢而涼解之此下後不干結痞而另有一證也此一節因上下文皆言下後之證亦姑備此證以參觀也諸本皆疑其錯簡或謂其傳寫之誤然漢季及晉為時未久不可與秦以前之書並論余讀書凡有遇不能曉悟之處皆自咎識見不到不敢輒以錯簡等說自文太陽病外證未除而數下之遂協熱而利利下不止心下痞硬表裏不解者桂枝人參湯主之下後表證未解而作痞不無裏寒內熱之分試言其裏寒太陽病不用桂枝湯解肌外證未除醫者魯莽而數下之致虛胃氣虛極則寒中氣無權既不能推托邪熱以解肌遂協同邪熱而下利利下不止胃陽愈虛而陰霾之氣愈逆於上彌漫不開故心下痞硬此為表裏不解者以桂枝人參湯主之此一節合下節皆言太陽表裏不解而成痞也弟賓有按此協熱二字與別處不同蓋由肌熱不從外解故其方不離桂枝桂枝人參湯桂枝四兩甘草四兩炙白朮三兩人參三兩乾薑三兩上五味以水九升先煮四味取五升納桂更煮取三升溫服一升日再服夜一服蔚按太陽外證未除而數下之未有不致虛者裏虛則外熱內陷故為協熱利不止協合也同也言但熱不虛但虛不熱皆不足以致此也太陽之氣出入於心胸今太陽主陽之氣因誤下而陷於下則寒水之陰氣反居於陽位故為心下痞硬可與甘草瀉心湯此條非熱結但以胃中虛客氣上逆故使硬句互參方用人參湯以治裏虛桂枝以解表邪而煮法桂枝後納者欲其治於裏藥中越出於表以解邪也沈丹彩曰此與葛根黃連湯同於誤下而利不止之證也而寒熱各別虛熱對待可於此互參之彼因實熱而用清邪此因虛邪而從補正彼得芩連而喘汗安此得理中而痞硬解彼得葛根以升下陷而利止此藉桂枝以表解邪而利亦止矣傷寒大下後復發汗心下痞惡寒者表未解也不可攻痞當先解表表解乃可攻痞解表宜桂枝湯攻痞宜大黃黃連瀉心湯試言其內熱傷寒大下之後復發其汗則太陽之氣逆於心胸故心下痞而惡寒之證仍在者為表未解也夫從外而內者先治其外後治其內故不可攻痞當先解表必俟不惡寒之表證盡解乃可以攻其痞解表宜桂枝湯攻痞宜大黃黃連瀉心湯此一節汪苓友謂其重出而不知仲師繼上節而復言之以見表之邪熱雖同而裏之變證各異且表裏同治有用一方而為雙解之法雙解中又有緩急之分或用兩方而審先後之宜兩方中又有合一之妙一重復處開出一新境不可與讀書死於句下者說也傷寒發熱汗出不解心中痞硬嘔吐而下利者大柴胡湯主之今試即痞證而總論之可以從中而解亦可以從外而解也傷寒發熱汗出不解邪結心中而心下痞硬然邪雖已結聚而氣機仍欲上騰故嘔吐不得上出而復欲下行故嘔吐而又下利者當因其勢而達之達之奈何用大柴胡湯從中上而達太陽之氣於外以主之治痞者不可謂瀉心湯之外無方也此一節所以結痞證之義也按此證宜用大柴胡湯之無大黃者病如桂枝證頭不痛項不強寸脈微浮胸中痞硬氣上衝喉咽不得息者此為胸有寒也當吐之宜瓜蒂散又即結胸之證而總論之以見大小陷胸湯外又有吐法以補其所未及也病如桂枝證但頭不痛項不強知其病不在太陽之經脈矣寸脈主上而微浮設是風邪當從胸以及於頭而俱痛今頭項如故惟胸中痞硬何也胸中乃太陽出入之地本寒之氣塞其道路故也氣上衝咽喉喘促而不得自布其鼻息者此為胸有寒也內經云太陽之上寒氣主之寒氣結凝於胸則太陽之氣不能從胸以出當吐以從高越之宜瓜蒂散此可見結胸之證不一因下而成者固多因汗而成者亦復不少不因汗吐下而成者亦有之因其欲吐不得吐而成者亦有之其治法示不專主於大小陷胸等方也瓜蒂散方瓜蒂一分熬黃赤小豆一分上二味各別搗篩為散已合治之取一錢匕以香豉一合用熱湯七合煮作稀糜去滓取汁和散頓服不吐者少少加得快吐乃止諸亡血虛家不可與瓜蒂散蔚按太陽之脈連風府上頭項今云不痛不強者不在經脈也太陽之氣出入於心胸今云胸中痞硬氣上衝咽喉不得息者是邪氣欲從太陽之氣上越也寸脈微浮者氣欲上越之象也然欲越而不能遽越其寒水之氣不在經亦不在表而惟在於胸中故曰胸中寒方取瓜蒂之苦涌佐以赤小豆之色赤而性降香豉之黑色而氣升能使心腎相交即大吐頃神志不憒此所以為吐法之神也又論云病人手足厥冷脈乍緊者邪在胸中心下滿而煩饑不能食者病在胸中當須吐之宜瓜蒂散諸家解互異惟徐靈胎以邪在胸中陽氣不能四達解之甚為簡妙病脅下素有痞連在臍旁痛引少腹入陰筋者此名臟結死又即藏結之證而總論之在少陰止為難治止為不可攻在厥陰則為不治病人脅下平素有痞其痞連在臍傍為天樞之位此脾氣大虛而肝氣自旺總為腎家真陽衰敗致胸中為氣不布肝木之榮失養三陰部分皆虛矣又值寒邪內入則藏真之氣結而不通其痛從臍旁引及少腹以入陰筋者以少腹陰筋皆厥陰之部厥陰為陰中之陰不得中見之化此名藏結必死可知結在少陰無君火化者止曰難治曰不可攻以少陰上有君火猶可冀其生也結在厥陰兩陰交盡絕不見陽必死無疑矣此一節所以結藏結之義也正曰臟字如金匱婦人臟躁之臟指血室胞宮而言凡男子女人皆有血室胞宮乃下焦一大夾室也此夾室之膜上則連脅下之板油其下則有竅通於前陰故痛引陰筋仲景此章歷言胸膜脅膜脾胃及下焦膜中各證而又言及下焦夾室內之臟結上中下三焦詳矣修園不知三焦為何物是以有天樞之位脾氣之說不知胞宮乃腎肝所司腎肝陽敗而始結何得摭言天樞脾氣哉蓋以臟結即今人所謂縮陰證也入陰筋者將陰筋引入於內即縮陰證是也上文引字與此句入字緊連故知其為引之使入也曰少腹曰陰筋則其所謂臟結為指胞宮更無疑矣傷寒若吐若下後七八日不解熱結在裏表裏俱熱時時惡風大渴舌上乾燥而煩欲飲水數升者白虎加人參湯主之病在絡與在經者不同金匱既有熱極傷絡之論矣太陽之病氣在絡即內合於陽明之燥化傷寒病若吐若下後中氣受傷至七日又當太陽主氣之期八日又當陽明主氣之期其病不解則太陽之標陽與陽明之燥氣相合而為熱熱結在裏表裏俱熱熱傷表氣故時時惡風熱傷裏氣故大渴感燥熱之化故舌上乾燥而煩推其燥而與煩之情形欲飲水數升而後快者必以白虎加人參湯清陽明之絡熱而主之張錢塘云邪之中人必先於皮毛次入於肌次於絡肺入主皮毛脾主肌陽明主絡太陽病氣在於皮毛即內合於肺故麻黃湯所以利肺氣在於肌即內合於脾故桂枝湯越婢湯所以助脾氣在於絡即內合於陽明故白虎湯所以清陽明之氣然均謂之太陽病者以太陽為諸陽主氣皮毛肌絡皆統屬於太陽也合下共三節言太陽病在於絡合於陽明而為白虎之熱證也此章三節論燥熱火之氣下章風濕相搏兩節論風寒濕之氣所謂傷寒論一書六氣為病之全書也補曰熱結在裏對皮毛之表而言非胃中也張陳註為熱在陽明之絡然金匱云熱傷陰絡則下血傷陽絡則衄血此未言血且註絡字又不指出為何物安能的確又經絡二字混稱後人遂以直脈為經橫脈為絡內經又言胃有大絡脾有大絡五臟又皆有絡然則絡是何物哉蓋人身內外之微絲血管也西醫名管凡通氣行血之竅道皆油膜微絲血管內經所謂脈絡西醫皆名為管也是絡乃行氣行血之路道在內通於腸胃而在外則行於肌肉之中此證熱在肌肉肌者肥肉肉者瘦肉熱在此間從絡通於腸胃故見口舌乾燥瘦肉屬血分肥肉屬氣分皆脾與胃之所司故能內合於胃也傷寒無大熱口燥渴心煩背微惡寒者白虎加人參湯主之傷寒病太陽之標熱合陽明之燥氣熱盛於內而外反無大熱陽明絡於口屬於心故口燥渴而心煩太陽循身之背陽明循身之面熱俱併於陽明則陽明實而太陽虛矣可即於其背之微惡寒者以知為陽明之燥熱益盛焉白虎加人參湯所以主之傷寒脈浮發熱無汗其表不解不可與白虎湯渴欲飲水無表證者白虎加人參湯主之雖然解絡熱者白虎為其所長而表熱則不可以概用傷寒脈浮發熱無汗其表不解者與絡無與也不可與白虎湯若渴欲飲水為熱極傷絡可以直斷其無表證者以白虎加人參湯主之此申明白虎湯能解絡熱而不能解表熱也受業侄道著按白虎證其脈必洪大若浮而不大或浮而兼數是脾氣不濡水津不布則為五苓散證魏子乾曰入於肌絡者宜桂枝湯肌氣之在裏者宜越婢湯絡氣之入裏者宜白虎湯太陽少陽併病心下硬頸項強而眩者當刺大椎肺俞肝俞慎勿下之太陽少陽併病心下硬頸項強而眩者是太陽之病歸併於少陽少陽證汗下俱禁今在經而不在氣經則當刺大椎肺俞肝俞以泄在經之邪慎勿下之小結胸篇戒勿汗者恐其譫語此戒勿下者恐其成真結胸也此三節言太陽合併於少陽而為病也同學周鏡園曰此言太少併病證在經脈不在氣化病經脈者當刺少陽經脈下頸合缺盆太陽經脈還出別下項故頸項強太陽起於目內眥少陽起於目銳眥故目眩太陽經隧在膀胱其都會在胸肺肺脈還循胃上口上通心膈之間膽脈由胸貫於膈脈絡不和則心下鞕故刺大椎以通經隧之太陽刺肺俞以通都會之太陽又刺肝俞以通少陽之脈絡諄諄戒以勿下者以病在經脈宜刺不宜下也太陽與少陽合病自下利者與黃芩湯若嘔者黃芩加半夏生薑湯主之合病又與併病不同併病者彼併於此合病者合同為病也太陽與少陽合病太陽主開少陽主樞今太陽不能從樞以外出而反從樞而內陷其自下利者內陷之故與黃芩湯清陷裏之熱而太陽之氣達於外也若嘔者乃少陽之樞欲從太陽之開以上達宜順其勢而利導之用黃芩加半夏生薑湯宜其逆氣而助其開以主之黃芩湯方黃芩三兩甘草二兩炙芍藥二兩大棗十二枚擘上四味以水一斗煮取三升去滓溫服一升日再夜一服若嘔者加半夏半升生薑三兩蔚按仲景凡下利證俱不用芍藥惟此方權用之以泄陷裏之熱非定法也張令韶曰此治太陽與少陽合病而下利與嘔也合者彼此合同非如併者之歸併於此也太陽主開少陽主樞太陽不能從樞以外出而反從樞以內陷故下利與黃芩湯清陷裏之熱而達太陽之氣於外若嘔者少陽之樞欲從太陽之開以上達也故加半夏生薑宣達其逆氣以助太陽之開傷寒胸中有熱胃中有邪氣腹中痛欲嘔吐者黃連湯主之太陽之病既歸併於少陽則以少陽為主矣然亦知少陽三焦之氣游行於上中下者乎上焦主胸中焦主胃下焦主腹傷寒胸中有熱逆於上焦也胃中有寒邪之氣逆於中焦也腹中痛逆於下焦也欲嘔吐者少陽三焦之氣逆於上中下之間欲從樞轉而外出也治宜取小柴胡轉樞之意而加減之俾寒熱宣補內外上下絲絲入扣則愈以黃連湯主之黃連湯方黃連甘草炙乾薑桂枝各三兩人參二兩半夏洗半升大棗擘十二枚上七味以水一斗煮取六升去滓溫服一升日一服夜二服王晉三曰此即小柴胡湯變法以桂枝易柴胡以黃連易黃芩以乾薑易生薑胸中熱嘔吐腹中痛者全因胃中有邪氣阻遏陰陽升降之機故和人參大棗乾薑半夏甘草專和胃氣使入胃之後聽胃氣之上下敷布交通陰陽再用桂枝宣發太陽之氣載黃連從上焦陽分瀉熱不使其深入太陰有礙虛寒腹痛補曰胸中是言胸膈之內乃指心包而言不知膈膜則不知胸中是何物也且不知胸中與胃界限不同也此證惟心包有熱其餘胃中腹中大小腸皆有寒氣故只用黃連一味清心包之熱而其餘則皆治寒也傷寒八九日風濕相搏身體疼煩不能自轉側不嘔不渴脈浮虛而澀者桂枝附子湯主之若其人大便硬小便自利者去桂加白朮湯主之風濕相搏有從寒傷所致者其證奈何傷寒八曰當陽明主期氣之九日當少陽主氣之期宜從少陽之樞而外出也乃不解而復感風濕合而相搏寒邪拘束故身體疼風邪煽火故心煩濕邪沉著故不能自轉側邪未入裏故不嘔不渴脈浮虛而澀者以浮虛為風澀則為濕也此風多於濕而相搏於外以桂枝附子湯主之若患前證其人脾受濕傷不能為胃行其津液故大便硬愈硬而小便愈覺其自利者脾受傷而津液不能還入胃中故也此為濕多於風而相搏於內即於前方去桂枝加白朮湯主之濕若去則風無所戀而自解矣此節合下節言風濕相搏之病也但此節宜分兩截看風濕相搏至桂枝附子湯主之作一截言風濕相搏於外也若其人至去桂加白朮湯主之又作一截言風濕相搏於內也要知此節桂枝附子湯是從外驅邪之表劑去桂加白朮湯是從內撤邪之裏劑下節甘草附子湯是通行內外之表裏劑也正曰仲景書凡風寒二字有通稱不分別者蓋外感或系寒隨風至或系風挾寒來故二字往往通用此風濕是寒風非熱風也修園執定風為陽邪謂是後感於風風邪煽火與上文方治不合須玩此煩字不是心煩乃骨節煩疼謂其發作煩頻也風欲行而濕阻之故煩疼濕甚則筋脹不能掉動故不可轉側蓋筋生於瘦肉兩端而膜網則包著瘦肉西醫以筋是連網所生也連網者中國所謂膜肉也膜油即脾之物脾主濕故濕能從膜油而犯其筋節膜又是三焦所司至行小便故三焦陽虛則能小便自利脾之油受濕不運行則大便反硬會得此理乃與仲景方相合也桂枝附子湯桂枝四兩附子三枚去皮炮破八片生薑三兩切甘草二兩炙大棗十二枚擘上五味以水六升煮取三升去滓分溫三服此方藥品與桂枝去芍加附子湯同但分兩之輕重不同其主治亦別仲景方法之嚴如此桂枝附子去桂加白朮湯白朮四兩甘草二兩炙附子三枚炮大棗十二枚擘生薑三兩上五味以水七升煮取三升去滓分溫三服初服其人身如痹半日許復服之三服盡其人如冒狀勿怪此以附子朮並走皮內逐水氣未得除故使之爾當加桂枝四兩此本一方二法也蔚按師云傷寒八九日風濕相搏身體疼煩不能自轉側者風濕之邪盛也濕浮於中無上達之勢故不嘔濕為陰邪無陽熱之化故不渴邪盛則正虛故脈浮虛而澀但前方主桂枝為風勝於濕風為天之陽邪主桂枝之辛以化之後方去桂加術為濕勝於風濕為地之陰邪主白朮之苦以燥之或問苦燥之品不更令大便硬小便自利乎曰太陰濕土喜燥而惡濕濕傷脾土則不能輸其津液以入胃師所以去解表之桂而加補中之術也且濕既去而風亦無所戀而自除經方無不面面周到矣風濕相搏骨節疼煩掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫者甘草附子湯主之風濕相搏之病見證較劇者用藥又宜較緩風濕相搏業已深入其骨節煩疼掣痛不得屈伸近之則痛劇此風寒濕三氣之邪阻遏正氣不令宣通之象也汗出氣短小便不利惡風不欲去衣或身微腫者衛氣榮氣三焦之氣俱病總由於坎中亢陽之氣失職也務使陽回氣暖而經脈柔和陰氣得煦而水泉流動矣以甘草附子湯主之此一節承上節言風濕相搏病尚淺者利在速去深入者妙在緩攻恐前方附子三枚過多其性猛急筋節未必驟開風濕未必遽走徒使大汗出而邪不盡耳故減去一枚並去薑棗而以甘草為君者欲其緩也此方甘草止用二兩而名方冠各藥之上大有深義余嘗與門人言仲師不獨審病有法處方有法即方名中藥品之先後亦寓以法所以讀書當於無字處著神也受業門人答曰此方中桂枝視他藥而倍用之取其入心也蓋此證原因心陽不振以致外邪不撤是以甘草為運籌之元帥以桂枝為應敵之先鋒也彼時不禁有起予之嘆故附錄之補曰煩疼掣痛不得屈伸即上節不能轉側同一理也皆是筋脹之故自己且不能動況他人近之有所觸動不更劇乎寒風傷衛則汗出惡風不欲去衣濕停則為水故小便不利身微腫故用附子桂枝振其衛陽白朮甘草行其脾濕此節淺而易解而註家多不明也甘草附子湯方甘草二兩炙附子二枚炮去皮破白朮二兩桂枝四兩上四味以水六升煮取三升去滓溫服一升日三服初服得微汗則解能食汗止復煩者服五合恐一升多者宜服六七合為妙此言初服之始王晉三云甘草附子湯兩表兩裏之偶藥風淫於表濕流關節治宜兩顧白朮附子顧裏勝濕桂枝甘草顧表勝風獨以甘草冠其名者病深關節義在緩而行之若驅之太急風去而濕仍留反遺後患矣傷寒脈浮滑此以表有熱裏有寒白虎湯主之是故不知證者不可以言醫不知脈者亦不可以言醫脈之不可不講也脈之緊要者散見各證之中不能悉舉也亦不必贅舉也然太陽總諸經之氣而諸脈之同者異者似同而實異者似異而實同者有同中之異異中之同者雖曰不可言傳而亦無不可以意會矣今欲舉一以為偶反即以太陽傷寒言之太陽本寒而標熱若診其脈象浮滑浮為熱在表滑為熱在經此為表有標熱便知其裏有本寒內經所謂凡傷寒於為熱病是也病宜以白虎湯主之憑脈辨證之法從此比例之思過半矣張錢塘云上八節以風寒濕熱燥火之氣結通篇太陽之病以見傷寒一論六淫之邪兼備非止風寒也此三節以浮滑結代之脈象結通篇太陽之脈以見太陽總統諸經之氣而諸脈之死生亦俱備於太陽中也白虎湯方知母六兩石膏一斤碎甘草二兩粳米六合上四味以水一斗煮米熟湯成去滓溫服一升日三服蔚按白虎湯傷寒論凡三見太陽條治脈浮滑厥陰條治脈滑而厥又治三陽合病腹滿身重難以轉側口不仁而面垢譫語遺尿等證而原本此方列於太陽條甘草附子湯之下者言外見風寒濕燥火之氣俱括於太陽之內且下一條炙甘草湯亦即潤燥之氣可知傷寒論非止治風寒二氣也柯韻伯曰陽明邪從熱化故不惡寒而惡熱熱蒸外越故熱汗自出熱灼胃中故渴欲飲水邪盛而實故脈滑然猶在經故兼浮也蓋陽明屬胃主肌肉雖有大熱而未成實終非苦寒之味所能治也石膏辛寒辛能解肌熱寒能勝胃火寒性沉降辛能走外兩擅內外之能故以為君知母苦潤苦以瀉火潤以滋燥故以為臣用甘草粳米調和於中宮且能土中瀉火作甘稼穡寒劑得之緩其寒苦藥得之化其苦使沉降之性背得流連於中也得二味為佐庶大寒之品無傷損脾胃之慮也煮湯入胃輸脾歸肺大煩大渴可除矣白虎為西方金神所以治渴秋金得令而炎暑自解矣傷寒脈結代心動悸炙甘草湯主之浮滑恒脈之外又有劇脈曰結危脈曰代不可不知夫傷寒之脈何以結代非洞悉乎造化陰陽之本者不可與言蓋脈始於足少陰腎生於足陽明胃主於手少陰心少陰之氣不與陽明相合陽明之氣不與少陰相合上下不交血液不生經脈不通是以心氣虛常作動悸以炙甘草湯主之補養陽明從中宮以分布上下陳師亮曰代為難治之脈而有治法者何凡病氣血驟脫者可以驟復若積久而虛脫者不可復蓋久病漸損於內臟氣日虧其脈代者乃五臟無氣之候傷寒為暴病死生之機在於反掌亦有垂絕而不可救者此其代脈乃一時氣乏然亦救於萬死一生之途而未可必其生也炙甘草湯方甘草四兩炙生薑三兩切桂枝三兩人參二兩生地黃一斤阿膠二兩麥門冬半升麻子仁半升大棗三十枚擘上九味以清酒七升水八升先煮八味取三升去滓納膠烊消盡溫服一升日三服一名復脈湯蔚按周禹載云本條不言外證寒熱已罷可知不言內證二便自調可知第以病久正氣大虧無陽以宣其氣更無陰以養其心此脈結代心動悸所由來也方中人參地黃阿膠麥冬大棗麻仁皆柔潤之品以養陰必得桂枝生薑之辛以行陽氣而代結之脈乃復尤重在炙甘草一味主持胃氣以資脈之本原佐以清酒使其捷行於脈道也其煮法用酒七升水八升只服三升者以煎良久方得爐底變化之功步步是法要之師言結代者用此方以復之非謂脈脫者以此方救之也學者切不可泥其方名致誤危證推之孫真人制生脈散亦因其命名太夸庸醫相沿貽害豈淺鮮哉男元犀按此證必緣發汗過多所致汗為心液心液傷則血虛不能養心故心動悸心液傷則血不能榮脈故脈結代取地黃阿膠等為有形之品補有形之血另立法門脈按之來緩時一止復來者名曰結又脈來動而中止更來小數中有還者反動名曰結陰也脈來動而中止不能自還因而復動者名曰代陰也得此脈者必難治其結代之脈狀何如結能還而代不能還也脈按之來緩不及四至而時一止復來者是陰氣結陽氣不能相將此名曰結然不特緩而中止為結又脈來動而中止更來小數中有還者反動是陰氣固結已甚而陽氣不得至故小數而動也亦名曰結此為陰盛也結脈之止時或一止其止卻無常數若脈來動而中止止有常數既止遂不能自還陽不能自還而陰代之因而復動者儼如更代交代之象名曰代此獨陰無陽也得此脈者必難治此毫釐之分學者於此判之指下則可言脈矣豈獨太陽已哉此一節復申明結代之脈狀毫釐千裏務分仿佛中也正曰後世脈訣益詳而脈理益昧因分脈辨證不能會通脈之理也試思脈訣只二十八脈而病證不止二十八門若不貫通脈之全理安能即二十八脈而斷盡百病哉故人謂仲景脈法不詳而不知仲景論脈皆是以一貫萬舉一反三則脈理無不通矣故此三節特舉浮滑結代以明脈理知此而各脈之理無不通也蓋脈是血脈血生於心西醫言心有血脈管心體跳動不休則脈應之而動醫林改錯言脈是氣管氣方能動非血管也此說大謬使脈是氣管則一呼當一動一吸當一動何以一呼二動一吸二動明明與呼吸相反哉則知其決非氣管脈經云脈為血府仲景復脈湯又全是大補心血則知脈生於心血其應心而動為無疑矣故凡遲數結代三部均見斷無寸遲尺數尺結代而寸不結代者以脈管只一條數則均數遲則均遲結代則均結代皆是應心而動故無三部之分知此則知凡系脈管中事如細散芤澀革弱等理均可識矣故拈結代二脈以總明脈管所主之理也脈管外是肌肉油膜也乃三焦氣分所往來氣附脈行內經云衛氣一日行盡周身而復大會於手太陰肺故脈動而氣亦應之氣升則脈浮氣降則脈沉氣盛則脈洪氣衰則脈微氣盈則脈滑皆是隨氣呈露故有寸浮尺沉寸洪尺微之異隨氣之部分而異其強弱所以有三部之別知此則知凡脈管外氣分所主之事如弦緊牢濡等理均可識矣故拈浮滑二脈以總明脈管外氣分所主之理也讀仲景此三節則於脈理可以全通
