body:
  text: 傷寒論淺注補正卷二辨陽明病脈證補曰內經云陽明之上燥氣治之燥者陽明之本氣也此氣在人則屬胃與大腸在天則屬申酉二辰申當坤方屬土酉當兌方屬金在四時當七八月為燥金用事之候蓋天地只是水火二氣化生萬物水火相交則蒸而為濕燥與濕反乃水火不交之氣也火不蒸水則雲雨不生水不濟火則露澤不降水不潤則木氣不滋而草木黃落火不蒸則土返其宅而膏脈枯竭究水火之所以不交則由於金性之收收止水火各返其宅故神名蓐收司秋月草木枯稿水泉涸竭是為燥金用事之驗也其在一日則為申酉二時天地賴此燥氣所以戢水火之盈餘竭物産之精華而使之消息也人身稟天地之燥氣於是有胃與大腸二者皆消導水穀之府惟其稟燥氣是以水入則消之使出不得停於胃中西洋醫言胃之通體皆有微絲血管吸水出胃而走入連網西醫所謂連網即是膈膜乃內經所謂三焦為化行水穀之府也水出胃走入膈膜然後下行而入膀胱若胃之燥氣不足則水停矣西醫言食入則胃熱輳至以腐爛之西醫所謂熱即燥氣也水既出於胃中而食物之質未盡化者下行入小腸以化液其所剩糟粕乃入大腸然糟粕至此尚有餘液必得大腸燥金之氣以收吸之使餘液吸盡出往下焦去訖而糟粕乃化為堅糞若大腸燥氣不足則為溏瀉此胃與大腸所以必有此燥氣而後能消水穀也然而燥氣大過則又為結鞕等證必賴太陰之濕以濟之內經言陽明不從標本從中見之氣化正是賴中見太陰濕氣以濟其燥之義仲景存津液亦是此義手太陰肺與手陽明大腸相表裏位雖上下懸隔然肺系之油網下連膈膜又下連板油至下焦油網則與大腸相接肺津腴潤注於大腸則燥而不太過足陽明胃與足太陰脾相表裏位甚相近以膜相連胃中食物化液歸脾從膜中布達乃生膏油膏油者脾之物也膏油功用上濟胃氣下滋大腸膏油之色本帶微黃故病能發黃疸膏油透出筋骨之外則為肥肉是名曰肌邪在肌肉循膏膜而入則能內通於胃胃有大絡上通於心西醫言胃中化液有大管導之上行至頸會管遂與心之血管相會西醫所謂管即內經所謂絡也絡言其絲條管言絲條中之孔竅胃絡通心故胃中燥火入心亂神則為譫語燥熱相合胃家實則譫語舌上起芒口乾燥又以胃管上通口也若燥屎在大腸則為潮熱應申酉金旺之時而始從下潮上也其經行身之前從面至腹抵足趺皆陽明經所行臍下血室有衝脈兩條夾臍而上至於喉間是衝脈麗於陽明之部分陽明胃中汁液化血則下入血室又血室一名氣海膀胱所化之氣歸於氣海上出口鼻亦必從臍旁循陽明之道路而上是以衝氣亦能隨脈上逆入胃陽明二字或言取太少兩陽合併於人身之前兩陽相合故曰陽明然內經言陽明少陰有司天在泉之説是人身之陽明經仍取天之陽明以為名也在天以卯酉屬陽明以卯酉為日月之門戶且酉為日入如周易明入地中之明言陽明陽盛而竭是以成其燥氣陽明之氣必以下行為順者金氣肅降所以成化工也各經皆有陽明之證以水穀之海而各經皆秉氣於胃也讀者當會通焉問曰病有太陽陽明有正陽陽明有少陽陽明何謂也答曰太陽陽明者脾約是也正陽陽明者胃家實是也少陽陽明者發汗利小便已胃中燥煩實大便難是也問曰病有太陽陽明有正陽陽明有少陽陽明何謂也答曰太陽陽明者蓋以陽明之上燥氣主之本太陽不解太陽之標熱合陽明之燥熱併於太陰脾土之中脾之津液為其所爍而窮約所謂脾約是也正陽陽明者蓋以燥氣陽明之本也天有此燥氣人亦有此燥氣燥氣太過無中見太陰濕土之化所謂胃家實是也少陽陽明者蓋以少陽之上相火主之若病在少陽誤發其汗誤利其小便已則水穀之津液耗竭而少陽之相火熾盛津竭則胃中燥火熾則煩而實實則大便難是也此一節言陽明有太少正之分也補曰太陽陽明者從太陽肌肉而入內之膜油脾主膏油被熱灼而膏油枯縮則腸亦枯澀是為脾約指脾之膏油收縮而言也少陽陽明是膜網與胃相通膜網之水外從腠理而汗下從小便而泄則胃中之水皆去遂乾燥矣此處提綱即將膏油膜網與腸胃相通之迹先行發明則通篇變證可尋求矣陽明之為病胃家實是也何謂正陽陽明之為病燥氣為陽明之本氣燥氣盛於上則胃家實於內一言以蔽之曰胃家實也此復申明正陽陽明之為病也按沈堯封曰此是陽明證之提綱後稱陽明證三字俱有胃家實在內胃家實言以手按胃中實硬也如大陷胸證按之石硬即名實熱梔子豉證按之心下濡即名虛煩夫心下俱以濡硬分虛實何獨胃中不以濡硬分虛實乎此説與柯韻伯之論相表裏雖非正解亦可存參問曰何緣得陽明病答曰太陽病若發汗若下若利小便此亡津液胃中乾燥因轉屬陽明不更衣內實大便難者此名陽明也問曰何緣得太陽陽明病答曰太陽之津液從胃府水穀而生患太陽病若發汗若下若利小便此皆亡胃中之津液胃中無津液而乾燥其太陽未解之邪熱因轉屬於陽明其不更衣為腸內之實腸內既實其大便必難通而閉塞者此名太陽轉屬之陽明也此一節承上章太陽陽明病而言也然重申胃家實之旨是陽明病之總綱正曰此承上太少陽明而言淺注謂單承太陽不知仲景雖未提出少陽字面而若利小便已承上文少陽條即如太陽篇其干及少陽之證又何曾提出少陽二字讀者當細玩之問曰陽明病外證云何答曰身熱汗自出不惡寒反惡熱也問曰有諸中者形於外陽明病外證云何答曰胃熱之外見者肌肉之中蒸蒸然熱達於外名曰身熱與太陽之表熱不同也熱氣內盛濈濈然汗溢於外名曰汗自出與太陽之自汗不同也表寒已解故不惡寒裏熱已盛故反惡熱也因只有胃家實之病根即見熱盛汗出之病證不惡寒反惡熱之病情內外俱備方是陽明之的證此一節補出陽明外證合上節為一內一外之總綱正曰身熱自汗與太陽正同太陽之邪在肌肉則翕翕發熱淅淅自汗出肌肉即肥肉與內之膏油皆屬於脾胃故胃熱亦發見於肌肉而為身熱自汗與太陽同也惟不惡寒反惡熱是陽明燥熱之的證與太陽之惡寒不同淺注不知肌肉之理是以略差焉問曰病有得之一日不發熱而惡寒者何也答曰雖得之一日惡寒將自罷即汗出而惡熱也問曰身熱不惡寒既得聞命矣今陽明病有始得之一日不發熱而惡寒者何也答曰陽明主金氣金氣微寒也邪初入故惡寒及邪既入於肌肉之分即從熱化雖得之一日不待解散而惡寒將自罷燥氣內出即自汗出而惡熱也此陽明之的候也此承上文不惡寒反惡熱而言也但上文言陽明自內達外之表證此言風寒外入之表證問曰惡寒何故自罷答曰陽明居中主土也萬物所歸無所復傳始雖惡寒二日自止此為陽明病也問曰陽明病未經表散其惡寒何故自罷答曰陽明與他經不同以其居中土也中土為萬物所歸故凡表寒裏熱之邪無所不歸無所不化皆從燥化而為實實則無所復傳一日表氣通於太陽其始雖頗惡寒而二日為陽明主氣之期正傳而邪亦傳正再傳而邪有所歸而不再傳故惡寒自止此胃家實所以為陽明病之根也此復設問答以明惡寒自罷之故並指出胃家實之根也本太陽初得病時發其汗汗先出不徹因轉屬陽明也傷寒發熱無汗嘔不能食而反汗出濈濈然者是轉屬陽明也過汗亡津液而轉屬陽明者固多而汗出不徹與不因發汗者亦有轉屬之證本太陽病初得病時發其汗汗先出不徹其太陽表熱之氣不能隨汗而泄而即與燥氣混為一家因此而轉屬陽明也此外更有傷寒發熱無汗其時即伏胃不和之病機嘔不能食不能發汗而反汗出濈濈然者水液外泄則陽明內乾是轉屬之外又有一轉屬陽明之證也上文歷言陽明本經之自為病此復申明太陽轉屬陽明之義除過汗亡津液外又有此汗出不徹而轉屬不因發汗而轉屬合常變而並言之也傷寒三日陽明脈大三日為少陽主氣之期病固宜乘其氣而樞轉外出矣今傷寒三日現陽明證而脈大為邪歸中土無所復傳是不能從少陽之樞而解也述自此以上六節論陽明之氣主表而外合太陽主裏而內關津液之義也按此即高士宗所謂讀論者因證而識正氣之出入因治而知經脈之循行則取之有本用之無窮矣傷寒脈浮而緩手足自溫者是為繫在太陰太陰者身當發黃若小便自利者不能發黃至七八日大便硬者為陽明病也陽明與太陰正氣相為表裏邪氣亦交相為繫傷寒陽明脈大今浮而緩陽明身熱今止手足自溫是為病不在陽明而繫在太陰太陰者濕土也濕熱相併身當發黃若小便自利者濕熱得以下泄故不能發黃至七日已過為八日值陽明主氣之期遂移其所繫而繫陽明胃燥則腸乾其大便無有不硬者此為陽明也此節合下節明陽明與太陰相表裏之義也傷寒轉繫陽明者其人濈然微汗出也傷寒由太陰而轉繫陽明者其人不特大便硬而且濈然微汗出也此承上節而補言陽明之汗出即上章所云外證俱在其中矣正曰上是由太陽轉繫太陰故曰脈浮此節轉系陽明亦是由太陽而轉繫陽明是從自汗油膜中入胃淺注言太陰誤矣蓋此二節正是明首章太陽陽明之義而已陽明中風口苦咽乾腹滿微喘發熱惡寒脈浮而緊若下之則腹滿小便難也陽明不特與太陰表裏而且與太陽少陽相合陽明中風不涉於本氣之燥化而涉於少陽之熱化故口苦咽乾復涉於太陰之濕化故腹滿微喘又涉於太陽之寒化故發熱惡寒陽明脈本浮大以陽明協於太陽故脈象浮中不見大而見緊浮緊之脈宜從汗以解之若誤下之陽邪內陷於中土則中土不運而腹增滿少陽之三焦不能決瀆復增出小便難之新證也述此言陽明之氣不特與太陰為表裏抑且中合於太陽外合於少陽也正曰此只申明少陽陽明證脈浮而緊是弦脈也發熱惡寒是太陽證也口苦咽乾是少陽證也惟腹滿微喘兼在陽明當借少陽而達於表不可下腸胃而引入裏也少陽三焦司決瀆故引入裏則小便難淺注牽引太陰又復指為太陽反生葛藤陽明病若能食名中風不能食名中寒陽明本經自患之病未曾久留太陽經而化熱者風自為風寒自為寒可於是辨之若能食名中風以風能鼓動陽明之氣也不能食名中寒以寒能閉拒陽明之氣也然此特初病則然久則為實滿等證雖能食者亦歸於不能食矣此一節以食而辨風寒之氣即以食而驗陽明之胃氣因正而辨邪因邪而識正善讀者能會心於文字之外則得矣陽明病若中寒者不能食小便不利手足濈然汗出此欲作固瘕必大便初硬後溏所以然者以胃中冷水穀不別故也試論中寒陽明病若中寒陰寒過甚不得本氣燥熱之化則穀不消而不能食水不化而小便不利四肢為諸陽之本胃陽虛而津液外泄故手足濈然汗出此欲作大便固而仍不固欲作大瘕泄而仍不瘕燥氣用事必大便初硬寒氣用事而後半即溏所以然者以胃中冷水穀不能泌別故也此言陽明中寒也補曰水穀不別四字指出水從胃中即散出而走膜膈也西醫所謂胃之通體有微絲血管將水散出內經所謂上焦為水之上源即指水從胃中而散入膜膈也胃中冷即總論所謂燥氣不足合總論觀而水穀之治法明矣陽明病初欲食小便反不利大便自調其人骨節疼翕翕如有熱狀奄然發狂濈然汗出而解者此水不勝穀氣與汗共併脈緊則愈試論中風陽明中風之病胃為陽土風為陽邪兩陽相得故初病時欲食即此可以定其為中風矣然病在陽明小便當利大便當硬今小便反不利大便反自調是津液尚還入於胃中但不得少陰之癸水以相合也少陰主骨節而不能上合於陽明故其人骨節疼且骨節合於肌肉之間翕翕如有熱狀似此陽不遇陰病難自解乃奄然煩躁而發狂濈然汗出而解者此少陰癸水之陰氣不勝陽明穀神之陽氣兩不相敵者忽而兩相合遂與作汗而共併即戰栗汗解之義也脈若轉遲而為緊則愈蓋以緊則為陰陰氣復而陽氣平戊癸合矣此言陽明中風也正曰飲食與大便自調是陽明之穀氣勝也小便不利是太陽之水不化其人骨節疼是太陽之身疼痛翕翕如有熱狀是太陽桂枝證之翕翕發熱此乃太陽水中所化之氣沸鬱在肌肉間皆太陽病本未能解惟賴陽明之穀氣勝外合太陽兩陽相並是為重陽內經云重陽狂故必奮然發狂濈然汗出而解仲景又自注曰此為太陽水中所化之氣不勝於胃中之穀氣而穀氣有權得發於肌肉之間與太陽之汗交併外出故得解也又注曰脈緊則愈亦是太陽外閉陽明內搏之脈淺注以水為少陰癸水以脈緊為戊與癸合牽強之至陽明病欲解時從申至戌上陽明病欲解時從申至戌上蓋陽明旺於申酉病氣得天時之助也然此言陽明之表證出微汗而解若胃家實之證值旺時更見發狂譫語矣此言陽明欲解之時作一小結也陽明病不能食攻其熱必噦所以然者胃中虛冷故也以其人本虛攻其熱必噦陽明病雖以胃家實為大綱而治者當刻刻於虛寒上著眼陽明病胃氣實則能食今不能食可以知其胃家之虛矣醫者反攻其熱則虛不受攻寒復傷胃其人必噦所以然者胃中虛冷故也此胃氣存亡之關頭不得不再為叮嚀曰以其人胃氣本虛故攻其熱必噦此一節言陽明中氣虛寒之為病也補曰此言胃氣虛冷無燥屎雖有身熱之陽明證亦不可誤攻其胃非胃有燥屎而不可攻也淺注必扯胃家實為言反添葛藤陽明病脈遲食難用飽飽則微煩頭眩必小便難此欲作穀疸雖下之腹滿如故所以然者脈遲故也胃氣虛則不能淫精氣於經脈陽明病脈宜大而反遲是經脈不能稟氣於胃也內經云食氣入胃濁氣歸心淫精於脈脈氣流經可知食氣散於各經之中自不厭其飽若不能散達止留滯於胃故食難用飽飽則濁氣歸心不淫於脈流於經所以微煩不但此也且不能循經上行而頭眩不能循經下行必見小便難上下不行則留滯於中為腹滿此欲作穀疸黃疸病也雖已下之而腹滿如故所以然者以胃虛不能淫精於經脈脈遲故也此一節言食氣入胃胃虛不能淫精於經脈也正曰小便難不是經脈所司乃三焦膜網所司也膜網不清利穀又不化則壅滯蒸發遂為黃疸修園不知陽明病三字是言身熱本屬陽證不知脈遲是言陽證見陰脈知食難用飽是遲脈之胃虛冷身雖熱而胃則不熱也不知飽則微煩是胃絡通心食停則心氣阻遏故煩也穀疸二字穀是病在胃疸是病在膜腠淺注乃扯經脈為解豈不誤哉陽明病法多汗反無汗其身如蟲行皮中狀者此以久虛故也胃氣虛則不能輸精於皮毛陽明病法當多汗今反無汗其身癢如蟲行皮中狀者此以胃氣久虛不能輸精於皮毛故也內經云輸精皮毛毛脈合精行氣於府可知內而經脈外而皮毛皆稟氣於胃胃虛皮毛經脈俱無所稟矣此一節言胃氣虛不能輸精於皮毛也陽明病反無汗而小便利二三日嘔而咳手足厥者必苦頭痛若不咳不嘔手足不厥者頭不痛陽明居中土主灌溉於上下內外四旁也茲先言中氣寒逆於上陽明病法當多汗而反覺無汗而小便利寒氣中於裏而水溢下行也至二日主氣之期以及三日不拘日數但覺嘔而咳即內經所謂邪中於膺則下陽明是也手足厥者胃陽虛寒其氣不能敷布於四肢也內經云陽明之脈循髮際至頭顱陽明寒氣牽連正氣而上逆故必苦頭痛若不咳不嘔手足不厥者為寒氣已除陽明正氣而既能四布即不上逆故頭不痛此節言陽明之氣合寒氣而上逆於頭不能灌溉於四旁也凡言邪即以言正言正即以言邪為讀仲詩書第一要法余於數節必重申之不厭於復也述此章凡四節論陽明居中土主灌於上下內外四旁也陽明病但頭眩不惡寒故能食而咳其人咽必痛若不咳者咽不痛再言中風氣逆於上陽明病其證不一然他證無論但頭旋目眩此證不在陽明提綱之內自有陽有陰有寒有熱從何處辨起惟不惡寒知病屬陽明而不屬陰經矣前云陽明病若能食名中風故吾即於其能食知為陽明胃熱而非陽明胃寒矣由是熱氣上衝肺受火爍而發咳咳極其人必咽痛若熱不上干於肺而不咳者咽亦不痛此一節言陽明之氣合風熱而上逆於咽不得流通於下也程扶生云陰邪下利故無汗而小便利風邪上行故不惡寒而頭眩寒則嘔不能食風則能食寒則頭痛風則咽痛是風寒入胃之辨也按雖本章之義不重在此而亦不可不知咳出於肺當云喉嚨痛今胃熱甚則咽痛二者相連氣必相侵陽明病無汗小便不利心中懊憹者身必發黃更有鬱於中土之證陽明病其氣不能外達於皮毛則無汗不下輸於膀胱則小便不利心中懊憹者中土鬱而成熱熱氣為煩也鬱於中則現於外身必發黃此節合下節皆言陽明之氣鬱於中土不得外達而下輸也陽明病被火額上微汗出而小便不利者必發黃鬱於中土若誤火更益其熱陽明病醫者不知所以無汗之故以火強迫其汗熱邪被火周身之氣燥極而熱不外越而上攻於額上而微汗出又不得下泄而兼小便不利者濕熱相搏亦必發黃此節即上節所言發黃之證借被火以言其更甚也凡誤服羌獨荊防及薑桂烏附之類皆以被火概之陽明之脈起於鼻行髮際至額顱陽明病脈浮而緊者必潮熱發作有時但浮者必盜汗出陽明原主裏病今診其脈浮而緊者仍見太陽表實無汗之脈陽明被太陽之寒邪外束則陽氣不能宣發而為熱故必乘其所旺申酉時而潮熱如潮水之發作有定時若脈但浮而不緊者是見太陽表虛自汗之脈陽明被太陽之風邪外渙則陽氣盡浮於表及臥而陰血歸肝之頃兩不相顧必為浮陽盜去而汗出述此三節言陽明主裏復外合於表氣內通於經脈復還於胃中也正曰此脈緊是應大腸中有燥屎結束之形也故必潮熱凡仲景所言潮熱皆是大腸內實結解為太陽實邪非也仲景脈法如脈緊者必咽痛脈遲身涼為熱入血室皆與後世脈訣不同修園未明脈之至理而拘於緊主外寒是以誤注又此盜汗是盛陽不入陰而盜汗解以陰不歸肝亦略誤陽明病口燥但欲漱水不欲咽者此必衄陽明之脈起於鼻交額中還出挾口今陽明燥熱之病其口無不乾燥若熱止在於經其人但欲以口嗽水濟其經熱漱畢吐去而不欲咽下者熱不在胃故也陽明氣血俱多經中熱盛則逼血妄行因此必發其衄此言陽明之津液通於經脈而血衄也陽明病本自汗出醫更重發汗病已瘥尚微煩不了了者此必大便硬故也以亡津液胃中乾燥故令大便硬當問其小便日幾行若本小便日三四行今日再行故知大便不久出今為小便數少以津液當還入胃中故知不久必大便也陽明病本自汗出醫更重發汗外熱之病已差而內尚微煩不了了者此大便必硬故也津液為胃所主以發汗亡其津液胃中乾燥故令大便硬今姑不問其大便當問其小便日幾行若汗出本日小便日三四行今於微煩之曰止再行故知大便不久自出蓋以大小便皆胃府津液之所施也今為小便數少以津液當復還入胃中故知不久必大便也此胃府實大便硬亦有不必下者醫人不可不知也此言陽明之津液復還於胃中也傷寒嘔多雖有陽明證不可攻之陽明證既知有不必下者更當知有不可下者傷寒嘔多為陽明胃氣之虛胃氣既虛雖有陽明燥熱之證切不可攻之此一節言胃氣虛者不可下也述陽明有胃氣有悍氣有燥氣胃氣者柔和之氣也悍氣者慓悍滑利別走陽明者也燥氣者燥金之氣也病在悍氣者要攻病在燥氣者可攻病在胃氣者不可攻病在燥氣而胃氣虛者亦不可攻故此三節俱言不可攻也按師言其不可非坐視而不救也必有所以可者在正面旁面對面皆可以悟其治法若常器之補亡論必處處補出方治無論其搔不著癢也即有偶合之處反令鳶飛魚躍水流花放活潑文章俱成糟粕長洲汪苓友多宗其説何其陋歟陽明病心下硬滿者不可攻之攻之利遂不止者死利止者愈陽明病外有身熱自汗出不惡寒反惡熱之證便知其內為胃家實之證但胃家實只指不下利而言務宜活看亦知其實處即是虛處若心下硬滿者止在心下尚未及腹止是硬滿而不兼痛此陽明水穀空虛胃無所仰虛硬虛滿不可攻之若誤攻之則穀氣盡而氣敗利遂不止者死若其利能自止者是其人胃氣尚在穢腐去而邪亦不留故愈此一節言虛而假實者不可下也受業薛步雲按心下為陽明之膈膈雖實腹必虛氣從虛閉是陽明假實證攻之是為重虛正曰心下硬滿是言胸前膈膜中之痞不在胃中故不可攻修園不知而以硬為水穀空虛胃無所仰夫既空虛無所仰焉能致硬此皆修園強詞而細考原文絶不合也陽明病面合色赤不可攻之必發熱色黃者小便不利也內經云中於面則下陽明以陽明之脈上循於面故也陽明病通面合見赤色為陽氣怫鬱於表不可攻之若誤攻之胃氣徒虛津液大耗熱不得越故必復發熱面色之赤者亦變為色黃內經云三焦膀胱者腠理毫毛其應以三焦主腠理膀胱應皮毛今鬱熱在表三焦失其決瀆之官膀胱失其氣化之職小便不利為發黃之根也此一節言外實內虛者不可下也補曰膜是三焦接於腸胃胃別水散入膜中水從膜中行是為三焦決瀆之官三焦膜上皆生有膏油乃脾胃之所司也胃熱陷於膏油蒸鬱其水不得從膜中暢行而小便不利必且蒸發出膏油之本色是為發黃膏油本微有黃色水火相蒸則更發黃也陽明病不吐不下心煩者可與調胃承氣湯不可攻者既明而可攻者更不可以不講陽明病不吐不下可知其胃氣不虛也心煩者以胃絡上通於心陽明之燥火與少陰之君火相合故也胃氣雖曰不虛卻是不和可與調胃承氣湯以和之此一節言陽明胃府不和宜與調胃承氣也述此三節皆言可攻之證而又以明三承氣之各有所主也陽明病脈遲雖汗出不惡寒者其身必重短氣腹滿而喘有潮熱者此外欲解可攻裏也手足濈然汗出者此大便已硬也大承氣湯主之若汗多微發熱惡寒者外未解也其熱不潮未可與承氣湯若腹大滿不通者可與小承氣湯微和胃氣勿令至大泄下陽明病脈遲為陽邪入於裏陰然止言脈猶不足憑也必以汗出知陽熱之內蒸然止言汗亦不足憑也雖汗出為陽熱之內蒸而表未罷者亦恆多汗出之證必以不惡寒者定其表證之已罷然表證已罷尤當再驗其裏證陽明主肌肉邪在表陽則身輕易以轉側若入於裏陰則其身必重邪結於中必礙呼吸而短氣腹滿難以下通勢必上逆而為喘此已屬大承氣證矣然猶必身熱變為潮熱知其熱邪盡入於胃乃可以指其實在曰有潮熱者此外欲解可攻裏也又必通身熱蒸之汗變為手足濈然之汗熱與汗俱斂止露出胃所主之四肢為本證真面目乃可指其實在曰手足濈然而汗出者此大便已硬也以大承氣湯主之若其人汗出雖多微發熱惡寒者外未解也不可攻裏即不惡寒而其熱不潮為胃未全實未可與大承氣湯若其人腹大滿大便不通者凡不見潮熱之證止可與小承氣湯微和胃氣勿令大泄下大承氣湯方大黃四兩酒洗厚朴半斤炙去皮枳實五枚炙芒硝三合上四味以水一斗先煮二物取五升去滓納大黃煮取二升納芒硝更上火微煮一兩沸分溫再服得下餘勿服武陵陳氏云方名承氣殆即亢則害承乃制之義乎亢即反兼勝己之化承者以下承上也夫天地一理萬物一氣故寒極生熱熱極生寒物窮則變未有亢極而不變者傷寒邪熱入胃津液耗真陰虛陽盛陰病所謂陽盛陰虛汗之則死下之則愈急以苦寒勝熱之劑救將絶之陰瀉亢甚之陽承氣所以有挽回造化之功也然不言承亢而言承氣何哉夫寒熱流轉不過一氣之變遷而已用藥制方彼氣機之不可變者力難矯之亦第就氣機之必變者而一承之耳設其氣有陽無陰一亢而不可復則為脈澀直視喘滿者死何則以其氣機已絶更無可承之氣也由是言之聖人雖盡人工之妙止合乎天運之常耳不云承氣而云何按陳氏此注必須熟讀蔚按承氣湯有起死回生之功惟善讀仲景書者方知其妙俗醫以滋潤之脂麻油當歸火麻仁鬱李仁肉蓯蓉代之徒下其糞而不能蕩滌其邪則正氣不復不能大瀉其火則真陰不復往往死於糞出之後於是咸相戒曰潤腸之品且能殺人而大承氣湯更無論矣甚矣哉大承氣湯之功用盡為那庸耳俗目所掩也張隱庵曰傷寒六經止陽明少陰有急下證蓋陽明稟悍熱之氣少陰為君火之化在陽明而燥熱太甚緩則陰絶矣在少陰而火氣猛烈勿戢將自焚矣非腸胃之實滿也若實在腸胃者雖十日不更衣無所苦也仲師所云急下六證若究省不到不敢急下且病此者鮮有能生之且豫嘗聞之曰痞滿燥實堅五證皆備然後可下噫當下者全不在此五證小承氣湯方大黃四兩厚朴二兩炙去皮枳實三枚大者炙上三味以水四升煮取一升二合去滓分溫二服初服湯當更衣不爾者盡飲之若更衣者勿服之男元犀按三承氣俱陽明之正方調胃承氣其方已載於太陽篇故不復列傷寒論云陽明病不吐不下心煩者可與調胃承氣湯言陽明病者胃不和也言不吐不下者胃不虛也胃絡上通於心陽明之燥火與少陰之君火相合故心煩可與此湯解見太陽本方下至於大承氣取急下之義陽明譫語潮熱胃中有燥屎五六枚及二陽併病潮熱及陽明下後心中懊憹而煩胃有燥屎及大下後六七日不大便煩不解腹滿痛本有宿食及少陰證口燥舌乾或自利清水色純青等證俾奏功於頃刻小承氣取微和胃氣勿令大泄下之義陽明病熱未潮大便不鞕恐有燥屎少與此湯轉失氣者可與大承氣攻之若不轉失氣者不與及太陽病汗吐下後微煩小便數大便因鞕者令邪去而正不傷論中逐條俱有深義張令韶云胃與大腸小腸交相貫通者也胃接小腸小腸接大腸胃主消磨水穀化其精微內灌溉於臟腑外充溢於皮毛其糟粕下入於小腸小腸受其糟粕復加運化傳入於大腸大腸方變化傳道於直腸而出故曰小腸者受盛之官化物出焉大腸者傳道之官變化出焉是大承氣者所以通泄大腸而上承熱氣者也故用朴實以去留滯大黃以滌腐穢芒硝上承熱氣小承氣者所以通泄小腸而上承胃氣者也故曰微和胃氣是承制胃府太過之氣者也不用芒硝而亦名承氣者以此名調胃承氣乃調和胃氣而上承君火之熱者也以未成糟粕故無用枳朴之消留滯此三承氣之義也承者制也謂制其太過之氣也故曰亢則害承乃制柯韻伯曰諸病皆因於氣穢物之不去由於氣之不順也故攻積之劑必用氣分之藥因以承氣名湯方分大小有二義焉厚朴倍大黃是氣藥為君名大承氣大黃倍厚朴是氣藥為臣名小承氣味多性猛制大其服欲令大泄下也味寡性緩制小其服欲微和胃氣也大小之分以此且煎法更有妙義大承氣用水一斗煮枳朴取五升納大黃再煮取二升去滓納芒硝何哉蓋生者氣鋭而先行熟者氣鈍而和緩仲景欲使芒硝先化燥屎大黃繼通地道而後枳朴除其痞滿若小承氣以三味同煎不分次第同一大黃而煎法不同此可見微和之義也張憲公云承者以卑承尊而無專成之義天尊地卑一形氣也形統於氣故地統於天形以承氣故地以承天胃土也坤之類也氣陽也乾之屬也胃為十二經之長化糟粕運精微而成傳化之府豈專以塊然之形亦惟承此乾行不息之氣耳湯名承氣確有取義非取順氣之義也憲公此解超出前人惜其所著傷寒類疏未刊行世憲公諱孝涪古吳人也補曰三承氣湯不但藥力有輕重之分而其主治亦各有部位之別故調胃承氣湯仲景出心煩二字以見胃絡通於心而調胃承氣是注意在治胃燥也故以大黃色黃歸土氣烈味苦大瀉中土之熱者為主佐以芒硝所以潤燥而合之甘草使藥力緩緩留中以去胃熱故名調胃也大承氣湯仲景提出大便已硬四字是專指大腸而言大腸居下藥力欲其直達不欲其留於中宮故不用甘草大腸與胃同稟燥氣故同用芒硝大黃以潤降其燥用枳朴者取木氣疏泄助其速降也若小承氣湯則重在小腸故仲景提出腹大滿三字為眼目蓋小腸正當大腹之內小腸通身接連油網油是脾所司膜網上連肝系肝氣下行則疏瀉脾土而膏油滑利肝屬木故枳朴秉木氣者能疏利脾土使油膜之氣下達小腸而出也又用大黃歸於脾土者瀉膏油與腸中之實熱此小承氣所以重在小腸也其不用芒硝以小腸不秉燥氣不取硝之滑潤至大承氣亦用枳朴者以肝木之氣從油膜下接大腸內經所謂肝與大腸通也三承氣湯藥力皆當從胃中過從大腸而去但其所命意則各有區別用者當審處焉陽明病潮熱大便微硬者可與大承氣湯不硬者不可與之若不大便六七日恐有燥屎欲知之法少與小承氣湯湯入腹中轉失氣者此有燥屎也乃可攻之若不轉失氣者此但初頭硬後必溏不可攻之攻之必脹滿不能食也欲飲水者與水則噦其後發熱者必大便復硬而少也以小承氣湯和之不轉失氣者慎不可攻也胃合海水無病之人亦日日有潮但不覺耳病則氣隨潮而發現於外故凡陽明病必審其有潮熱又大便微硬者方可與大承氣湯若大便不硬者即不可與之切勿概以潮熱為可攻也然而大便又不可盡信也若其人不大便已六七日未敢必其果有燥屎與否恐有燥屎須知之法少與小承氣湯湯入腹中下轉而失氣者此有燥屎乃可以大承氣攻之若不轉失氣者為胃氣之虛此但初頭硬後必溏不可攻之攻之則胃氣愈虛必脹滿不能食也試觀胃虛之人渴欲飲水者與水則噦水且不宜於胃而況攻下乎推而言之凡得攻而潮熱已退其後復發潮熱者必大便復硬但溏者既去則所留者雖硬而甚少也止須復以小承氣湯和之然亦必須轉失氣者乃可再投若仍不轉失氣者並小承氣且難再投慎不可徑用大承氣以妄攻也此言大承氣行便硬小承氣行燥屎各有所主而胃氣虛者慎不可攻也補曰失氣之失當是矢字矢氣即今之放屁也古名便糞為矢今人名為出弓古名矢氣今名出虛弓即俗所言放屁也矢訛為失便不可解注家不加考訂古義所以不明夫實則譫語虛則鄭聲鄭聲者重語也直視譫語喘滿者死下利者亦死陽明譫語其中有虛實之不同生死之各異者不可不知夫陽明病實則語皆狂亂名曰譫語虛則聆其所語如鄭國之聲而不正輕微重復名曰鄭聲鄭聲即重語也蓋譫語原非死證而邪氣入藏以致精氣不榮於目致直視而譫語則危矣更加喘滿者脾肺不交血氣脫於上主死及下利者脾腎不固而氣脫於下亦主死此章統論譫語各證之治法也譫語之時聆其聲有不正之聲輕微重復之語即是鄭聲注家分而為兩皆相沿之誤也故止首節提出鄭聲而後無鄭聲之證補曰聲音出於腎成於肺而其辨言語者則出於心心欲言而舌動音出遂成詞句心氣實則神煩亂而言語多妄故為譫語心氣虛則神顛倒而言語重復故為鄭聲譫語當攻鄭聲不當攻譫語多生兼鄭聲則多死故下文言譫語而直視喘滿者下利者死則譫語而兼鄭聲亦在死之例矣細玩文法意見言外又陽病所以譫語者胃絡上通於心燥火相併而神明被其熒惑故煩妄多言至於見鬼則又心血結而為死魄心肝之神魂自見此死魄故如鬼狀血室中血結亦能如見鬼狀腸胃中燥屎亦死魄之類故皆能如見鬼狀譫語見鬼不見鬼又可知其故矣發汗多若重發汗者亡其陽譫語脈短者死脈自和者不死有亡陽而譫語者汗為心液心為陽中之太陽發汗多則心液虛矣若重發汗者心液為虛虛於內則心主陰乏陽無所附而遂亡於外矣亡其陽則神氣亦昏而譫語脈乃血脈脈短者心液亡心氣絶故死若脈不短而且自和者病雖劇亦不死此言亡陽譫語也補曰此見譫語不盡胃實心神虛乏亦譫語也又見心神藏於血中血脈乏竭則神不可復故死血脈流利則神可歸宅故不死西醫言心體跳動不休而脈管隨之以動中國雖無此説法然觀仲景復脈湯純治心血則脈之托根於心為不爽矣脈短則心血結則神亡脈和則心血足而神復仲景示人至深切矣傷寒若吐若下後不解不大便五六日上至十餘日日晡所發潮熱不惡寒獨語如見鬼狀若劇者發則不識人循衣摸床惕而不安微喘直視脈弦者生澀者死微者但發熱譫語者大承氣湯主之若一服利則止後服有亡陰而譫語者傷寒若吐若下後不解其陰亡液矣陰液亡故不大便五六日上至於十餘日陽明旺於申酉之間其時名為日晡所邪氣隨旺時而發潮熱且全顯出本來燥氣之象而不惡寒且熱甚神昏無問答而一人獨語無所見而如見鬼狀若劇者神識不為我用發則不識人陽奔於外而躁擾故循衣摸床陰孤於內而無所依故心惕而不安陽脫於上故微喘精不榮於目故直視此陽熱甚而陰液亡其生死只在一瞬之間須於脈候決之弦為陰脈若脈弦者為陰氣未絶可生澀則微血若脈澀者為陰血已結必死而茍病勢尚微者無以上之劇證但見發熱譫語者以大承氣湯主之若一服利即止後服蓋以大承氣用之得當可以養陰不當亦所以亡陰也可不慎歟此言亡陰譫語也按柯氏云吐下後不解病有微劇之分微者是邪氣實當以下解劇者邪正交爭當以脈斷其死生弦者是氣實不失為下證故生澀者是正氣虛不可更下故死生死二字從治病者看出又是一解卻是正解陽明病其人多汗以津液外出胃中燥大便必硬硬則譫語小承氣湯主之若一服譫語止者更莫復服有亡津液而譫語者陽明燥熱之氣為病其人多汗以津液外出以致胃中乾燥大便必硬硬則胃氣不和而譫語以小承氣湯主之若一服譫語止更莫復服此言亡津液而譫語也陽明病譫語發潮熱脈滑而疾者小承氣湯主之因與承氣湯一升腹中轉氣者更服一升若不轉氣者勿更與之明日又不大便脈反微澀者裏虛也為難治不可更與承氣湯也然其中虛實之辨當專辨其脈陽明病其作譫語有虛有實若發潮熱脈滑而疾者此陽明裏實也以小承氣湯主之然服之多寡亦因其證為進退先與承氣湯一升服後腹中轉矢氣者更服一升若不轉矢氣勿更與之設明日不大便脈反變滑病為微澀者微則氣衰澀則血少此裏虛也邪盛正衰法為難治熱邪雖盛亦不可更與承氣湯也此以脈而辨譫語之虛實前欲與大承氣以小承氣為法今欲與小承氣即以小承氣先與為試法可知古人之謹慎如此按柯氏云勢若不得不通者可用蜜導虛甚者與四逆湯陰得陽則解矣愚以救逆當臨時審其所急不可預有成見正曰裏虛是指胃中無燥屎也蓋不轉矢氣即為無燥屎仲景已有明文而柯氏猶云可用蜜煎導只緣注家但知譫語是胃病而不知譫語是心主之病胃家實熱上熏為譫語者奪其實則愈今裏虛而胃不實則不可下若脈滑者心主之陰血尚足急去其心中之熱而譫語可治矣設脈反微澀心中陰血已結故脈應之而澀血竭而陽神又亂譫語不休則正既敗而邪又甚是以難治此與上譫語脈短同是指心主言讀者互參則不致誤陽明病譫語有潮熱反不能食者胃中必有燥屎五六枚也若能食者但硬耳宜大承氣湯下之且有在胃在腸亦須分別內經云胃滿則腸虛腸滿則胃虛陽明病若譫語有潮熱反不能食者胃滿也胃滿則胃中必有燥屎五六枚也若譫語潮熱而能食者腸滿也腸滿則胃無燥屎故但大便硬爾俱宜大承氣湯下之述此以能食不能食以驗譫語有燥屎便硬之不同而又以明腸胃更虛更滿之義也胃主納穀胃滿則不能容穀故不能食腸主變化腸滿則難以變化故但硬然腸雖滿而胃則虛故又能食陽明病下血譫語者此為熱入血室但頭汗出者刺期門隨其實而瀉之濈然汗出則愈間有熱入血室而譫語者以衝任二脈為血室皆起於胞中與陽明合故陽明病熱逼於經故必下血血者神也下血而即譫語者血脫神昏也此為熱入血室何以為血室男女皆有之在男絡唇口而為髭鬚在女月事以時下是也但頭汗出而別處不到者血下奪則無汗熱上擾則汗蒸也肝統諸經之血刺肝之期門隨其實而泄之俾熱出血室而外出於皮膚濈然汗出則愈此言下血譫語也補曰義詳太陽篇汗出譫語者以有燥屎在胃中此為風也須下者過經乃可下之下之若早語言必亂以表虛裏實故也下之愈宜大承氣湯間有因風致燥而譫語者奈何夫汗多亡液以致胃燥譫語故也今汗出不見其多而亦譫語者以有燥屎在胃中此為風也謂風木之邪干於中土風燥而非熱燥也燥實必須議下之然亦俟其過經俾有餘不盡之風邪悉歸胃中併於燥屎乃可下之下之若早風性渙動善行數變內傷神氣其語言必亂以風邪盡入於裏邪盛則實此為表虛裏實故也蓋風燥證俟過經宜下下早以致裏實證亦宜下統其法曰下之則愈統其方曰宜大承氣湯此言風木之邪燥其津液而為譫語也傷寒四五日脈沉而喘滿沉為在裏而反發其汗津液越出大便為難表虛裏實久則譫語攻裏太早致裏實而譫語者言之詳矣而攻表失法致裏實而譫語者亦可並舉而相參傷寒四日為太陰主氣之期五日為少陰主氣之期病邪隨經氣而內入則脈沉太陰少陰之氣不相生而為喘滿沉為在裏而反發其表汗則胃府之津液越出大便遂燥結為難誤發汗致其表虛大便難成為裏實其虛靈不昧之天君因邪實而失其靈實日增實久則譫語此承上節表虛實裏而補出尋常裏實之因以備互證也三陽合病腹滿身重難以轉側口不仁面垢譫語遺尿發汗則譫語下之則額上生汗手足逆冷若自汗出者白虎湯主之譫語亦有三陽合病者太陽陽明少陽三陽合而為病腹滿陽明之熱合於前也身重太陽經熱合於後也難以轉側少陽經熱合於側也三證見而一身之前後左右俱熱氣彌漫矣口不仁而面垢熱合少陽之府也譫語熱合陽明之府也遺尿熱合太陽之府也三證見而身內之上下中俱熱氣充塞矣大抵三陽主外三陰主內陽實於外陰虛於內故不可發汗以耗欲竭之陰以發汗則譫語陽浮於外則陰孤於內故不可下奪以傷其欲脫之微陽若下之則額上生汗手足逆冷醫者審其未經汗下之誤兼治太陽少陽不如專顧陽明若自汗出一證者從陽明而得太陽少陽之總歸白虎湯主之茍非自汗出恐表邪抑寒亦不敢鹵莽而輕用也此言三陽合病而為譫語也二陽併病太陽證罷但發潮熱手足濈濈汗出大便難而譫語者下之則愈宜大承氣湯譫語亦有二陽併病者太陽陽明二陽併病太陽病氣俱已歸併於陽明無復有頭痛惡寒之表證則為太陽證罷但見有發潮熱手足汗出大便難而譫語者皆陽明結邪之裏證也下之則愈宜大承氣湯此言二陽併病而為譫語也陽明病脈浮而緊咽燥口苦腹滿而喘發熱汗出不惡寒反惡熱身重若發汗則躁心憒憒反譫語若加溫針必怵惕煩躁不得眠若下之則胃中空虛客氣動膈心中懊憹舌上苔者梔子豉湯主之陽明表證少而裏證多下法之外發汗尚宜詳慎而溫針更無論矣然而病兼表裏又另有其法陽明病在表其脈則浮而涉於裏則又緊咽連胃脘脾開竅於口陽明與太陰相表裏邪氣相侵故咽燥口苦手太陰肺主天足太陰脾主地地氣不升天氣不降故腹滿而喘此病陽明之裏也發熱汗出不惡寒反惡熱已詳本篇之首此病陽明之表也土氣不和則為身重此陽明之表裏俱病也可轉其機為兩解之法若誤發其汗則傷腎液而躁傷心液而憒憒陰液既傷則陽邪益熾故病反增譫語若誤加燒針則經脈受傷必見怵惕水火不交則為煩躁不得眠若下之則胃中空虛客氣乘虛而動膈又從膈而上乘於心故心中懊憹舌為心苗舌上有胎者熱甚而為邪氣所鬱之象也宜梔子豉湯導火熱以下降引陰液以上升以主之此言陽明病兼表裏非汗下溫針所能治也補曰陽明病至身重者是言熱在陽明肌肉及內膜油間也若外發皮毛之汗則津液外泄邪熱乃內入遂變為譫語譫語治法見上文又邪熱在肌肉若加燒針則熱傷肌肉必筋脈怵惕而手足煩躁此仲景未出方尚宜俟考若邪熱在肌肉膜中醫者誤以為在胃中而下之則胃中空虛客熱之氣動於膜膈之中併於胃絡以上乘心則懊憹宜梔子豉湯主之如此分三層解義甚了晰注家不可不分別也梔子豉湯方見太陽若渴欲飲水口乾舌燥者白虎加人參湯主之然梔子豉湯止為熱邪乘心之劑也恐不能兼清陽明經氣之燥熱若前證外更加渴欲飲水口乾舌燥者為陽明經氣之燥熱也又宜白虎加人參湯主之此承梔子豉湯而進一步言也若脈浮發熱渴欲飲水小便不利者豬苓湯主之白虎加人參湯止清陽明經氣之燥熱若脈浮發熱渴欲飲水如前證外更加小便不利一證者為陽明纍及太陰脾氣不能散精歸肺通調水道下輸膀胱所致也第運脾調肺以導水又必以清熱滋陰為本方不失為陽明之治法以豬苓湯主之此承白虎加人參湯又進一步言也正曰此若字是言或汗或吐或下後若不變出以上三證而但變為渴欲飲水口乾舌燥者為白虎加人參證若變出脈浮熱渴而又小便不利者為豬苓湯證仲景已將上文盡行剝去只就本節現出之證處方文意極其了當修園糾纏前證而曰更進一步實屬自尋荊棘豬苓湯方豬苓去皮茯苓阿膠滑石碎澤瀉各一兩上五味以水四升先煮四味取二升去滓納下阿膠煬消溫服七合日三服述此湯與五苓之用有天淵之別五苓治太陽之水太陽司寒水故加桂以溫之是暖腎以行水也此湯治陽明少陰結熱二經兩關津液惟取滋陰以行水蓋傷寒表證最忌亡陽而裏熱又患亡陰亡陰者亡腎中之陰與胃之津液也若過於滲利則津液反致耗竭方中阿膠即從利水中育陰是滋養無形以行有形也故仲景云汗多胃燥雖渴而裏無熱者不可與也陽明病汗出多而渴者不可與豬苓湯以汗多胃中燥豬苓湯復利其小便故也豬苓湯助脾氣之轉輸肺氣之通調利小便甚為得法矣若陽明病汗出過多而渴者為津液外越以致中乾作渴非水津不布而渴也即小便不利不可與豬苓湯以汗多胃中燥恐豬苓湯復利其小便更走其津液故也自陽明病脈浮而緊至此看似四節實是一節細玩其段段相承上下聊絡以見傷寒不可執定一法用藥即如轉環也脈浮而遲表熱裏寒下利清穀者四逆湯主之且陽明中有寒冷燥熱之分不可不辨試先言下焦之虛寒夫虛則脈浮而寒則脈遲今陽明戊土不能下合少陰癸水而獨主乎外則表熱少陰癸水不能上合陽明戊土而獨主乎內則裏寒戊癸不合而下焦生陽之氣不升故下利清穀而不能止者以四逆湯主之述此節言陽明下焦虛寒也本章凡三章以上中下三焦論陽明有寒冷燥熱之病也若胃中虛冷不能食者飲水則噦再言中焦之虛冷若胃中虛冷視下焦之生陽不起者彼為火虛此為土虛其土虛亦本於火虛虛極則寒寒則失其消穀之用每由食少而至於不能食者若復令其飲水則兩寒相得而為噦此論陽明中焦虛冷也脈浮發熱口乾鼻燥能食者則衄再言上焦經脈之燥熱熱在經脈故脈浮發熱熱循經脈而乘於上焦故口乾鼻燥其能食者熱在經脈不傷中焦之胃氣也經脈熱甚則發衄此言陽明上焦經脈燥熱也陽明病下之其外有熱手足溫不結胸心中懊憹飢不能食但頭汗出者梔子豉湯主之陽明主闔若終闔而無開機則死矣所以言之不厭於復也茲先以陽明之氣不得交通於上下言之陽明病外證未解而遽下之其外有熱而手足溫熱在於外故不結胸胃絡不能上通於心故心中懊憹下後胃虛故飢不能食陽明之津液主灌溉於上下今陽明氣虛其津液不能周流遍布惟上蒸於頭故但頭汗出而餘處無汗者宜交通其上下以梔子豉湯主之受業薛步云按梔豉湯能開陽明之闔須記之此言陽明之氣不得交通上下而為梔子豉湯證也述合下五節論陽明主闔貴得樞轉以出若闔於心胸腹胃之間無開轉之機則死矣陽明病發潮熱大便溏小便自可胸脅滿不去者與小柴胡湯其或闔於胸脅之間者陽明病發潮熱則大便應硬小便應利矣今大便溏而小便自可知其氣不涉於大小二便止逆於胸脅之間也至胸脅滿而不能去者宜從樞脅而達之於外以小柴胡湯主之此言陽明之氣闔於胸脅之間宜樞轉而出也補曰此潮熱是如瘧之發作有時以胸脅結滿衝陽之氣行至結處即相交而發熱瘧疾如是此少陽陽明但熱不寒者亦如是即大便硬之申酉潮熱亦是正氣至申酉而併於大腸也讀者當會通陽明病脅下硬滿不大便而嘔舌上白苔者可與小柴胡湯上焦得通津液得下胃氣因和身濈然汗出而解然而小柴胡之用不止此也夫陽明之氣由下而上由內而外出入於心胸遊行於腹胃靡不藉少陽之樞今陽明病脅下硬滿不得由樞以出也不得由樞以出遂致三焦相混內外不通矣下焦不通津液不下而為不大便中焦不治胃氣不和而為嘔上焦不通火鬱於上其舌上必現有白胎者可與小柴胡湯調和三焦之氣俾上焦得通舌上白胎自去津液得下而大便利胃氣因和而嘔止三焦通暢氣相旋轉身濈然而汗出解也此言小柴胡湯不但達陽明之氣於外更能調和上下之氣流通內外之津液也正曰解舌上白胎為火衰於上非也小柴胡正是清上焦之火何得云火衰於上蓋非病在三焦膜膈之中則舌色必白現出三焦之本色也故丹田有熱亦云舌上白胎丹田是下焦之膜中也此上焦是胸前正當胃中之水散走之路陽明之熱合於此間則水不得入於膜中而反嘔出是為上焦不通必用柴胡以透達胸膜則上焦得通水道下行是以津液得下胃中水不留逆則因而和平內膜之水道既通則外膜之氣道自暢故身濈然而汗出解也今人以白胎為寒多致謬誤蓋白胎只是應在三焦並不以此辨寒熱也陽明中風脈弦浮大而短氣腹都滿脅下及心痛久按之氣不通鼻乾不得汗嗜臥一身及目悉黃小便難有潮熱時時噦耳前後腫刺之小瘥外不解病過十日脈續浮者與小柴胡湯脈但浮無餘證者與麻黃湯若不尿腹滿加噦者不治今從主闔之理藉樞開之所以然者而深論之陽明中風少陽脈弦太陽脈浮陽明脈大陽明兼見三脈宜可以相藉而樞開矣乃其氣主闔又不能得樞開而短氣夫不能樞開而出闔於腹則腹都滿闔於脅則脅下及心作痛以手久按其心腹脅下之病處而氣不通以久按之則闔而復闔也陽明之脈起於鼻其津液為汗氣闔於內津液不得外達故鼻乾不得汗陽明隨衛氣而行於陰故嗜臥土內鬱而色外呈故一身及面目悉黃脾不能為胃行其津液故小便難陽明之氣旺於申酉邪熱旺時而發故有潮熱陽明氣逆於上故時時噦三陽之脈循繞耳之前後邪盛於經故耳前後腫醫者取足陽明之經隨其實而刺之雖刺之少差然樞不外轉而病不解病過十日又當三陰受邪若脈續浮者知其不涉於陰仍欲從少陰之樞而出也故與小柴胡湯以轉其樞若脈但浮別無餘證者是病機欲從太陽之開而出也故與麻黃湯以助其開若不尿腹滿加噦者是不從太陽之開少陽之樞逆於三陰也夫不尿則甚於十日前之小便難矣腹滿加噦則甚於十日前之腹部滿時時噦矣樞轉不出逆於三陰謂非不治之證而何述此節言陽明主闔必藉少陽之樞太陽之開若闔而不能開轉則一息不運氣機窮矣故經曰太陽為開陽明為闔少陽為樞三經者不得相失矣正曰執定闔字死板解之而所以短氣滿痛等證反晦而難解且與下文用小柴胡及麻黃湯法不能貫通不知此節是發明首章少陽陽明太陽陽明之義故提出脈弦為少陽經之眼目提出脈浮為太陽經之眼目此下先言少陽陽明謂少陽三焦膜中水不得利則氣不化而氣短三焦之膜油布於腹中故腹都滿脅下是板油所居心下是膈膜所在故結而作痛久按之氣不通則膜中之氣結之甚矣此皆少陽三焦膜中病也而陽明經脈之熱又夾鼻作乾膜與油連膏油是陽明所司膏油被蒸周身困頓故嗜臥遂發出膏油被蒸之黃色膜中水不利則小便難有潮熱者發作如瘧應正氣至邪結處而熱與上條潮熱同例非大便硬申酉熱也此膜中實胃中虛膜中氣逆入胃則噦三焦病也隨少陽經上耳則前後腫刺之是刺少陽經解為刺足陽明安能愈耳腫哉刺之則經脈已愈而別處各證不解又見脈浮有欲出於表之情故與小柴胡使達於外若脈但浮無餘證是言無少陽之證而只有陽明證也以脈浮即從太陽汗之可也此篇是論陽明證故少陽兼證即名餘證也淺注多誤陽明病自汗出若發汗小便自利者此為津液內竭雖硬不可攻之當須自欲大便宜蜜煎導而通之若土瓜根及大豬膽汁皆可為導以上各法無非使氣機之旋轉也至於下法之窮又有導法以濟之陽明病自汗出不可再發其汗若再發其汗兼見小便自利者此為津液內竭津液既竭則大便硬不待言矣若大便雖硬不可攻之當須自欲大便宜蜜煎導而通之若土瓜根及與大豬膽汁皆可為導述此言陽明氣機總要其旋轉津液內竭者不宜內攻而宜外取也蓋以外無潮熱內無譫語與可攻之證不同須待也蜜煎導方蜜七合一味納銅器中微火煎之稍凝似飴狀攪之勿令焦著欲可丸並手捻作挺令頭鋭大如指長二寸許當熱時急作冷則硬以納穀道中以手急抱欲大便時乃去之豬膽汁方大豬膽一枚瀉汁和醋少許以灌穀道中如一食頃當大便出蔚按津液內竭便雖硬而不宜攻取蜜之甘潤導大腸之氣下行若熱結於下取豬為水畜以制火膽為甲木以制土引以苦酒之酸收先收而後放其力始大其宿食等有形之物一下而無形之熱亦蕩滌無餘矣按內臺方云將蜜於銅器內微火煎之稍凝似飴狀攪之勿令焦滴水中墜凝可用蘸皂角末捻作挺以豬膽汁或油潤穀道納之少頃欲大便乃去之又豬膽汁方以豬膽汁二枚以小竹管插入膽口留一截用油潤內入穀道中以手將膽捻之其汁自內出一食頃當大便下又用土瓜根削如指狀蘸豬膽汁納入穀道中亦可用陽明病脈遲汗出多微惡寒者表未解也可發汗宜桂枝湯陽明可汗之證亦有在肌在表之分茲先言其在肌蓋太陽以皮毛為表陽明以肌腠為表陽明病表氣虛則脈遲邪干肌腠則肌腠實而膚表虛故汗出多微惡寒者表未解也可發汗宜桂枝湯此節合下節言陽明病在肌表而可以汗解也蓋陽明以肌腠為表在太陽則謂之解肌在陽明則謂之發汗也陽明病脈浮無汗而喘者發汗則愈宜麻黃湯陽明病邪在表則脈浮邪在表則表氣拒閉而肺氣不利無汗而喘者發汗則愈宜麻黃湯述此陽明之表證脈也二證俱是太陽而屬之陽明者不頭痛項強故也要知二方全為表邪而設不為太陽而設見麻黃證即用麻黃湯見桂枝證即用桂枝湯不必問其為太陽陽明也若惡寒已罷則二方所必禁矣陽明病發熱汗出者此為熱越不能發黃也但頭汗出身無汗劑頸而還小便不利渴引水漿者此為瘀熱在裏身必發黃茵陳蒿湯主之熱有鬱於氣分者陽明居中土而色黃陽明病若發熱汗出此為熱從汗越不能發黃也若熱氣上蒸於頭但頭汗出而身無汗其汗劑頸而還津液不能下行而小便不利不能上行而渴引水漿者此為瘀熱在裏土鬱色現身必發黃以茵陳蒿湯主之述此為熱鬱氣分而為茵陳蒿湯證也合下節言陽明為燥熱之經總統氣血故可病於氣而亦可病於血也補曰土色本黃人之脾胃屬土故胃中有黃液凡嘔吐者間或吐出黃液也胃通於油膜凡膏油皆脾所司膏油之色亦本帶微黃膜中小水通利則滌瑕而黃不蒸也若小便不利則蒸發土之色故用茵陳以利小便用梔子大黃者滌胃中之黃液也胃液被蒸必汗垢而後發黃故服之尿當如皂角汁色正赤是胃液變也知此而發黃之實理乃得茵陳蒿湯方茵陳蒿六兩梔子十四枚大黃二兩去皮上三味以水一斗先煮茵陳減六升納二味煮取三升去滓分溫三服小便當利尿如皂角汁色正赤一宿腹減黃從小便去也柯韻伯曰太陽陽明俱有發黃證但頭汗出而身無汗則熱不得外越小便不利則熱不得下利故瘀熱在裏而發黃太陽之發黃乃太陽之標陽下合太陰之濕氣而陽明之發黃亦陽明之燥熱內合太陰之濕化故也然裏有不同肌肉是太陽之裏當汗而發之故用麻黃連翹赤小豆湯以發其汗而肌肉之黃從汗外泄也矣心胸是太陽之裏陽明之表當寒以勝之故用梔子柏皮湯乃清火法腸胃是陽明之裏當瀉之於內故立本方是逐穢法茵陳稟北方之色經冬不凋傲霜凌雪偏受大寒之氣故能除熱邪留結率梔子以通水源大黃以調胃實令一身內外瘀熱悉從小便而出腹滿自減腸胃無傷乃令合而竭之之法此陽明利水之聖劑也又按仲景治陽明渴飲有三法太陽篇之五苓散微發汗以散水氣者不與焉若大渴煩躁小便自利者白虎湯加參清火而生津脈浮發熱小便不利者豬苓湯滋陰以利水若小便不利而發黃腹滿者茵陳湯以泄熱令黃從小便出病情治法胸有成竹矣竊思仲景利小便必用氣化之品通大便必用承氣之品以小便由於氣化也茲小便不利不用二苓者何本論云陽明病汗出多而竭者不可與苓豬湯以汗多胃中燥豬苓湯復利小便故也須知陽明汗出多而渴者不可用則汗不出而渴者津液先虛更不可用明矣此惟以推陳致新之茵陳佐以屈曲下行之梔子不用枳朴以承氣與芒硝之峻利則大黃但能潤腸泄熱緩緩而行故必一宿而腹始減黃從小便去而不由大腸去仲景立法之奇匪彝所思耳陽明證其人喜忘者必有蓄血所以然者本有久瘀血故令喜忘屎雖硬大便反易其色必黑者宜抵當湯下之熱有鬱於血分者內經云上氣不足下氣有餘久之不以時上則善忘者陽明證其人喜忘者乃血隨氣行俱併於下故必有畜血所以然者本有久瘀之血停積於下心主血瘀血久停於下而不得上則心氣虛故令善忘陽明主燥其屎雖硬血又主濡而大便反易血久則黑火極反見水化故其色必黑宜抵當湯下之述此言熱鬱血分而為抵當湯證也師辨太陽蓄血證必驗其小便利辨陽明蓄血證必驗其大便易亦各從其府而言之陽明病下之心中懊憹而煩胃中有燥屎者可攻腹微滿初頭硬後必溏不可攻之若有燥屎者宜大承氣湯大承氣為陽明之攻藥然胃實可攻胃虛不可攻陽明病既下之而熱邪乘虛而內陷心中懊憹而煩絶似虛煩之梔子豉湯證而審其胃中有燥屎者為邪不陷於心而陷於胃如徒用梔子豉湯無濟於事不可不攻若腹只微滿為中土內虛初頭硬後必溏胃無燥屎不可攻之是則可攻不可攻全憑燥屎之有無也若有燥屎者宜大承氣湯述此章凡六節五節俱論大承氣湯要以攻胃實不可以攻胃虛末節又提虛寒一條以結之弟賓有按少腹按之軟而不拒按者無燥屎也小腹硬而拒按者有燥屎也此辨證之捷訣病人不大便五六日繞臍痛煩躁發作有時者此有燥屎故使不大便也何以知胃中有燥屎也然辨之有法陽明病下之後病人不大便五六日邪入下脘及腸中還繞於臍作痛煩極而至於躁隨所旺日晡所發作有時者此有燥屎故使不大便也此承上文胃中有燥屎者可攻而言也病人煩熱汗出則解又如瘧狀日晡所發熱者屬陽明也脈實者宜下之脈浮虛者宜發汗下之與大承氣湯發汗宜桂枝湯然胃實之證必以脈實為憑否則又須分別病人陽氣盛而煩熱陽若得陰汗出則解若不解又如瘧狀日晡所發熱者屬陽明也然又有表裏須憑脈以斷脈實者為病在裏宜下之若脈浮虛者為病在表宜發汗下之與大承氣湯發汗宜桂枝湯蓋以脈為憑不必以日晡所發熱而遽認為裏實也述此言憑脈之虛實以辨表裏以施汗下不可概與承氣也大下後六七日不大便煩不解腹滿痛者此有燥屎也所以然者本有宿食故也宜大承氣湯脈實固宜下矣然有大下後六七日不大便煩仍不解腹仍滿痛者此有未盡之燥屎也所以然者以胃為水穀之海能容水穀三斗五升本有宿食未盡故也宜大承氣湯以推陳致新是知大承氣湯不獨能下胃熱而亦能下宿食述此承上文下之而言也此證著眼在六七日以六七日不大便則六七日所食之物又為宿食所以用得大承氣病人小便不利大便乍難乍易時有微熱喘冒不能臥者有燥屎也宜大承氣湯下後有燥屎既詳其驗法矣而未下有燥屎者又有驗之之變法病人小便不利若津液還入胃中則大便下而愈矣今邪熱耗灼清道涸竭大便不得其灌溉則結聚不下而乍難結者自結於中其未結者旁流而乍易又於日晡所之時有微熱氣滿不得下而喘冒胃氣不得和而不能臥者皆為有燥屎之徵也宜大承氣湯此又識燥屎之變法醫人不可以不知也補曰解大便乍難乍易甚精喘冒者氣喘鬱冒頭暈痛也食穀欲嘔屬陽明也吳茱萸湯主之得湯反劇者屬上焦也雖然陽明實熱之證固多而虛寒者亦復不少胃主容穀今食穀欲嘔者屬陽明胃氣虛寒也以吳茱萸湯主之若得此湯而嘔反劇者人必疑此湯之誤而不知陽明與太陰相表裏其食穀欲吐者是陽明虛甚中見太陰為中焦之胃氣虛寒也服吳茱萸湯之後反劇者是太陰虛回中見陽明為上焦之胃口轉熱也此為從陰出陽寒去熱生之吉兆可以析其疑曰太陰濕土喜得陽明之燥氣其病機屬上焦而向愈也書曰若藥不瞑眩厥疾不瘳其斯之謂與述上五節論陽明實熱之證此節又提虛寒一條以結上文五節之意正曰解吳茱萸是治太陰以回中焦之胃寒解得湯反劇是從陰出陽而移居上焦之胃口非也同是一胃安有胃氣胃口之分不知胃是食管上焦是膈膜食管中寒不任水穀而欲嘔故以吳茱萸湯溫之使寒散而水穀得下也若得湯反劇則非胃中之寒乃上焦膈膜中之熱也膈中得湯反助其熱熱熏入胃則更加嘔矣一曰屬陽明一曰屬上焦正欲人分別層析而淺注強扭之至於仲景文法皆不可通吳茱萸湯方吳茱萸一升酒洗人參三兩生薑六兩切大棗十二枚擘上四味以水七升煮取二升去滓溫服七合日三服太陽病寸緩關浮尺弱其人發熱汗出復惡寒不嘔但心下痞者此以醫下之也如其不下者病人不惡寒而渴者此轉屬陽明也小便數者大便必硬不更衣十日無所苦也渴欲飲水少少與之但以法救之渴者宜五苓散前言太陽陽明今試重申其轉屬之義太陽病寸緩為陽氣虛關浮為中氣虛尺弱為陰氣虛其人發熱汗出復惡寒皆為桂枝證之未解又於不嘔知其裏氣之和裏氣既和緣何心下又發痞但心下痞非本有之證者此以醫下之太早所致也如其不因誤下者邪熱入裏則罷太陽之本寒從陽明之燥化病人不惡寒而且渴者此太陽轉屬陽明也其小便數者津液下滲大便必硬是硬為津液之不足非胃家之有餘即不更衣十日亦無所為痞滿硬痛之苦也若津液竭而渴欲飲水宜少少與之以潤其燥然此但因其竭而以通權之法救之審其實系水津不布而渴者又宜五苓散助脾氣之轉輸而使水津之散布夫曰十日無所苦承氣湯既不可用飲水不至數升白虎加人參湯又非所宜惟助脾氣以轉樞多飲暖水以出汗則內外俱鬆須知病從太陽而入者仍從太陽而出也此散不能養液但以陽明病與轉屬陽明者或異或同可分可合亦視治者之活法耳正曰浮緩弱均注為虛與證不合不知浮緩而弱是中風脈其人發熱汗出復惡寒是中風證又不嘔則胃中無病而但見心下痞是痞不在胃中乃在膈膜中即太陽篇之瀉心證也此因風證當與桂枝湯而反下之太早邪陷於胸膈所致不得以其痞滿而誤認為陽明胃家之實也如其不因下而痞滿又不惡寒則無太陽之風證且但口渴現出陽明之燥證此乃轉屬陽明胃中之實熱矣此為上段是辨胃與膈致痞各異也下段又是為大便硬致辨言陽明大腸燥熱固因大便硬而亦有不關大腸之燥者蓋凡膀胱中小便數水行太多無復灌溉腸中則大便必硬頗似大腸燥結之證但大腸燥結久不更衣必有潮熱滿急之苦矣今系膀胱中小便數水去多以致便硬雖不更衣至十日之久而亦無潮熱滿急等苦矣水不留則津不升渴欲飲水者宜少少與之此但當以胱膀化氣法救之有如渴者氣不化津也宜五苓散化氣化水以升津液則自然更衣幸勿誤用承氣等法此為下段是辨大腸與膀胱致硬不同也此等層折交通之故則知者少矣述此章凡七節皆論太陽陽明也首節統論轉屬之意次節甚言津液之不可亡三節四節申言亡津液遂成胃熱脾弱之證五節言發汗後轉屬陽明六節言吐後轉屬陽明七節總言發汗吐下皆能轉屬陽明皆所以亡津液也脈陽微而汗出少者為自和也汗出多者為太過陽脈實因發其汗出多者亦為太過太過者為陽絶於裡亡津液大便因硬也津液根於身中之真陰脈寸緩為陽微而汗出少者陰陽同等為自和也汗出多者陰液亡而陽反獨盛故為太過此皆自出之汗也若陽脈不微而實醫因發其汗而出多者亦為太過太過為陽亢與陰隔絶而不相和於裏何也發汗亡其津液而大便因硬也上節亡津液是本旨而五苓散特為轉屬證之變治非亡津液之主方此節復足上文亡津液之意而治法自在言外汪苓友云即用下麻仁丸愚以為麻仁丸未盡其量脈浮而芤浮為陽芤為陰浮芤相搏胃氣生熱其陽則絶陽絶於陰其脈奈何蓋胃土為陽土貴得陰氣以和之若病人脈浮而芤浮為亢陽芤為孤陰浮芤相搏則胃之陽氣盛而生熱熱則津液愈竭無以維其陽其陽亢則與陰相絶所謂陽絶於陰者如此此又承上文而申言陽絶之脈愚按浮為陽之陽言陽邪也其陽之陽言人身之陽氣也正曰此説非也解見下節趺陽脈浮而澀浮則胃氣強澀則小便數浮澀相搏大便則硬其脾為約麻子仁丸主之陰虛不能以和陽診之於手之氣口則芤診之於足之趺陽則澀趺陽者胃脈也胃為陽脾為陰今趺陽脈浮而澀浮則胃之陽氣強澀則脾之津液泄而小便數浮澀相搏其津液不能返入胃中而大便則難夫脾土為胃行其津液者也津液鮮少則其脾無可奈何為窮約麻仁丸主之瀉脾之陽即扶脾之陰也此從上文陽絶之脈而補出陰虛之脈出其方治也正曰此三節皆言脾約證而所因各有不同也首節言汗出多者亡津液則陽氣孤絶在裏熏灼脾之膏油而膏油枯縮不能注潤於腸中則大便難次節是言浮為陽氣亢芤為陰血虛其胃陽遂與脾陰相絶而脾之膏油被胃熱灼亦枯縮矣此節又言若不出汗不血虛而為小便數則津又從小便瀉去膜中不潤被胃熱灼枯其膏則脾油亦縮而為脾約不大便也脾指膏油約謂枯縮淺注解為無可奈何殊可笑也麻仁丸方麻子仁二升芍藥半升枳實半斤炙大黃一斤去皮厚朴一斤炙去皮杏仁一升去皮尖研作脂上六味為末煉蜜為丸桐子大每服十丸日三服漸加以知為度男元犀按脾為胃行其津液也今胃熱而津液枯脾無所行而為窮約故取麻仁杏仁多脂之物以潤燥大黃芍藥苦泄之藥以破結枳實厚朴順氣之藥以行滯以蜜為丸者治在脾而取緩欲脾不下泄其津液而小便數以還津液於胃中而大便難已也蔚按古今權量尺寸不同考之內臺方麻仁四兩杏仁六兩芍藥枳實各三兩厚朴三兩大黃八兩煉蜜丸如梧桐子大熟水下五十丸陽病三日發汗不解蒸蒸發熱者屬胃也調胃承氣湯主之有汗後而轉屬者太陽病三日發汗不解熱從內出如甑釜之蒸蒸發熱者乃熱邪內陷與陽明水穀之氣合併而為熱屬於胃也必也釜底抽薪而熱自愈以調胃承氣湯主之述此方熱邪由汗後而入於胃府也陽明者無形之氣化也胃者有形之胃府也傷寒吐後腹脹滿者與調胃承氣湯有吐後而轉屬者夫有形之邪在於胃之上脘宜吐而越之今傷寒吐後則上脘之邪已去而腹仍脹滿者乃中下之實邪未解也宜與調胃承氣湯此言吐後而熱邪仍留而未解也太陽病若吐若下若發汗後微煩小便數大便因硬者與小承氣湯和之愈總而言之大凡太陽病若吐若下若發汗則津液無矣津液亡於外則燥熱甚於內故微煩又走其津液而小便數大便因小便之數而致硬者與小承氣湯和之愈此總論發汗吐下後皆可以轉屬於陽明也補曰上二節是邪入於胃府中者故均用調胃承氣而其邪入之路一則從肌肉蒸熱而入胃一則從吐傷胃陰而入胃胃連及小腸皆在腹間故曰腹滿二證有表裏之異而邪皆已入胃故用調胃承氣湯此一節言汗吐下均能傷膜網中之水津而水津不灌於腸故大便難以小承氣和之是和小腸與膜網之氣也合共三節第一節是從肌肉油膏而入胃第三節是從膜網竅道而入腸膜即肓也油即膏也膏肓相連而又有分別也調胃小承氣義已見前得病二三日脈弱無太陽柴胡證煩躁心下硬至四五日雖能食以小承氣湯少少與微和之令小安至六日與承氣湯一升若不大便六七日小便少者雖不受食但初頭硬後必溏未定成硬攻之必溏須小便利屎定硬乃可攻之宜大承氣湯非關轉屬其病為陽明自得之病得病二日算起至三日始滿二日值陽明主氣之期陽明為氣血之主邪傷則不能自振故脈弱自得之病不關轉屬故無太陽柴胡證胃熱上乘於心則煩煩極而臥不安則躁胃居於心下邪實於胃故心下硬胃氣未虛則能食今病至四五日雖能食亦不可遽以為能食而大下之宜以小承氣湯不及升而少少與微和之令煩躁小安至六日仍不大便仍與小承氣湯加至一升使得大便而止甚矣小承氣湯之不可多用也如此若煩躁心下硬其不大便至於六七日似可以大下無疑矣而只因其小便少一證者津液尚還入胃中雖不能食而與譫語潮熱有燥屎之不能食者不同但初頭硬後必溏未定成硬攻之必溏須待小便利屎定成硬乃可攻之宜大承氣湯甚矣大承氣湯之不可驟用也如此述此章凡五節論陽明自病非關轉屬首節反復辨論以示不可輕攻之意後四節又於陽明中從內經悍氣之旨悟出悍熱之氣為病最急又不可泥於不可輕攻之説徐徐緩下以成莫救之患也正曰此分兩段上段言脈弱者雖燥硬亦不可攻只當用小承氣和之而已治燥硬者當顧其虛也次段言小便少者未盡結硬不可攻之須審其小便利者屎乃純硬方可斷為燥結而攻之也是須辨別不是須等待安有病淺而待其病深之理且使待之久而小便仍少豈遂別無治法哉一字之差所誤不少傷寒六七日目中不了了睛不和無表裏證大便難身微熱者此為實也急下之宜大承氣湯然亦不可拘於不輕下之説以誤事也陽明有悍熱之氣為害最速不可不知靈樞動輸篇云胃氣上注於肺其悍氣上衝頭者循咽上走空竅循眼系入絡腦出頤下客主人循牙車合陽明並下人迎此胃氣別走於陽明者也故陰陽上下其動若一傷寒六七日為一經已周其悍熱之氣上走空竅而循目系故目中不了了睛不和其悍熱之氣別走陽明上循空竅不在表而亦在裏故無表裏證惟其無裏證故大便不硬而只覺其難惟其無表證故身不大熱而止微熱者此悍氣之病而為實也急下之宜大承氣湯急下之以救其陰稍緩則無及矣述此言陽明悍熱為病是當急下又不可拘於小便利而後下之也不了了者病人之目視物不明了也睛不和者醫者視病人之睛光或昏暗或散亂也按此證初看似不甚重至八九日必死若遇讀薛立齋張景嶽書及老秀才多閲八家慣走富貴門第者從中作主其死定矣余所以不肯為無益之談止合拂衣而去矣正曰陽明悍熱之説非也義詳於後茲不具論但就本節解之曰傷寒六七日邪熱已內合陽明當身大熱大便當極硬矣乃無陽明肌表之證而身只微熱無陽明胃裏之證而大便只微難看似不甚重矣孰知其燥熱之氣從膜網縫隙之中而上入腦髓直衝目系目中不了了睛不和者是腦髓瞳神有立時敗壞之勢危之極矣急宜釜底抽薪故當急下之此與上文若吐若下若發汗微煩小便數同是膈膜中證惟煩與便數是熱循膈膜上入心包而下走膀胱心包之神不至立亡膀胱之水不至立涸是其燥熱尚輕也故止以小承氣湯和之此節熱循膈膜上衝髓海干犯神水有立刻神亡之懼是其燥熱甚重且勢危也故當急下內經言胃絡上通於腦西醫言腦氣筋多系於胃然主絡言筋實皆從膈膜而上通故原文無表裏證句明明指出在膜網縫中也與前微煩小便數節同在膜中而輕重不同非彼是燥熱此是悍熱也悍熱之説實為蛇足陽明病發熱汗多者急下之宜大承氣湯又有宜急下者陽明病審其發熱系悍氣為熱其汗多者為熱勢炎炎而津液盡出亢陽無陰緩則無及急下之宜大承氣湯此言悍熱之氣內出迫其津液外亡者之宜急下也魏千子云止發熱汗出無燥渴硬實之證而亦急下者病在悍氣愈明矣正曰此節亦非悍氣只與上文蒸蒸發熱者節分輕重而已陽明內主膏油外主肌肉邪熱在肌肉中則蒸蒸發熱若汗出不多其熱勢尚輕只如上文用調胃承氣湯足矣此之汗出者為熱太猛膏液恐其立竭故急下之以瀉其燥熱之勢是只與上節分輕重而亦無悍熱之説與蒸蒸發熱節皆在肌肉膏油中此不可不知者也發汗不解腹滿痛者急下之宜大承氣湯更有宜急下者悍熱為病陽氣盛也陽盛則陰虛復發汗以傷陰液其病不解悍熱之氣反留於腹其腹滿痛者與燥屎之可以緩下者不同須急下之宜大承氣湯述此言悍熱之氣不上走於空竅而下循於臍腹也亦宜急下也以上為陽明三急下證腹滿不減減不足言當下之宜大承氣湯三急下之外又有不可以言急而亦不可以姑緩者醫者不可不明腹雖不痛而常滿不減即偶減一二分亦不足言雖不甚危亦當下之以其病在陽明無形之悍氣從肓膜而聚有形之胸腹亦與陽明之本氣不同必宜大承氣湯方足以濟之也正曰此兩節亦非悍氣只與上腹滿者與調胃承氣湯兩節分輕重而已上兩節是言汗吐下後邪熱入於腸胃是居府中之證也宜調胃承氣以和胃管小承氣以和腸中此兩節腹滿而痛者其結甚減不足言者其結亦固痛者急故曰急下減者緩故但曰當下皆是奪去胃腸管中之實也腸中之實亦只是燥熱相合而結並非別有悍熱將此四節與上文四節合看則陽明之層折與燥熱之輕重無不了然述承上文而言腹滿痛者固宜急下若不痛而滿云云雖不甚急而病在悍氣非下不足以濟之也問曰三急下證本經並不説出悍氣茲何以知其為悍氣也答曰陽明有胃氣有燥氣有悍氣悍氣者別走陽明而下循於臍腹素問痹論云衛氣者水穀之悍氣也其氣慓疾滑利不入於脈循皮膚之中分肉之間熏於肓膜散於胸腹目中不了了睛不和者上走空竅也發熱汗多者循皮膚分肉之間也腹滿痛者熏盲膜而散胸腹也慓悍之氣傷人甚捷非若陽明燥實之證內歸中土無所復傳可以緩治也故下一急字有急不容待之意焉所謂意不盡言也學者得其意而通之則緩急攸分輕重立見庶不臨時舛錯也按仲師自序云撰用素問九卷可知傷寒論全書皆素問九卷之菁華也錢塘張氏注中補出悍氣二字可謂讀書得間然長沙何不明提此二字乎不知傷寒論字字皆經卻無一字引經撰用之所以入神也正曰陽明只一燥氣合於邪熱則為燥熱輕者可以緩調重者必須急下方能挽亢陽而存孤陰為燥熱正治之大法非陽明燥熱之外別有所以悍熱也若夫內經所謂悍氣是申明胃氣之意言營者水穀之精氣而衛者水穀之悍氣非言陽明燥氣外另有一悍氣也不入於脈言榮血乃入脈管此系衛氣故不入脈管熏於盲膜散於胸腹皆言衛氣循行膜膈之中也靈樞所謂循咽衝頭上走空竅亦只是衝氣從上焦膜膈而上走空竅也凡此皆言衛氣之行慓悍有力故能衛外仍只是言衛氣之行而已何曾是言陽明胃別有悍氣哉故此四節只是燥熱相合太重且急故當急下並非言胃另有一種悍氣也注家於內經悍氣二字扯入陽明既與經旨有乖而於陽明篇反添蛇足不亦謬乎陽明少陽合病必下利其脈不負者為順也負者失也互相克賊名為負也脈滑而數者有宿食也當下之宜大承氣湯合病既審脈而足其順與否亦審脈而知其可下與否陽明為金土少陽為木火二陽合病則土受木克金被火克故必下利若陽明脈大與少陽脈弦相敵其脈不負者與病機為順也若只見少陽之脈弦而不見陽明之脈大為陽明負於少陽者於正氣為失也然木火固能乘其所勝而克金土金土卻亦能乘其所不勝而侮木火此勝彼屈互相克賊兩敗俱傷名為負也蓋陽明負於少陽則下利少陽負於陽明則有宿食若脈滑而數者乃內有宿食也陽明戊土有餘少陽初生之甲木鬱於土中不能暢達當下之以平土中之敦阜而助初生之甲木宜大承氣湯此言陽明少陽合病審其應下者下之中寓土鬱奪之木鬱達之二意述經云食入於胃散精於肝又土得木而疏陽明土勝少陽木屈則為頑土故木不可太勝土亦不可太旺平則治偏則病也病人無表裏證發熱七八日雖脈浮數者可下之假令已下脈數不解合熱則消穀喜飢至六七日不大便者有瘀血宜抵當湯若脈數不解而下不止必協熱便膿血也病有不在陽明之經腑而在於陽明之絡者不可不知然而絡病下後又有瘀血與便膿血之不同病人外無頭痛惡寒之表證內無譫語硬滿之裏證發熱七八日值陽明主氣之期陽熱不退則陰液日虧雖脈浮數者宜汗而不宜下然發熱而不惡寒汗之不可欲為發熱證籌一去路亦可斟酌下之以除絡中之熱然謂之可者幾經詳慎若差之毫釐則為大不可也假令已下其脈浮已解而數不解是絡熱不因下而除反乘下後內虛而合於胃而為熱胃熱則消穀善飢至六七日再值陽明主氣之期若不大便者熱得燥氣而橫血因燥熱而凝知其有瘀血也宜抵當湯夫抵當湯為攻瘀血方茲不直斷之曰主之而僅商之曰宜者蓋欲臨證者審其有身黃小便自利善忘如狂等證而後用此劑而得宜也若脈浮已解而數不解而且下利不止是血不為熱灼而為瘀反為熱逼而下奔必又協腸胃之熱而便膿血也此證溫劑有桃花湯寒劑有白頭翁湯淺而易知不必特立方治也此論邪干陽明之絡處方宜詳慎而靈活也正曰此節是言肌肉膏血間病人身內外皆以膜相連膜有縫隙行水行氣屬氣分膜上生膏油肥肉而膏油肥肉中盡是血絲脈絡縈行此單言膏血肌肉間病故提出無表裏證為眼目言不在皮毛之表腸胃之裏而只在肌肉膏血間則相蒸發熱應宜清解若久至七八日則清之不能遽解可用調胃承氣用大黃甘草色黃入膏油者引熱氣歸腸胃而下瀉之則熱解而浮數當已假令已下脈浮已解而熱勢不休數脈仍不解者則膏油中之熱因下而入於胃胃之燥氣本能消穀西醫言食入則胃熱輳集以化穀也今又合膏油之邪熱則為消穀善飢之中消證矣若不為中消而為下後亡津液至六七日不大便者其熱必結於膏油血液之間而有瘀血蓋下焦膏油中血液注潤大腸則大便調今瘀血在膏油而不注大腸宜抵當湯逐其瘀血也若下之後熱仍甚而脈數不解又因下後利亦不止者其熱必脅合於大腸而便膿血是為今之痢疾總之邪熱在膏油中合於胃則為消穀結其血則瘀血合於大腸而下利則為便膿血修園不知肌肉膏油屬脾而生於膜上與腸胃皆相通也傷寒發汗已身目為黃所以然者以寒濕在裏不解故也以為不可下也於寒濕中求之陽明之裏即是太陰合其氣則為黃請先言寒濕傷寒法應發汗所以使熱從汗越也乃發汗已而通身與目俱為黃所以然者暴感之寒邪鬱於表者已解而以本有之寒濕病在裏者不解故也蓋濕熱之黃可下而此以寒濕為黃不可下也當於寒濕中求其法而治之此言寒濕發黃不可誤以濕熱之法治之五苓真武皆正方也時法加入茵陳蒿亦妙述此章凡四節論陽明之熱合太陰之濕而為發黃證傷寒七八日身黃如橘子色小便不利腹微滿者茵陳蒿湯主之濕熱之黃治法何如傷寒七八日又當再經之期濕熱現於外故身黃如橘子色濕熱鬱於裏故小便不利其腹微滿者因小便不利所致也以茵陳蒿湯主之此言濕熱鬱於內外也傷寒身黃發熱梔子柏皮湯主之傷寒濕熱已發於外而不鬱於裏故只身黃發熱而無別證者以梔子柏皮湯主之此言濕熱之發於外也梔子柏皮湯方梔子一十五個擘甘草一兩炙黃柏二兩上三味以水四升煮取一升半去滓分溫再服傷寒瘀熱在裏身必黃麻黃連軺赤小豆湯主之傷寒表證未解而瘀熱在裏與太陰之濕氣混合身必發黃以麻黃連翹赤小豆湯主之此言濕熱之瘀於內也述太陽之發黃乃太陽之標熱下合太陰之濕氣陽明之發黃亦陽明之燥熱內合太陰之濕化若止病本氣而不合太陰俱不發黃故曰太陰者身當發黃若小便自利者不能發黃也麻黃連翹赤小豆湯方麻黃二兩去節赤小豆一升連翹二兩杏仁四十個去皮尖大棗十二枚擘生梓白皮一升生薑二兩甘草二兩炙上八味以潦水一斗先煮麻黃再沸去上沫納諸藥煮取三升分溫三服半日服盡按無梓皮以茵陳代之蔚按梔子柏皮湯治濕熱已發於外止有身黃發熱而無內瘀之證此治瘀熱在裏迫其濕氣外蒸而為黃也麻黃能通泄陽氣於至陰之下以發之加連翹梓皮之苦寒以清火赤豆利水以導濕杏仁利肺氣而達諸藥之氣於皮毛薑棗調榮衛以行諸藥之氣於肌腠甘草奠安太陰俾病氣合於太陰而為黃者仍助太陰之氣使其外出下出而悉去也潦水者雨後水行潦地取其同氣相求地氣升而為雨亦取其從下而上之義也補曰在裏言在肌肉中對皮毛而言則為裏也肌是肥肉氣分所居肉是瘦肉血分所藏若熱入肌肉令氣血相蒸則淤滯不行是名瘀熱氣瘀則為水血瘀則為火水火蒸發於肌肉中現出土之本色是以發黃故用麻黃杏仁發皮毛以散水於外用梓白皮以利水於內梓白皮象人之膜人身肥肉均生於膜上膜中通利水不停淤則不蒸熱故必利膜而水乃下行此三味是去水分之瘀熱也連翹散血分之熱赤豆疏血分之結觀仲景赤豆當歸散是疏結血則此處亦同此二味是去血分之瘀熱也尤必用甘棗生薑宣胃氣協諸藥使達於肌肉妙在潦水是雲雨既解之水用以解水火之蒸鬱為切當也即方觀證而義益顯明陳注解裏字不確故注與方皆不切
