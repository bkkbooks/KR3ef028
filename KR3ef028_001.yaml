front:
  text: 序等傷寒論淺註補正序醫為活人術迄今醫道晦盲活人者反以殺人曷勝浩嘆章素嗜醫寢饋有年每讀仲師傷寒金匱不得其旨參求註解愈多愈昧惟陳修園淺註較明奉為圭臬乃讀之既久又生疑竇以之臨證處方尤多枘鑿不禁廢書三嘆以為斯道不明勢誠無可如何矣復游海上竊見中國皆今人不及古人西洋則今人更勝古人製造之巧格致之精實為中國所不及則其醫學亦當高出於中國乃於醫院藥房留心咨訪求其證論考其方書器具則精妙無比治法則顢頇異常始知尚形跡而略氣化凡五運六氣之神妙西醫概未能曉吁中醫既不明西醫又不識軒岐活人之術反以殺人悲夫戊子秋唐容川兄經滬上容川己丑進士前為諸生名聞三蜀列門下者恒數十人與家兄雲笠通譜余每過從知其能醫究未知其精也迄晤海上時每有疑證問之輒應如響凡人身臟腑經絡明若觀火且其談三焦更能發人所未發皆以西醫之形跡印證中醫之氣化章不能療者一經容川診治沉痼頓除人俱驚為神奇章則津梁奉之矣嘗言仲師書淺註雖佳不無遺誤必再補正乃善余著有中西匯通醫經精義閱之自悟章受讀一過再讀仲景書前不能解者大半可解乃嘆仲景之書如鎖此其鑰也真鴻寶歟遂石印行世又為之請曰醫理雖明醫法未備何不從事傷寒金匱將所謂補正者筆之於書豈非大千世界火坑中生青蓮耶蓋醫病止愈一人不如醫醫其功當倍於醫病補正云者原以醫前之醫即以醫後之醫既醫醫愈矣將已愈之醫治未愈之病其所活當不啻恒河沙數越兩寒暑補正書成捧讀之下疑團冰釋實為軒岐功臣足以羽翼仲景醫道當從此昌明使活人之術不致殺人則天下幸甚後世幸甚時大清光緒二十年甲午仲夏夔門鄧其章雲航謹敘傷寒淺註序周禮疾醫中士八人隸於天官秦醫和之言曰天有六氣淫生六疾而陰淫寒疾實居其首知醫之道通於天醫之業屬於士而醫之治可統於寒也修園以名孝廉宰燕素精於醫夫民之疾苦深知者莫如宰剛柔輕重遲速尋其脈絡以治之而疾苦可去元氣可復修園精於醫其治民可知矣修園既解組自以治一邑之疾苦其治猶小因於方脈諸書悉心研窮而呼吁之求有投輒應且將所著公餘醫錄四種梓之以醒庸俗復取漢張仲景傷寒論原文辨其魚魯分其章節期於解前人之惑而不至貽誤於後修園之心何其大而遠也余視學入閩因署中診視獲與修園接一日出所作傷寒論淺註屬余弁語余不知醫者也然觀淺註之提綱挈要條分縷析覺傷寒一書無不一一瞭如指掌仲景為郡守而作論修園為邑宰而作註其拯救斯民之心先後一轍也夫天氣始於冬至而一陽初動寒於是乎始來以此作論而百病之權衡在焉明天道之陰陽治民生之疾苦非讀書深識之士烏足與言仲景之書哉是為序通奉大夫都察院左副都御史提督福建學政加三級紀錄八次長壽韓鼎晉拜撰長沙方註小引漢藝文志云湯液經出於商伊尹皇甫謐謂仲景論伊尹湯液為十數卷可知傷寒論金匱要略諸方除崔氏八味腎氣丸侯氏黑散外皆伊尹之遺方也伊尹因內經止有十二方詳於針灸而略於藥遂宗神農經旨專以湯液治病補內經所未及長沙得其真傳可謂大而化化而不可知矣然余讀魯論能近取譬二句想長沙當日必非泛泛而求大抵入手工夫即以伊聖之方為據有此病必用此方用此方必用此藥其義精其法嚴毫釐千里之判無一不了然於心而後從心變化而不窮論中桂枝證麻黃證柴胡證承氣證等以方明證明明提出大眼目讀者弗悟也然而可以謂之方者非聖人不能作非明者不能述其藥品察五運六氣而取其專長其分兩因生剋制化而神其妙用宜湯宜散宜丸一劑分為三服兩服頓服停後服溫服少冷服少少咽之服後啜粥多飲水暖水之類而且久煮微煮分合煮去滓再煮漬取清汁或用水或用酒及漿水潦水甘瀾水麻沸水之不同宋元後諸書多略之而不知古聖人之心法在此余同周鏡園飲中暢明其義歸而乘興韻之其詩為藥證分兩煮法服法等所限弗能工也戊辰歲余服闋復到保陽供職公餘取傷寒論原文重加註疏書成附此六卷於後命男蔚按方而細註之俾讀傷寒論者於人略我詳處得一捷便之法云修園陳念祖並題補曰修園此引原載傷寒方歌括中今因方證當合勘故取其方註編入原文合為一書以便查對並將此引亦採入焉意在專為仲景之方證發明而已故不存修園本書面目讀者當知著書各有本意若要觀陳書舊本則自有陳書在幸勿議吾書之割裂也仲景原序余每覽越人入虢之診望齊候之色未嘗不慨然嘆其才秀也怪當今居世之士曾不留神醫藥精究方術上以療君親之疾下以救貧賤之厄中以保身長全以養其生但競逐榮勢企踵權豪孜孜汲汲惟名利是務崇飾其末忽棄其本華其外而悴其內皮之不存毛將安附焉卒然遭邪風之氣嬰非常之疾患及禍至而方震慄降志屈節欽望巫祝告窮歸天束手受敗賫百年之壽命持至貴之重器委付凡醫恣其所措咄嗟嗚呼厥身以斃神明消滅變為異物幽潛重泉徒為啼泣痛夫舉世昏迷莫能覺悟不惜其命若是輕生彼何榮勢之云哉而進不能愛人知人退不能愛身知己遇災值禍身居厄地蒙蒙昧昧蠢若游魂哀乎趨世之士馳競浮華不固根本忘軀徇物危若冰谷至於是也余宗族素多向餘二百建安紀年以來猶未十稔其死亡者三分有二傷寒者十居其七感往昔之淪喪傷橫夭之莫救乃勤求古訓博採眾方撰用素問九卷八十一難陰陽大論胎臚藥錄並平脈辨證為傷寒雜病論合十六卷雖未能盡愈諸病庶可以見病知源若能尋余所集思過半矣夫天布五行以運萬類人稟五常以有五藏經絡府俞陰陽會通元冥幽微變化難極自非才高識妙豈能探其理致哉上古有神農黃帝岐伯伯高雷公少俞少師仲文中世有長桑扁鵲漢有公乘陽慶及倉公下此以往未之聞也觀今之醫不念思求經旨以演其所知各承家技終始順舊省疾問病務在口給相對斯須便處湯藥按寸不及尺握手不及足人迎趺陽三部不參動數發息不滿五十短期未知決診九候曾無彷彿明堂闕庭盡不見察所謂窺管而已夫欲視死別生實為難矣孔子云生而知之者上學則亞之多聞博識知之次也余宿尚方術請事斯語漢長沙太守南陽張機仲景撰程郊倩註曰古人作書大旨多從序中提出孔子於春秋未嘗有序然其言曰知我者其惟春秋乎罪我者其惟春秋乎又曰其義則丘竊取之矣即此是春秋孔子之自序孟子則曰孔子懼作春秋又曰孔子作春秋而亂臣賊子懼是即孟子之代春秋序也迄今未讀春秋者亦能道及春秋無非從此數句書讀而得其大旨余讀傷寒論仲景之自序竟是一篇悲天憫人文字從此處作論蓋即孔子懼作春秋之微旨也緣仲景之在當時猶夫春秋之有孔子道大莫容一時驚怖其言而不信是以目擊宗族之死亡傷之而莫能救則知仲景之在當時宗族且東家丘之矣況復舉世昏迷莫知覺悟安得不賫百年之壽命持至貴之重器悉委凡醫恣其所措乎恣其所措四字於醫家可稱痛罵然實是為病家深悼也醫家苦於不知病病家苦於不知醫知之一字兩難言之若欲愛人知人先是愛身知己凡勤求博採從天之五行人之五常與夫經絡府藏陰陽會通處殫了多少體認工夫此非醫之事而已而己之事也醫不謀之己而謀之人則醫者人也而厥身以斃神明消滅變為異物幽潛重泉徒為啼位者已也非人也醫不為之代也從此處語醫自是求之於己不復求之於人從己求醫求之於知從人求醫求之於行知行合一之學道則皆然醫事獨否知則必不能行行則未必能知行者之精神力量都用在行上何由去知但能各承家技終始順舊罔不能行矣終日殺人亦只是行知者之精神力量都用在知上何暇去行即使欲行而思求經旨以行其所知較之相對斯須便處湯藥者鈍不如敏庶幾見病知源較之省疾問病務在口給者藏不如炫徒知活人孰與活口所以群言莫正高技常孤在仲景之身已是一鈍秀才持此誨及於醫又何利於醫而屑其教誨者故半夜晨鐘僅於序中為蒙蒙昧昧輩一喚起此游魂預掩其啼泣也若是真正惜命亟從己上作工夫等醫事於自家之身心性命即君親亦是己之君親貧賤亦是己之貧賤至若保身長全以養其生蓋是己之身與心從愛身知己中廣及愛人知人無非自己求之者於己處求知不於己處求行則尋師俱在吾論中無他覓也其間見病知原是全論中丹頭若能尋余所集思過半矣是全論中鼎灶思求經旨以演其所知是全論中火候要此火候足時須要曉得此論是知醫的淵源從艱難得之不是醫的方技以簡便法取之者也故一篇之中創凡醫之害正痛舉世之昏迷於憂讒畏譏之際不啻三致意焉蓋深懼夫邪說惑民將來不以吾論為知之次反借吾論為行之首從醫道中生出鄉愿來以賊吾論中千百世後恣其所措將何底止故預示讀吾論者亟從醫懲艾也吾故曰得仲景之傷寒論而讀之先須辟去叔和之序例始敢向叔和之序例而辟之先須讀著仲景此處之自序始按程郊倩名應旄新安人也喜讀書神悟過人但變更仲景原文以為註疏未免聰明誤用而少陽太陰等篇尤多葛藤不可為法若使全部中盡如此註之純則仲景必許為賢弟子後學者可奉為大宗師矣補曰仲景序中天布五行以運萬類人稟五常以有五臟經絡府俞陰陽會通此數句已括全書大義蓋傷寒以六氣立論而此序則以五行開宗五行為體六氣為用人稟五行而有五臟然後有六腑有五臟六腑遂有經絡俞穴而成為三陰三陽總皆秉天之陰陽以為人身之陰陽其間臟腑經俞貫通會合必先洞悉而後可見病知源病之用藥亦因藥在萬類中同稟五行之運故借以治人之病要皆天地萬物陰陽一體之義仲景此數句最有包蘊故曰元冥幽微變化難極自非高才識妙豈能探其理致哉吾於各經篇首特補總論以明此旨正曰鄧雲航云仲景自序明言傷寒雜病論合十六卷蓋傷寒六經為六卷後附三章為一卷金匱要略九卷二書共合恰得一十六卷金匱當是雜病論即以此序之卷數而知之也金匱之名亦疑後人所加又觀傷寒論後痓濕暍篇仲景曰此三種宜應別論以與傷寒相似故見於此所謂應別論者即謂應列入雜病論也故復於金匱之首列此三證足見金匱即是雜病論嗣經王叔和添辨脈平脈等證冠於傷寒之首而傷寒之卷數已亂又不知何人將雜病論題為金匱要略復於卷後添俗傳雜療方為第十卷狗尾續貂混誤已甚陳修園刪去辨脈平脈等篇詢有卓見而猶存雜療方不免遺累且陳書分卷亦與仲景未符今應刪去雜療方將傷寒論依六經分為六卷後附三章又為一卷合之金匱九卷適符仲景原文一十六卷之數然則仲景二書實為合集仲景此序亦是合序並非單序傷寒也讀者將兩書合讀則融會貫通毫無遺義矣雲航此說至為精確當即從之將二書卷數釐正復還其本來面目願與天下讀者共訂正焉淺註凡例一仲景書本於內經法於伊尹漢藝文志及皇甫謐之言可據蓋內經詳於針灸湯液治病始自伊尹扁鵲倉公因之至仲景專以方藥為治而集群聖之大成醫門之仲景即儒門之孔子也但其文義高古往往意在文字之外註家不得其解疑為王叔和之變亂而不知叔和生於晉代與仲景相去未遠何至原書無存耶若仲景另有原書叔和何能盡沒以致今日之所存者僅有叔和之編次耶要知平脈辨脈傷寒例諸可與不可與等篇為王叔和所增增之欲補其詳非有意變亂也然仲景即儒門之孔子也為叔和者亦游夏不能贊一辭耳玆故於其所增者削之一叔和編次傷寒論有功千古增入諸篇不書其名王安道惜之然自辨其太陽病脈證篇至勞復止皆仲景原文其章節起止照應王肯堂謂如神龍出沒首尾相顧鱗甲森然玆刻不敢增減一字移換一節一成無己註後諸家皆有移易若陶節庵張景岳程山齡輩無論矣而方中行喻嘉言程郊倩程扶生魏念庭柯韻伯皆有學問有識見之人而敢擅改聖經皆由前人謂傷寒論非仲景原文先入為主遂於深奧不能解之處不自咎其學問之淺竟歸咎於叔和編次之非遂割章分句挪前換後以成一篇暢達文字如詩家之集李集杜雖皆李杜句究竟非李杜詩也余願學者從仲景原文細心體認方知諸家之互相詆駁者終無一當也一宣聖云信而好古成無己註傷寒論不敢稍參意見而增刪移易蓋好由於信也後輩不得仲景之旨遂疑王叔和之誤以致增出三大綱之說傳經為熱直中為寒之論今古南北貴賤之分三時正冬之異種種謬妄皆由不信故也惟張隱庵張令韶二家俱從原文註解雖間有矯枉過正處而闡發五運六氣陰陽交會之理恰與仲景自序撰用素問九卷陰陽大論之旨吻合余最佩服今照二家分其章節原文中襯以小註俱以二家之說為主而間有未甚愜心者令於方中行喻嘉言各家中嚴其採擇以補之蓋以各家於仲景原文前者後之後者前之字句藥品任意增減改易既非全璧而分條註釋精思穎悟不無碎金總期於經旨明暢而後已一仲景傷寒論即內經所言三陰三陽各因其臟脈之理二張會全部內經以為註解余百讀之後神明與浹幾不知我即古人古人即我故每節總註或註其名或止註述字不拘以形跡論也至於各家有一得之處必註其姓名蓋以作家苦心不容沒也一是書雖論傷寒而百病皆在其中內而臟腑外而形身以及血氣之生始經俞之會通神機之出入陰陽之變易六氣之循環五運之生制上下之交合水火之相濟熱實寒虛溫清補瀉無不悉備且疾病千端治法萬變統於六經之中即五道一以貫之之義若讀靈素難經不於此求其實用恐墮入張景岳一流以陰陽二字說到周易說到音律並及仙釋毫無下手工夫止以人參地黃自數錢以及數兩為真陰真陽之主藥貽害無所底止急讀此書便知悔悟一此書原文中襯以小註只求經旨明暢絕不敢驚及高遠致讀者有涉海問津之嘆唯是漢文語短味長往往於一二虛字中寓其實理且於無字中運其全神余襯以小註採各家之精華約之於一言一字讀者最宜於此處著眼一余前刻數種採集固多而獨出己見者亦復不少惟此刻以二張為主又博採各家獨得之言融會大旨而為小註去取則有之杜撰則無也一傷寒論及金匱方出自上古及伊尹湯液明造化之機探陰陽之本所有分兩煮法服法等差之一黍即大相逕庭余另有長沙方法歌六卷附後一傷寒論晉太醫令王叔和撰次宋臣林億等校正聊攝成無己註解此為原本如辨脈平脈序例前賢謂其出於叔和之手余細繹文義與六經篇不同至於諸可與不可篇余即以叔和之說定之叔和云夫以疾病至急倉卒尋按要者難得故重集可與不可方治列之篇後其為叔和所作無疑玆余於叔和所增入者悉去之去之所以存其真也補正凡例一修園書道從二張兼採各家至為精當而猶有缺誤者只因唐宋後無人親見臟腑於內經所論之陰陽氣化多不著實二張力求精深於理頗詳而於形未悉不知形以附氣離形論氣決非確解近出西洋醫法所論形跡至詳惟西醫略於氣化是其所短然即西醫之形跡循求內經之氣化則印證愈明乃知修園二張所以尚有缺誤者西醫未出無考異之書中醫失傳窮鑽研之力終未能瞭如指掌也余幸生今日既得群賢誘之於前又得西醫證之於後先將內經參透然後知此書註解尚有缺誤必須補正乃為完善意在為淺註之功臣並非志存攻訐識者鑒之一唐宋後不知三焦為何物於水道出入氣血往來臟腑連絡多不能明醫林改錯極詆其謬而另言人有氣府即雞冠油西洋醫書亦斥三焦之妄而言另有連網中國不知豈知雞冠油連網即內經所謂下焦也西醫言水從連網中入膀胱醫林改錯言水從雞冠油中入膀胱證以內經三焦者決瀆之官水道出焉適相符合焦古作𩏷義作膲余曾見日本內經凡三膲均書作三瞧蓋膲誤作瞧亦猶膲省作焦今人失考訓焦為赤以三膲為空腔子註家之誤多由於此是以必須補正庶經修復明故吾於仲景所論涉於三焦之證特加詳明於少陽總論尤推闡焉一原註每經篇首未立總論隨文散釋讀者難於會通以無綱領也吾於每經特補總論一篇以明大旨讀者先讀總論然後再讀原文自然貫通且六經總論當一齊讀熟然後讀原文自如桶底脫一仲景原文撰用素問九卷陰陽大論八十一難凡我註家自不應參以後說然近出西醫其論形跡有足證明內經者間亦採入註中非正西醫正以內經奧義近代失傳西醫有足發明則採取之正所以遵從內經期與仲景原文符合又有時並駁西醫非攻西醫也只藉以明原文而已要使聖學昌明其毋為後世末學所混亂則幸甚矣豈有疆域之見哉一淺註切當者固足遵守即義不甚精而理有可通者亦存而不論惟義有紕繆則正之加正曰二字義有欠缺則補之加補曰二字非欲揭其短正以輔其長也修園有知當亦諒我我有所短尤望世人規我也一原文傳寫既久難保一無訛字文義深奧安能一一盡釋修園逐節逐句照例必加註釋於萬無可通者亦強通之反滋疑誤吾於此等特加闕疑二字待質高明庶於原文可告無罪讀淺註者亦免生滋弊也一修園將方註立為歌括另成一部讀者不便查對今特編入原文註下則讀證讀方可互勘以明其理也一歌括為初學梯階陳氏用心亦佳然另立為部則可加歌括今既收入原文若加歌括便非註經體裁故不採入一凡仲景之方與證針鋒相對一絲不差須於註證後即註方乃能合勘修園分部註方已有未合而其方下又引內臺原文建安許宏集議謂與傷寒論詳略不同意在博採以示詳也不知內臺許宏集議已非仲景原書其所列之證與方多不有合不得攔入仲景方中恐生支離也讀法按仲景傷寒論六經與內經熱病論六經宜分別讀王叔和引熱病論文為序例冠於傷寒論之首而論中之旨反因以晦甚矣著作之難也按六氣之本標中氣不明不可以讀傷寒論內經云少陽之上火氣治之中見厥陰陽明之上燥氣治之中見太陰太陽之上寒氣治之中見少陰厥陰之上風氣治之中見少陽少陰之上熱氣治之中見太陽太陰之上濕氣治之中見陽明所謂本也本之下中之見也見之下氣之標也本標不同氣應異象內經此旨深邃難測即王太僕所註亦不過隨文敷衍未見透徹惟張景岳本張子和之說而發揮之洵可謂千慮之一得也另圖於後按至真要大論曰少陽太陰從本少陰太陽從本從標陽明厥陰不從標本從乎中也何則少陽太陰從本者以少陽本火而標陽太陰本濕而標陰標本同氣故當從本然少陽太陰亦有中氣而不言從中者以少陽之中厥陰木也木火同氣木從火化矣故不從中也太陰之中陽明金也土金相生燥從濕化矣故不從中也少陰太陽從本從標者以少陰本熱而標陰太陽本寒而標陽標本異氣故或從本或從標而治之有先後也然少陰太陽亦有中氣以少陰之中太陽水也太陽之中少陰火也同於本則異於標同於標則異於本故皆不從中氣也至若陽明厥陰不從標本從乎中者以陽明之中太陰濕土也亦以燥從濕化矣厥陰之中少陽火也亦以木從火化矣故陽明厥陰不從標本而從中氣也要之五行之氣以木遇火則從火化以金遇土則從濕化總不離於水流濕火就燥同氣相求之義耳然六氣從化未必皆為有餘知有餘之為病亦當知其不及之難化也夫六經之氣時有盛衰氣有餘則化生太過氣不及則化生不前從其化者化之常得其常則化生不息逆其化者化之變直其變則強弱為災如木從火化也火盛則木從其化此化之太過也陽衰則木失其化此化之不前也燥從濕化也濕盛則燥從其化此化之太過也土衰則金失其化亦化之不前也五行之氣正對俱然此標本生化之理所必然者化而過者宜抑化而不及者不宜培耶此說本之張景岳誠覺穎悟但彼時未得明師友以導之致終身受高明之過可惜也夫補曰內經所言某經之上某氣治之之上云者蓋謂臟腑為本經脈為末是臟腑居經脈之上故稱上焉由臟腑本氣循經脈下行其中絡者中之見也中見之下其經脈外走手足以成六經又各有太少陽明三陰之不同則系六氣之末矣故曰氣之標也前二圖至為明晰惟於各經本氣尚未發明余特補之曰少陽之上火氣治之言少陽經之上為三焦膽腑司人身之火氣三焦即油網論詳補例中三焦之原根於腎系名曰命門由腎系生出兩大板油由板油生出網油上生胸膈前連包絡而後附於脊與肝相連通於膽系命門坎中一陽行於三焦只是陽氣不名為火惟上通於膽得肝木之生化則成火矣所謂空中有火麗木則明蓋必麗於木而後稱為火故三焦中之陽氣乃火之根惟上合於膽乃為麗木則明之火是膽為火之焰三焦為火之根而肝木則是生火之物故論火以膽與三焦為主膽中所藏之火出入皆以三焦為路道而托根又在腎系故膽與三焦同司火化世言肝膽包絡皆司相火心為君火此後世之說其實非也內經明言厥陰之上風氣治之少陰之上熱氣治之蓋少陰心腎同司熱氣不得名火熱與火後世無分曉故混稱君火相火不知天之陽氣必麗於木乃為火之實體若發於水中積為烈日亦只是熱氣不名為火故內經曰少陰之上熱氣治之少陰坎中之陽氣上交於心而為心陽如天之有日司人身之熱氣與火不同乃先天之陽化生氣血之本也火與熱其辨如是至於燥氣又與火熱不同火熱皆屬陽而燥氣有陰燥有陽燥是以異焉蓋燥與濕對濕為水火相交之氣燥為水火不交之氣究水火之所以不交則由於金性之不收收止水火各返其宅故神名蓐收令司秋月草木枯槁水泉渴竭是為燥金用事之驗人秉燥金之氣為陽明經夫金氣收而水火不交是為燥則燥者水火消耗之氣也腸胃所以能化飲食皆以其燥能消耗之也燥化不足則不消水燥化太過則傷津液陽燥是水不濟火此證最多陰燥是火不蒸水此證間有此陽明之上燥氣治之之義也濕者土之本氣土旺於長夏正水火相蒸之候水火相合遇木則腐而成土遇金則化而歸土故土又旺於四季蓋必水火金木相合而化然後成土是以洪範土居五行之末尤先要水火相蒸有此濕氣然後能腐化百物以成土土在天地間乃陰體之極大者也人秉之而為太陰脾經脾之氣化全以濕氣為主故曰太陰之上濕氣治之毋令太過不及則脾土安和也夫人之身主血分居內者太陰為大主氣分居外者太陽為大內經云太陽之上寒氣治之言太陽經氣居外以為衛元陽之氣也而此氣實發於膀胱寒水之中膀胱為腎之府主小便凡人飲入之水從腸胃入三焦油網從油網入膀胱如天之有海水之有壑應北方寒水之氣而能導引心火清利三焦皆賴寒水之功用設人無此寒氣則不足以濟燥火熱故寒水之氣不可太過亦不可不及此水之所以能化氣衛外者則又賴心火下交而水化為氣也義詳太陽總論寒與風不同水化氣升為太陽寒水之氣化陽生陰退為厥陰風木之氣化厥陰為陰之盡陰盡陽生而和風生焉於卦為震於人為肝以肝體論得心脾之陰血凝結成質是為陰體如震卦之上二陰爻也肝中之系連於脊下連腎系得腎水中之一陽所發生如震卦之下一陽爻也名厥陰者以其體陰又曰風氣治之以其用陽陰盡陽生是為和風風氣和而百體暢厥陰經所以司氣者如是太過不及則又生病焉論詳厥陰篇按程郊倩云經猶言界也經界既正則彼此輒可分疆經猶言常也經常既定則徙更輒可窮變六經署而表裏分陰陽劃矣凡虛實寒溫之來雖不一其病務使經署分明則統轄在我不難從經氣淺而淺之深而深之亦不難從經氣淺而深之深而淺之可也按六經之為病仲景各有提綱太陽以脈浮頭痛項強惡寒八字提綱陽明以胃家實三字提綱少陽以口苦咽乾目眩六字提綱太陰以腹滿而吐食不下自利益甚時腹自痛若下之必胸下結鞕二十三字提綱少陰以脈微細但欲寐六字提綱厥陰以消渴氣上撞心心中疼熱饑而不欲食食則吐蛔下之利不止二十四字提綱以提綱為主參以論中兼見之證斯無遁情矣鞕音硬堅也蛔食蟲也按程郊倩云仲景六經條中不但從脈證上認病要人兼審及病情太陽曰惡寒陽明曰惡熱少陽曰喜嘔太陰曰食不下少陰曰但欲寐厥陰曰不欲食凡此皆病情也按柯韻伯云太陽為先天之巨陽其熱發於榮衛故一身手足壯熱陽明乃太少兩陽相合之陽其熱發於肌肉故蒸蒸發熱少陽為半表半裏之陽其熱發於腠理時開時合故往來寒熱此三陽發熱之差別也太陰為至陰無熱可發因為胃行津液以灌四旁故得主四肢而發熱於手足所以太陰傷寒手足自溫太陰中風四肢煩疼耳少陰為封蟄之本若少陰不藏則坎陽無蔽故有始受風寒而脈沉發熱者或始無表熱八九日來熱入膀胱致一身手足盡熱者厥陰當兩陰交盡一陽初生其傷寒也有從陰而先厥後熱者從陽而先熱後厥者或陽進而熱多厥少或陽退而熱少厥多或陰陽和而厥與熱相應者是三陰發熱之差別也按高士宗云熱陽氣也寒陰氣也惡寒者周身毛竅不得陽氣之衛外故皮毛嗇嗇然灑淅也人周身八萬四千毛竅太陽衛外之氣也若病太陽之氣則通體惡寒從頭項而至背膂太陽循行之經也若病太陽之經則其背惡寒惡寒之外又有身寒身寒者著衣重覆而身常寒乃三焦火熱之氣不能溫肌肉也本論云形冷惡寒者此三焦傷也即身寒之謂也按靈樞本藏篇云三焦膀胱者腠理毫毛其應是太陽又主通體之毫毛而為膚表之第一層故必首傷太陽也然亦有不從太陽而竟至陽明少陽以及於三陰者張令韶註云此又值三陰三陽所主之部位而受之也靈樞病形篇云中於面則下陽明中於項則下太陽中於頰則下少陽其中於膺背兩脅亦中其經又曰中於陰者常從胻臂始此皆不必拘於首傷太陽也柯韻伯云本論太陽受邪有中項中背之別中項則頭項強痛中背則背強𠘧𠘧也陽明有中膺中面之別中面則目痛鼻乾中膺則胸中痞鞕也少陽有中頰中脅之別中頰則口苦咽乾中脅則脅下痞鞕也此岐伯中陽溜經之義其云邪中於陰從胻臂始奈何謂自經及藏藏氣實而不能容則邪還於府故本論三陰皆有自利證是寒邪還府也三陰皆有可下證是熱邪還府也此岐伯中陰溜府之義按張令韶云傳經之法一日太陽二日陽明三日少陽四日太陰五日少陰六日厥陰六氣以次相傳周而復始一定不移此氣傳而非病傳也本太陽病不解或入於陽或入於陰不拘時日無分次第如傳於陽明則見陽明證傳於少陽則見少陽證傳於三陰則見三陰證論所謂陽明少陽證不見者為不傳也傷寒三日三陽為盡三陰當受邪其人反能食而不嘔者此為三陰不受邪也此病邪之傳也須知正氣之相傳自有定期病邪之相傳隨其證而治之而不必拘於日數此傳經之大關目也不然豈有一日太陽則見頭痛發熱等證至六日厥陰不已七日來復於太陽復又見頭痛發熱之證乎此必無之理也且三陰三陽上奉天之六氣下應地之五行中合人之藏府合而為一分而為三所該者廣今人言太陽止曰膀胱言陽明止曰胃言少陽止曰膽三陰亦然是以有傳足不傳手之說不知藏府有形者也三陰三陽無形者也無形可以該有形而有形不可以概無形故一言三陽而手足三陽俱在其中一言三陰而手足三陰俱在其中所以六經首節止提太陽之為病而不言足太陽足太陰之為病其義可思矣況論中厥陰心包少陽三焦太陰肺之證頗多又陽明燥結有不涉於大腸者乎傳足不傳手非也按內經云太陽為開陽明為闔少陽為樞太陰為開厥陰為闔少陰為樞此數語為審證施治之大關鍵至於病發何經或始終只在一經或轉屬他經或與他經合病併病各經自有各經之的證可驗原不可以日數拘而一日太陽至六日厥陰之數周而復始謂之經氣其日數一定不移醫者先審出確係那一經之病證再按各經值日之主氣定其微甚卜其生死乘其所值之經氣而救治之此論中之大旨也其一二日八九日十餘日等字皆是眼目不可只作閑字讀也按或問張令韶曰傷寒六氣相傳正傳而非邪傳固已不知無病之人正亦相傳否不然正自正傳邪自邪傳兩不相涉正傳可以不論何以傷寒必計日數也答曰無病之人由陰而陽由一而三始於厥陰終於太陽周而復始運行不息莫知其然無病之人經氣之傳無所憑驗病則由陽而陰由三而一始於太陽終於厥陰自得病之日即從太陽逆傳一日一經一逆則病再逆則甚三逆而死矣所以傷寒傳經不過三傳而止安能久逆也其有過十八日不愈者雖病而經不傳也不傳則勢緩矣補曰有病由陽而陰正氣逆行如天之五星逆行退舍乃其變也必待病退然後正氣復其常則仍順行而由陰出陽循行而不自覺此言傳經之理至為精當讀者當體會也按宋元後醫書皆謂邪從三陽傳入俱是熱證惟有下之一法論中四逆白通理中等方俱為直中立法何以謂之直中謂不從三陽傳入徑入三陰之臟惟有溫之一法凡傳經俱為熱證寒邪有直中而無傳經數百年來相沿之法也余向亦深信其然及臨證之久則以為不然直中二字傷寒論雖無明文而直中之病則有之有初證即見三陰寒證者宜大溫之有初病即是三陰熱證者宜大涼之大下之是寒熱俱有直中世謂直中皆為寒證者非也有謂遞次傳入三陰盡無寒證者亦非也蓋寒熱二氣盛則從化余揆其故則有二一從病體而分一從誤藥而變何則人之形有厚薄氣有盛衰臟有寒熱所受之邪每從其人之臟氣而為熱化寒化今試譬之於酒酒取諸水泉寒物也酒釀以曲蘗又熱物也陽臟之人過飲之不覺其寒第覺其熱熱性迅發則吐血面瘡諸熱證作矣陰臟之人過飲之不覺其熱但覺其寒寒性凝滯則停飲腹脹泄瀉諸寒邪作矣知此愈知寒熱之化由病人之體而分也何謂誤藥而變凡汗下失宜過之則傷正而虛其陽不及則熱熾而傷其陰虛其陽則從少陰陰化之證多以太陽少陰相表裏也傷其陰則從陽明陽化之證多以太陽陽明遞相傳也所謂寒化熱化由誤治而變者此也至云寒邪不相傳更為不經之說仲景云下利腹脹滿身體疼痛者先溫其裏乃攻其表溫裏宜四逆湯攻表宜桂枝湯此三陽陽邪傳入三陰邪從陰化之寒證也如少陰證下利白通湯主之此太陰寒邪入少陰之寒證也如下利清穀裏寒外熱汗出而厥者通脈四逆湯主之此少陰寒邪傳入厥陰之寒證也誰謂陰不相傳無陽從陰化之理乎末段採吳氏說與本註略有異同然大體卻不相悖按論中言脈每以寸口與趺陽少陰並舉又自序云按寸不及尺握手不及足人迎趺陽三部不參等語是遍求法所謂撰用素問九卷是也然論中言脈不與趺陽少陰併舉者尤多是獨取寸口法所謂撰用八十一難是也然仲景一部書全是活潑潑天機凡寸口與趺陽少陰對舉者其寸口是統寸關尺而言也與關尺並舉者是單指關前之寸口而言也然心榮肺衛應於兩寸即以論中所言之寸口俱單指關前之寸口而言未始不可也曰足太溪穴屬腎足趺陽穴屬胃仲景用少陰趺陽字眼猶云腎氣胃氣少陰診之於尺部趺陽診之於關部不拘拘於穴道上取診亦未始不可也然而仲景不言關尺止言少陰趺陽何也蓋兩寸主乎上焦榮衛之所司不能偏輕偏重故可以概言寸口也兩關主乎中焦而脾胃之所司左統於右若剔出右關二字執著又不該括不如止言趺陽之為得也兩尺主乎下焦而腎之所司右統於左若剔出左尺二字執著又不該括不如止言少陰之為得也至於人迎穴在結喉為足陽明之動脈診於右關更不待言矣而且序文指出三部二字醒出論中大眼目學者而不泥於古然後可以讀活潑潑之傷寒論正曰仲景診脈是人迎趺陽寸口太溪周身遍求至為精詳乃古法也與今之診法不同修園欲強通其說將遍診之法攔入寸口為今人說法則可為仲景作註則不可修園此論殆不可從補讀法曰仲景文法有引彼以例此者有因此而及彼者譬如文家有借賓定主法又是刑名有引案比例法蓋欲明乎此而又恐混乎彼勢不得不借彼以例此若讀者不知其文法將所引他經之證為比較者亦不知辨即混註為此經之證是膠柱鼓瑟矣總之仲景書每論一經之證而雜引他經非本經而見他經之證實引他經之證以較勘本經耳如厥陰篇之此非蛔厥是自明其非厥陰證乃引少陰之厥以相證也又如少陰之厥有四逆散厥陰之厥有四逆湯皆非本經之證只是引他經以為比而已若不分別見其論列何篇即註為何經之證則將賓作主矛盾叢生讀仲景書故當先講文法庶幾賓主不混
